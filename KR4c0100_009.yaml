front:
  text: 桂苑茟耕集卷之九别紙二十二首
  hash: sha256:aedd4cd88e83a604276aec46b4872c8a5a0034b62cc4c8b372ca1aa37d3f158e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_009-1a}
body:
  text: 都統王令公三首浙西周司空五首宣歙裘尚書三首壁州鄭尚書二首鄭太保相公一首郤護軍三首衛常侍一首泗州于尚書二首都統王令公三首近者専馳賀狀伏計已覽卑誠久絶來音但多景戀令公始終陶冶表裏經綸王商能止於訛言謝萬暫提其徑卒奪窮寇姦凶之魄活疲氓震懾之魂行既順天捷當克日某比承詔㫖久緩師期今伏見令公命許君親身先將校幸叶彈冠之望倍驚投𬒮之心已閲全師既離弊鎮雖自稱岸上之虎或謂當仁而不畏水中之龍實歸重德唯期助役非敢貪㓛欲取來月上旬决謀進退直衝宋野先㑹梁園謹遣専人咨探行李輒覬回信聊紓逺懷伏惟恩私深賜鍳察云云第二纍専寓狀粗得輸誠繼奉榮緘益銘殊不審近日尊體何似夏星沒火秋琯飄灰佇妖氣之雪銷想軍聲之雷振伏計振振君子之德仡仡勇夫之誠足可憑有慶之威誓無譁之衆㓛期一舉勢必萬全謝太傅之智謀預知大捷鮑參軍之歌詠唯佇中興伏惟慎保莭宣用諧時望某常銜曩顧况捧溫言朝禱暮祈可量卑懇云云第三某自承令公親率鋭師佇殱窮冦便謀訓錬欲赴戰征願折豺牙仰瞻馬首履山川而犯霜露久决心期擐甲胄而峙糗糧早成力辦不料徐戎匆聚費誓猶陳未豁征途難通饋輦以此早申誠懇但切憂惶伏想萬夫爭彉弩之先八表望建􅐤之令佇見龍歸魏闕却迎鳯舞荀池雖居喙息跛行盡解口祈心禱某早窺偉量遙禀壯圖仰視旄頭漸覔奔藏之處俯看屐齒唯懷斷折之虞恭俟捷音􅌹申賀禮未前祝望不暇啓陳云云浙西周寶司空五首昨奉緘翰兼寄示書碑㨾眷私既深披閲無倦其於榮抃無以喻陳某每念久握兵戎纍移莭制雖纘弓裘之業未揚鍾鼎之勳况乃來暮歌稀行春化拙豈期睿奬特采微勞許摽不朽之規逺降非常之寵至如仲尼儒術始流芳於沂水之湄元凱戰㓛方掛美於峴山之頂愚實何效遂叨此榮司空念切憂忘事諧響應猥垂恩力妙選書工所謂知臣者莫若聖君成我者固須良友有始有卒念兹在兹彼雖未起雕鐫此巳先深銘鏤今者干戈務擁茟硯事踈不及别請他人敬遵來命唯望早成刋勒實賴奬憐其碑詞同封呈上云云第二録溫者包藏異謀玷汚玄化螻蟈暫成聚窟鴟梟貴欲同巢誠謂天髙可欺不知日逺能照果彰罪跡遂舉刑書既絶慮於竊鈇俾成規於用銊言堪自賀事必相傳豈料司空染五色毫飛一函𥿄徵美詞於魯史辱虛譽于劉箋列土除凶不負國章在手臨風拜賜其如戎律拘身未啓素誠但銘殊貺第三楊示詔書仰窺聖㫖佇攀髙躅倍激壯懷司空寄綰吳門敢懸魏闕况奉臣㦲之命必興王者之師但希水簇舟船幸遵舊俗山堆戈甲早振雄威副大君旰食之勤慰下走朝飢之望某秖看風信便泛江程五兩翩翻解指朝天之路三軍踊躍待申破竹之㓛許接後塵逺示行日儻可從心所欲必希擕手同行王導有言無作椘囚相對劉琨養勇以誅逆虜為期事可榮今㓛何讓古既銜帝語勿老師徒願因江漢之征得遂瀟湘之遇云云第四伏以山嶽降靈尹吉甫之全德風雷奮氣竇世寧之異祥况乃景值新秋時當聖代間生英傑髙建勳庸伏惟相公名可掩瑜志堪奪璧魏公子春霆振響有物皆驚晉大夫冬日流輝無人不愛深藴安劉之業終成佐漢之謀今則又慶生辰永資景福出握元戎之柄既播嘉聲入持宰相之權則迎急詔禱祝攀戀不任下情有少續壽之儀謹具别狀寄獻云云第五專使押衙傅遜至啓閲華緘奉承珍貺光輝奪目荷戴銘心况承已奉堯言永除回恐繼好息民之義逺耀麟經輸忠報主之誠頻傳鴈訊喜氣連鋪於兩岸嘉聲遍振於四鄰敬仰成規深敦曩契唯願內防蝎譛外息狐疑必期勠力於公家不敢欺心於暗室伏惟深賜云云宣歙裴䖍餘尚書今月十六日裴校書至伏蒙深追曩顧逈黜違言損之以榮箋辱之以好幣情敦刻盡無非譽過之詞事繫琢磨宛是愛忘之眷既多受賜永切銜知不審自履閠秋尊體何似伏想蟬噪暮景鶴呌晴空樓下長溪閲政聲而不息窗中逺岫引詩思以無窮伏惟侍膳之餘公退之暇精加保愛佇俟寵徴某早願攀嵇近蒙善鄭深祝瞻望豈任下情云云苐二去年因景氏子有小人言讒誣之事多興噂􅊱之詞不少動成忌器久阻親仁昨以戎首既摧禍胎自剖遂修舊好聊逹微誠伏蒙尚書特請嘉賔遠賫厚幣俾息四方之笑永通兩地之歡捧嘉貺而增榮窺雅言而竊抃况對蓮池之客實逢桂苑之仙自此句渚清波已能流惡隋河遠派亦得洗瑕錬多而既識金精燒罷而共知玉冷伏惟仁鍳俯察愚衷云云苐三當司宣歙院被浙西越局侵權差官奪務以強自恃謂暴無傷仰計通仁偹詳深弊今者鹺務却仍舊貫已有詔書浙西踓近宋聾固殊魯瘠只解租庸副職尚提招討兵符冝慙已往之非用結將來之好竊知猶尋亂轍愈弄雄權再署周正罔思唐令宣歙院上違聖㫖下阻群情實虧臣子之誠豈逭鬼神之怒既失用和為貴唯知長惡不悛伏望尚書洞察事情俾全理體雖知秦鏡固無遺鍳之虞或恐齊竽猶有濫吹之者能摧狡妄遠托威嚴亦慮官吏驚疑必望深加撫恤幸甚壁州鄭凝績尚書二首賢尊相公不聞庸虗早垂眷顧每念攀鴻之懇頻傳繫鴈之書動皆陶侃之手蹤曾非陳遵之口占寶玩而字終不滅何翅三年輝榮而恩有所從倍賢十部况與尚書頃依鳯里巳覯龍章清談深仰於阿戎異禮得攀於侯昱髙山仰止何日忘之今者遠辱榮緘過垂虗譽永言抃荷但務鐫銘云云苐二某素無材術􅍝荷寵章頃握兵權方舉上將軍之令爰沾睿渥叨承大司馬之榮仰覩鳯書深慙豹略此時未審尚書躡八花㙛之影綴五色筆之詞刻畫恩深遊揚意重不獲早申感激遠謝褒稱又奉華緘方知麗藻雖早榮𥿄貴固無愧於士安而每想茟乾實有慙於玄照既多闕禮何贖深辜伏惟眷私終賜恕察云云太保相公鄭畋自承相公大郎再持廟算大庇藩條况蒙特假陶鈞正歸榷管雖則魯為長府仍舊貫之言行其如晉閲被廬作新軍之意切未能措手尋見移權凡所阻囏自能審度遠垂批示倍荷恩私如愚者焉所獲多矣敢速官謗有負親知伏惟鍳察謹狀護軍郤公甫將軍某用舍行藏唯遵帝命始終去就兾洽群情仰酬萬乘之知豈計一朝之忿昨者繼窺天㫖更勵氷心遂令専介傳書願得近鄰釋憾周相公似能遵禀免致悔尤既知􅕋瑗之非必息廉頗之怒一帶水永除多梗九重天實鍳忠誠自此日聆雞犬之音風識馬牛之性往來無壅彼此相成斯皆將軍遠贊睿慈旁垍和氣共成美事但荷深仁特辱芳緘過垂虗譽銘戴慙惕豈任下情苐二特垂寵示過辱奬詞竊知將校官寮三軍百姓共陳衆狀請發奏章以為煙塵自起於四郊塗炭遍加於九野唯有斗牛之境稍無戎馬之灾此實地分所招天心見庇蓋蒸黎之福也何㓛力之有焉豈料將軍過聽衆詞助成美事欲煩録奏特賜傳言然以拙政而誘群情以虗言而干聖鍳固為不可實所難當伏惟終寢奏論俾速官謗便同受賜非敢矯言伏惟允察云云第三特辱華緘猥傳吉語初驚善謔終荷深仁某每省庸虗過沽寵寄未能報主豈至封王雖漢代諸侯亦流恩於異姓而周書列爵須示賞於殊勳曽無剖竹之聲詎有分茅之望既非實譽必恐虗傳但慙眷私未敢陳謝云云前左省衛增常侍匆奉榮緘特垂善謔宣父則欽遵三益老君則唯贈一言仰銜成我之恩但抱起豫之歎自常侍遠勞仙騎俯顧弊藩竊承久陟道途倦垂軒蓋戀德而披雲尚阻懷誠而啓露未期每憶笑談莫勝飢渴某也早以勤行至道唯希翊贊聖朝張良正遇於漢恩敢言絶跡范蠡未除其越耻詎欲逃名非求八百歲以成春但讀五千言而勵節幸無大故且恕小瑕方願惠然肯來豈將率爾而對云云泗州于濤尚書蠢彼徐戎聚兹餘燼敢侵貴境再逞姦謀只應夾就誅夷固可立期擈滅况尚書德超㝎國威跨栗磾妙略防危實知孺子可教強鄰結憾是表忠臣不和去年既振雄威今日更資茂績此已微􅥟衆旅救援仁封永言牙瓜之勤須託指蹤之妙願諧群望暫屈長才輒敢請充都指揮使仰俟一呼之命同成九拒之㓛兾耀兵權早􅑒冦黨得脫齊桓之耻唯慿郤穀之賢伏惟眷私深賜照察苐二昨者竊聆有拔城之議遂申忠告兾保遠圖伏奉廽緘得窺深㫖且徐戎肆虐固非椘子之能泗俗懷忠不比蕭人之怯欲謀自潰何謂克終雖云有慮於防川豈可潜思於坐井某近奉詔㫖頗促軍期即得經過貴州便可剗除冦壘未見殷輪之苦且更勉旃其於沷釡之言已承命也他具前狀此不繁陳云云桂苑茟耕集卷之九
