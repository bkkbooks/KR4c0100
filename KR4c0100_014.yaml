body:
  text: 桂苑茟耕集卷之十四舉牒二十五首淮口鎮将李質充㳂淮應接使淮隂鎮将陳季連充㳂淮應接副使宋再雄差充水軍都知兵馬使蘇聿補衙前虞候曺威轉𥙷散兵馬使許勍授廬州刺史孫端權知舒州軍州事朱鄘補討擊使郝㝎補衙前兵馬使客将哥舒璫兼充樂榮使王䖏順充鹽城鎮使張晏充廬州軍前催陳使歸順軍補衙前兵馬使安再榮管臨淮都吕用之兼管山陽都兵馬使獬豸都将宿松縣令李敏之充招討都知兵馬使張雄充白沙鎮將安再榮充行營都指揮使徐莓充榷酒務􅌹知柳孝謙知白沙榷酒務行營都虞候曺鵬知行在進奏補莭度押衙朱祝大夫起復上都昊天觀聲讃大徳賜紫謝遵符充淮南管内威儀指揮諸宫觀制置淮口鎮将李質充㳂淮應接使牒奉䖏分用兵之難擇利而動不論遠者近者須賴掎之角之在安思危有僃無患前件官名超廣利勇繼雄飛自提外戍之軍毎審中權之要彼徐寇以屢侵吾圉莫戢其鋒急之則鼠竄彭墟緩之則豕豗椘岸遂徵衆旅俾剗羣兇豈從援溺之權将助焚枯之勢爾其指呼順命擒縦成功終令入海之波偏能流惡乃使暎淮之月早見洗兵茂賞髙懸良時倐徃勉思委寄勿負利終事湏差充㳂淮都應接使便仰量出兵士討除賊徒淮隂鎮将陳季連充㳂淮應接副使牒前件官勇扵戰賊樂在從軍操戈而只待舂喉彂箭而曽無曠目自居逺戍乆練雄兵毎聆捍蔽之勞能息奔衝之患今則未殱彭孽猶役椘軍将資首尾之權是成虵陣固藉瓜牙之利共展豹韜爾其跡脫伍符身居貮職􅌹防險道佇静長淮雖云廻遶之川未是縈紆之地坐思前哲猶傳胯下之蹤立取竒功好豁匈中之氣勉期竭莭實謂逢時事須差充㳂淮都應接副使便仰量出兵士討除賊徒宋再雄差充水軍都知兵馬使牒奉䖏分舟檝施利干戈騁威自古爲難在今所急固托縦横之略始成捍蔽之功前件官學劒有成彎弧自許嚼彘而當年逞俊曵牛而是䖏争雄髙列軍門深遵義路乆居江戍妙練舟師今以泗上流灾淮中聚冦既犯觀風之境頗昏暎月之流爾其摠握雄兵逺張秘䇿陸殱虵豕水截蛟螭早令賊壘皆平永使驚波不起用官物而討官賊吾不爲難探乕穴而㧞虎雛爾當自勗事須差充水軍都知兵馬使部領諸兵馬討除淮内賊徒蘇聿𥙷衙前虎候牒奉䖏分古之有言以小諭大則祁奚之請老也既當問嗣能自舉親情不渉扵阿私事何妨扵委用前件官早從吏役乆習武才父也暮年既思休退子之壮氣可代勤勞且令職在扵早趨乃欲功歸扵歷試無爽聿修之訓勉成負荷之規事須補充衙前虞候曺威轉補散兵馬使牒前件官勇而好禮勤以從戎此者逞陳衆之言詞傳郭維之訊問果驅險浪皆赴順風尋值沛戎来侵椘壤首登鶴列深挫豺牙摩壘而毎能率先殷輪而不欲言病忠誠勵已壯莭驚人今則郡守論功材官受賞俾昇峻級用報前功事須轉補散兵馬使許勍授廬州刺史牒奉䖏分良二千石古難其人屬郡之中吾有所試勤修静理今得人焉前件官自舉六條巳踰四載邑無吠犬境絶飛蝗外令丘井乂安内致閨門肅睦政聲則有口者謌詠仁譽則無翼而奮飛逺逹宸聰果霑殊寵美秩已題扵龍劒雄威愈振扵隼旟既銷滁水之灾来作廬江之福分憂救瘼能諧聖主之心紅斾碧幢豈落他人之手事須准敕授廬州刺史孫端權知舒州軍州事牒奉䖏分昔李弼有言大丈夫生世須履鋒刃以取功名安可碌碌依階求仕是乃蓄志能壮謀身克成夕脫羔裘朝驅熊軾不慙徃哲其在兹乎前件官族繼興公術傳武子能揚俊氣乆練雄師常安仡仡之徒果就循循之誘今則委之郡政試以公才既逢豹變之秋善守龍舒之境爲邦致理必見三年有成向國輸忠勉令百姓無患即迎帝賞更峻官榮事須差權知舒州軍州事朱鄘補討撃使納助軍錢遂加職賞牒奉䖏分漢有卜式者輸家財助軍費遂乃出自牧羊竪子終爲司憲大夫忠誠所施其利甚愽前件官石非硌硌鐡實錚錚知義重而財輕碩忘家而報國天龍地馬不蔵私室之中尺籍五苻可列軍門之下俾昇峻級以諷頑甿既有賴扵金多無自驚扵銅臭事須補充討撃使郝㝎補衙前兵馬使能手射七十步牒奉䖏分弧矢之利武藝所先號猿而永播嘉聲落鴈而能傳妙技况乃只慿五指能伐六鈞豈非邁古超今可謂神功聖術前件官早攻手射善應心機不彎三百斤弓能發七十歩箭紀昌若見必想攷弦吕布相逢固慙撚筈既抱非常之伎佇成可乆之功換滑㙜之舊資陟隋苑之髙級事須補充衙前兵馬使客将哥舒璫兼充樂營使牒前件官動彰毅勇静保兼中早成學劒之功不墜爲裘之業頗經歷試無怠聿修乆委賔司既見與言之可使俾兼樂職必期􅎖喜之克諧爾其有禮爲先無荒是誡迎送扵燕臺鄭驛指蹤扵廽雪遏雲勿使英賢或發飬痾之誚須令艶麗先緘笑躄之聲事須兼充樂營使王䖏順充鹽城鎮使牒奉䖏分大藩鎮之爲制也中屯銳師外列諸戍用僃腹心之患固慿瓜牙之勤前件官深藴壮圖挺生勇氣姜維若在未占雄児焦度相逢應饒健物毎展報恩之莭累申伐叛之功眷彼䀋城居于海岸苟或一同失理實為四逺多虞遂徴䖏順之名俾守防奸之任爾其效勇夫之重閇致危俗之安居蹔固封疆無念及瓜之限但逢寇孽勉揚破竹之聲事須補充䀋城鎮使張晏充廬州軍前催陣使牒奉䖏分師克在和兵貴在速若許緩其善陣誠為挫彼竒鋒用之則行時不可失前件官志能傳略名可止啼待逢盤錯之難碩展縦横之術今則舒猶叛椘衛巳伐邢雨雖潤扵興師雲未銷扵結陣遂使魚麗猛勢阻掃氛埃蟻聚頑徒敢安窟穴爾其驅之以馬箠訓之以豹篇事唯託扵一麾功必成扵百勝将迎軍賞佇送捷書事須差充廬州軍前催陣使歸順軍補衙前兵馬使牒奉䖏分前件官身榮豹飾志習龍韜奮心扵撃皷其鏜騁力扵挾輈以走早歸信義無憚勤勞去正冦㩀屬城兵徴諸郡共諫㣲孽各誓前驅既遵令扵牙璋冝陟名扵甲騎聊遷職秩用報軍功爾其勿朁忠誠更邀上賞事須補充衙前兵馬使安再榮管臨淮都牒奉䖏分西魏王羆率衆拒冦乃杖白挺大呼而詬曰老羆當道卧貛子郍得過敵見威勇果自驚奔則知猛将之名能奪叛徒之魄前件官夙精韜略歷試機謀甞犯重圍决成獨戰實可謂神出鬼没豈唯左旋右抽今之武力雖衰壮心益勵臨事而猶能強飯即戎而寧欲素飡蠢彼頑兇騷然侵優雖徵衆旅未建竒功眷彼臨淮䖏于要地其在訓之以三令激之以一呼審詳扵彼竭我盈成􅈬扵先難後獲老驥免嗟扵伏櫪無令駑馬争先秋鷹既遂扵下韝勿使妖狐得便事須差管臨淮都呂用之兼管山陽都知兵馬使牒奉䖏分仲尼云寛則得衆信則任人焉甞聆斯語今見其人前件官慶襲玉璜業精金版遵直道而利有攸徃奉公家而知無不爲是以晉作新軍權資䖏右齊行勇爵象許居先乃裨察俗之䂓動叶安民之策遂得晨羊罷飲夜犬停喧永除奸濫之源深得撫綏之道今以屬城多難散䘚無依窮猿既切扵投林飛鳥猶思扵擇木羣情所附戎略可嘉俾安其瞀瞀然来實倚其多多益辦無辭两役用展長才事須兼充山陽軍都知兵馬使獬豸都将牒奉䖏分凡標軍額須警衆心如指喻之非宜則訓齊而何在况乃均霑好爵共荷殊恩跡雖限扵柳營秩盡昇扵栢署冝加一䓁俾異三行前件官壮氣挺生忠誠卓立彍弩則前無強敵荷戈則動有成功累建戎勲遂霑爵賞今以狼星未滅鯨浪猶翻将申􅓍暴之能用示觸邪之號爾其勉思一角永息二心佇銷封豕之灾勿失神羊之性事須𥙷充獬豸軍都知兵馬使宿松縣令李敏之充招討都知兵馬使牒奉䖏分昔来護者立性卓犖初讀詩至撃皷其鏜踴躍用兵羔裘豹飾孔武有力乃捨書歎曰夫人在世固當如是㑹因滅賊以取功名安能區區􅌹事茟硯其後果申壮志累逢殊勲則知竒才所爲何代不有前件官精詳吏道㫄習戎機假百里之威則疲甿獲頼作萬夫之長則義旅知歸遂得縣道肅清鄰藩倚頼欲破蘄春之狡窟遥分江夏之兵權罷從役扵驅雞佇承乏扵建隼聊加職賞俾振軍聲是乃丈夫雄飛君子豹變勉驅甲騎逺應羽書既設援扵他邦必保安扵吾圉事須補充莭度衙前兵馬使兼充西南招討都知兵馬使張雄充白沙鎮将牒奉䖏分昇髙自卑君子所以勵素志辭大就小古人所以傳令名但能守莭不虧固在相時而動前件官宻懐義勇深貯議和頒條而政有嘉聲馭衆而軍無愠色今以新恩未降銳旅何安眷彼古津實為要路是成鎮務乃在江壖既居使府之要衝冝假公才而管轄况兼塲貨可贍軍須且卷豹韜共養斬蛟之勇佇迎鳳詔别遷建隼之榮事須差權句當白沙鎮務兼知塲司公事安再榮充行營都指揮使牒奉䖏分昔曺公爲樂府歌云老驥伏櫪志在千里烈士暮年壮心不已今猶古也我得人焉前件官百戰成功一麾出守曽安海俗永振風聲而乃不求更握乕符唯碩終申豹略豈覺老之将至毎俟用之則行今以大憝未殱外方多難諸藩命将無非竹簡探名逺道徴師或是葵丘代戎苟虧忠勇何蕩妖兇遂付重權佇觀竒䇿其在身先行伍頋指軍兵勉揚矍鑠之名無致遷延之役時不可失徃矣敬㢤事須差先行營都指揮使赴夀州西面僃禦討逐黄巢徒黨者徐莓充榷酒務􅌹知牒奉䖏分前件官彂跡戎行研心吏道忠勤所至幹濟可觀今則舉漢代之權宜搜杜康之利潤贍吾軍用藉爾公才既非若䖏先登無與衆人皆醉事須差句當天長縣榷酒務柳孝讓知白沙塲搉酒務牒奉䖏分前件官直道立身公途勵志學巳窺室家之富任曽致州縣之勞今以僃食三行搜資六物豈使弊歸扵下只令利在其中勉禀條章早申績効俾不欺扵釀具無自䧟扵醉郷事須差知白沙塲搉酒務行營都虞候牒奉䖏分前件官勇而好禮敏則有功膂力甚強腹心可委今以齊驅勁䘚俾剗羣凶爾其糺摘行間防虞境外宜拘小莭善事上官勿謂忠貞有乖輯睦能成勤効不恡甄酬事須補充行營都虞候曺鵬知行在進奏補充莭度押衙牒奉䖏分藩侯所任邸吏為先能傳萬里之音不墜九霄之命固憑幹濟方付重難前件官魯劌長􅫉魏仁雄族雖䖏干戈之列早閑刀茟之能遂使逺赴行朝􅌹司逓務覩六龍之仙蹕毎審廵逰傳九鳳之三言曽無阻滯以茲歷試深可奨酬今已秩亞憲卿官昇典午身得趨扵輦路職未稱扵轅門俾假牙璋遥分甲騎慎達上天之㫖以安外地之心爾能竭誠吾不恡賞事須改補攝莭度押衙依前知行在進奏朱祝大夫起復牒奉䖏分事䌓金革禮奪苴麻魯公制之扵前晉侯行之扵後盖乃從權順變是為移孝就忠苟不忘家将何報國前件官方從戎役毎藉公才遽鍾風樹之悲永違霜槿之養能勤泣血唯懼奪情然以羣冦未殱列藩多事礭執三年之愛仰辜萬乗之恩况承敕命指揮已許軍前驅使出如綸之睿㫖既俟成功衣夫錦之格言豈同前哲時異事異念茲在茲揚名顯親竭力從命孝之終也徃矣敬㢤事須牒舉起復差徃五嶺己来類㑹軍前公事上都昊天觀聲讃大徳賜紫謝遵符充淮南管内成儀指揮諸宫觀制置牒大徳真璞混成靈源廣潤淘俗態扵心水瑩仙女扵面氷蓬島神仙應待䘖杯之樂茅家兄弟敢攀執袂之逰猶思救苦扵寰中尚阻追歡扵物外屬以陣虵出穴戎馬生郊毎勤齋敬之心深假護持之力達聖聦而有謂施醮禮以無虧今則秦嶺烟昏難尋四老椘淮月皎幸伴八公但以桂苑䌓華楊都壮麗既見星壇月殿䖏䖏荒摧難期鶴駕霓旌時時降㑹欲設精嚴之僃須資揚統之權白馬将軍方役大朝之元帥青牛道士暫充下界之仙官比年既遂扵攀留他日必同扵輕舉事須請充淮南管内威儀兼指揮諸宫觀庄田䓁務桂苑茟耕集卷之十四
