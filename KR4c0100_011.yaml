front:
  text: 桂苑筆耕集卷之十一檄書四首書六首
  hash: sha256:66903acd9464205bac4384a5ea2d082530df30ad354ad1c0a7506f49d5a47fdc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_011-1a}
body:
  text: 都統巡官侍御史內供奉崔致逺撰檄黃巢書招趙璋書告報諸道徴會軍兵告報諸道徴促綱運答浙西周司空書答江西王尚書答徐州時溥書答襄陽郤將軍書浙西周寶司空書浙西護軍焦將軍書檄黃巢書廣明二年七月八日諸道都統檢校太尉某告黃巢夫守正修常曰道臨危制變曰權智者成之于順時愚者敗之於逆理然則雖百年繫命生死難期而萬事主心是非可辨今我以王師則有征無戰軍政則先惠後誅將期剋復上亰固且敷陳大信敬承嘉論用戢姦謀且汝素是遐氓驟為勍敵偶因乘勢輒敢亂常遂乃包藏禍心竊㺯神哭侵凌城闕穢黷宫闈既當罪極滔天必見敗深塗地噫唐虞已降苗扈弗賔無良無賴之徒不義不忠之輩爾曺所作何代而無逺則有劉曜王敦覬覦晉室近則有祿山朱泚吠噪皇家彼皆或手握強兵或身居重任叱吒則雷奔電走喧呼則霧塞煙橫然猶暫逞姦圖終殱醜類日輪闊輾豈縱妖氛天網髙懸必除凶族况汝出自閭閻之末起於壠畒之間以焚劫為良謀以殺傷為急務有大愆可以擢髮無小善可以贖身不唯天下之人皆思顯戮抑亦地中之鬼已議隂誅縱饒假氣逰魂早合亡神奪魄凡為人事莫若自知吾不妄言汝須審聽比者我國家德深含垢恩重棄瑕授爾莭旄寄爾方鎮爾猶自懷鴆毒不斂梟聲動則齧人行唯吠主乃至身負玄化兵纏紫微公侯則奔竄危途警蹕則巡逰逺地不能早歸德義但飬頑凶斯則聖上於汝有赦罪之恩汝則於國有辜恩之罪必當死亡無日何不畏懼于天况周鼎非發問之端漢宫豈偷安之所不知爾意終欲奚為汝不聽乎道德經云飄風不終朝驟雨不終日天地尚不能久而况于人乎又不聽乎春秋傳曰天之假助不善非祚之也厚其凶惡而降之罰今汝藏姦匿暴惡積禍盈危以自安迷以不復所謂燕巢幕上漫恣騫飛魚戲鼎中即看燋爛我緝熙雄略糾合諸軍猛將雲飛勇士雨集髙旌大斾圍將椘塞之風戰艦樓船塞斷吳江之浪陶太尉鋭于破敵楊司空嚴可稱神旁眺八維橫行萬里既謂廣張烈火爇彼鴻毛何殊髙舉泰山壓其鳥卵即日金神御莭水伯迎師商風助肅殺之威晨露滌昏煩之氣波濤既息道路即通當解纜于石頭孫權後殿佇落帆于峴首杜預前驅收復亰都剋期旬朔但以好生惡殺上帝深仁屈法申恩大朝令典討官賊者不懷私忿諭迷途者固在直言飛吾折簡之詞解爾倒懸之急汝其無成膠柱早學見機善自為謀過而能改若碩分茅列土開國承家免身首之橫分得功名之卓立無取信于面友可傳榮于耳孫此非兒女子所知實乃大丈夫之事早須相報無用見疑我命戴皇天信資白水必須言發響應不可恩多怨深或若狂走所牽酣眠未寤猶將拒轍固欲守株則乃批㷱拉豹之師一麾撲滅烏合鴟張之衆四散分飛身為齊斧之膏骨作戎車之粉妻兒被戮宗族見誅想當燃腹之時必恐噬臍不及爾須酌量進退分别否臧與其叛而滅亡曷若順而榮貴但所望者必能致之勉尋壯士之規立期豹變無執愚夫之慮坐守狐疑某告招趙璋書都統大尉馳問趙璋古人有言曰大厦成而燕雀相賀湯沐具而蟣蝨相吊審其賀之與吊由彼依之與違且爾同惡相成異謀斯搆遽為犯順尚敢偷安今我水陸徴軍天人助信久審風雲之會逺揚雷電之威即當行展豹韜立擒梟師剋收城闕靜剗煙塵想計爾曺具知吾意但以先春而後秋者天之道重賞而輕罰者君之恩遂乃馳吾咫尺之書問爾方寸之事爾等依慿大憝猾亂中朝罪已貫盈理須誅剪然若黃巢狠性能改雄心自新望其國封建彼家社勳葉可超今邁古恩榮可付子傅孫必為致之速相報也如或螳蜋努臂猰㺄磨牙輒欲拒張必當撲滅爾須審詳至理勸誘元凶欲令天下知名早申忠莭奈何草間求活終作叛徒况居成算之中即在覆巢之下死生有命禍福無門唯審是非可知成敗所謂燕雀相賀蟣蝨相吊實在于知與不知順與不順良時易失嘉會難逢生為有害之人死作無知之鬼深可恥也深可痛也勉惟去就早副指蹤悉之告報諸道會兵書中和二年五月十二日具䘖某謹告某州府莭度使逆賊黃巢自亂天常亟移星律縱使擢其賈髮誥罪難窮未能眷彼狄喉稔姦斯極神誅可俟鬼怪何慿而敢鴟張鳳城熊據龍闕至于五尺童子猶欲請纓况在四方諸侯忍為投袂偶屬朝廷密施廣畫先倚甸侯不勞十道徴驅必謂一麾蕩㝎豈料軍令雖殊于兒戲將名莫驗于童謡未暇搴旗旋聆反斾遂使犬猶狂吠猿不驚號徒招玩冦之譏孰擅弭兵之譽聖上暫飛日馭親省風謡蔭暍行恩睿慮則雖勞罪已慕羶結望羣情則却怨後豫然而自幸龜城久停鑾輅秦雲逺隔蜀柳再芳每興霜露之懷聖情可想未滅煙塵之患臣莭何安某去年羽􅊾先馳牙璋後舉唱義聲于遐邇養勇氣于偏裨于是廣徴陶侃之船久握辛毗之銊畫鷁齊飛于雪浪檣烏髙轉于煙空必欲帆張曉風旗寢夜月才離椘岸便到漢江直驅背水之師永破滔天之孽而乃未施豹略頻降鳳書已知諸道進軍不許逺藩離任詔旨云為朕全吳越之地遣朕無東南之憂是以再閲綸音遂回組甲蓋乃仰遵帝命固非敢緩師期今則萬里􅌹征誰能奮翼三年縱敵尚許磨牙賊巢雖戲鼎中已居機上掘尾狗子輒曽發狂斷頭將軍難可釋怒某聿忝握兵之要固當仗義而行近奉詔條遍徴戎旅一呼巡屬四集驍雄不唯被練三千實有控弦十萬已取今月十八日部領兵士發離本鎮必得直趨汴道徑入潼關立剗梟巢去迎鑾駕引舜風之無外覩漢日之再中况都統王令公暗運智機别操戎柄已提徑卒即展竒功足可相應軍謀共興王略諸道自從賊盛皆峻官榮尸為食上之毛盡思效命矧乃荷天之寵豈合安身且大丈夫之在世也壯氣難甲良時易失苟或美事讓他人之手殊恩負聖主之心則莫測肺肝何施面目固應各勤訓練同碩誅鋤瞻帝輦而魂飛擁戎軒而眥裂早看行色勿懷兒女之悲須把戰勳永作子孫之福謹告告報諸道徴促綱運書謹告某州莭度使夫忠于國者無以家為是故漢代微臣有傾産助邉之請魏朝烈士有舉宗陳力之言况乃邉寄榮身兵符在手遇大朝之多難見上宰之董戎而不能役致泛舟令行挈畚使戰士猶多飢色將軍未獻捷書但忝分憂實為忍恥某昨從中夏再集大軍不慙素飽之名已誓無譁之衆仍差都押衙韓汶先賫金帛百萬匹救接都統令公軍前既裝運船將扣飛楫言遵汴道徑指圃田必值徐戎來侵淮口扼斷河路攻圍郡城近者又擁凶徒直衝近境敢慿蝟結欲恣鯨吞當道既見阻艱暫須停駐遂乃㨂徴驍勇往討頑凶佇靜封疆便登道路必可豁通綱運廣偹供輸行稱東道主人非無意也立斬南陽太守竊有志焉諸道久荷深恩各居重任縱以家門寶貨猶合贍軍况將州縣賦輿豈宜壅利其宜武忠武天平昭義泰寧平虜河陽等道盡彂雄師咸從統命其依饋運各已通流其浙東淅西宣州江西鄂州荆南湖南嶺南福建等道今欲踰年未聆發運若由水路須入汴河如此稽留何因濟集必計杜畿美化遍得人心任峻竒謀兼施兵力速請同勤饋輦繼發綱船齊至都統軍前早期收復亰闕其徐州實為國蠧豈止鄰讎蓋以天暫容姦地猶聚慝昔為龐勛叛亂早合宫昨因時溥猖狂更宜塗地偶屬朝廷未誅大憝不問小瑕貴恱軍情驟加爵賞而乃時溥罔遵詔旨尚搆姦謀去年曽犯淮山今夏又侵泗水乃作黃巢外應久妨諸道進軍先須剗當路之豺狼後可殄壞堤之螻蟻兾使隋皇新路楊柳含春無令漢祖舊鄉荆榛撲地凡承寵寄共察忠誠謹告答浙西周司空某自忽覽來示驚憤兩深是何見事之乖如此發言之過且趙公約者背軍逃走行怙追擒遽投迹於貴藩遂偷生于逋藪今則異端斯搆細作為名若能懷上士之心豈可信下人之口談何容易事不酌量來示云位極上公權尊都統别興異見遽起他謀以何悔尤欲為燒劫此乃稍殊雅責僅涉穢詞鼠尚有皮蓋譏無禮駟難及舌亦誡慎言豈是不為虗兮誠非所可道也司空晚歲縱不以學識為從事雋才亦合以智謀相贊虗成啖飯難望和羮未諭是非須陳本末具摽五信無貯一疑且此三世立功無非報國四方出鎮曽不安家身持將相之權手握恩威之柄豈獨撫淮邉之俗終期安海內之人方􅋀緝綏何言侵伐其可信而不合疑者一也况今黃巾尚熾翠輦未歸方驅貔虎之師欲破豺狼之窟逺離弊鎮深託善鄰臨危而猶兾依慿守靜而更除損害其可信而不合疑者二也司空早聮中外永保初終言既馥于芝蘭操彌貞于松桂曽無釁隙每有音書偏深魯衛之情永絶張陳之事其可信而不合疑者三也浙西始為交代未得多時陶公之官柳誰移召伯之遺棠不讓至于賊壘猶將信義招降况是舊藩豈以兵戎侵逼其可信而不合疑者四也昨自師過江浦令肅雪霜軍門則擊柝夜嚴行路則銜枚晝靜豈有任從海則登舫趙公約則隔簾通報既不難為指麾又何易得直至上流嘉客不瑕接迎是何下等健兒敢來親近其可信而不合疑者五也粗申大較可察中心何乃慿叛卒之讒詞失賢人之事體以此陳奏聖主以此傳告諸侯非我無辭是誰有過細尋來旨莫測貴懷為當老耄所侵末年多變為復狂迷偶作忠莭遽乖夫耳不辨五聲曰聲目不分五采曰昧司空久當重寄已謂元臣因何妄發莠言或似自懷蓬性不知彭寵此時有按劒之疑却恐廉頗他日無負荆之處噫將帥則空榮列土君王則尚逺蒙塵更無匡復之誠唯有猜嫌之事祗隔一條水脈便興萬種風言必計心虗遂成口實大凡獻酬以禮來往為書理失其中事生非小且須審諦勿恣豪強于此難盡私誠其他僃載公牒無遺後悔併棄前功某白答江西王尚書十二月六日某白閣下逺損長書深貽善諭一覽而發皇耳目再窺而驚越神魂是何詞彩之彬彬能致言端之懇懇既知約我以禮方信起豫者商况乃事徴于羑里聖人道媲于首陽義士切磋雖至刻盡何勝敬佩良針􅌹銘鄙抱然慮虗聲易應真寶難知㺯唇吻以鑠金衆皆妙手拭瞳眸而辨玉多是清盲苟非原始要終則必唱豫和汝是以略陳梗概用察根源匪欲廣援古今所希暫曉左右僅同伐善豈免興慙君其審之僕所望也僕與浙師周司空早于鳳里相識亦為鴒原往還接載笑載言之時展如兄如弟之分况作建旟交代真為結綬相知既睦比鄰罷扄外户江南江北祗鬪行春三椘三吳盡喧來暮方謂慿我友歲寒之莭解吾君宵旰之憂豈料蒼烏髙飛翠華逺狩僕以久叨重寄便決専征偶緣兵力未加人心尚攝遂于春首先發羽書仍請都統判官顧雲協律議共成之事謀相見之期固非閲被廬之軍徴夾谷之會實欲親謀歃血方寫痛心若能接濟師徒粗得振揚聲勢而乃周司空却自棄同即異不能捨短從長忽疑惑于澠池謂矝誇于踐土便見戒嚴城壁阻塞津途搆猜嫌而信有小人遺故舊而曽無大過僕雖蓬彼怒但守吾真及至中夏出軍外方多事兾安弊鎮旁倚近鄰又合幕客過江請為都統副使豈衒弓旗之禮邀辟元戎祗慿鈇鉞之威撫綏近境周司空礭手阻意莞爾興譏不從固請之言自惜有餘之刃頴移曩顧但積沉見此初屯下瀨之師未設中流之誓猶淹水道久候天風軍聲既振于四鄰人意自防于兩岸偶有背軍官健趙公約者走投浙西釣以巧言搆為細作便移長牒妄説異端其書云位極上公權尊都統别興異見遽起他謀以何悔尤欲為燒劫僕以趙襄子之忍辱念茲在茲藺相如之慎微有始有卒遂馳書牒具述事情聞司空尚發怨言自懷怍色與宣護景虔貞徐師時溥者暗資積釁相應密謀各興梗路之兵戈遍告沿江之郡邑以至練成戰陳鎖斷征途僕若不辭險阻之虞必致殺傷之患坐甲而未期破竹回車而用待負荆尋屬繼奉絲綸不令離鎮遂驅組練却已班師雖云帝命斯遵實乃鄰兵所阻彼宣州者亦有所因春初冠犯黟州勢侵旬水况值前廉已去新帥未來既無禦捍之權恐落姦凶之便遂差押衙馮綬暫令安撫郡城蓋緣曽奉詔書特許便冝從事凡于制置得以指麾景虔貞常侍菽麥不分蘭蕕莫辨謂言専輒遽有侵凌殺害軍人劫掠財物慿綬幾臨死所劣得生還自此隋國怨興謝城信絶將投彼鼠其如有礙之時欲僨于豚又是無端之事且為含忍未及通和必知橫彼織羅巧成貝錦傳之子逺誰曰不然噫滔滔者天下皆同君子所恥泛泛如水中自樂壯夫不為但問事之若何則知曲之在彼今則特垂教督益驗奬憐自緣有理可申豈便無辭以對固非􅎖過不敢慿虗莊生不云乎其智適足以知人之過而不知其所以過若非辱殷勤之旨何以息睚眥之詞僕也不能嫉惡如讎唯以用和為貴但以賢愚共惑本末未彰復書而不覺詞繁比事而終慙理短身修三省勉尋曽子之規心敬一言永荷伯陽之惠幸垂鑒志某頓首答徐州時溥書六月十六日某白僕射足下特辱長牒仍移公牒細詳來旨頗涉多端有同戲以前言無乃驚于衆聽雖倚兵強力壯其如作偽心勞且泗州舊隸仁封新標使額固非郡守専輒蓋是朝廷指揮為在頃年獨全忠莭遂編名于防禦永傳賞于驍雄近者久結鄰讎蓋遵國典獨行直道固守危城嘗膽爭先斷頭非苦此亦古人云寧為忠鬼不作叛臣之義也况于尚書有㝎國恩威有栗磾武勇自安疲俗甚洽羣情每將勾踐單醪均沾無黨不獨臧洪薄粥分啜有餘固當散三年之儲充一日之費能敵衆安可待勞豈比于築室反耕杜門却掃者哉忽覩來示云泗州獨阻淮河自牢城壘使四方多阻諸道莫通而又每于朝廷妄為訕謗今有城中將校潛來計圖請少振兵戎即便期開泰者大凡人事莫若自知足下去年忍携不禁求榮頗切暫奮橫行之氣果成順守之權是以纍受國恩逺膺藩寄豈可尊身忽物是己非人偏致嫌于藺生終歸過于季氏其于淮河久阻道路不通皆因貴府出兵不是泗濵為梗是非可辨逺近所聆去歲夏初早蒙侵伐呼蟻軍于漣水拒虎旅于淮山此緣將援親仁難逃善戰爰謀薄伐用救倒懸君異荀吳莫振受降之譽僕慙吕布有虧解鬪之言泗州以實奏陳豈為謗讟僕也雖慙知已嘗敢薦賢亦曽録詔寄呈必合垂情見悉誰料既踰望始翻起釁端甲兵繼興疆場頻駭所云泗州城中將校頻來計圖此乃巧飾虗辭遍行長牒盡知譎誂孰肯詭隨朝廷以足下身處雄城刃多餘地委摧綱運兾濟權冝但自戢斂兵車必得通流饋輦今則却云奉朝廷意旨收徐泗封疆廣出師徒難窮事意必若足下訓戎勇鋭報主忠勤何不親總全軍往殱巨憝早立非常之效以酬不次之恩而乃知僕再次西征即謀北渡便侵泗境來犯淮壖負國家之寵榮搆州縣之患害幸其賊勢阻此師期未諭雅懷何辜聖奬言但繁于枝葉事莫究于根源來示又云比皆廬州海州皆為背叛纍來投欵不遣措詞者強謂恩情形于書札顔雖不厚心且何安彼東海廬江偶聚姦惡異端斯起既非鄭有人焉同氣相求盡是跖之徒也足下已居重任不徇危謀自守詔條何煩飾説僕纍將軍食頻救臨淮為分逆順之蹤令保始終之志實以泗州曽非杞子之無禮亦類展禽之有詞每當告急告窮唯以行仁行義唯望足下暫息餘怒深量逺圖且先報國之誠無急伐鄰之役兼覩詔書奬諭請與忠武協和足見睿情俾銷微憾在于臣子合更慎思求將安撫氓黎速自追回士卒苟或上負君命下違物情隔礙征途侵凌近境則亦難辭借一用試當千必見傷禽易驚困獸猶鬪悔須防後險已居前矧乃泗州以抱莭為命貴鎮以玩兵為務泗州則唯遵王化貴鎮則虗構牒詞以較否臧可知曲直是敢逺申忠告兾絶後誣正當聖主蒙塵未除禍難何忍諸侯列土更起兵戎猛發忠言懶為諂笑勉思大體勿暴小瑕必因此日所針却得後時見謝幸從誠信無損功名某官某頓首答襄陽郤將軍書中和二年七月四日具銜髙某謹復書于將軍閣下某側窺前史嘗慕古賢贈人以至言則老聃垂誡成我者良友則管仲知恩但恨季俗寢訛芳規僅喪豈期今日得覩餘風將軍唯恐掩瑜欲令磨玷特勞彩翰逺辱長箋初尋歸美之奬詞汗驚浹背後覽扶危之針諭淚迸沾頥既乃粲然可觀焉敢率爾而對輒慿毫素仰疏血誠終兾恩私略垂採覽幸甚幸甚某自去年春知冦侵秦甸帝幸蜀川欲會兵于大梁遂傳􅊾于外鎮練成軍伍選㝎行期便被武寧匆興戎役先侵泗境後犯淮壖聲言則狼顧舊封實意則鯨吞弊鎮長驅猛陳直犯近疆是以分遣偏裨果殱凶醜及當中夏乃出大軍既知其北路阻艱遂決于西征利涉尋奉詔旨云卿手下甲兵數少眼前防慮處多但保淮南之封疆協和浙右之師旅為朕全吳越之地遣朕無東南之憂言其垂功固亦不朽某以兵機固難自滯君命有所不從已事征行必期進發占風選日只欲奮飛又奉七月十一日詔旨云諸道師徒四面攻討計度收剋旦夕可期卿冝式遏寇戎饋輦粟帛何必離任則是勤王或恐餘孽遁逃最要先事布置以此再承綸旨遂駐舟師唯廣利權宜供戎費殊不知進退唯命是從無虧却被近鎮讒誣聖朝猜慮食駃騠之良肉何敢望焉絆騏驥之駿蹄無能為也遂使忠誠未展睿奬難期非敢自辜海內之人心但飬淮邉之兵力詢之于理良有所因將軍以泗州舊屬彭門謂某妄為占護必慮未詳狡計或採浮詞且徐州昨自侜張更無戢斂威權既盛暴虐轉深見某自五月初再謀征討已排徑卒欲援令公兼差都押衙韓汶先喪一百萬貫救濟都統軍前盡載舟船將臨道路又興兵甲來優疆陲把斷淮河蔟成寨柵是以行計猶阻羣情莫安細察徐州所為是作黃巢外應不然則何以每見當軍臨發即將凶黨奔衝又乃執稱泗濵阻絶汴路且臨淮則城孤氣寡劣保疲羸彭門則地險兵強恐行狂悖以茲斟酌可見端倪况無諸道綱船曽過泗州本路今則皆因此冠却滯諸綱近則浙東浙西逺則容府廣府並未聆饋運何濟急難某見蔟椘師俾誅餘孽一則遵行詔旨救援鄰封二則得靜長淮欲登征路固非貪泗民之租稅排徐師之兵戎蓋分曲直之端將保初終之莭泗州二年閉壘一境絶煙織婦停梭耕夫釋耒滿城軍食猶仰給于弊藩關郡賦與固難徴于疲俗將軍謂某藉某地利搆此鄰讎細閲來言難知深意泗州不獨咸通之際得振雄聲曽于天寶之中亦遵直道况于濤尚書政條既舉武略兼精收百姓之歡心得三軍之死力將軍便令棄而不問理復如何徐州實有大愆固非小患若將助虐豈謂輸忠某今所俟者􅓍當道之豺狼奮乘秋之雕鶚星言夙邁電擊専征必與王令公腹心見知首尾相應齊驅蛇陳豁展豹韜剋復上亰奉迎大駕亦不敢負秣陵之莭度爭強弩之功名所兾得繼前勞自防後患使藺相如之謙德不損雄威費無極之讒徒皆歸顯􅓍捨此之外餘無所云敬佩良針豈離愚抱伏惟鑒察某再拜浙西周寶司空書昨奉公牒云當道臨淮叛卒過江來投集衆廣場巳受降訖三復來示言難不酬且降之為名其理甚大虞舜之七旬苗格晉侯之三日原歸此皆以干紀亂常起兵動衆緩之則稔成患害急之則橫致殺傷遂假小慈終施大信能敷德化俾革姦凶若有偶聚萑蒲散為榛梗者共須撲滅勿使晏安今相公幸此鄰災樂其軍禍莫能嫉惡翻欲惠姦恐乖扙銊之威虗衒倒戈之捷且如去年陳儒徒伴唐宇貴鎮封疆僅有六萬餘人宣州日告危急此時相公何不招諭致令侵凌却見瑣瑣頑凶即自勤勤誘引莫測髙旨實辜衆心傳不云乎召外盜書不云乎為逋逃主稍詳至理無信虗詞昔漢朝胸奴叛黨來附景帝便欲與之封周亞夫曰彼背其主而見賞何以責人臣之莭以小喻大可量事情况臨淮一郡早從淝上行營及淮邉戰敵每有優賞曽無偏頗自是臨財則竸起貪心遇賊則皆無鬪志旋為逗撓猶與矝寬昨又請換都頭已依衆請殊不知犬易興于狂瘈豕難制于喧豗未盡誅擒便謀奔竄幸且未離近境固合同塞姦源在此既已不忠于彼亦應非利石祁子所云天下之惡一也惡于宋而保于我保之何補其在茲乎况凡鄰府事宜一彼一此互相救援同致安寧是以前年六月中貴鎮有天平潞府元從兵士背叛奔逃數僅百人為患非小遂蒙移牒請為追擒當使羌都將梁椘部領馬軍所在討襲并各帖管內諸州令差精兵同力捕逐尋即諸鎮及東塘逰奕使相次牧獲三十八人才見擒來便令押送續得梁椘狀報到濠州界趂及殘孽殺得三十餘人其餘漏網之徒盡以傷弓而走所生擒之凶黨皆就􅓍于貴藩能致彼之快心實賴此之勞力今則却見臨淮叛卒特向沿江招呼便稱受降仍補職纍牒咨請不送過江搜慝何多飬姦斯甚敢言以怨報德實恐在安忘危詩云投我以木瓜報之以瓊琚匪報也永以為好此乃國風遺訓昭晣可觀相公通仁略賜詳度無自賈天下之􅓍笑也其他已其回牒伏惟俯賜照察浙西護軍焦將軍書昨有臨淮背叛兵士誅擒不盡奔迸過江便蒙貴鎮相公特許歸降遍加補署兼移公牒頗搆虗詞既乖七縱之謀誰謂三驅之禮蓋是幸災樂禍固非撫士安人自古受降之為義也叛而伐之服而捨之忠信能敷德刑乃就或以賊數則動盈千萬姦謀則難測二三若欲戰爭恐多傷殺或吹笳感動或書箭招呼免致膏鋒俾從肉袒其或蕞爾凶狡率然叛離兔奔岡而終必自顛鼠失穴而欲將安往在于接境合與同擒不料豁開叛換之門深作逋逃之藪慰安螻蟻雖欲好生訓練㷱羆有何用處才招稔惡之輩遽衒受降之名藴豹韜而略不施張對龍莭而恐須慙愧魯史云晉椘設誓無相加戎同恤災危備救凶患若有害椘則晉伐之在晉椘亦如之交贄往來道路無壅謀其不協而討不庭此則古時敵國猶保話言今日善鄰豈傷師律况晉椘則各在逺地揚潤則只隔長江曽無交惡之端豈有相欺之事實驚衆聽甚爽逺圖已無蠶女爭桑永安兩境冝效農夫去草靜剗本根伏惟將軍逺護兵符共成王事必不欲和之如響知而不言唯望稍致良針終除巨弊永使必誠必信誰云莫往莫來此既無噂􅊱以背憎彼亦免忸怩于顔厚幸垂採聽特惠終始伏惟云云桂苑筆耕集卷之十一
