front:
  text: 桂苑筆耕集卷之十一檄書四首書六首
  hash: sha256:66903acd9464205bac4384a5ea2d082530df30ad354ad1c0a7506f49d5a47fdc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_011-1a}
body:
  text: 都統廵官侍御史内供奉崔致逺撰檄黄巢書招趙璋書告報諸道徴㑹軍兵告報諸道徴促綱運荅浙西周司空書荅江西王尚書荅徐州時溥書荅襄陽郄将軍書浙西周寳司空書浙西護軍焦将軍書檄黄巢書廣明二年七月八日諸道都統檢校太尉某告黄巢夫守正修常曰道臨危制變曰權智者成之扵順時愚者敗之於逆理然則雖百年繋命生死難期而萬事主心是非可辨今我以王師則有征無戰軍政則先恵後誅将期剋復上亰固且敷陳大信敬承嘉論用戢奸謀且汝素是遐甿驟爲勍敵偶因乗勢輒敢亂常遂乃包蔵禍心竊㺯神哭侵凌城闕穢黷宫闈既當罪極滔天必見敗深塗地噫唐虞已降苗扈弗賔無良無賴之徒不義不忠之軰爾曺所作何代而無逺則有劉曜王敦覬覦晉室近則有禄山朱泚吠噪皇家彼皆或手握強兵或身居重任叱吒則雷奔電走喧呼則霧塞烟横然猶暫逞奸圖終殱醜類日輪闊輾豈縱妖氛天網髙懸必除兇族况汝出自閭閻之末起於壠畒之間以焚劫爲良謀以殺傷爲急務有大愆可以擢髮無小善可以贖身不唯天下之人皆思顯戮抑亦地中之鬼已議隂誅縦饒假氣逰魂早合亡神奪魄凡爲人事莫若自知吾不妄言汝須審聴比者我國家徳深含垢㤙重棄瑕授爾莭旄寄爾方鎮爾猶自懐鴆毒不歛梟聲動則齧人行唯吠主乃至身負玄化兵纏紫㣲公侯則犇竄危途警蹕則廵逰逺地不能早歸徳義但飬頑兇斯則聖上於汝有赦罪之恩汝則於國有辜恩之罪必當死亡無日何不畏懼于天况周鼎非發問之端漢宫豈偷安之所不知爾意終欲奚爲汝不聴乎道徳經云飄風不終朝驟雨不終日天地尚不能乆而况扵人乎又不聴乎春秋傳曰天之假助不善非祚之也厚其凶惡而降之罰今汝蔵奸匿暴惡積禍盈危以自安迷以不復所謂燕巢幕上漫恣騫飛魚戲鼎中即㸔燋爛我緝熈雄略糺合諸軍猛将雲飛勇士雨集髙旌大斾圍将椘塞之風戰艦樓舡塞㫁呉江之浪陶太尉銳扵破敵楊司空嚴可稱神㫄眺八維横行萬里既謂廣張烈火爇彼鴻毛何殊髙舉泰山壓其鳥卵即日金神御莭水伯迎師商風助肅殺之威晨露滌昏煩之氣波濤既息道路即通當解䌫扵石頭孫權後殿㑏落帆扵峴首杜預前驅收復亰都剋期旬朔但以好生惡殺上帝深仁屈法申恩大朝令典討官賊者不懐私忿諭迷途者固在直言飛吾折簡之詞解爾倒懸之急汝其無成膠柱早學見機善自爲謀過而能改若碩分茅列土開國承家免身首之横分得功名之卓立無取信扵面友可傳榮扵耳孫此非児女子所知實乃大丈夫之事早須相報無用見疑我命戴皇天信資白水必須言發響應不可恩多㤪深或若狂走所牽酣眠未寤猶将拒轍固欲守株則乃批㷱拉豹之師一麾撲滅烏合䲭張之衆四散分飛身爲齊斧之膏骨作戎車之粉妻児被戮宗族見誅想當燃腹之時必恐噬臍不及爾須酌量進退分别否臧與其叛而滅亡曷若順而榮貴但所望者必能致之勉尋壮士之䂓立期豹變無執愚夫之慮坐守狐疑某告招趙璋書都統大尉馳問趙璋古人有言曰大厦成而燕雀相賀湯沐具而蟣蝨相吊審其賀之與吊由彼依之與違且爾同惡相成異謀斯搆遽爲犯順尚敢偷安今我水陸徴軍天人助信乆審風雲之㑹逺揚雷電之威即當行展豹韜立擒梟師剋收城闕静剗烟塵想計爾曺具知吾意但以先春而後秋者天之道重賞而輕罰者君之恩遂乃馳吾咫尺之書問爾方寸之事爾䓁依慿大憝猾亂中朝罪已貫盈理須誅剪然若黄巢狠性能改雄心自新望其國封建彼家社勲葉可超今邁古恩榮可付子傅孫必爲致之速相報也如或螗蜋努臂猰㺄磨牙輒欲拒張必當撲滅爾須審詳至理勸誘元兇欲令天下知名早申忠莭柰何草間求活終作叛徒况居成算之中即在覆巢之下死生有命禍福無門唯審是非可知成敗所謂燕雀相賀蟣蝨相吊實在扵知與不知順與不順良時易失嘉㑹難逢生爲有害之人死作無知之鬼深可恥也深可痛也勉惟去就早副指蹤悉之告報諸道㑹兵書中和二年五月十二日具䘖某謹告某州府莭度使逆賊黄巢自亂天常亟移星律縦使擢其賈髪誥罪難窮未能眷彼狄㗋稔奸斯極神誅可俟鬼恠何慿而敢䲭張鳳城熊據龍闕至扵五尺童子猶欲請纓况在四方諸侯忍為投袂偶屬朝廷宻施廣畫先倚甸侯不勞十道徴驅必謂一麾蕩㝎豈料軍令雖殊扵児戲将名莫驗扵童謡未暇搴旗旋聆反斾遂使犬猶狂吠猿不驚號徒招翫冦之譏孰擅弭兵之譽聖上蹔飛日馭親省風謡䕃暍行恩睿慮則雖勞罪已慕羶結望羣情則却㤪後予然而自幸龜城乆停鑾輅秦雲逺隔蜀柳再芳毎興霜露之懐聖情可想未滅烟塵之患臣莭何安某去年羽􅊾先馳牙璋後舉唱義聲扵遐邇養勇氣扵偏裨扵是廣徴陶侃之舡乆握辛毗之銊畫鷁齊飛扵雪浪檣烏髙轉扵烟空必欲帆張曉風旗寢夜月纔離椘岸便到漢江直驅背水之師永破滔天之孽而乃未施豹略頻降鳳書已知諸道進軍不許逺藩離任詔㫖云爲朕全呉越之地遣朕無東南之憂是以再閱綸音遂回組甲盖乃仰遵帝命固非敢緩師期今則萬里􅌹征誰能奮翼三年縦敵尚許磨牙賊巢雖戲鼎中已居机上掘尾狗子輒曽發狂㫁頭将軍難可釋怒某聿忝握兵之要固當仗義而行近奉詔條遍徴戎旅一呼廵屬四集驍雄不唯被練三千實有控弦十萬已取今月十八日部領兵士發離本鎮必得直趨汴道徑入潼闗立剗梟巢去迎鑾駕引舜風之無外覩漢日之再中况都統王令公暗運智機别操戎柄已提勁䘚即展竒功足可相應軍謀共興王略諸道自從賊盛皆峻官榮尸爲食上之毛盡思効命矧乃荷天之寵豈合安身且大丈夫之在世也壮氣難甲良時易失苟或羙事讓他人之手殊恩負聖主之心則莫測肺肝何施面目固應各勤訓練同碩誅鋤瞻帝輦而魂飛擁戎軒而眥裂早㸔行色勿懐児女之悲須把戰勲永作子孫之福謹告告報諸道徴促綱運書謹告某州莭度使夫忠扵國者無以家爲是故漢代㣲臣有傾産助邉之請魏朝烈士有舉宗陳力之言况乃邉寄榮身兵符在手遇大朝之多難見上宰之董戎而不能役致泛舟令行挈畚使戰士猶多飢色将軍未獻捷書但忝分憂實爲忍恥某昨從中夏再集大軍不慙素飽之名已誓無譁之衆仍差都押衙韓汶先賫金帛百萬疋救接都統令公軍前既装運舡将扣飛檝言遵汴道徑指圃田必值徐戎来侵淮口扼㫁河路攻圍郡城近者又擁兇徒直衝近境敢慿蝟結欲恣鯨吞當道既見阻艱暫須停駐遂乃㨂徴驍勇徃討頑兇佇静封疆便登道路必可豁通綱運廣偹供輸行稱東道主人非無意也立斬南陽太守竊有志焉諸道乆荷深恩各居重任縱以家門寶貨猶合贍軍况将州縣賦輿豈宜壅利其宜武忠武天平昭義泰寧平虜河陽䓁道盡彂雄師咸從綂命其依饋運各已通流其浙東淅西宣州江西鄂州荆南湖南嶺南福建䓁道今欲踰年未聆發運若由水路須入汴河如此稽留何因濟集必計杜畿美化遍得人心任峻竒謀兼施兵力速請同勤饋輦繼發綱舡齊至都統軍前早期收復亰闕其徐州實爲國蠧豈止鄰讎盖以天暫容奸地猶聚慝昔爲龐勛叛亂早合宫昨因時溥猖狂更宜塗地偶屬朝廷未誅大憝不問小瑕貴恱軍情驟加爵賞而乃時溥罔遵詔㫖尚搆奸謀去年曽犯淮山今夏又侵泗水乃作黄巢外應乆妨諸道進軍先須剗當路之豺狼後可殄壊堤之螻蟻兾使隋皇新路楊柳含春無令漢祖舊郷荆榛撲地凡承寵寄共察忠誠謹告荅浙西周司空某自忽覧来示驚憤兩深是何見事之乖如此發言之過且趙公約者背軍逃走行怙追擒遽投跡於貴藩遂偷生扵逋藪今則異端斯搆細作爲名若能懐上士之心豈可信下人之口譚何容易事不酌量来示云位極上公權尊都統别興異見遽起他謀以何悔尤欲爲燒刼此乃稍殊雅責僅渉穢詞䑕尚有皮盖譏無禮駟難及舌亦誡慎言豈是不爲虗兮誠非所可道也司空晚歲縱不以學識爲從事雋才亦合以智謀相賛虗成㗖飯難望和羮未諭是非須陳本末具摽五信無貯一疑且此三世立功無非報國四方出鎮曽不安家身持将相之權手握恩威之柄豈獨撫淮邉之俗終期安海内之人方􅋀緝綏何言侵伐其可信而不合疑者一也况今黄巾尚熾翠輦未歸方驅貔虎之師欲破豺狼之窟逺離弊鎮深託善鄰臨危而猶兾依慿守静而更除損害其可信而不合疑者二也司空早聮中外永保初終言既馥扵芝蘭操彌貞扵松桂曽無釁隙毎有音書偏深魯衛之情永絶張陳之事其可信而不合疑者三也浙西始爲交代未得多時陶公之官柳誰移召伯之遺棠不讓至扵賊壘猶将信義招降况是舊藩豈以兵戎侵逼其可信而不合疑者四也昨自師過江浦令肅雪霜軍門則擊柝夜嚴行路則銜枚晝静豈有任從海則登舫趙公約則隔簾通報既不難爲指麾又何易得直至上流嘉客不瑕接迎是何下䓁健児敢来親近其可信而不合疑者五也粗申大較可察中心何乃慿叛卒之讒詞失賢人之事軆以此陳奏聖主以此傳告諸侯非我無辭是誰有過細尋来㫖莫測貴懐爲當老耄所侵末年多變爲復狂迷偶作忠莭遽乖夫耳不辨五聲曰聲目不分五采曰昧司空乆當重寄已謂元臣因何妄發莠言或似自懐蓬性不知彭寵此時有按劒之疑却恐廉頗他日無負荆之䖏噫将帥則空榮列土君王則尚逺蒙塵更無匡復之誠唯有猜嫌之事祗隔一條水脉便興萬種風言必計心虗遂成口實大凡獻酬以禮来往爲書理失其中事生非小且須審諦勿恣豪強扵此難盡私誠其他僃載公牒無遺後悔併棄前功某白荅江西王尚書十二月六日某白閤下逺損長書深貽善諭一覧而發皇耳目再窺而驚越神魂是何詞彩之彬彬能致言端之懇懇既知約我以禮方信起予者商况乃事徴扵羑里聖人道媲扵首陽義士切磋雖至刻盡何勝敬佩良箴􅌹銘鄙抱然慮虗聲易應真寳難知㺯唇吻以鑠金衆皆妙手拭瞳眸而辨玉多是清盲苟非原始要終則必唱予和汝是以略陳梗㮣用察根源匪欲廣援古今所希暫曉左右僅同伐善豈免興慙君其審之僕所望也僕與浙師周司空早扵鳳里相識亦爲鴒原徃還接載咲載言之時展如兄如弟之分况作建旟交代真爲結綬相知既睦比鄰罷扄外户江南江北祗闘行春三椘三呉盡喧来暮方謂慿我友歲寒之莭解吾君宵旰之憂豈料蒼烏髙飛翠華逺狩僕以乆叨重寄便决専征偶縁兵力未加人心尚攝遂扵春首先發羽書仍請都統判官頋雲協律議共成之事謀相見之期固非閱被廬之軍徴夾谷之㑹實欲親謀㰱血方寫痛心若能接濟師徒粗得振揚聲勢而乃周司空却自棄同即異不能捨短從長忽疑惑扵澠池謂矝誇扵踐土便見戒嚴城壁阻塞津途搆猜嫌而信有小人遺故舊而曽無大過僕雖蓬彼怒但守吾真及至中夏出軍外方多事兾安弊鎮㫄倚近鄰又合幕客過江請爲都統副使豈衒弓旗之禮邀辟元戎祗慿鈇鉞之威撫綏近境周司空礭手阻意莞爾興譏不從固請之言自惜有餘之刃頴移曩頋但積沉見此初屯下瀨之師未設中流之誓猶淹水道乆候天風軍聲既振扵四鄰人意自防扵両岸偶有背軍官健趙公約者走投浙西釣以巧言搆爲細作便移長牒妄說異端其書云位極上公權尊都統别興異見遽起他謀以何悔尤欲爲燒刼僕以趙襄子之忍辱念茲在茲藺相如之慎㣲有始有䘚遂馳書牒具述事情聞司空尚發㤪言自懐怍色與宣護景䖍貞徐師時溥者暗資積釁相應宻謀各興梗路之兵戈遍告㳂江之郡邑以至練成戰陣鎻㫁征途僕若不辭險阻之虞必致殺傷之患坐甲而未期破竹廻車而用待負荆尋屬繼奉絲綸不令離鎮遂驅組練却已班師雖云帝命斯遵實乃鄰兵所阻彼宣州者亦有所因春初冠犯黟州勢侵旬水况值前廉已去新帥未来既無禦捍之權恐落奸兇之便遂差押衙馮綬暫令安撫郡城盖縁曽奉詔書特許便冝從事凡扵制置得以指麾景䖍貞常侍菽麥不分蘭蕕莫辨謂言専輙遽有侵凌殺害軍人刼掠財物慿綬㡬臨死所劣得生還自此隋國㤪興謝城信絶将投彼䑕其如有礙之時欲僨扵䐁又是無端之事且爲含忍未及通和必知横彼織羅巧成貝錦傳之子逺誰曰不然噫滔滔者天下皆同君子所恥泛泛如水中自樂壮夫不爲但問事之若何則知曲之在彼今則特垂敎督益驗奬憐自縁有理可申豈便無辭以對固非􅎖過不敢慿虗荘生不云乎其智適足以知人之過而不知其所以過若非辱殷勤之㫖何以息睚眦之詞僕也不能嫉惡如讎唯以用和爲貴但以賢愚共惑本末未彰復書而不覺詞䌓比事而終慙理短身修三省勉尋曽子之䂓心敬一言永荷伯陽之惠幸垂鍳志某頓首荅徐州時溥書六月十六日某白僕射足下特辱長牒仍移公牒細詳来㫖頗渉多端有同戲以前言無乃驚扵衆聴雖倚兵強力壮其如作僞心勞且泗州舊隷仁封新標使額固非郡守専輙盖是朝廷指揮爲在頃年獨全忠莭遂編名扵防禦永傳賞扵驍雄近者乆結鄰讎盖遵國典獨行直道固守危城甞膽争先㫁頭非苦此亦古人云寧爲忠鬼不作叛臣之義也况于尚書有㝎國㤙威有栗磾武勇自安疲俗甚洽羣情毎将勾踐單醪均沾無黨不獨臧洪薄粥分啜有餘固當散三年之儲充一日之費能敵衆安可待勞豈比扵築室反耕杜門却掃者㢤忽覩来示云泗州獨阻淮河自牢城壘使四方多阻諸道莫通而又每扵朝廷妄為訕謗今有城中将校潜来計圖請少振兵戎即便期開泰者大凡人事莫若自知足下去年忍携不禁求榮頗切暫奮横行之氣果成順守之權是以累受國㤙逺膺藩寄豈可尊身忽物是己非人偏致嫌扵藺生終歸過扵季氏其扵淮河乆阻道路不通皆因貴府出兵不是泗濵爲梗是非可辨逺近所聆去歲夏初早蒙侵伐呼蟻軍扵漣水拒虎旅扵淮山此縁将援親仁難逃善戰爰謀薄伐用救倒懸君異荀呉莫振受降之譽僕慙吕布有虧解闘之言泗州以實奏陳豈爲謗讟僕也雖慙知已甞敢薦賢亦曽録詔寄呈必合垂情見悉誰料既踰望始翻起釁端甲兵繼興疆塲頻駭所云泗州城中将校頻来計圖此乃巧飾虗辭遍行長牒盡知譎誂孰肯詭随朝廷以足下身䖏雄城刃多餘地委摧綱運兾濟權冝但自戢歛兵車必得通流饋輦今則却云奉朝廷意㫖收徐泗封疆廣出師徒難窮事意必若足下訓戎勇銳報主忠勤何不親摠全軍徃殱巨憝早立非常之効以酬不次之恩而乃知僕再次西征即謀北渡便侵泗境来犯淮壖負國家之寵榮搆州縣之患害幸其賊勢阻此師期未諭雅懐何辜聖奨言但䌓扵枝葉事莫究扵根源来示又云比皆廬州海州皆爲背叛累来投欵不遣措詞者強謂恩情形扵書札顔雖不厚心且何安彼東海廬江偶聚奸惡異端斯起既非鄭有人焉同氣相求盡是跖之徒也足下已居重任不徇危謀自守詔條何煩飾說僕累将軍食頻救臨淮爲分逆順之蹤令保始終之志實以泗州曽非杞子之無禮亦類展禽之有詞毎當告急告窮唯以行仁行義唯望足下暫息餘怒深量逺圖且先報國之誠無急伐鄰之役兼覩詔書奬諭請與忠武協和足見睿情俾銷㣲憾在扵臣子合更慎思求将安撫氓黎速自追廻士卒苟或上負君命下違物情隔礙征途侵凌近境則亦難辭借一用試當千必見傷禽易驚困獸猶闘悔湏防後險已居前矧乃泗州以抱莭爲命貴鎮以翫兵爲務泗州則唯遵王化貴鎮則虗構牒詞以較否臧可知曲直是敢逺申忠告兾絶後誣正當聖主蒙塵未除禍難何忍諸侯列土更起兵戎猛發忠言懶爲謟笑勉思大體勿暴小瑕必因此日所箴却得後時見謝幸從誠信無損功名某官某頓首荅襄陽郄将軍書中和二年七月四日具銜髙某謹復書于将軍閣下某側窺前史甞慕古賢贈人以至言則老聃垂誡成我者良友則管仲知恩但恨季俗寑訛芳䂓僅䘮豈期今日得覩餘風将軍唯恐掩瑜欲令磨玷特勞彩翰逺辱長牋初㝷歸美之奬詞汗驚浹背後覧扶危之箴諭淚迸沾頥既乃粲然可觀焉敢率爾而對輒慿毫素仰䟽血誠終兾恩私略垂採覧幸甚幸甚某自去年春知冦侵秦甸帝幸蜀川欲㑹兵扵大梁遂傳􅊾扵外鎮練成軍伍選㝎行期便被武寧怱興戎役先侵泗境後犯淮壖聲言則狼頋舊封實意則鯨吞弊鎮長驅猛陣直犯近疆是以分遣偏裨果殱兇醜及當中夏乃出大軍既知其北路阻艱遂决扵西征利涉尋奉詔㫖云卿手下甲兵數少眼前防慮䖏多但保淮南之封疆恊和浙右之師旅爲朕全吴越之地遣朕無東南之憂言其垂功固亦不朽某以兵機固難自滯君命有所不從已事征行必期進發占風選日只欲奮飛又奉七月十一日詔㫖云諸道師徒四面攻討計度收剋旦夕可期卿冝式遏寇戎饋輦粟帛何必離任則是勤王或恐餘孽遁逃㝡要先事布置以此再承綸㫖遂駐舟師唯廣利權宜供戎費殊不知進退唯命是從無虧却被近鎮䜛誣聖朝猜慮食駃騠之良肉何敢望焉絆騏驥之駿蹄無能爲也遂使忠誠未展睿奨難期非敢自辜海内之人心但飬淮邉之兵力詢之扵理良有所因将軍以泗州舊屬彭門謂某妄爲占護必慮未詳狡計或採浮詞且徐州昨自侜張更無戢歛威權既盛暴虐轉深見某自五月初再謀征討已排勁卒欲援令公兼差都押衙韓汶先䘮一百萬貫救濟都統軍前盡載舟舡将臨道路又興兵甲来優疆陲把㫁淮河蔟成寨柵是以行計猶阻羣情莫安細察徐州所爲是作黄巢外應不然則何以毎見當軍臨發即将兇黨奔衝又乃執稱泗濵阻絶汴路且臨淮則城孤氣寡劣保疲羸彭門則地險兵強恐行狂悖以茲斟酌可見端倪况無諸道綱舡曽過泗州本路今則皆因此冠却滯諸綱近則浙東浙西逺則容府廣府並未聆饋運何濟急難某見蔟椘師俾誅餘孽一則遵行詔㫖救援鄰封二則得静長淮欲登征路固非貪泗民之租稅排徐師之兵戎盖分曲直之端将保初終之莭泗州二年閉壘一境絶烟織婦停梭耕夫釋耒滿城軍食猶仰給扵弊藩闗郡賦與固難徴扵疲俗将軍謂某藉某地利搆此鄰讎細閱来言難知深意泗州不獨咸通之際得振雄聲曽扵天寳之中亦遵直道况于濤尚書政條既舉武略兼精收百姓之歡心得三軍之死力将軍便令棄而不問理復如何徐州實有大愆固非小患若将助虐豈謂輸忠某今所俟者􅓍當道之豺狼奮乗秋之鵰鶚星言夙邁電擊専征必與王令公腹心見知首尾相應齊驅虵陣豁展豹韜剋復上亰奉迎大駕亦不敢負秣陵之莭度争強弩之功名所兾得繼前勞自防後患使藺相如之謙徳不損雄威費無極之讒徒皆歸顯􅓍捨此之外餘無所云敬佩良箴豈離愚抱伏惟鍳察某再拜浙西周寳司空書昨奉公牒云當道臨淮叛䘚過江来投集衆廣塲巳受降訖三復来示言難不酬且降之爲名其理甚大虞舜之七旬苗格晉侯之三日原歸此皆以干紀亂常起兵動衆緩之則稔成患害急之則横致殺傷遂假小慈終施大信能敷徳化俾革奸兇若有偶聚萑蒲散為榛梗者共須撲滅勿使晏安今相公幸此鄰灾樂其軍禍莫能嫉惡翻欲恵奸恐乖扙銊之威虗衒倒戈之捷且如去年陳儒徒伴唐宇貴鎮封疆僅有六萬餘人宣州日告危急此時相公何不招諭致令侵凌却見瑣瑣頑兇即自勤勤誘引莫測髙㫖實辜衆心傳不云乎召外盗書不云乎爲逋逃主稍詳至理無信虗詞昔漢朝匈奴叛黨来附景帝便欲與之封周亞夫曰彼背其主而見賞何以責人臣之莭以小喻大可量事情况臨淮一郡早從淝上行營及淮邉戰敵毎有優賞曽無偏頗自是臨財則竸起貪心遇賊則皆無闘志旋爲逗撓猶與矝寛昨又請換都頭已依衆請殊不知犬易興扵狂瘈豕難制扵喧豗未盡誅擒便謀奔竄幸且未離近境固合同塞奸源在此既已不忠扵彼亦應非利石祁子所云天下之惡一也惡扵宋而保扵我保之何補其在茲乎况凡鄰府事宜一彼一此互相救援同致安寧是以前年六月中貴鎮有天平潞府元從兵士背叛奔逃數僅百人爲患非小遂蒙移牒請爲追擒當使羌都将梁椘部領馬軍所在討襲并各帖管内諸州令差精兵同力捕逐尋即諸鎮及東塘逰奕使相次牧獲三十八人纔見擒来便令押送續得梁椘状報到濠州界趂及殘孽殺得三十餘人其餘漏網之徒盡以傷弓而走所生擒之兇黨皆就􅓍扵貴藩能致彼之快心實賴此之勞力今則却見臨淮叛䘚特向㳂江招呼便稱受降仍補職累牒咨請不送過江蒐慝何多飬奸斯甚敢言以㤪報徳實恐在安忘危詩云投我以木瓜報之以瓊琚匪報也永以爲好此乃國風遺訓昭晣可觀相公通仁略賜詳度無自賈天下之􅓍咲也其他已其廻牒伏惟俯賜炤察浙西護軍焦将軍書昨有臨淮背叛兵士誅擒不盡奔迸過江便蒙貴鎮相公特許歸降遍加補署兼移公牒頗搆虗詞既乖七縱之謀誰謂三驅之禮盖是幸灾樂禍固非撫士安人自古受降之爲義也叛而伐之服而捨之忠信能敷徳刑乃就或以賊數則動盈千萬奸謀則難測二三若欲戰争恐多傷殺或吹笳感動或書箭招呼免致膏鋒俾從肉袒其或蕞爾兇狡率然叛離兔奔岡而終必自顛䑕失穴而欲将安徃在扵接境合與同擒不料豁開叛換之門深作逋逃之藪慰安螻蟻雖欲好生訓練㷱羆有何用䖏纔招稔惡之軰遽衒受降之名藴豹韜而略不施張對龍莭而恐須慙愧魯史云晉椘設誓無相加戎同䘏灾危俻救凶患若有害椘則晉伐之在晉椘亦如之交贄徃来道路無壅謀其不協而討不庭此則古時敵國猶保話言今日善隣豈傷師律况晉椘則各在逺地揚潤則只隔長江曽無交惡之端豈有相欺之事實驚衆聴甚爽逺圖已無蚕女爭桒永安两境冝效農夫去草静剗本根伏惟将軍逺護兵符共成王事必不欲和之如響知而不言唯望稍致良箴終除巨弊永使必誠必信誰云莫徃莫来此既無噂􅊱以背憎彼亦免忸怩扵顔厚幸垂採聴特恵終始伏惟云云桂苑筆耕集卷之十一
