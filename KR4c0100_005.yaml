front:
  text: 桂苑筆耕集卷之五奏狀十首
  hash: sha256:22ae8d04c428399339349f7bec15a545d1dc284751107b8db8ba547c501e116d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_005-1a}
body:
  text: 奏誘降黃巢下賊將成令瓌狀奏誘降福建道草賊狀奏姪劭華州失守請行軍令狀奏論天征軍任從海等衣糧狀奏論抽發兵士狀奏請叛將鹿晏弘授興元狀進金銀器物狀進􅃮器狀進御衣段狀進綾絹錦狀奏誘降成令瓌草賊黃巢下擘隊賊將成令瓌徒伴四萬人馬軍七千騎右件賊徒元受黃巢指使占據潼關尋自擘隊奔逃所在燒劫就中蘄黃管內最甚傷殘臣伏以肅齊王者之師必期無戰遵奉聖君之德可恕有瑕暫緩討除先加告諭臣昨者専差押衙丁威賚委曲深入招誘果願歸降兼乞委任郡符展效忠節其成令瓌臣當時𥙷充軍前押衙兼給㓛名檢校國子祭酒兼御史中丞官告一通權知椘州軍州事以今月二十三日部領手下兵士到椘州倒戈訖伏緣椘州與徐州漣水對岸今春曾被寇戎驟來攻劫雖頻討逐未盡誅擒况漣水賊徒久蓄姦謀潜行偵諜常排戰艦欺視孤城再欲奔衝終為患害臣以此特將此郡權授令壞既能投信義而來必得破頑凶之窟臣久臨戎事素習軍謀以為惠而後則誅兵家所貴逺者懷而近者恱帝道方興上窺含垢之恩下察慕羶之志不勞寸刃唯假尺書成令瓌遂革野心能從天意叛徒四萬盡為樂業之齊人精騎七千皆作輸忠之烈士既當恕罪倍見感恩蜂飛之小寇族銷蝟結之元凶可殄斯乃陛下祝除三綱舞耀兩階信既洽於豚魚化能移於梟摬善師不陳敢矝止殺之權至道無私但仰好生之德其成令瓌下願在車門及放散人數請續具申奏謹録奏聞謹奏奏招降福建道草賊狀福建道溪洞草賊何嵪張延鄂璩悚等徒伴共八萬人右件賊徒自去年冬侵劫信州界內臣以其道途阻闊溪洞險艱若欲討除恐為勞役遂於今年二月內差節度衙推諸葛成充東面招諭使判官便賫委曲職牒招誘其賊首何嵪等三人雖行匪有師而卜能從吉一時應響三窟除姦才當言下歸投兼乞軍前展效臣委曲𥙷職名追赴軍前俾申忠節臣伏以小人興叛所迷者貪竸之心上帝垂恩所惡者殺傷之事終能耀德固可弭兵與其繼獻捷書曷若盡收降欵是以逺飛折簡便倒群戈塵不假於曵柴風自行於偃草溪頭洞口免汚煙霞閩嶺鄱江豁通道路况乃各期後效盡願前驅能令八萬餘人永不二三其意有以見陛下皇威天覆玄德日新四郊之煙壘將銷萬國之梯航竸集則乃軍中士卒安身而永别戰場宇內生靈擕手而齊登夀域臣無任歌詠屏營之至其何嵪等下𥙷職名願隨臣征行及放散人數請續具申奏謹録奏聞謹奏奏姪男劭華州失守請行軍令狀具銜髙劭右臣伏以僨軍之將禮所興譏大義滅親傳曾垂訓將肅安危之本必嚴賞罰之科竊自巨猾增驕王師致討臣堂姪男劭比在河中司録得受李都指揮領昭義之甲兵收華州之城邑稍申鷹犬之力暫挫梟狼之聲巳蒙特降殊恩俯旌微效服榮金紫位忝星郎始離蒲坂之具寮遽假蓮峯之通守誠合率忠勵勇䤋醜摧凶禀進尺退寸之規决萬死一生之計終申誠節仰報寵光昨者狂孽併來疲兵再戰既絶安西之救難申逐北之威然而不能潤草塗原永忘苟活仰使靡旗亂轍旋見脫歸致諸道之星分縱姦徒之霧結職此之過罪無所逃豈可當二峯保守之時遽沾寵賞及一陳奔亡之後得免誅夷國有常刑軍無貸法懲一勸百念兹在兹伏乞聖恩特行嚴典徇于藩鎮警彼師徒所兾國章永能安於社稷微臣家法亦不昧於神祗干冒宸聰無任責躬泣血戰越之至謹奉狀陳請以聞謹奏奏請天征軍任從海衣糧狀天征軍都將任從海及節級軍將并官健捴二百八十七人右臣得都將任從海及節級狀稱自赴征行巳逾五載纍曾㳂海襲賊上江防虞去年軍都放回本道從海等且在當府願隨行營者各得家信知西川巳停衣糧伏緣從海等皆是貧寒更無營業彼處父母親屬便須委􅊤填溝請具奏論乞還衣糧者謹按史記釋云天子車駕所至則人臣為僥幸賜人爵有級數或賜田租之半故因謂之幸也伏以任從海等萬里從戎五年于役不辭艱險願盡勤勞今者身在東吳職居西蜀此方苦於羇旅彼巳停其衣糧逺路音書難寫征人之恨貧家親戚先懷餓殍之憂伏遇陛下暫幸龜城未回龍闕三川草木别有光榮萬户蒸黎永能蘇息而任從海等久離本鎮不睹殊恩望雨露之均沾恨烟波之逈隔固堪傷憫輒具奏論伏乞聖慈允臣所請特令本道却給全糧所兾鳯鴐巡逰士卒皆知其有幸鴻慈煦育君親必表於無私謹具録奏聞伏聽敕㫖奏論抽發兵士狀當道先准詔㫖抽盧壽滁和等州兵馬共二萬人仍委監軍使押領赴軍前者臣當時巳各帖諸州令排比點撿次又得進奏院狀報近奉詔㫖更於諸州催促兵士者右臣伏以兵惟飾怒雖尚勇於戰征師克有和固推誠於輯睦茍非得衆何以成㓛臣當管廬州與和州舊有讎嫌至今疑忌唯謀以怨報怨未遂知和而和孫端新授滁州又與秦彥有隙既是滁和接境動有他虞若於光蔡會軍必酬舊憾事非便穩理合奏論臣自得招降多方控馭粗能禁戢免有動搖如令各出兵戈必恐自相魚肉輒陳利害兾慎始終謹録奏聞伏聽敕㫖奏請叛卒鹿晏弘授興元莭度使狀右當道賀正子將許令琮等今月日回得狀稱三月五日陳許軍潰散節級鹿晏弘領兵馬二萬餘人打破金洋䒭州突入興元府坐莭度使牛朂四日夜領隨從人并家纍約二千餘人奔投龍州西山谷者伏以天未悔禍地多受灾既當易動難安非可懲一勸百鹿晏弘早驅散卒廣集叛夫始聆焚劫東都旋見奔衝西路本道莭度使周岌纍令招諭終不歸降豈興破浪之風但熾燎原之火今者逆黨則鯨吞盛府元戎則鼠竄危途瓜距巳成根株難剗儻或未恕亂常之咎别興伐叛之師即恐終成一秦固應不利三蜀且列藩貢獻諸道表章得達刀州皆由劒路况乃鳯城巳復鑾輅將旋縱令鵰鶚在天能摧狡窟若更豺狼當道必凝行宫峽路雖通水程多慮不唯險阻實且遐遙兼至上江皆為賊境唯憂進獻莫遂通流臣久竊寵光深懷驚憤逺詳事意輒具奏陳伏乞聖慈霽雷霆之威回雨露之澤速飛寬大之詔特委撫綏之權鹿晏弘免致麏驚便當豹變必當克巳永務安人聖主含弘既宥其窮斯濫矣姦臣警悟亦免於尤而效之謹録奏聞伏聽敕㫖進金銀器物狀金器銀器右臣伏以煙塵向息道路猶虞每慙仗鉞之榮多曠獻琛之禮得申逺貢唯有䡖賫前件金器銀器䒭質變披沙形分鑄礫雖愧易盈之用且資虛受之㓛固敢竭航波梯巘之心助麟趾馬蹄之瑞貢金三品空陳任圡之冝望闕九重未遂朝天之願感恩何極戀聖徒勤今差押衙王䖍隨狀奉進謹進進􅃮器狀當道造成乾符六年供進􅃮器一萬五千九百三十五事右件􅃮器作非淫巧用得質良兾資尚儉之規早就惟新之製雖有慙於瓊玉或可代於琉瓶伏緣道路多虞星霜屢器貢難通於萬里綱行遂滯於三年既失及時唯憂虛月臣今差押銀青光祿大夫撿校太子賔客兼御史中丞上柱國辛從實押領隨狀奉進謹進進御衣段狀當道先兼監鐡使織造中和四年已前御衣羅折造布并綾錦等除光進納外續織造九千六百七十八段謹具如後物色右臣久權管貨素乏籌謀多虧山海之資莫報雲天之澤前件御衣并綾錦綺䒭薄慙蟬翼䡖愧鴻毛然而舒張則凍雪交光疊積則餘霞鬪彩既成㓛於鳯杼希八用於龍衣儉德彌彰致美宜先於黻冕皇恩逺燭輸誠必鍳於絲毫其匹段物䒭臣謹差某官某押領隨狀奉進謹進進綾絹錦綺等狀進奉綾絹錦銀綺等一十萬匹段兩謹具色目如後物色右臣伏以兵戈充熾郡邑凋殘仰思御輦巡逰唯恨賦輿懸闕况乃當道巡屬之內招降頗多皆請占留將充供贍貴息寇戎之患難豐進獻之儀前件綾絹錦綺等雖製自鴛機而價慙鮫室敻謝八蠶之號劣登三品之名祗將申任土之宜豈足備𥙷天之用輕微既甚隕越何安其匹段物色謹差莭度散兵馬使王審球等押領隨狀奉進謹進桂苑茟耕集卷之五
