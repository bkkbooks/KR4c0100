front:
  text: 桂苑筆耕集卷之五奏狀十首
  hash: sha256:22ae8d04c428399339349f7bec15a545d1dc284751107b8db8ba547c501e116d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_005-1a}
body:
  text: 奏誘降黃巢下賊将成令瓌狀奏誘降福建道草賊狀奏姪劭華州失守請行軍令狀奏論天征軍任從海等衣粮狀奏論抽發兵士狀奏請叛将鹿晏弘授興元狀進金銀器物狀進􅃮器狀進御衣段狀進綾絹錦狀奏誘降成令瓌草賊黄巢下擘隊賊将成令瓌徒伴四萬人馬軍七千騎右件賊徒元受黃巢指使占㩀潼關尋自擘隊奔逃所在燒刼就中蘄黄管内最甚傷殘臣伏以肅齊王者之師必期無戰遵奉聖君之徳可恕有瑕暫緩討除先加告諭臣昨者専差押衙丁威賚委曲深入招誘果願歸降兼乞委任郡符展效忠節其成令瓌臣當時𥙷充軍前押衙兼給㓛名檢校國子祭酒兼御史中丞官告一通權知椘州軍州事以今月二十三日部領手下兵士到椘州倒戈訖伏縁椘州與徐州漣水對岸今春曾被㓂戎驟来攻刼雖頻討逐未盡誅擒况漣水賊徒乆蓄姦謀潜行偵諜常排戰艦欺視孤城再欲奔衝終為患害臣以此特将此郡權授令壊既能投信義而来必得破頑兇之窟臣乆臨戎事素習軍謀以為恵而後則誅兵家所貴逺者懐而近者恱帝道方興上窺含垢之㤙下察慕羶之志不勞寸刃唯假尺書成令瓌遂革野心能從天意叛徒四萬盡為樂業之齊人精騎七千皆作輸忠之烈士旣當恕罪倍見感㤙蜂飛之小㓂族銷蝟結之元兇可殄斯乃陛下祝除三綱舞耀兩階信旣洽於豚魚化能移於梟摬善師不陣敢矝止殺之權至道無私但仰好生之徳其成令瓌下願在車門及放散人數請續具申奏謹録奏聞謹奏奏招降福建道草賊狀福建道溪洞草賊何嵪張延鄂璩悚䓁徒伴共八萬人右件賊徒自去年冬侵刼信州界内臣以其道途阻闊溪洞險艱若欲討除恐為勞役遂於今年二月内差節度衙推諸葛成充東面招諭使判官便賫委曲職牒招誘其賊首何嵪䓁三人雖行匪有師而卜能從吉一時應響三窟除姦纔當言下歸投兼乞軍前展效臣委曲𥙷職名追赴軍前俾申忠節臣伏以小人興叛所迷者貪竸之心上帝垂㤙所悪者殺傷之事終能耀徳固可弭兵與其継獻捷書曷若盡收降欵是以逺飛折簡便倒群戈塵不假於曵柴風自行於偃草溪頭洞口免汚煙霞閩嶺鄱江豁通道路况乃各期後效盡願前驅能令八萬餘人永不二三其意有以見陛下皇威天覆玄徳日新四郊之煙壘将銷萬國之梯航竸集則乃軍中士卒安身而永别戰塲宇内生靈擕手而齊登夀域臣無任歌詠屏營之至其何嵪䓁下𥙷職名願隨臣征行及放散人數請續具申奏謹録奏聞謹奏奏姪男劭華州失守請行軍令狀具銜髙劭右臣伏以僨軍之将禮所興譏大義滅親傳曾垂訓将肅安危之本必嚴賞罰之科竊自巨猾增驕王師致討臣堂姪男劭比在河中司録得受李都指揮領昭義之甲兵收華州之城邑稍申鷹犬之力暫挫梟狼之聲巳蒙特降殊㤙俯旌微效服榮金紫位忝星郎始離蒲坂之具寮遽假蓮峯之通守誠合率忠勵勇䤋醜摧兇禀進尺退寸之規决萬死一生之計終申誠節仰報寵光昨者狂孽併来疲兵再戰既絶安西之救難申逐北之威然而不能潤草塗原永忘苟活仰使靡旗亂轍旋見脫歸致諸道之星分縱姦徒之霧結職此之過罪無所逃豈可當二峯保守之時遽沾寵賞及一陣奔亡之後得免誅夷國有常刑軍無貸法懲一勸百念兹在兹伏乞聖㤙特行嚴典徇于藩鎮警彼師徒所兾國章永能安於社稷微臣家法亦不昧於神祗干冐宸聦無任責躬泣血戰越之至謹奉狀陳請以聞謹奏奏請天征軍任從海衣粮狀天征軍都将任從海及節級軍将并官健捴二百八十七人右臣得都将任從海及節級狀稱自赴征行巳逾五載累曾㳂海襲賊上江防虞去年軍都放廻本道從海䓁且在當府願隨行營者各得家信知西川巳停衣粮伏縁從海䓁皆是貧寒更無營業彼䖏父母親属便湏委􅊤填溝請具奏論乞還衣粮者謹按史記釋云天子車駕所至則人臣為僥幸賜人爵有級數或賜田租之半故因謂之幸也伏以任從海䓁萬里從戎五年于役不辭艱險願盡勤勞今者身在東吴職居西蜀此方苦於覉旅彼巳停其衣粮逺路音書難冩征人之恨貧家親戚先懐餓殍之憂伏遇陛下暫幸龜城未迴龍闕三川草木别有光榮萬户烝黎永能蘇息而任從海䓁乆離本鎮不睹殊㤙望雨露之均沾恨烟波之逈隔固堪傷憫輒具奏論伏乞聖慈允臣所請特令本道却給全糧所兾鳯鴐廵逰士卒皆知其有幸鴻慈煦育君親必表於無私謹具録奏聞伏聴敕㫖奏論抽發兵士狀當道先准詔㫖抽盧壽滁和䓁州兵馬共二萬人仍委監軍使押領赴軍前者臣當時巳各帖諸州令排比點撿次又得進奏院狀報近奉詔㫖更於諸州催促兵士者右臣伏以兵惟飾怒雖尚勇於戰征師克有和固推誠於輯睦茍非得衆何以成㓛臣當管廬州與和州舊有讎嫌至今疑忌唯謀以怨報怨未遂知和而和孫端新授滁州又與秦彦有隙既是滁和接境動有他虞若於光蔡會軍必酬舊憾事非便穩理合奏論臣自得招降多方控馭粗能禁戢免有動摇如令各出兵戈必恐自相魚肉輒陳利害兾慎始終謹録奏聞伏聴敕㫖奏請叛卒鹿晏弘授興元莭度使狀右當道賀正子将許令琮䓁今月日迴得狀稱三月五日陳許軍潰散節級鹿晏弘領兵馬二萬餘人打破金洋䒭州突入興元府坐莭度使牛朂四日夜領随從人并家累約二千餘人奔投龍州西山谷者伏以天未悔禍地多受灾既當易動難安非可懲一勸百鹿晏弘早駈散䘚廣集叛夫始聆焚刼東都旋見奔衝西路本道莭度使周岌累令招諭終不歸降豈興破浪之風但熾燎原之火今者逆黨則鯨吞盛府元戎則䑕竄危途瓜距巳成根株難剗儻或未恕亂常之咎别興伐叛之師即恐終成一秦固應不利三蜀且列藩貢獻諸道表章得達刀州皆由劒路况乃鳯城巳復鑾輅将旋縦令鵰鶚在天能摧狡窟若更犲狼當道必凝行宫峽路雖通水程多慮不唯險阻實且遐遥兼至上江皆為賊境唯憂進獻莫遂通流臣乆竊寵光深懐驚憤逺詳事意輒具奏陳伏乞聖慈霽雷霆之威廻雨露之澤速飛寛大之詔特委撫綏之權鹿晏弘免致麏驚便當豹変必當克巳永務安人聖主含弘既宥其窮斯濫矣姦臣警悟亦免於尤而效之謹録奏聞伏聴敕㫖進金銀器物狀金器銀器右臣伏以煙塵向息道路猶虞毎慙仗鉞之榮多曠獻琛之禮得申逺貢唯有䡖賫前件金器銀器䒭質變披沙形分鑄礫雖愧易盈之用且資虚受之㓛固敢竭航波梯巘之心助麟趾馬蹄之瑞貢金三品空陳任圡之冝望闕九重未遂朝天之願感恩何極戀聖徒勤今差押衙王䖍随狀奉進謹進進􅃮器狀當道造成乾符六年供進􅃮器一萬五千九百三十五事右件􅃮器作非淫巧用得質良兾資尚儉之規早就惟新之製雖有慙於瓊玉或可代於瑠瓶伏縁道路多虞星霜屢器貢難通於萬里綱行遂滯於三年既失及時唯憂虚月臣今差押銀青光禄大夫撿校太子賔客兼御史中丞上柱國辛從實押領随狀奉進謹進進御衣段狀當道先兼監鐡使織造中和四年已前御衣羅折造布并綾錦䓁除光進納外續織造九千六百七十八段謹具如後物色右臣乆權筦貨素乏籌謀多虧山海之資莫報雲天之澤前件御衣并綾錦綺䒭薄慙蟬翼䡖愧鴻毛然而舒張則凍雪交光疊積則餘霞闘彩既成㓛於鳯杼希八用於龍衣儉徳彌彰致羙宜先於黻冕皇㤙逺燭輸誠必鍳於絲毫其疋段物䒭臣謹差某官某押領随狀奉進謹進進綾絹錦綺䓁狀進奉綾絹錦銀綺䓁一十萬疋段兩謹具色目如後物色右臣伏以兵戈充熾郡邑凋殘仰思御輦廵逰唯恨賦輿懸闕况乃當道廵屬之内招降頗多皆請占留将充供贍貴息㓂戎之患難豊進獻之儀前件綾絹錦綺䓁雖製自鴛機而價慙鮫室夐謝八蚕之号劣登三品之名祗将申任土之宜豈足俻𥙷天之用輕微既甚隕越何安其疋段物色謹差莭度散兵馬使王審球䓁押領随狀奉進謹進桂苑茟耕集卷之五
