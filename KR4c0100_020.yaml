front:
  text: 桂苑茟耕集卷之二十啓狀别𥿄祭文詩共四十首
  hash: sha256:668cf95ca8ea5c6c69b5df9998d01256503269d494d8c73721212d25a0a95a65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_020-1a}
body:
  text: 謝許歸覲啓謝行裝錢狀謝再送月料錢狀謝賜弟栖逺錢狀上太尉别𥿄五首祭巉山神文陳情上太尉詩奉和座主尚書絶句三首吟歸燕詩酬楊贍秀才送别詩行次謝太尉衣段詩留别女道士詩酬進士楊贍送别絶句椘州張尚書謝相迎詩酬吳巒秀才絶句二首石峰詩潮浪詩沙汀詩野燒詩杜鵑詩海鷗詩山頂危石詩石上矮松詩紅葉樹詩石上流泉詩和友人除夜見寄詩東風絶句海邊春望絶句春曉間望絶句海邉間步詩將歸海東巉山詩和金貟外贈巉山絶句題海門蘭若栁絶句謝許歸覲啓某啓早來貟外郎君奉傳尊旨伏蒙恩慈念以某久别庭聞許令歸覲者仰䘖金諾虔佩玉音雖尋海島以榮歸古今無比且望煙波而感泣去住難安伏緣某自年十二離家今已二九載矣百生天幸獲托德門驟忝官榮仍叨命服一身遭遇萬里光輝是以逺親稍慰于倚門逰子倍榮于得路唯仰趙衰之冬日深暖旅懷豈吟張翰之秋風遽牽歸思且緣辭鄉歲久泛海程遙住傷烏烏之情去懷犬馬之戀唯碩暫謀東返迎待西來仰託仁封永安卑迹今即將期理但切戀軒下情無任感戴兢灼涕泣之至謹奉啓陳謝云云謝行裝錢狀伏蒙仁恩特賜錢二百貫又令辦行裝者謹依處分捧領訖伏以某學虧力行事過心期燕觜䘖泥點汚常慙于廣厦鼇頭抃嶽低佪暗避于連鉤每慎行藏深規躁靜豈謂謙而受蓋或希屈以求伸今者果逢尊慈令將逺命榮歸故國免挈空囊比陸生南説之槖裝倍多輝煥異孔氏東還之輜重豈慮焚燒且彼虞卿白璧郭隗黃金徒欲耀名終非濟事是若念其就飬愍以食貧減二十日之堂封濟數千里之家信纍載莫申其勞苦一朝頓贍于旨甘寧親而既佩銀章倍榮衣錦戀德而但垂珠淚碩效賣綃下情無任感恩榮抃涕戀兢惕之至云云謝再送月料錢某啓昨日軍資庫送到館驛巡官八月料錢伏緣某將命逮方已奉公牒慙離候館即指歸程既蒙别賜行裝豈令職俸難領受遂便送還不知庫司具狀申上上伏奉者茟飛雲鳳顯示深恩緡躍天龍仰資厚遂還家之望實驚潤屋之言逺地賤微雖有慙于故鄉親識必致敬于金多通神則蓋驗魯褒執癖則伏以尊卑禮隔辭讓無由謹依處分跪領訖下情無任感恩戀德激切徘佪兢灼之至云云謝賜弟栖逺錢狀某啓某堂弟栖逺比將家信迎接東歸遂假新羅國入淮海使録事職名獲詣雄藩將歸故國昨者伏蒙仁恩特賜錢三十貫者伏以崔栖逺逺涉煙波大遭風浪僅存微命唯有空身雖志切鶺鴒竊慕在原之義而譽慙騏驥難期得路之秋䘖蘆而但喜聮行泛梗而免虞失所今者某已榮奉使則遂寧親貨泉沾潤之名實稱子母歸路光榮之事皆屬善人下情無任感恩欣躍兢惕之至上太尉别𥿄五首某啓昨以鄉使金仁圭貟外已臨去路尚闕歸舟懇求同行仰候尊旨伏蒙恩造俯允卑誠今則共别淮城齊登海艦雖慙李郭之譽免涉胡越之言逺路無虞不假琴髙之術巨川能濟唯懷傅説之恩下情無任感戀之至云云又某啓伏奉手茟批誨一行人並善將息穩風濤者俯頸微流仰窺尊念望淮海則陟遐自邇指風波則視險如夷遍灑溫言盡叨恩于挾纊敷至懇碩無愧于賣綃下情無任感激攀戀兢灼之至云云又伏奉尊誨藥袋子懸于船頭不畏風浪慎勿開之者仰挂青囊逺踰碧海必使天吳息浪水伯迎風既無他慮于葭津可訪仙逰于蓬島唯碩往來無滯忠孝克全萬里安流永濟川之力百年苦莭不欺臨谷之心下情無任感戴兢灼之至又某舟船行李自到乳山旬日候風已及冬莭海師進難懇請駐留某方忝榮身唯憂辱命乘風破浪既輸宗慤之言長楫短篙實涉惠施之説雖仰資恩煦不憚險艱然正值驚波難踰巨壑今則巳依曲浦暫下飛廬結茅茨以庇身糝藜藿而充腹候過殘臘決撰行期若及春日載陽必無終風且暴便當直帆得遂榮歸謹具别狀咨申伏惟云云又某啓自叨指使唯欲奮飛必期不讓秋鷹便能截海豈料翻成跂鱉尚類曳泥雖慎三思而行且乖一舉之俊既勞淹久合具啓陳某嘗讀國語見海鳥爰居止于魯東門之外展禽曰今茲海有災乎夫廣川之鳥獸常知而避其災是歲也海多大風冬曘伏見今年自十月之交至于周正月略無觱發覺溫燠必恐魯修濫祠豳改成詩靜思漢祖之興歌大風可懼遙想田橫之竄迹絶島難依遂于登舟近浦止泊籠鵠無失藩羊自安唯碩時然後行必當利有攸往泛艆艘而不滯指渤澥而非遙兾申􅌹對之能早遂再來之望伏惟祭巉山神文維年月日新羅國入淮南使檢校倉部貟外郎守翰林郎賜緋銀魚袋金仁圭淮南入新羅兼送國信等使前都統巡官承務郎殿中侍御史內供奉賜緋魚袋崔致逺等謹以清酌牲牢之奠敬懸于巉山大王之靈竊以昔辨方圎始分清濁融作江海結為山嶽石戴土而土戴石小者磝而大者礐然而罕有威神靜無稜角與堆阜而相接見丘陵之可學惟靈磊磊落落髙臨鯷壑巉巉嵒嵒俯壓鯨潭上則為雲霧縈纏之骨下則為波濤激射之窟朝則迎金烏而前出夜則送銀蟾而後沒是以峻德能彰乎東夏西夷玄功不假乎南倏北忽則彼織女之機倚河漢秦帝之橋架溟渤徒衒其名莫勞我形每謂藴藏其片玉豈唯厠列于雙璞遂使往來者虔度英靈祈禱者盡寫精誠既蘋蘩之可薦信黍稷之非馨今者仁圭等久䘖逺命致逺也始奉殷聘喜歸舟之既同佇逰轡之能并不患胡越之意殊寧慙李郭之名盛去歲初冬及東年東屬以滄流尚逺玄律將窮浪形匌㔩而鷁難浮艦風響驫飍而鵠恐辭籠遂艤刳木聊安斷蓬一昨雖迎端月猶懼俊風延頸而待逢候燕回眸而送盡歸鴻方期利涉龜從筮叶直指雞林輕浮芥葉豈輸馳馬之號碩較秋鷹之捷逺詣靈峰難尋夀宫但覩其青蓮倒蘸于巨浸碧螺髙柱于晴空仰威靈之聳塵外想影響之飄雲中于是潔饋饎擇􅞷醲酒醴斯醹牲牷粗豐謹賫薄禮敢覬隂功伏惟大王潛施呼吸密降指蹤使波神拱手川后斂容椘師之南風且竸鄭伯之東道豁通照水鏡之心既分妍醜擘土囊之口無雜雌雄則可朝穿汗漫暮截鴻濛去採石華必同謝運行吟肉脯免效張融加以某臨川自審登木增凛憶昔雪作夜光氷為夕飲幾年獨勵于鼓篋今日方期于扇枕將問荆州之絹忝技會稽之錦見寵若驚心如捧盈雖智有不逮而時然後行况賫御筆慮滯王程今則褁裝既􅎖儼有行色玩淑景以歌吟泛安流于瞬息唯托大王之風早歸君子之國俾傳帝命無曠神職尚饗陳情上太尉海內誰憐海外人問津何處是通津本求食祿非求利只為榮親不為身客路離愁江上雨故園歸夢日邉春濟川幸遇恩波廣碩濯凡纓十載塵奉和座主尚書避難過維陽寵示絶句三首年年荆棘侵儒苑處處煙塵滿戰場豈料今朝覲宣父豁開凡眼睹文章亂時無事不悲傷鸞鳳驚飛出帝鄉應念浴沂諸弟子每逢春色耿離腸濟川終望拯湮沉喜捧清詞浣俗襟唯恨吟歸滄海去泣珠何計報恩深歸燕吟獻太尉秋去春來能守信暖風􅋽雨飽相諳再依大厦雖知許久汚雕梁却自慙深避鷹鸇投海島羡他鴛鷺戲江潭只將名品齊黃雀獨讓䘖環意未甘酬楊贍秀才送别海槎雖㝎隔年回衣錦還鄉愧不才暫别蕪城當葉落逺尋蓬島趂花開谷鶯遙想髙飛去時楊生有隨計之計豕寧慙再獻來好把壯心謀後會廣陵風月待䘖杯行次山陽續家太尉寄賜衣段令充歸覲續夀信物謹以詩謝自古雖誇畫錦行長卿翁子占虗名既傳國信兼家信不獨家榮國亦榮萬里始成歸去計一心先算却來程望中遙想深恩處三朵仙山目畔橫留别女道士每恨塵中厄宦塗數年深喜識麻姑臨行與為真心説海水何時得盡枯酬進士楊贍送别海山遙望曉煙濃百幅帆張萬里風悲莫悲兮兒女事不須怊悵别離中椘州張尚書水郭相迎因以詩謝椘天蕭瑟碧雲秋旟隼髙飛訪葉舟萬里乘槎從此去預愁魂斷謝公樓酬吳巒秀才惜别二絶句榮祿危時未及親莫嗟歧路暫勞身今朝逺别無他語一片心須不愧人殘日塞鴻髙的的暮煙汀樹逺依依此時回首情何限天際孤帆窣浪飛石峰中和甲辰年冬十月奉使東泛泊舟于大珠山下凡所人目命為篇名嘯月吟風貯成十首寄髙貟外巉嵒絶頂欲摩天海日初開一朵蓮勢削不容凡樹木格髙唯惹好雲煙點蘇寒影粧新雪戞玉清音噴細泉靜想蓬萊只如此應當月夜會羣仙潮浪驟雪翻霜千萬重往來弦望躡前蹤見君終日能懷信慙我趨時盡放慵石壁戰聲飛霹靂雲峰倒影撼芙蓉因思宗慤長風語壯氣撗生憶卧龍沙汀逺看還似雪花飛弱質由來不自持聚散只慿潮浪簸髙低况被海風吹煙籠靜練人行絶日射凝霜鶴步遲别恨滿懷吟到夜那堪又值月圎時野燒望中㫌斾忽􅌭紛疑是橫行出塞軍猛熖燎空欺落日狂煙遮野截歸雲莫嫌牛馬皆妨牧須喜狐狸盡喪羣只恐風驅上山去虗教玉石一時焚杜鵑石罅根危葉易乾風霜偏覺見摧殘已饒野菊誇秋艷應羡巖松保歲寒可惜含芳臨碧海誰能移植到朱欄與凡草木還殊品只恐樵夫一例看海鷗慢隨花浪飄飄然輕擺毛衣真水仙出沒自由塵外境往來洞中天稻粱滋味好不識風月性靈深可憐想得園蝴蝶夢只應如我對君眠山頂危石萬古天成勝琢磨髙髙頂上立青螺永無飛溜侵凌得唯有間雲撥觸多峻影每先迎海日危形長恐墜潮波縱饒藴玉誰回顧舉世謀身笑卞和石上矮松不材終得老煙霞澗底何如在海涯日引暮隂齊島樹風敲夜子落潮沙自能盤石根長固豈恨凌雲路尚賖莫訝低顔無所愧棟梁堪入晏嬰家紅葉樹白雲巖畔立仙姝一蔟煙蘿倚畫圖麗色也知于世有間情長得似君無宿粧含露疑垂泣醉態迎風欲待扶吟對寒林却惆悵山中猶自辨榮枯石上流泉琴曲雖誇妙手彈逺輸雲底響珊珊靜無纎垢侵金鏡時有輕颸觸玉盤嗚咽張良言未用潺湲孫椘枕應寒尋思堪惜清泠色流入滄𬈑便一般和友人除夜見寄與君相見且歌吟莫恨流年挫壯心幸得東風巳迎路好花時莭到雞林東風知爾新從海外來曉􅙘吟坐思難裁堪憐時復撼書幌似報故園花欲開海邉春望鷗鷺分飛髙復低逺汀幽草欲萋萋此時千里萬里意目極暮雲翻自迷春曉間望山面懶雲風惱散岸頭頑雪日欺銷獨吟光景情何限猶賴沙鷗伴寂寥海邉間步潮波靜退步登沙落日山頭蔟暮霞春色不應長惱我看看即醉故園花將歸海東巉山春望目極煙波浩渺間曉烏飛處認鄉關旅愁從此休凋鬢行色偏能助破顔浪􅕚沙頭花撲岸雲粧石頂葉籠山寄言來往鴟夷子誰把千金解買間和金貟外贈巉山清上人海畔雲菴倚碧螺逺離塵土稱僧家勸君休問芭蕉喻看取春風撼浪花題海門蘭若柳廣陵城畔别蛾眉豈料相逢在海涯只恐觀音菩薩惜臨行不敢折纎枝桂苑茟耕集卷之二十
