front:
  text: 桂苑茟耕集卷之二十啓状别𥿄祭文詩共四十首
  hash: sha256:7814084946b46830edc4274eee29c08449674b90178d6c9239bfefc0ec880abe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_020-1a}
body:
  text: 謝許歸覲啓謝行装錢状謝再送月料錢状謝賜弟栖逺錢状上太尉别𥿄五首祭巉山神文陳情上太尉詩奉和座主尚書絶句三首吟歸燕詩酬楊贍秀才送别詩行次謝太尉衣段詩留别女道士詩酬進士楊贍送别絶句椘州張尚書謝相迎詩酬吳巒秀才絶句二首石峰詩潮浪詩沙汀詩野燒詩杜䳌詩海鷗詩山頂危石詩石上矮松詩紅葉樹詩石上流泉詩和友人除夜見寄詩東風絶句海邊春望絶句春曉閑望絶句海邉閑歩詩将歸海東巉山詩和金貟外贈巉山絶句題海門蘭若栁絶句謝許歸覲啓某啓早来貟外郎君奉傳尊㫖伏蒙㤙慈念以某乆别庭聞許令歸覲者仰䘖金諾䖍佩玉音雖尋海島以榮歸古今無比且望煙波而感泣去住難安伏縁某自年十二離家今已二九載矣百生天幸獲托徳門驟忝官榮仍叨命服一身遭遇萬里光輝是以逺親稍慰扵倚門逰子倍榮扵得路唯仰趙衰之冬日深暖旅懐豈吟張翰之秋風遽牽歸思且縁辭郷歲乆泛海程遥住傷烏烏之情去懐犬馬之戀唯碩暫謀東返迎待西来仰託仁封永安卑跡今即将期理但切戀軒下情無任感戴兢灼涕泣之至謹奉啓陳謝云云謝行装錢状伏蒙仁恩特賜錢二百貫又令辦行装者謹依䖏分捧領訖伏以某學虧力行事過心期燕觜䘖泥點汚常慙扵廣厦鼇頭抃嶽低佪暗避扵連鉤毎慎行蔵深規躁静豈謂謙而受蓋或希屈以求伸今者果逢尊慈令将逺命榮歸故國免挈空囊比陸生南說之槖裝倍多輝煥異孔氏東還之輜重豈慮焚燒且彼虞卿白璧郭隗黄金徒欲耀名終非濟事是若念其就飬愍以食貧减二十日之堂封濟數千里之家信累載莫申其勞苦一朝頓贍扵㫖甘寧親而既佩銀章倍榮衣錦戀徳而但垂珠淚碩效賣綃下情無任感㤙榮抃涕戀兢惕之至云云謝再送月料錢某啓昨日軍資庫送到館驛廵官八月料錢伏縁某将命逮方已奉公牒慙離候館即指歸程既蒙别賜行裝豈令職俸難領受遂便送還不知庫司具状申上上伏奉者茟飛雲鳳顯示深恩緡躍天龍仰資厚遂還家之望實驚潤屋之言逺地賤㣲雖有慙扵故郷親識必致敬扵金多通神則盖驗魯褒執癖則伏以尊卑禮隔辤讓無由謹依䖏分跪領訖下情無任感恩戀徳激切徘佪兢灼之至云云謝賜弟栖逺錢状某啓某堂弟栖逺比将家信迎接東歸遂假新羅國入淮海使録事職名獲詣雄藩将歸故國昨者伏蒙仁恩特賜錢三十貫者伏以崔栖逺逺渉烟波大遭風浪僅存㣲命唯有空身雖志切鶺鴒窃慕在原之義而譽慙騏驥難期得路之秋䘖蘆而但喜聮行泛梗而免虞失所今者某已榮奉使則遂寕親貨泉沾潤之名實稱子母歸路光榮之事皆屬善人下情無任感恩欣躍兢惕之至上太尉别𥿄五首某啓昨以郷使金仁圭貟外已臨去路尚闕歸舟懇求同行仰候尊㫖伏蒙㤙造俯允卑誠今則共别淮城齊登海艦雖慙李郭之譽免渉胡越之言逺路無虞不假琴髙之術巨川能濟唯懐傅說之㤙下情無任感戀之至云云又某啓伏奉手茟批誨一行人並善将息穏風濤者俯頸㣲流仰窺尊念望淮海則陟遐自邇指風波則視險如夷遍洒温言盡叨㤙扵挾纊敷至懇碩無愧扵賣綃下情無任感激攀戀兢灼之至云云又伏奉尊誨藥帒子懸扵舡頭不畏風浪慎勿開之者仰掛青囊逺踰碧海必使天呉息浪水伯迎風既無他慮扵葭津可訪仙逰扵蓬島唯碩徃来無滯忠孝克全萬里安流永濟川之力百年苦莭不欺臨谷之心下情無任感戴兢灼之至又某舟舡行李自到乳山旬日候風已及冬莭海師進難懇請駐留某方忝榮身唯憂辱命乗風破浪既輸宗慤之言長楫短篙實渉恵施之說雖仰資㤙煦不憚險艱然正值驚波難踰巨壑今則巳依曲浦暫下飛廬結茅茨以庇身糝藜藿而充腹候過殘臈决撰行期若及春日載陽必無終風且暴便當直帆得遂榮歸謹具别状咨申伏惟云云又某啓自叨指使唯欲奮飛必期不讓秋鷹便能截海豈料翻成跂鼈尚類曳泥雖慎三思而行且乖一舉之儁既勞淹乆合具啓陳某甞讀國語見海鳥爰居止扵魯東門之外展禽曰今茲海有灾乎夫廣川之鳥獸常知而避其灾是歲也海多大風冬曘伏見今年自十月之交至于周正月略無觱發覺温燠必恐魯修濫祠豳改成詩静思漢祖之興歌大風可懼遥想田横之竄跡絶島難依遂扵登舟近浦止泊籠鵠無失藩羊自安唯碩時然後行必當利有攸徃泛艆艘而不滯指渤澥而非遥兾申􅌹對之能早遂再来之望伏惟祭巉山神文維年月日新羅國入淮南使檢校倉部貟外郎守翰林郎賜緋銀魚袋金仁圭淮南入新羅兼送國信䓁使前都統廵官承務郎殿中侍御史内供奉賜緋魚袋崔致逺䓁謹以清酌牲牢之奠敬懸于巉山大王之靈窃以昔辨方圎始分清濁融作江海結為山岳石戴土而土戴石小者磝而大者礐然而罕有威神静無稜角與堆阜而相接見丘陵之可學惟靈磊磊落落髙臨鯷壑巉巉嵒嵒俯壓鯨潭上則為雲霧縈纏之骨下則爲波濤激射之窟朝則迎金烏而前出夜則送銀蟾而後没是以峻徳能彰乎東夏西夷玄功不假乎南儵北忽則彼織女之機倚河漢秦帝之橋架溟渤徒衒其名莫勞我形毎謂藴蔵其片玉豈唯厠列扵雙璞遂使徃来者䖍度英靈祈禱者盡冩精誠既蘋蘩之可薦信黍稷之非馨今者仁圭䓁乆䘖逺命致逺也始奉殷聘喜歸舟之既同佇逰轡之能并不患胡越之意殊寧慙李郭之名盛去歲初冬及東年東屬以滄流尚逺玄律将窮浪形匌㔩而鷁難浮艦風響驫飍而鵠恐辭籠遂艤刳木聊安㫁蓬一昨雖迎端月猶懼俊風延頸而待逢候燕回眸而送盡歸鴻方期利渉龜從筮叶直指雞林輕浮芥葉豈輸馳馬之號碩較秋鷹之捷逺詣靈峰難尋夀宫但覩其青蓮倒蘸扵巨浸碧螺髙柱扵晴空仰威靈之聳塵外想影響之飄雲中扵是㓗饋饎擇􅞷醲酒醴斯醹牲牷粗豐謹賫薄禮敢覬隂功伏惟大王潛施呼噏宻降指蹤使波神拱手川后歛容椘師之南風且竸鄭伯之東道豁通照水鏡之心既分妍醜擘土囊之口無雜雌雄則可朝穿汗漫暮截鴻濛去採石華必同謝運行吟肉脯免效張融加以某臨川自審登木増懔憶昔雪作夜光氷爲夕飲㡬年獨勵扵鼓篋今日方期扵扇枕将問荆州之絹忝技㑹稽之錦見寵若驚心如捧盈雖智有不逮而時然後行况賫御筆慮滯王程今則褁装既􅎖儼有行色翫淑景以歌吟汎安流扵瞬息唯托大王之風早歸君子之國俾傳帝命無曠神職尚饗陳情上太尉海内誰憐海外人問津何䖏是通津本求食禄非求利只為榮親不為身客路離愁江上雨故園歸夢日邉春濟川幸遇㤙波廣碩濯凡纓十載塵奉和座主尚書避難過維陽寵示絶句三首年年荆棘侵儒苑䖏䖏烟塵満戰塲豈料今朝覲宣父豁開凡眼睹文章亂時無事不悲傷鸞鳳驚飛出帝郷應念浴沂諸弟子毎逢春色耿離膓濟川終望拯湮沉喜捧清詞浣俗襟唯恨吟歸滄海去泣珠何計報㤙深歸燕吟獻太尉秋去春来能守信暖風􅋽雨飽相諳再依大厦雖知許乆汚雕梁却自慙深避鷹鸇投海島羡他鴛鷺戲江潭只将名品齊黄雀獨讓䘖環意未甘酬楊贍秀才送别海槎雖㝎隔年廻衣錦還郷愧不才暫别蕪城當葉落逺㝷蓬島趂花開谷鸎遥想髙飛去時楊生有随計之計豕寧慙再獻来好把壮心謀後㑹廣陵風月待䘖杯行次山陽續家太尉寄賜衣段令充歸覲續夀信物謹以詩謝自古雖誇畫錦行長卿翁子占虗名既傳國信兼家信不獨家榮國亦榮萬里始成歸去計一心先算却来程望中遥想深恩䖏三朶仙山目畔横留别女道士毎恨塵中厄宦塗數年深喜識麻姑臨行與爲真心說海水何時得盡枯酬進士楊贍送别海山遥望曉烟濃百幅帆張萬里風悲莫悲兮兒女事不須怊悵别離中椘州張尚書水郭相迎因以詩謝椘天蕭瑟碧雲秋旟隼髙飛訪葉舟萬里乗槎從此去預愁魂㫁謝公樓酬呉巒秀才惜别二絶句榮禄危時未及親莫嗟歧路蹔勞身今朝逺别無他語一片心須不愧人殘日塞鴻髙的的暮烟汀樹逺依依此時回首情何限天際孤帆窣浪飛石峰中和甲辰年冬十月奉使東泛泊舟扵大珠山下凡所人目命爲篇名嘯月吟風貯成十首寄髙貟外巉嵒絶頂欲摩天海日初開一朶蓮勢削不容凡樹木格髙唯惹好雲烟點蘇寒影粧新雪戞玉清音噴細泉静想蓬莱只如此應當月夜㑹羣仙潮浪驟雪翻霜千萬重徃來弦望躡前蹤見君終日能懐信慙我趨時盡放慵石壁戰聲飛霹靂雲峰倒影撼芙蓉因思宗慤長風語壮氣撗生憶卧龍沙汀逺看還似雪花飛弱質由来不自持聚散只慿潮浪簸髙低况被海風吹煙籠静練人行絶日射凝霜鶴歩遅别恨滿懐吟到夜那堪又值月圎時野燒望中㫌斾忽􅌭紛疑是横行出塞軍猛熖燎空欺落日狂煙遮野截歸雲莫嫌牛馬皆妨牧須喜狐狸盡䘮羣只恐風驅上山去虗敎玉石一時焚杜䳌石罅根危葉易乾風霜偏覺見摧殘已饒野菊誇秋艶應羡巖松保歲寒可惜含芳臨碧海誰能移植到朱欄與凡草木還殊品只恐樵夫一例㸔海鷗慢随花浪飄飄然輕擺毛衣真水仙出没自由塵外境徃来洞中天稻粱滋味好不識風月性靈深可憐想得園蝴蝶夢只應如我對君眠山頂危石萬古天成勝琢磨髙髙頂上立青螺永無飛溜侵凌得唯有閑雲撥觸多峻影毎先迎海日危形長恐墜潮波縦饒藴玉誰回顧舉世謀身笑卞和石上矮松不材終得老煙霞澗底何如在海涯日引暮隂齊島樹風敲夜子落潮沙自能盤石根長固豈恨凌雲路尚賖莫訝低顔無所愧棟樑堪入晏嬰家紅葉樹白雲巖畔立仙姝一蔟烟蘿倚畫圖麗色也知扵世有閑情長得似君無宿粧含露疑垂泣醉態迎風欲待扶吟對寒林却惆悵山中猶自辨榮枯石上流泉琴曲雖誇妙手彈逺輸雲底響珊珊静無纎垢侵金鏡時有輕颸觸玉盤嗚咽張良言未用潺湲孫椘枕應寒尋思堪惜清泠色流入滄𬈑便一般和友人除夜見寄與君相見且歌吟莫恨流年挫壮心幸得東風巳迎路好花時莭到雞林東風知爾新從海外來曉􅙘吟坐思難裁堪憐時復撼書幌似報故園花欲開海邉春望鷗鷺分飛髙復低逺汀幽草欲萋萋此時千里萬里意目極暮雲翻自迷春曉閑望山面嬾雲風惱散岸頭頑雪日欺銷獨吟光景情何限猶頼沙鷗伴寂寥海邉閑歩潮波静退歩登沙落日山頭蔟暮霞春色不應長惱我㸔㸔即醉故園花将歸海東巉山春望目極煙波浩渺間曉烏飛䖏認郷闗旅愁從此休凋鬢行色偏能助破顔浪􅕚沙頭花撲岸雲粧石頂葉籠山寄言来徃鴟夷子誰把千金解買閑和金貟外贈巉山清上人海畔雲菴倚碧螺逺離塵土稱僧家勸君休問芭蕉喻㸔取春風撼浪花題海門蘭若柳廣陵城畔别蛾眉豈料相逢在海涯只恐觀音菩薩惜臨行不敢折纎枝桂苑茟耕集卷之二十
