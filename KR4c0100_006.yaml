front:
  text: 桂苑茟耕集卷之六堂狀十首
  hash: sha256:b1ff971cc40bac7b2be8917f48f5c4175bb11ff482d0225244ecd26fd9ad6ee1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_006-1a}
body:
  text: 都統巡官侍御史內供奉崔致逺撰賀入蠻使回狀賀殺黃巢賊徒狀賀收復京城狀賀月蝕德音狀賀內宴仍給百官料錢狀請降詔旨指喻兩浙狀謝加侍中兼實封狀謝落諸道􅐭鐡使加侍中兼實封狀謝弟柷再除綿州狀請轉官從事狀賀入蠻使回狀右臣得進奏院狀報入南蠻通和使劉光𥙿等回雲南通和兼進獻國信金銀器物匹段香藥信馬等漢使傳詔則星回象林蒙王奉琛則雲集龍闕能舉羈縻之術果悛倔強之心若非聖上德叶棄瑕化敷柔逺則何以感鐻耳鏤身之衆啓隳肝瀝膽之誠彼越雉呈祥未為盛觀旅􅋙入貢徒見良針曷若正在艱時能安獷俗使雲南酋長再遵奉贄之儀天下賢良免獻征蠻之䇿斯皆相公魏絳陳利王商振威巳令六詔歸投即使八綋清謐某比者南尋銅柱西鎮劒關曽施上將之謀免辱大君之命令則逺聆盛事倍切歡心陳賀未由無任欣抃云云賀殺黃巢賊徒狀右得進奏院狀報㝎難軍拓跋相公保大軍東方逵尚書奏於冝君縣南殺􅓍賊徒并生擒賊將又鳯翔李相公奏探知京中賊徒潰散六月十三日聖上御宣政殿排仗受賀者竊以逆賊黃巢稔惡既多就刑非久敢驅烏合之衆屢拒鷹揚之師拓跋相公東方尚書或力微裔孫或曼倩餘慶皆申祕略共彌兖徒能順天誅遂陳月捷軍名㝎難雅稱開張之聲縣號冝君克符堯舜之德是以聖上高臨紫極逺耀皇威睹百辟之歡呼雷驚蜀國想六師之勇戰電掃秦川即當靜滅氛霾永見均施渥澤此皆相公調鼎中之味運堂上之兵右援抱而得㓛左執律而至獻勳㓛相繼稱慶何窮某久阻淮夷尚淹海徼逺聆捷語但切歡聲然必願劒拂狼星旗迎聖日終繼張飛之拒俊不慙聶叔之致師限守戎藩末由陳賀下情無任踴躍之至謹奉狀陳賀謹録狀上賀收復京城狀右得河中莭度使王司空牒報四月十日當道與鴈門莭度使李㒒射及都監楊驃騎下諸道馬軍齊入京城與賊軍交戰約殺賊步軍一萬餘人其馬軍賊便走出城黃巢亦未知存亡其逃遁賊徒尋差兵馬追奔並已收復京闕訖者伏以逆賊黃巢藏姦匿暴惡積禍盈久于輦下偷生固是檻中待死楊驃騎受聖君之重寄李僕射傳飛將之雄名既無慮於二心果有成於一力想其霜鋒電擊月羽風驅壓雀卵之威髙燎鴻毛之勢猛遂使賊巢困不能鬪亂無所歸雖為漏網之鱗巳是傷弓之翼則期加顯􅓍永掃群凶加以熊據六宫豕豗九陌今兹克復免致焚燒佇望翠華便歸丹闕稍豁上天之怒實除下土之災此皆相公靜運廟謀逺揚戎略既叶一匡之妙道北極何憂將流萬古之美談東封可俟某登壇有忝仗銊無㓛逺聽歡聲始除慙色限拘守鎮陳賀未由下情無任抃躍之至謹録狀上賀月蝕德音狀右伏見六月二十六日德音以太隂薄蝕曲赦三川管內囚徒及委諸鎮收拾埋瘞京畿四靣暴露骸骨者伏以金精隱耀玉扆垂仁答天誡以震驚省風謡而欽恤圎扉宥罪掃彗銷冤近鄙北齊號御囚而肆虐逺遵西伯葬枯骨以施恩蜀山之草木先春秦甸之煙塵永息此皆相公㓛成燮理道洽變通助日月之光輝振雲雷之號令八方翹首萬彚歡心某迹繫戎旃心馳台室阻隨班列莫遂歡呼下情無任抃躍之至謹奉狀陳賀謹録狀上賀內宴仍給百官料錢狀右得進奏院狀報七月一日於內殿宴百官仍令度支各給三箇月料錢并奉勑旨回駕之日應沿路州縣切不得輒進歌樂及屠殺者伏以聖上繼周匡業避狄興憂自幸成都彌資儉德守玄元之三寶達舜帝之四聰徹彼珍肴挂其素服言唯罪巳事不勞人今者巳復上京將回大駕致柏梁之高宴盡醉千鍾鄙鍊布之乏財均頒九府然後繼飛綸翰仍命繡衣制郡邑之嚴科莭道途之浮費既施令於好生惡殺亦停歡於八列九成王化斯行物情皆泰此皆相公手擕多士躬賀聖君鴛行賦在鎬之章鳯藻詠濟汾之樂一時盛事萬代美談某限守藩條阻攀仙仗心馳蜀棧目斷堯樽下情無任抃躍之至謹奉狀陳賀謹録狀上請降詔旨指喻兩浙狀右先淮浙西周相公牒杭州與浙東兵士鬪敵某遂具事由申奏請降詔書速令戢斂伏奉二月二十日詔旨已詔兩浙務在叶和者某當時備録王言各移公牒訖兼先差人賫書牒與劉漢宏尚書詰彼起戎之本諭其繼好之規今得回書其言不讓唯稱周相公與董昌苟恃寵榮妄行威福虐侵近境阻截通津况有不同國之讎嫌又夫無藴年之誓約必想見豺而戰猶能首鼠幸生已決加兵終期釋憾然則此無和氣彼有鬪心嘗膽者結怨既深抉眼者遺言可驗必恐以吳與越終當有越無吳實所謂夫差之麋鹿興譏范蠡之黿鼉得便唯憂黎庶枉見殺傷輒再具狀奏陳請更飛詔止遏某徒圎鑿方枘避柱觸楹纍陳高鳯之詞莫解子都之怒且讎因手足疾在腹心爭㓛而行藏相時豈無懷愧而又積山煮海瓜剖豆分莫成贍國之權徒竊經邦之位唯甘廢棄永見沈淪敢期渥澤之無私俯念涓埃之有效許登玉署高戴金璫仍忝真封式加懋賞且如講能奪席諌切引𥚑方升鵉渚之榮俾稱鳯池之望豈伊孱劣所可貪叨此皆相公仰贊萬機俯安九牧無使怨乎不以能令可者與之唯當三命益恭一辭無退入則撫安疆圉出則誓掃氛雺佇成滅寇之㓛兾續曠官之責戎鎮有限不獲陳謝下情無任感恩兢懼之至謹奉狀陳謝謹録狀上謝落諸道監鐵使加侍中兼實封狀右某伏奉去年十一月十一日恩制加授侍中並餘如故仍加食實封一百户落諸道鹽鐡使者伏以君親委任固能捨短從長臣子忠勤唯願從微至著某一司榷課六暄涼正逢多事之秋莫展牢籠之用况自頻更統師别致租庸既當狐讓千皮實見羊分九牧贍軍冨國固絶籌謀熬海鎔山幾隳條貫今者聖上恕其不逮察以無私將漢法之重權委儒流之妙術豈料更留宸慮猶念戎勳許登負璽之班資不替擁旄之寵寄尚假極品重增實封當主憂臣辱之時若斯榮盛審福過災生之理何以遑安此皆相公曲庇庸虛全忘僣忝俾息躬於負重當鋭志於専征寧無淬礪之㓛仰答陶鈞之賜此外以榮為懼至末如初下情無任感戴兢惕之至謹奉狀陳謝云云謝弟柷再除綿州狀右件官是某堂弟今得進奏院狀報奉某月某日恩制除金吾將軍𬒳本州官吏衆狀舉留續準敕旨依前充綿州刺史某嘗讀後漢書見寇恂為頴川守後拜金吾從上經過頴川郡人遮道願借寇君乃留一年以慰百姓此實國家殊寵郡邑美談萬代之來一人而已誰知盛事得屬鄙宗安貧恤孤頴川之政化雖乏出官入仕子翼之官資略同感深而喜作悲端效淺而榮為懼本伏以高柷粗間吏術忝荷君恩分憂而地壓劒開理俗而塵銷鈴閣今者才升緹綺却擁朱輪謂施撫葺之能特徇衆多之請此皆相公愛忘其短仁及於微仰贊帝俞俯從群願某唯知提訓俾慎揣摩同驅軾下之熊但期靜理雖睹堂前之燕免恨分飛限守戎藩末由陳賀云云請轉官從事狀某官薛礪右件官閔損登科良由德行陳琳從職實假詞華林幽而轉識芝蘭木落而方知松桂深敦操尚夙著幹能逺叨分閫之榮唯籍運籌之妙伏請轉官仍改章服轉充觀察判官某官鄭俶右件官早登上苐久佐大藩能修檢慎之規每助撫綏之政賔筵所重健筆為先伏請轉官仍賜章服轉充莭度掌書記某官顧雲前件官東筠孕美南桂抽芳曵謝眺之長𥚑從衛青之軍幕五羖皮之為重豈謂虗談百鷙鳥之不如方知實事良資妙畫共展壯圖伏請轉官仍賜章服充觀察攴使以前件狀如前伏以某逺率舟師誓除國賊征帆則雲挂行色戰鼓則雷含殺聲留務既繁良籌是托或倚幕中之婉婉或求馬上之翩翩輒具薦論仰希甄奬不拘月限别覬天恩伏惟相公庇護戎藩激掦賔席稍超常例特受清資略假潤於丹青許分榮於朱紫所異元戎十乘速成討罰之㓛越府三才各得施張之處巳具狀申奏訖云云桂苑茟耕集卷之六
