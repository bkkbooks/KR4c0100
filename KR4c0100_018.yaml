front:
  text: 桂苑茟耕集卷之十八書狀啓二十五首
  hash: sha256:5b461cd6b51c358354f9dfa32467f787e52d5581b5c50526929fcea7df6bff5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_018-1a}
body:
  text: 賀破淮口賊狀賀髙司馬除官謝職狀啓二首謝加料錢狀謝衣段狀謝借示法雲寺天王記狀謝示延和閣記碑狀謝改職狀謝探請料錢狀與恩門裴秀才求事啓獻生日物狀五首端午日獻物狀二首謝新茶狀謝櫻桃狀謝冬至莭料狀謝寒食莭料狀謝社日酒肉狀謝匹段狀賀破淮口賊狀右某昨日竊聆淮口鎮狀報今月八日諸軍合勢殺􅓍狂賊已盡者伏以徐州賊黨偶因嘯聚敢恣喧張鴟梟同巢勢必不久蟣蝨相吊生能幾何猶懷拒轍之心未有返轅之意伏賴太尉相公雄聲逺振妙略潛施謀安四方決勝千里遂使淮山樂境長承虎豹之威泗水孤城免作鯨鯢之餌功著于暫勞永息計資于彼竭我盈小盜旋除中興可望三軍之勇氣方振百姓之驚魂再蘇但仰恩威咸增抃躍謹祗候陳賀謹狀賀髙司馬除官某啓伏承司馬二十五郎榮膺寵命伏惟感慰伏以漢朝美仕稱太傅少傅之榮晉代髙流誇大阮小阮之譽然而但欲脫身于利祿無非縱志于歌吟于臣則虧報主之誠為子則失榮親之莭豈期太尉相公重言天應美命風行遂令司馬二十五郎挂綵衣披朱紱動高堂之喜色振德宇之嘉聲佐理多間藹餘芳于玉樹連官獨貴掩前哲于竹林某每愧小儒忝栖大厦覩鵾鵬之逸勢貯燕雀之歡心下情無任抃躍之至謹奉啓陳賀謹啓謝職狀右某志雖求已藝不及人伏蒙太尉相公仁慈肉被摧骸翼成假卯卵難飾片言隻字粗伸感德懷恩今則久貯血誠敢慿毫素先甘鼎钁仰黷旌幢謹具長書咨陳下情無任戰灼之至伏惟特寬罪誅俯賜念察謹狀長啓某啓某伏以短綆不可以汲深頑鋒不可以剸滯是故不能者止周任有言自宜量力而行豈可從心所欲某東海一布衣也頃者萬里辭家十年觀國本望止于榜尾科弟江淮一縣令耳前年冬罷離末尉望應宏詞計決居山暫為隱退學期至海更自琢磨俱緣祿俸無餘書糧不濟輒擕勃帚來掃膺門豈料太尉相公逈垂奬憐便署職秩迹趨鄭驛身寓陶窗免憂東郭之貧但養北宮之勇去年中夏伏遇出師忽賜招呼猥加驅榮許隨龍斾久倚鷁舟每恨布鼓音凡鉛刀器鈍縱傾肝膽莫副指蹤遽蒙念以慕善依仁特賜奏薦重言天應忝獲超升若非九重倚賴于功名十道遵承于法令則其恩命亦豈肯許某自江外一上縣尉便授內殿憲柣又兼章紱且見聖朝簪裾烜赫子弟出身入仕二三十年猶挂藍袍未趨蓮幕者多矣况如某異域之士乎昔有一日九遷無以及斯榮盛某嘗讀魯論見仲尼使􅃮雕開仕對曰仕進之道未能究習善其深志夫子致恱某雖慙不敏竊有慕焉昨蒙恩慈特賜轉職尋巳具狀陳讓兼納所賜公牒伏奉批誨即有敕命但請收之某既蒙未允至誠固且仰遵嚴旨立愧形影坐驚神魂每當夜對寒釭曉窺清鏡感激而頭橫涕雨憂惶而背浹汗漿難榮擺脫于風塵倍赧汚瀆于門館伏以太尉相公雄名峻望碩德茂勳不唯雲覆九州抑亦風揚萬國寓目傾耳仰為指南儒武所歸一人而已是以諸道景附馬首是瞻其如都統巡官須選人材稱職外塞四方之望內資十乘之威若今某塵玷恩知尸素位但恐買戎狄之笑沽史傳之譏昔漢朝金日磾常在武帝左右帝欲别加寵遇日磾辭曰臣外國人且使胸奴輕漢某仐日之請實在于茲諸廳郎官早陳公議蓋以賤無妨貴欲令夷不亂華某伏自前年得在門下更無知識唯謁諸廳幕中垂情幸而獲宥竊聆太尉相公去年夏于東塘顧問某之時諸郎官同力薦揚和之如響遂沾厚遇遽竊殊榮昨者繼陳讜言不徇尊旨實乃惜太尉相公之名望存淮南藩府之規儀事體不虧裨贊斯在冬末面奉處分欲使别開院宇雖承恩諾轉切憂懷何者六韜曰人才大小猶如斗也不可盛石滿則棄矣故孔子云孟公綽為趙魏老則優不可以為滕薛大夫今者甘置嚴誅輒傾真懇乞解所職官謗可也伏惟太尉相公時賜允從今得其所儻蒙未垂擯棄猶許依栖則望成别補冗貟或薄攴虗給一枝數粒可養羽毛斗水尺波得安鬐鬛固非矯􅎖廉讓為名實碩揣量分涯免成負纍恩德春秋傳曰齊侯使敬仲為卿辭曰羈旅之臣免于罪戾施于負擔所獲多矣敢辱髙位請以孔告使為工正不失令名故事昭彰卑誠悃愊守道而得無悂矣登門而免見眲之但碩藥臼留恩終有凌雲之望蓍簪挂念永無委地之愁干冒台威下情無任懇迫憂兢之至謹啓謝加料錢狀右某今日某官奉傳處分每月加給料錢二十貫者某厚沾職俸過贍書羝羊之角且不羸鼹鼠之腹能易滿唯憂福盛難報恩深豈料茟端乏白鳳之詞日無可效囊底獲青鳬之術月有所增但懷臨谷之心恐敗負山之力唯碩除供陋巷之食分濟逺鄉之親同感厚恩永傅遐俗或成浮費必速幽誅下情無任荷戴兢惶涕泣之至謝衣段狀某啓伏蒙恩慈賜及生衣段一十匹者伏以風雖解愠日可畏威始當蒸欎之時忝受鮮華之賜敢效八公之侣欲衒六銖但隨百姓之歡同歌五况乃某幸趨台階榮託德門實資千載之遭逢每濟四時之服飾愍念而情踰父毋稱揚而禮異賔傄今者輕縠衫材細練褠制俾趨儉幕許曵鄒𥚑雖恩耀逺人足呈妍于鮫室而名慙竒士甘致刺于鵜梁下情無任感戴之至謝借示法雲寺天王記狀某啓昨日伏蒙恩慈借示修法雲寺天王碑綵毫乍閲俗眼初醒唯慙鐡印之傭流忽覩銀鉤之妙迹既成國寶豈許家藏竊聆將敕貞碑始揮神茟風停減暑天酒呈祥固知垂露之蹤便成甘露况假崩雲之勢永耀法雲冝乎琬琰之詞鎮彼琉璃之地共傳嘉瑞逺振芳聲然則隋煬帝之故都永為寶窟謝將軍之舊宅終作福田下情無任捧讀師禱榮懼之至其碑謹􅌹咨納謹狀謝示延和閣記碑狀某啓昨日觀察衙推邵宗奉傳處分賜及延和閣記碑本一軸者跪展真蹤仰窺臣莭對銀鉤而手舞足蹈望玉輦而魂飛膽揚伏以太尉力贍補天心勤捧日遂啓遷都之議佇聆徙蹕之期恭候宸逰儼成壯觀但以尋章摘句素非吳主之心進牘抽毫唯在陳王之命爰令幕客謹撰碑詞支使侍御丘門顔回融帳盧植能揮真茟妙寫尊襟敘三年望幸之丹誠則鼓傳衆聽𫐠一片勤王之忠莭則鏡照羣迷實乃酣飫德馨僃陳事實永使竒功祕略皆令陋古榮今太尉相公志忉迎鑾喜勝覽􅊾既贊美于凌雲百尺將掩能于入水八分遂乃親染綵毫俾鐫翠琰隨手而龍蛇旋活迎鋒而劒戟交橫畫玉點珠豈可比蘭亭醉本撇雲挑霧只宜示蓬島真仙誰料末儒亦叨殊貺輒敢覬覦將顧是知誘諭孱庸何則名題桂宫迹隸蓮府雖忝一時之有遇實無萬代之可稱今者支使侍御以好善心得稽古力騁真才子之藻思辱大丞相之茟蹤雖為賔席殊榮别是儒家盛事則彼郭隗受黃金厚禮虞卿沽白璧深恩強欲比方却成浼瀆然則四方舐墨含茟之士也莫不竸效顰眉之態潛希唾口之恩仰修修然勤慥慥爾如某者學海至海雖云有心執柯伐柯猶恐傷手持弊帚而徒增健羡遇神錐而便欲投降唯碩讀五千卷之書庶幾入室把十九年之刃無愧發硎每覩仙書更敦壯志稍希異闕黨童子何敢望儒林丈人其所賜碑唯慎捧持敢矝披閲待過天池之外遍誇日域之中想彼驪龍頷下之珠永當減價巨鼇頭上之客必欲偷看下情無任寶玩師仰之至謝改職狀右某伏蒙仁恩特賜公牒改署館驛巡官今隨斾西去者雖命重難荷而身輕欲飛稱心懷捧擊之榮滿口詠從軍之樂唯慙幽劣有辱奬憐感恩而既識海深舉步而但憂氷薄况無孫搴之精騎自比顔峻之小兒將何以剖拆事機遊揚德業然所碩者得睹龍飛玉劒豹掣牙旗風雷振大捷之聲日月照中興之運則某也有望于一言長價或為天上之人萬里從知免作池中之物行唯踴躍坐則禱祠下情無任榮抃兢灼之至謹齋沐祇候陳謝謝探請料錢狀某啓某頃者西笑傾懷南音著操蓬飛萬里迷玉亰之要路通津桂折一名作金榜之懸疣附贅乃是常常之事徒云逺逺而來海隅未覺于榮家江徼况勞于佐邑由是詠南陔而引咎望東道以知歸伏蒙太尉念掃德門許遷代舍濡毫染牘深慙雪苑之清才頂豸腰魚遽忝霜臺之峻秩傳天上披衷之命榮日邉垂白之親以宣父見知則實同陳隼以逺人多幸則不讓漢貂雖乖就養無方久想宗族稱孝然而煙波阻絶難申負米之心風雨凄􅋽空灑梁山之泣既踈溫清又闕旨甘但切責躬敢言養志况又無鄉使難附家書唯吟陟岵之詩莫遇渡𬈑之信今有本國使船過海某欲買茶藥寄附家信伏緣蹄涔易渴溝壑難盈不避嚴誅更陳窮懇伏惟太尉念以依門館次三千客别庭闈已十八年既免行傭有希及哺特賜探給三箇月料錢所兾祿遂及親逺分光于異域志能求已永投迹于仙鄉干瀆台階下情伏增感泣兢悸懇迫之至其請錢狀别具上呈云云與恩門裴秀才求事啓某伏念身托德門光生異域雖池蛟得雨無沉埋末路之憂而海燕含泥有點汚畫梁之罪迹賤而兢惶倍切恩深而展效何期豈合更寫卑誠仰塵尊德但以事非獲已情或可哀不辭鈇鉞之誅兾滿斗筲之望伏緣某昨聆座主侍邦主銓東洛道路不通且在襄州行李極困早欲發遣􅌹使切緣力未副心今有諸兄弟裴傄逺將窮懇相告輒具别狀干瀆台階下情無任戰灼之至前湖南觀察巡官裴璙右件人是某座主侍郎再從弟某去乾符三年冬到湖南起居座主侍郎之時見于諸院弟兄中偏所記念自數年繼遭剽劫生計蕩盡骨肉凋零久在江南近投當府碩披情懇泣告尊慈駐留多時不幸疾苦遂且扶持發去云欲徑往襄陽迎接侍郎今得書云行至滁州前去未得道途既阻溝壑是虞况乃孤孀三十餘口更無産業未卜㝎居伏緣某家寄日邉路踰天外香無來信固絶他圖既無寸土以分耕寧有尺波而假潤是以不量僭越輒具薦論命懸沸鼎之中目斷台階之下非不知捋虎鬚之險非不知探龍頷之難但緣既忝門生豈論賔貢鴛鸞之與螻蟻感恩皆同多士之與逺人報德何異伏乞太尉相公念以程窮計盡其柱促聲哀特賜于廬夀管內場院或堰埭中補署散職所兾月有捧入便獲安家裴璙即自到襄州令弟璹仰副驅䇿不度涯分浼瀆尊嚴下情無任感泣兢懼之至獻生日物狀某啓伏以降迹仙山為行恩于俗界挺神維嶽期㝎亂于危時是以𣏌梓材長松椿夀永名字已摽于金籙兵符暫理于玉鈐伏惟太尉相公貟嶠稟靈尼丘誕質大任天降中庸日彰四夷識傾膽之門逺栖仁蔭萬姓歸返魂之域盡飽德馨况今秦甸停氛鎬京聚孽息虎旅奔沉之患望豹萹擒縱之機暫施決勝之謀永致升平之運則必坐寧環海後當去會瑶池五色輕雲鎮隨行止千年素鶴竸效驅馳獨保長生却登真位調鼎佐玉皇之命䘖杯聽金母之歌自此漢室公卿仰羡而空知望斷仙家朋友相逢而不訝來遲某居近鼇峰遇深驥坂每賭張良之術唯吟郭璞之詩喜對今辰敢陳善柷龜蛇病骨叨承救活之恩雞犬癡心竊有奮飛之望下情無任虔禱依攀欣抃之至輒以海東藥物輕黷尊嚴謹具别幅伏惟俯賜念察謹狀又狀某啓某聆天降賢人濟天下之人也是以材合地寶性契天和髙闢德門深匡帝室伏惟太尉相公漢師仙格魯聖儒機推心于三代之英鍊氣于五行之秀今者正融韶景共慶誕辰四方飽開䦚之恩萬族獻稱觴之懇伏惟龍韜暫展靜卷妖氛鳳輦遄歸永興清運然後誡白石生之妙術從赤松子之勝逰鼇頭擎五色之雲久勞西望豹尾指二亰之路暫事北征佇揚滅冦之勳便舉朝真之禮某栖身大厦祝夀中春下情無任禱祠歌詠欣躍之至謹具别狀輒申微誠伏惟恩慈俯賜念察謹狀物狀海東人形參一軀銀裝龕子盛海東實心琴一張紫綾袋盛右伏以慶資五福瑞降三清中春方盛于香風上德乃生于遲日凡荷奬延之賜合申獻賀之儀前件人參并琴等形稟天成韻含風雅具體而既非假貌全材而免有虛聲况皆採近仙峰携乘逺地儻許成功于藥臼必碩捐軀如能入用於蓬壼可知實腹誠慙菲薄兾續延長塵黷尊嚴培增戰灼伏惟俯賜容納下情幸甚蓬萊山圖一面右伏以重陽煦景仙界降真雖長生標金籙之名而衆懇祝玉書之夀前件圖千堆翠錦一朵青蓮雪濤蹙出于墨池鯨噴可駭雲嶠湧生於茟海鼇戴何輕不愧瑣微輒將陳獻望卧龍而股栗隨賀燕以魂飛伏惟略鑒心誠俯賜容納所兾近台座而永安寰海展仙齋而便對家山許沾一顧之榮預報三清之信輕黷視聽下情無任禱祝歌謡兢灼之至人參三斤天麻一斤右伏以昴宿垂芒尼丘降瑞始及中和之莭爰當大慶之辰仰沐尊慈合申卑禮前件藥物採從日域來涉天池雖徴三丫五葉之名慙無異質而過萬水千山之險貴有餘香不揆輕微輒將陳獻所兾海人之藥或同野老之芹伏惟特恕嚴誅俯容情懇績靈夀則後天而老駐仙顔而與日長新下情無任禱祝欣躍兢惕之至謹狀端午莭送物狀織成鞍幞一條右伏以晏隂將㝎令莭俄臨遇天地之仁時睹江淮之樂境伏惟大尉應五百年運用八千歲為春仰贊薰風髙揚畏日不假渡瀘之役自成匡漢之謀某忝在末睿合陳微禮前件鞍幞鴛機呈妙獸錦成華當憩影于追風或資光于照地伏碩鞍也助百福永安之慶幞也表四方率服之誠干瀆尊嚴下情無任禱祝兢惶懇激之至伏惟俯賜容納謹狀雪扇一柄右伏以星火揚輝雲峰聳影遇陳大守饗遙祠之莭效華封人祝仙夀之誠前件扇細糝飛綿輕鋪凍練雖假丹青之迹實含潔白之姿裁規則不學齊紈空誇圎月委質則碩依孫閣得振仁風謹獻台階無任悚栗伏惟俯賜容納百生榮幸謹狀謝新茶狀右某今日中軍使俞公椘奉傳處分送前件茶茅者伏以蜀岡養秀隋苑騰芳始興採擷之功方就精華之味所宜烹緑乳于金鼎泛香膏于玉甌若非靜揖禪翁即是間邀羽客豈期仙貺猥及凡儒不假梅林自能愈渴免求萱草始得忘憂下情無任感恩惶懼激切之至謹狀陳謝謹狀謝櫻桃狀右中軍使俞公椘奉傳處分伏蒙賜及前件櫻桃者伏以三春之下始閲群芳百果之中獨誇仙達綴仙露而堪教鳳食被德風而背許鶯含遂令摘自喬枝分其美實豈期末品亦荷深恩捧持而色奪椘萍咽嗢而味欺蘇橘何必貯赤瑛盤上最宜對白玉樽前勻排萬顆之珠不唯眼飽似服一丸之藥便覺身輕下情伏增感戴之至謹奉狀陳謝謹狀謝冬至料狀右伏蒙仁恩特賜前件莭料者伏以某忝棲德宇不愧異鄉萬里滄波雖恨絶東來之信三冬愛日且歡迎南至之辰豈料尊慈别垂厚賜玉粒既資于同頴霜華乃出于雨歧不勞大嚼之言却懷中聖之慮莫識酬恩報德唯知飽食醉吟下情無任兢懼之至謹狀謝寒食莭料狀右伏蒙仁慈特賜前件莭料米糆羊酒等者伏以人舉令回祿沮威正吟化俗之仁風又對順時之甘雨仰沾豐餼遇瞻新炊况乃蟻慕芳羶蛆浮清醖捧恩光而飽飫豈止三朝玩春色而醺酣可期千日秪知歌詠何報陶鈞下情無任感戴之至謹奉狀陳謝謹狀謝社日酒肉狀右伏蒙恩慈特賜前件酒肉等者伏以候燕應期句龍受祀一半之韶光欲老千般之旅思相攻只知吟樂國之春豈料捧仙家之賜陵分甘膬淮減香醲想田夫醉舞之場起海客狂歌之興敢效陳平壯志便發大言唯尋徐邈前蹤略判中聖其肉并酒謹跪領訖下情無任感戴之至謹狀謝匹段狀緋羅紫綾紫天淨紗紫平紗黃平紗黃綾黃絹熟綿綾袴段右伏蒙仁恩特賜前件匹段霞舒鳳縷雪疊鮫綃猥分絳帳之餘俾換褐袍之飾不學玉尼巧説遽叨盧志殊榮唯慙螻蟻之姿不稱蜉蝣之竹但碩勵食蘗飲氷之莭報披朱拖紫之恩下情無任感戴兢惕涕泣之至謹奉狀陳謝謹狀桂苑茟耕集卷之十八
