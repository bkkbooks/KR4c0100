front:
  text: 桂苑筆耕集卷之十九狀啓别𥿄雜書共草首
  hash: sha256:46fb0c43d951cf8306dfe157a47303c9ae6962e577738e3ed302c48b4ddc3327
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_019-1a}
body:
  text: 上座主尚書别𥿄賀除吏部侍郎别𥿄賀除禮部尚書别𥿄濟源别𥿄迎椘州行李别𥿄二首五月一日别𥿄謝降顧狀與金部郎中别𥿄二首與客將書謝宋絢侍御書答裴掘庶子書謝髙祕書示長歌書謝李琯狀謝元郎中書謝周繁秀才以小山集見示與夀州張常侍書賀椘州張義府尚書與假牧書上座主尚書别𥿄不審近日尊體寢膳何似道惟滌慮德以潤身致五福之併臻迎百靈之所薦伏惟莭宣無爽時望有歸某竊窺曩史之傳芳僃載達傄之晦跡疏太傳登其祖帳僅涉沽名陶朱公泛彼柏舟未忘邀利豈若尚書中庸守志大隱存神表獨見之能察未萌之事遂得髙楊素莭夙避危時到處煙塵不汚指鴻之目終年雲水能怡夢蝶之心然而宸鍳屢回物情猶欎欲作山中宰相其如天下蒼生即期大駕還亰必赴上台虗位斯乃萬乘瞻矚四方禱祈某海燕含泥忝栖雲屋池蛟淂雨早脫塵塗感恩自比于互鄉仰德但思于闕里唯碩泥沙賤質永資陶冶深恩卑情不任攀戀䖍祝涕泣之至謹狀賀除吏部侍郎某啓伏承榮膺寵命伏惟感慰張司空之一匡西晉則藻鍳無倫謝太傅之忽起東山則蒸黎是念苟欲幽栖恱志獨處忘懷緘輝而恥耀秦㙜藴味而懶調殷鼎則乃智者仁者止傳樂山水之名賢才俊才盡失脫塵泥之望羣情久欎昊命遂行今者侍郎靜揖巖扉高提銓管萬族仰濟通之譽一時進寒之徒致使關中之冦孽灾消海內之英雄道泰近又竊聆風議仰測天心必謂文司再歸重德然則任賢得地既叶五百年之期好學趨門必盈七十子之數繼集仙逰于蓬島盛傳儒禮于杏壇既搜虹玉驪珠皆成國寶佇見臺鸞閣鳳永作家禽某伏思萬里無依久勞溧蕩十年有遇幸遂奮飛異鄉榮垂白之親達路忝披朱之􅎖昔名士為李公御者喜抃猶多今逺人稱尼父生徒光輝無比陳至懇而喙輸三尺望深仁而腸結九回下情無任抃賀踊躍感激之至伏惟俯賜念察謹狀賀除禮部尚書别𥿄伏承天恩榮膺寵命伏惟感慰昔子貢曰夫子之文章可得而聞夫子之言性與天道不可得而聞也然則至于四科弟子窺測尚難况是萬里逺人仰何及固不效尤于篆刻請益于琢磨強搜類鶩之詞是黷猶龍之德今者逺聆美命俯切歡心望峻中臺逈冠鴛鷺之列恩深大厦空傾燕雀之誠伏惟捨念雲泉拯民塗炭輔弼契千年之運奸雄避七日之誅某跡忝諸生身拘倅職末由陳賀下情無任抃躍兢惶禱祝之至伏惟俯賜念察謹狀濟源别𥿄不審近日尊體何似伏想孟津别壤沇水清源風晴而欹枕泉聲雲曉而卷簾山色既見境含秀麗固當道脫冲和伏惟每慎寢興早歸燮理顯驗月中之夢􅐌成天下之春卑情無任攀戀禱祝之至謹狀迎椘州行李别𥿄二首不審近日利涉長淮尊體寢膳何似伏以源滋桐柏浪接蓬萊雖漸臨鬱懊之期而宛對清虗之境開樂鏡而真同月映泛膺舟而况值風調誰言避地之行實叶濟川之業伏惟緩飛仙棹靜運真筌庶納休禎每加遵護卑情懇望謹狀又某啓今月某日專使至伏蒙恩慈特降尊誨跪讀欣抃不任下情伏審尚書逺赴天庭將遵水道整蘭撓而思郭泰指桂苑而訪劉安睹神仙則椘俗皆驚聞雅頌則魯儒相賀况某材實慙于楛矢跡嘗列于蓬壷為倚德門獲栖候府今者佇迎鶴駕即覲龍章既知天幸遭逢唯切日深踊躍且曽晢陳浴沂之志只見虗談仲由恱浮海之言終非實事輒以管窺筳擊真為古陋今榮卑情無任攀戀欣抃兢惕之至云云五月一日别𥿄某啓伏以黃雀風髙蒼龍星耀㺯雨而梅雖應夏鋪烟而麥已驚秋時㝎晏隂資全德伏惟尚書處身無躁深守禮經視履考祥雅符易道恬淡則老聃讓美清虗則周顗懷慙氷光長泛于玉壷豈須獨映天意久留其金鼎唯望親調方當鷁泛仙舟必見鳳䘖睿茟入康帝室永福寰區下情無任䖍禱欎戀激切之至謹狀謝降顧狀某啓某未遂山栖尚從塵役所居官舍深在軍營雖異衡門實同陋巷既乏君章之蘭菊可襲馨香空餘仲蔚之蓬蒿偏資寂寞春日則蝶牽晝夢秋風則蛩助夜吟以此為娛無他所覬今者方經離亂再獲起居但喜攀父母之恩却慙下兒女之淚况某叨榮秦爵就學漢儀姜維之膽氣雖麁鄧艾之口詞甚訥唯深感激莫備啓陳伏蒙尚書念以逺方察其獨立俯憐素志每煦溫顔聽及階及席之言佇銘骨銘肌之懇早來又蒙降三淸之仙駕顧一畒之窮居方慙隨入室之賢豈料忝軾廬之念非所敢望將何自安莫不思光逺耀于珠鄉卑迹永超于末路揣庸賤則華夷有隔較輝榮則古今無倫數年乖豹隱之期常低俗眼此日覩鳳儀之後豁展愁眉下情無任感戴欣抃兢惕之至謹祗候起居陳謝謹狀與金部郎中别紙二首不審近日尊體寢膳何似既明且哲則詩美賢人視履考祥則易稱君子既樂持盈之道固安養素之機况屬遲日載陽光風遍煦燕歌鶯舞深資酌桂之歡智水仁山靜恱據梧之興伏惟永資景福早副急徴擲玄賞于烟霞濟蒼生于塗炭羣情禱望天下幸甚謹狀又某啓某仰審格言側窺性行人能弘道賢臣以致堯舜為先世實須才俊士以效巢由是恥古者只傳于方䇿今也共仰于德門伏惟郎中大雅含清中庸處厚既以髙名肅物能將全德鎮時柱晴空而嶽頂無雲瑩秋色而潭心有月比者蘭拋粉闥竹領朱􅙲出分天子之憂來慰海人之望况彼郡也户吞越氷􅙘列吳山得袁宏舉扇之風靈濤縮怒使謝運枉帆之路釣渚含春及其五袴傳歌百錢流譽尋迎睿渥遙陟華資懷寶令名誰發迷邦之問司珍正位佇成匡國之謀而乃得之若驚直而不倨選勝于巖軒澗户貪歡于酒賦琴歌久聆萬乘虗懷忍見四方失望仐者梟聲向息鳳紀重興晉傳長才待示指南之制魏牟積變佇申拱北之誠入覲􅕴階坐調梅鼎豈止應月中之夢必期成天下之春然則致堯舜之大猷永匡宸扆效巢由之小莭不介尊襟某逺賣鮫綃慙非重價仰趨馬帳忝預生徒下情無任攀戀禱祝兢惕之至云云與客將書某腐芥無依斷蓬自役長走而未離塵土獨行而轉困路歧昨者逺抱危誠􅌹趨朗鍳竽聲恐濫琴調空悲伏蒙將軍念以來自異鄉勤于儒道曲垂提挈得遂獻投指喻情深師冕不為瞽者奬知言重卞和免作罪人荒淺何堪輝榮已極但以某無媒進取有志退居以詩篇為養性之資以書卷為立身之本却緣雖曽食祿未免憂貧趙囊則到處長空范甑則何時暫熱况乃家遙四郡路隔十洲窮愁則終夜煎熬逺信則經年阻絶時情冷淡俗態澆訛買笑金則易求讀書糧則難致天髙莫問日暮何歸始知學者之心須託至公之力今幸遇相公山包海納雨潤風行有片言可奬者稱譽出羣有小技可呈者隨材入用是以無一物不歸美化無一夫不荷深恩然則舉中國之人咸承煦育豈可令外方之士獨見棄遺某不揆庸才敢投清德豈料將軍許垂拯拔每賜吹噓他人之得喪榮枯皆推命分小子之升沉進退只在恩私儻或特假重言終榮賤質唯托針能入線則同錐得處囊某已倚䆠途粗諳吏道如能驅䇿未必跧藏終當富見室家豈憚職榮州縣實以流年易邁壯氣難申唯望庇庥得期變化所兾燕拪雲屋永無巢幕之危鶴出塵籠稍識栗軒之便今欲􅌹修啓事再獻相公少申感謝之懷預寫辭違之懇未知可否先取指麾且某也姜維之膽氣雖麁鄧艾之口辭甚訥縱申拜謁難具啓陳聊托箋毫代披肝膈未能患己先切求仁將軍之心若鏡焉無幽不察小子之身猶箭也唯命是從千浼既頻慙惶益切伏惟終始俯賜念察謹狀謝宋絢侍御書伏蒙殊造俯念移居借賜官車得離旅館簦笈則免勞自負簞瓢則各識所安如承命駕之恩但勵抹輪之志今者卜鄰甚靜學植可成唯扄袁粲之門不掃陳蕃之室雖乘機立事輸他附勢之榮而守道安貧贏得愛間之樂既諧素志但感深恩伏惟終始俯賜念察謹狀答裴拙庶子書某逺離海島旅宦江臯比者暫碩退居稍期隸案來投樂國兾濟窮塗本望少贍山資便諧谷隱伏蒙太尉念以雀有多病鶴自逺來特署職名俾趨恩化尋緣狂花有失腐芥無依轉知山鹿野麋唯宜退縮永謂鴻儔鵠侣不合攀瞻况乃器比斗筲之人身隨刀筆之吏旅舍既拘于雉堞間門可設其萑羅自前年伏承庶子暫阻朝天偶來避地便欲托金牌之幸會叙玉季之奬憐専候起居碩搜誠懇蓋慮跡賤而動多悔吝才微而易見棄捐強自微攀舊恩是為玷浼清德以此跧藏形影綿歷歲時雖知提帚有門唯恐負荆無路豈料庶子恕以未陳禰刺先降劉箋閲溫言而椘絖覆身捧華翰而隋珠耀掌兼蒙賢弟起居未移曩顧逺賜榮緘不遺異域之人特辱同年之字金膏珠粉既垂摩拂之恩驥尾龍髯重有依攀之望莫不駑駘長價瓴甋生光不唯誇衒于親朋實所輝榮于逺俗謹當占筮撰日齊沐拜塵墮肝而盡瀝卑誠擢髮而少逃厚責其他所奉尊㫖謹具别狀啓陳云云謝髙祕書示長歌書伏蒙特飛榮誨寵示長歌玉海金山難測髙深之本北方南國徒觀美麗之姿贊詠無階師資有路但如青蓮居士唯誇散誕之詞白石山人只騁荒唐之作但以風月琴樽為勝槩不以君臣禮樂為宏規遂使千年萬年所流傳皆嗟大雅小雅之淪弊今覩四十三叔行出人表言成世資㺯才子之茟端寫忠臣之襟抱在今行古既為儒室之宗憂國如家固是德門之事天有耳而必當悔禍雲無心而亦可銷兵一言自此興危邦六義于斯歸正道則所謂陳平宰社爾曺何知鄧艾畫營其志不小永言他日足驗前程某畏影雖迷偷光匪懈既知閲寶直若發蒙唯碩將鵬舉萹章傳于異域豈獨以伯魚對答誇向同聲下情但增感戴欽仰降歎之至續􅌹祗候陳謝謝李琯書某啓某今月十日得祗候見太尉渤澥風息蓬萊路通慙非席上之珍謬作壷中之客伏蒙溫顔見煦陋質增榮鳳翼龍鱗終容攀附癡鷹鈍犬特許指呼勉其撿慎之心諭以奬憐之意此皆副使不遺薄藝纍發重言始當獨卧北􅙘如蛙跳井豈料榮趨東閣似鶴乘軒風雲既識于因依氷谷不遑于安處感唯泣誠止無言伏緣既忝從軍難為乞假不獲柢候陳謝謝元郎中書某啓伏蒙太尉恩慈特賜轉職不任歡慶某玄兔微儒焦螟瑣質早因慕善偶獲成名爾後客路多愁候門䁇援麻衣始染于藍色竹簡尋摧其桂香伏自去年刺謁燕臺職叨鄭驛皆蒙郎中推心奬念假力薦揚使孤根無委地之虞短翮有凌雲之望今者忽忝非常之遇深慙不稱之譏雖樂從軍敢安尸祿且鷃披隼翼已覺非宜雞處鶴羣固當自責時日已具狀辭讓以此未敢祗候陳謝伏蒙恩私特降榮誨奉讀欣抃不任下情謝周繁秀才以小山集見示昨日早謁玄成晚歸弊止覺户庭之發光彩聞機案之散馨香遂因驚訊僕夫果得捧承留示溫辭一幅粲然受蓋之規雅什九篇蔚矣患多之思莫不振紀綱于六義飾冠冕于七言既崇大雅之基實播中和之響伏以諸從事鴻儔鵠侶鳳翥鸞翔集桂苑之名都占蓮池之雅望二十三官即先輩僃觀周樂深閲椘材各陳􅐌詠之詞能展縱橫之作茟皆實録機不虗張始窺八首之前只謂衛多君子終覽九華之後方知魯出聖人某今所以禱望者翠輦早遇東巡日環免勞西獻二十三官百步穿業一飛冲天姮娥則迎入桂宫王母則引歸蓬島然後輟勝逰于御氣展長䇿于濟時來登郭隗之㙜坐㺯陳琳之茟則乃今朝麗藻已掩八仙公之名他日賔筵必盈才子之數見丘門之請禱待陳榻之解懸某使欲䘖壁乞降摳衣請蓋但以志勤詞戰雖將築室反耕道拙世塗僅類杜門却掃未獲面申感謝謹􅌹修狀啓陳云云與夀州張常侍書當今聖天子在上賢丞相在下然而宿德令望而推者唯我上公暨滑㙜中令兩地而巳初常侍靜芟前弊權握使符我上公以理狀聞請為真守帝惟曰俞後常侍撫安郡俗振肅兵威大元師以雄才薦請貮前驅帝亦唯曰俞是得㺯印分榮剖符行化踰月報政盡活疲氓實謂夀之人永居夀域矣則乃常侍遇賢丞相之知入聖天子之用乃武乃文多才多藝固以播在四海某豈敢一二而談詠也今所禱碩者碧幢紅斾髙引前相幕將壇别張勝地謂豫不信神之聽之賀椘州張義府尚書國家自兵興已來爵賞既多官榮甚峻然而常恐授受之未能宜稱盡善盡美固當有待今則尚書以纍世勳望以數年戰功始假使符旋迎真命某將趨清德獲聽好音欣抃之來雀躍而已則非獨喜尚書展龔黃之美政實乃賀聖天子之得良二千石也伏惟云云與假牧書伏以近日俗尚書題言矝贊祝苟非全德多是愧辭某執性近愚處身斯直以目所覩以耳所聆方敢詠歌固無諂笑某自逹仁境如歸故鄉見百姓之安則知三軍之樂也見鄉閭之泰則知郡邑之肅也若非常侍寬猛相濟恩威并行則何以至村落之居室家相慶自近及逺嬉嬉然喜遇慈父然則政成一境名逹九重即計冠聳豐貂旟翻建隼榮膺真拜大洽羣情某每聽謳謡深增禱祝伏惟照察謹狀桂苑茟耕集卷之十九
