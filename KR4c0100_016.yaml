body:
  text: 都統巡官侍䘖史內供奉崔致逺撰祭文四首祭五方文築羊馬城祭土地文祭椘州陳亡將士文寒食祭陳云將士文書二首移浙西陳司徒廟書手札一首記二首西州羅城圖記補安南録異圖記疏一首求化修大雲寺疏求化修諸道觀疏祭五方文年月日具䘖某謹以清酌庶羞量幣之奠敢昭告于五方神之靈傳不云乎五行之官是謂五官封為上公祀為貴神社稷五祀是尊是奉木正曰勾芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土是以禮云共公氏之霸九州也其子曰后土能平九州故祀以為社然則神主順天靈功莫測諸侯列土祀典宜行惟夫人實統隂祗廣含坤德身為萬物之母首冠五方之君職奉軒皇功標社殷湯罷改遷之議漢武陳祠祭之誠是知神鑑則無偏無頗物情則以享以祀昔平九土既能疏決江河今處五方豈不庇安淮海靈其調和于金木水火驅役于風雨雪霜使春夏秋冬永息災殃之氣東西南北靜除氛祲之源牢幣具陳庶羞甚潔致敬不虧于中霤施恩幸滿于大藩唯候豐穰兾神報塞尚饗築羊馬城祭土地文年月日具䘖某以兵戎未息禦僃是勤乃命修築羊馬城遂遣某官某乙告于土地之神曰夫城郭之設邑居所慿陋之則狡者或美之則寡能固守况今豺聲竸發虺毒遍吹易動難安何處能為樂境暫勞永泰此時須建良功遂乃揣髙卑議逺近使令百堵皆作終可三旬而成徴名于伏櫪觸楹接勢于長雲斷岸不假龜行之迹豈須龍見之期衆既呌心事無費力神其德惟博載道實流謙勿辭板築之喧勉致金湯之固使雲鍬雷杵逺振歡聲烏堞隼墉髙標壯觀北吞淮月南吸江煙平欺鐡甕之名逈壓金甌之記有僃無患神其聽之祭椘州陳亡將士爾等尺籍從軍才心報國羔裘武􅎖既以力稱馬革雄圖早將身許爰有徐孽來侵椘封㫪喉之壯氣未申失手之冤聲遽起始見荷戈就列翻為復矢成行然而功其可稱死且不朽有狼瞫之君子無羊斟之小人昔時之重義輕生不求苟活今日之名存身喪豈貯遺悲魂其有知各歆薄酹寒食祭陳亡將士嗚呼生也有涯古今所歎名之不朽忠義為先爾等彍弩勞身蒙輪逞力奮氣于㷱羆之列忘形于鵝鸛之前能衍勇于干戈固免慙于牀第今也野草緑色林鶯好音杳杳逝川空流恨而無極纍纍荒塜誰驗魏之有知我所念兮舊功勞我所傷兮好時莭俾陳薄酹用慰冥逰共謀抗敵于杜回無效懷歸于溫序能成壯志是謂隂功移浙西陳司徒廟書滔滔逝水幽顯雖殊凛凛雄風古今何讓苟或同心立事必能異代論交司徒壯莭竒功僃載外孫之碣靈恩顯驗髙傳太伯之鄉談揚而不假再三徴引而難窮萬一今則兾動玄鑒直書素誠既當可舉而行固在不言而信且此誓除國難齊命舟師將泛西江即離北岸練鋪一水指疆界以雖分黛列千山望威靈而如在今于弊境已立嚴祠敬迓來儀乃酬前碩幸移玉趾無戀石頭桂楫蘭檣早決遷居之計鸞絲鳳管佇申迎奉之儀况乃近境無虞芳筵不絶但得禍淫福善何妨捨舊從新北渚煙花休起别離之恨東塘風月好追歌舞之歡必能依統帥指揮永可振司徒勳業特差􅌹介用啓至誠昔之青骨標竒已謂隂陽不測今也赤眉稔惡豈宜征戰無功將申烈烈之威實假冥冥之助所兾八公山上遍設雄師五里霧中能呈異術則必隂子春之破賊吳大帝之封王共立功名若合符契無誤會稽之軍僃有慙即墨之神謀早詳禴祭之言永副里仁之義某白手札風煙雖邇雲霧難披景仰靈威遙申誠碩今已靜搜勝地髙創夀宫永可安居謹令咨迓便請挈家速至􅌹當掃席相迎且鐡甕城低金陵地狹能施百福無滯一方此欲劒拂妖星旗迎聖日必期大捷永致中興幸其來助隂兵共成玉事目極東流之雪浪心馳北顧之煙峰神兮移來哀江南某白西川羅城圖記西川羅城四仞髙三尋濶周三十三里乃今淮海太尉燕公所築也粵若梁州别壞蜀國雄都內跨犍牂外聮蠻蛋左臨百濮右挾六戎咽喉之控引實繁唇齒之輔依難保自昔鱉靈流異龜迹標竒藩籬始建其一城扄鐍猶虧于四郭莒子則既忘重閉衛人則唯慮徒居蠢彼狗封恣其狼戾每至草乾𤏡道浪縮瀘河則必推紒橫侵撥羣驅隊編氓懾竄巷哭街號戎兵以拔斾為中權府尹以閉關為上䇿稔成氛祲積有歲時洎乾符初偶絶羈縻大興叛換白虎之狂災漸盛黃龍之舊約難尋兵力莫申帝心有寄以公慶傳漝夢業練圯書交趾銘勳則永威八詔鄆城報政則不待三年屬蠻寇加囂王師告老遂飛急詔請救倒懸由是自東徂西以晝繼夜走單車于外境豈煩龔逐獻書受戎輅于中塗掩晉侯稱伯公鄆行次咸陽除投西川莭制䘖睿略倐逹成都于時驃信屯兵逼郊隊而才踰一舍黔黎失葉焚里閭而何啻萬家彼則舉國而濟師此則闐城而受弊外熾崑岡之熖噀酒無能內枯疏勒之源指梅何益莫非枕倚墻壁誰堪擐執甲兵公至止之日豁啓城扉若開籠檻威振而寧勞利器邪膽皆摧化行而如嗅新香驚魂盡返蠻王以據耳飽聆其異略鏤膚畏挂于嚴誅恟然觀電懼雷歘爾烏飛魚散公尋令選鋭暫使追逃乘其垂翅之時展我燎毛之勢數俘莫記執馘居多爾後因閲地圖得搜天險是猿狖養髙之窟為豺狼伺隙之蹊乃令一創雄關一摽巨防修功峽關置平夷鎮蠻賊要路固守無虞危堞則慿蠻助峻長溝則噵澗資深宛成善閉之機實扼間行之徑丸泥可固斷知無得而踰爟火罷驚坐見不爭而勝仍尋水道别建河營大渡河側置防河營逺方猾夏之徒難謀航葦均發戍申之卒免詠流薪疆陲永保于覆盂門里閈唯矝于列鼎卿雲邦彥間吟搜吐鳳之詞卓鄭鄉豪靜坐貯蹲鴟之利公以寢處戎閫夢想扁舟將申逺慮于無窮豈立空言為不朽乃曰彼蠻之習也外癡內黠朝四暯三雖莊叔此時功已成于長狄而季孫他日憂必在于顓臾詎可虗號錦城尚無羅郭守民之制非我而誰啓抱而神欽至誠飛章而帝允丹請時有賔進難將校獻疑皆云公孫𫐠躍馬雄臨非無意也諸葛亮卧龍崛起亦有志焉但以曩築子城猶資容土九年方就百代所難蜀無土昔張儀築子城輩士于學射山日役往返九載後始成况今將興廓落之基恐致遷延之誚公曰術先㝎事當速成必能終簡天心豈謂虗穿地脈于是郡侯奔告邑尹樂從乃使揣髙卑議逺邇慮材用量事期採時候于魯書佚規模于周令引長江而􅗇長塹夏禹慙能對髙巘而劃髙墉秦皇失色矧乃命五丁而嘨侶運六甲以驅種天兵則謲水于寒泉地媪則變沙為美土蜀地穿未盈尺泉漫漲起至是土出沙中城缺如舊實謂百靈幽贊萬姓恱隨􅓩聚雲鋒杵騰雷響不見烈風凌雨又令簋飽觴酣登登而只竸歡呼屹屹而便如湧出百堵皆作三旬而成然後郢匠勞功素材變質優人展妙赬壞凝華攢空而烽櫓髙排架險而闉闍聳起橫分八尺結雕甍而彩鳳聮飛檻徹四隅擁繡堞而晴虹直挂罩一川之佳景籠萬户之歡聲逺而望焉則巍巍峩峩若雲中之疊嶂錦霞縠霧隱映乎其上迫而察也則赫赫燡燡想海畔之仙山金臺銀闕焜耀乎其間始自庀徒終于解役不假朽緍于官稅無資剖粒于軍租築板所費錢一百五十六貫米一十九萬石皆由智計不破上供皆聚羡財儼成壯觀遂使蠻酋裭魄賨旅歸心不敢言摩壘而旋無因致入郭之役爰徴繪事仰貢九重旋降綸言過褒一字宣睿旨于翰林才子綴妍辭于黃絹外孫築城碑今庸王相公承旨撰詞公雖迎金鳯䘖書未議石龜戴版蓋乃謙沖自牧恥其功伐驟稱及蒼鳥髙飛翠華逺狩儼仙逰于玉壘安聖慮于金墉故得親覽宏規益欽忠莭特傳瑶檢徴進碑詞遂命雕鐫永揚威烈實萬古未聆之事乃四方無比之榮美矣哉龍以雲興魚因水樂誰不仰公智周物表事照機先凡施權謀若合符契則昔全蜀未城也天留盛績日待英才所謂有非常之人然後有非常之事有非常之事然後有非常之功是以非常老固非常人之所覬也致逺雖丘堂覩奧師冕何知而秦國斂賢由余不棄謹成實録敢記殊庸所兾四海柕航閲雄圖而稽顙九州旄鉞望法駕而安心中和三年龍集癸卯八月二十五日記補安南録異圖記交趾四封圖經詳矣然而管多生獠境邇諸蕃略採俚談用摽方志安南之為府也巡屬一十二郡峰歡愛陸長郡諒武㝎武安蘇茂虞林羇縻五十八州府城東至南𬈑四百餘里有山橫亘千里而遙遽穴深巖為獠窟宅蠻蛋之衆六種星居鄰諸蕃二十一區管生獠二十一輩水之西南則通闍婆大食之國陸之西北則接女國烏蠻之路曽無亭堠莫審塗程跂履者計日指期沉浮者占風㝎信二十一國雞犬傳聲服食所宜大較相類管內生獠多號山蹄或𬒳髮鏤身或穿胸鑿齒詭音嘲􅑜姦態睢盱其中尤異者卧使頭飛飲于鼻受豹皮褁體龜殼蔽形搗木絮而為裘獠子多衣木皮熟搗有如纎纊編竹苫而作翅生飬則夫妻代患長成則父子爭雄縱時有傳譯可通亦俗無乘蠶之業唯織雜彩挾布多披短襟交衫或有不縫而衣不粒而食死喪無服嫁娵不媒戰有排刀病無藥餌固恃險阻各稱酋豪逺自漢朝迄于隋季荐興邉患頗役遐征馬將軍標柱歸時寸分地界史總管倒碑過後略靜海隅洎咸通初驃信挻災元戎喪律鴟嘯于跕鳶之地豕豗于束馬之塗摧凶欲快于摏喉拯溺唯思于援手先帝以今淮海太尉燕公宣威大漠政洽上都時公防禦秦城剗平醜虜才歸輦下出鎮安南乃請出鎮龍編立身豹略剗雕題而卯碎活黔首以肌豐復壁壘于一麾拔封疆于萬里有蠧皆削無冤不伸朱道古稔姦于外杜存凌恣虐于內皆為安南巨患公乃誅滅無遺故禇令公遂良竄殁日南子孫雕零公時表洗雪然後使電母雷公鑿外域朝天之路山靈水若偃大洋沃日之波安南經岝口天威神功所開播在逺邇遂得絶蠻課之北窺紆漢軍之南戍乃鳳傳徴鷁泛歸程至于洞獠海蠻莫不醉恩飽義逺投聖闕請建生祠則知善政所行殊方可誘既見馬如羊而不敢縱令蟻若象而何虞之以驗四夷之時或不賔九牧之任不得所也有柔逺軍從事吳降嘗集是圖名曰録異敘云久觀遐蕃目擊殊形手題本事然則信以傳信斯焉取斯閲前詞退而嘆曰愚之所以為異者其諸異乎人之所異曰六合之內何物則棄至如鼠肉萬斤蝦鬚一丈既知南北所産永釋古今之疑則彼獸性羣分鳥聲類聚誠不足異也頃太尉燕公受三顧恩用六竒計使獷悍歸服邉陲晏然今聖上省方蒙王獻欵不敢㺯吠堯之口永能除猾夏之心皆由燕公收交州鎮蜀郡威振于奔魑走魅功成于金壘湯池所謂藴先見之能察未來之事呼吸而隂陽不測指蹤而神鬼交馳實為天工人其代之斯實可為異矣聊輔所闕敢貽將來時翠華幸蜀之三載也求化修大雲寺疏大雲寺募緣求化重修建瓦木功價等詳夫教列為三佛居其一其如妙旨則暗裨玄化微言則廣諭凡流開張勸善之門解摘執迷之網然則欲使衆心歸敬須令像設莊嚴有感必通無求不應墾情田而種福遊法海而洶殃不可思議于是乎在當州城西大雲寺雖臨椘甸實壓蜀岡舊創仁祠髙標兊位雨洗煙窗之色萬朵前山風𫾣月砌之聲千株古木在一郡乃遍為勝境于四時則最稱芳辰至如春水緑波雜花生樹都人士女以遨以遊不勞聽法之緣自得消憂之所則與城東禪智寺䨥肩對聳兩耳齊張夾煬帝之遺宫擁淮王之仙宅壯茲樂土倚彼福田前年偶值飛蝗未能避境旋憂聚蟻或欲毀堤故護軍特進以將隔妖氛忽興猛熖遂使琉璃之界翻成煨燼之餘雖菩薩焚身固為常事而苾篘住足盡失安居可惜祗園便同隙地今幸遇太尉將驅衆旅佇滅羣凶既逃過去之哭或輔未來之福欲安盛府許葺精廬欲使爐續朝香鍾迎夜梵樹宿獼猴之友林栖鸚鵡之王蓋尋貞觀之中曽傳帝語豈效太清之末酷信伽談所碩廣運慈航徐捶法鼓深資功德靜剗妖魔百官榮從于鸞旌萬乘遄歸于象闕次碩太尉廓清寰宇髙坐廟堂演伽葉之真宗龍堪比德舉儒童之善教麟不失時克興上古之風永致大同之化凡于戴髮含齒鱗潛羽翔皆荷慈悲盡能解脫但以一毛可拔先求信義之心百足不僵須賴扶持之力既難獨辦固託衆緣無吝羡財合資洪福富者不仁之説自古所譏積而能散之規于今可誡謹疏求化修諸道觀疏𬗋極宫重修城下諸宫觀求化尾木等價伏以苦縣誕靈神州演法真性乃聖朝之祖強名為至道之宗玉葉金柯耀芳隂于萬代瑶函瓊笈傳妙旨于四方遂得齋醮有歸科儀無墜神宫靈宇宛寫諸天祕殿精壇嚴修勝地當州東吳麗俗南衮雄藩鮑參軍則賦衒精妍揚執戟則針誇夭矯而乃至道少勤行者玄門無善閉之味淡口中動成大笑義深目外誰信上升福庭則草沒塵侵仙室則雨傾風壞况值梟聲竸噪虺毒強吹到處星飛但見羽書之急經年霧集唯聆甲騎之勞俗既喧驚教增寂黔未有葺修之暇非無捨施之緣今幸遇太尉德繼猶龍道深有象黃石公之妙訣雅稱帝師赤松子之勝逰佇迎仙友是故出則以六竒制敵入則以九轉服勤靜除閫外之煙塵間對壷中之日月三元遵敬一氣精修果見真位髙遷殊祥荐降彩雲片片飛來椘岫之風玄鶴䨥䨥唳向隋宫之月又乃前年則江冦南逼去歲則淮戎北侵蟻皆恃于成羣蛇欲矝于結陳伏賴太尉雄威坐振衆孽奔亡四鄰戴信于桓公八郡感恩于邵父覩耕農之蔽野聽歌吹之沸天古人有言為可為于可為之時則可其城下宫觀今欲旋集良工增修舊址擬金室銀堂之制處處騰光俾星冠月帔之徒人人潔迹微功若就良碩克伸龍圖早耀于中興虎旅永摧其大盜次碩太尉運籌佐漢逈掩張良拊棹遊湖靜追范蠡石留馬迹臺挂鳳音蓬島花開春醉而間乘白鹿芝田雨過曉耕而長任青牛罷吟小桂之句獨邁大椿之夀然後仰從翔翼俯至潛鱗凡曰含虗悉能蒙福但以所修宫觀荒摧既久經費甚多無因獨辦資種唯仰衆成功德迦談之難捨能捨猶見樂輸道教之自然而然幸無輕諾謹疏桂苑茟耕集卷之十六
