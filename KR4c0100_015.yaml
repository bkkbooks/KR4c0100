front:
  text: 桂苑茟耕集卷之十五齋詞一十五首
  hash: sha256:64fc1692273bf4ab4324d6b9c508874e2c43988f488d47bb470844bcf65b79f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_015-1a}
body:
  text: 應天莭齋詞三首上元黄籙齋詞中元齋詞下元齋詞二首上元齋詞中元齋詞黄籙齋詞禳火齋詞天王院齋詞故昭義僕射齋詞二首應天莭齋詞三首道士某乙言伏以聖人降生王者嘉應包天地之大徳啓日月之殊样是以電繞虹流克符龍質握乾披震允叶龜書伏惟聖神聰睿仁哲眀孝皇帝紫所真宗丹陵寳命孝理而勤修一徳化成而胥恱萬方偶以犬吠尭威㷱驚漢御猶軫泣辜之念暫勞展義之行今者風振南薫方在長羸之莭星瞻北極乃當誕慶之辰莫不山靈供萬歲之歡聲河伯獻千年之瑞色仰資聖夀敢設仙齋廣成子之㣲言既傳衆妙華封人之善祝實繋羣誠伏碩徳乃日新禍當天悔暫興時雨遍洗妖氛髙整鸞旗早廻鳳輦然後捜濟汾之詠撰封岱之儀傳芳扵玉葉金枝積慶扵天長地乆使蠻戎率服蠢植咸蘇仰沐華胥之風齊登仁夀之域普天率土永賀昇平又道士某乙言伏以父天毋地帝道所以爲尊貫月繞星靈符扵是乎在况覩一人有慶固知萬夀無疆伏惟皇帝陛下龍握丕圖鳳資聖紀播休聲扵里社標盛禮扵髙楳今者風調舜琴日緩羲轡曆草舒芳扵八葉丹陵降瑞扵千齡謹設仙齋仰陳善祝伏碩塵銷九野波息四溟早廻西幸之儀便舉東封之禮一千年之休運髙建武功三十世之昌期倍延福祚允諧大㝎永賀中興又伏以瀨郷白鹿既掛仙蹤函谷紫雲果資王氣積慶扵天長地乆傳華扵聖子神孫耀玉京而我李長春演金籙而荘椿永茂伏惟皇帝陛下三無禀徳萬有覃恩叶惑星夢日之祥掩四乳八眉之瑞上天降聖爰乗解愠之風列士修齊况值晏隂之月伏碩峒山順䡄汾水廻鑾迎萬歲之岩音歸九重之天闕享七百年之休運寰宇中興守五千字之格言兵戈大㝎仰祈玄鍳永護皇居上元黄籙齋詞年月朔啓請如科儀伏以有徳不徳無名可名自施倐忽之功莫究希㣲之㫖是以紫府乃修心可到玄闗非用力能開臣志慕眞風躬行正道但以漢良前筯猶勞戰伐之謀越蠡扁舟未遂優閑之望既榮人爵須報主恩誓殱無頼之徒乆練不祥之器動拘俗役慮犯玄科今則莭已及扵上元灾未銷扵下界謹修常醮仰貢㣲誠所碩梟覆頑巢鳳廻仙駕帝座與三台永耀王畿與九牧皆安雷驚而蟄户全開風掃而妖氛静息俾臣靈根日茂至業天成乕符提閫外之權終安澤國虹莭指壷中之境得認家山臣無任䖍肅禱祠懇悃之至謹辭中元齋詞年月朔啓請如科儀伏以道本強名固絶琢磨之理身為大患深驚寵辱之機能審自然而然必知無可不可是以雕詞賛美則乖妙㫖扵混成矯志求真則爽竒功扵積學兾標玉籍在守金科臣才謝半千雖慙賢路心凝正一早扣玄闗齋誠扵八莭三元錬志扵龍緘鳳藴但屬鯨翻逆浪蜮噴毒沙數年興蠧螫之灾萬姓抱瘡痍之苦三尺劒髙提在手須救危時六銖衣輕掛扵身未諧夙碩今謹因中元素莭大慶良辰依寳壇而醮設常儀企仙闕而拜申精懇伏碩眞風蕩滌玄澤滂流吾君享萬歲扵巖音賢相耀六符扵渭訣調舜絃之羙化永復昌期漏湯網之兇徒咸歸顯戮然後戴髮含齒鱗潛羽翔不知日用之功各遂天成之樂俾臣代勲善繼真位髙遷留形扵烟閣雲䑓縦賞扵芝田蕙圃鑄金追想終榮聖主之恩叱石閑逰得效仙人之術儻非過望敢不精修臣某無任祈㤙謝過䖍禱懇悃之至謹辭下元齋詞年月日啓請如科儀伏以敎資妙用無爲而無不爲道在勤行不厭是以不厭苟得捧持三寳必能極護萬靈須慿善建之根株始覩混成之閫閾故曰大丈夫䖏其厚而不䖏其薄居其實而不居其華者也臣雖塵役拘身而雲装挂志大成是望上達爲期毎依郭璞詩中精調玉石碩向葛洪傳上得寄一名所以仰欽象帝之先豈在他人之後聴爛柯翁之說則倍惜光隂覧抱朴子之言則不虧忠信但以卑棲俗累深握兵符政刑之得失難調賞罰之重輕易忒暗堆愆咎莫補精修况叨真位之榮恐負玄科之責是以三元八莭顯醮遥祠唯期致力扵九層未曽妨功扵一簣今則天吏扣應鍾之候水官㰖玄轡之時月數就盈日辰在望仰投靈地敬設寳壇僃儀扵琳几瓊盤注想扵金䑓銀闕兾感通扵良夕能濟援扵危時伏乞太上三尊十方衆聖曲垂玄鍳俾遂丹誠卑廻翠輦扵長安復振皇風扵正始秉陶鈎者永諧徳化仗莭鉞者共戢兵戎波濤静寢扵四𬈑氛霧豁開扵九野樹下有推功之将草間無求活之徒至扵翔翼躍鱗跂行喙息偕登仁夀之域不躡昏迷之途使臣深結道縁遥申齋碩望三清扵通路資一溉扵良田此時枕越石之戈暫妨髙卧他日把浮丘之袂豈訝後来臣某無任瀝懇投辭䖍禱惶切之至謹辭又年月日啓請如科儀臣伏以測管窺天雖乖曠望揮戈駐日盖感精誠苟爲山之力不虧則至海之期何逺仰玄門之善閉遵妙道以勤行但以爲子爲臣曰忠曰孝既増榮扵國禄碩無忝扵家勲手握玉符且救寰中之難志棲金籙唯思象外之逰毎慮政失務三法虧畫一雖慎撫綏扵南兖尚多愆咎扵北酆况當剪寇爲期弭兵未暇今則月就盈數日臨下元遥倣眞儀敬陳齋法儼星壇而稽首想風馭以馳魂伏乞太上三尊十方衆聖玄慈見䕃良碩克諧翠華早耀扵秦雲皇祚永興扵漢日百官多慶八裔同歡冦戎則銷燧象之灾幽滯則假燭龍之照然後使臣世官貞吉道葉滋成遺榮待泛扵五湖企想潛通扵三島作人間之都尉蒯訓無心拜天上之侍郎沈羲有望唯碩在家必達終能直道而行臣無任祈㤙懴罪䖍切惶恐之至謹辭上元齋詞年月日啓請如科儀臣仰察玄經乃見道資衆甫俯稽聖典則知神應至誠是以早詳病病之言毎勵賢賢之行五音五色實除耳目之娯六甲六丁潜致瓜牙之役碩躡輕飛之路常𫾣衆妙之門但屬戎馬生郊陳蛇奔穴無苟免而臨難不得已而用兵盖報主㤙慮虧臣莭只誓顯誅冦孽寧知暗積愆殃雖軍律克申而眞科是懼今以日延和景月滿初元遇吸新吐故之辰懴喙腐吞腥之罪儼陳醮禮敬薦齋誠燈耀九光燼焚百和寂寥塵外幡幢静設扵星壇髣髴雲中環珮似傳乎風馭兾銷妖祲仰告威靈伏乞大降玄慈下從丹懇萬乗永資扵萬夀百官皆荷扵百祥戰塲則荆棘叢生農壤則麥禾花茂凡云蠢勲盡獲昭蘓然後俾臣援溺功成奉身以退冲靈道遂鼓腹而逰飽蘃之糇粮就瑶㙜之蹊徑遇圯上者終諧素志自有前蹤入壷中者盖感􅌹心寧無後望既殊捕影敢憚勞形臣無任悔過祈㤙䖍切惶恐之至謹辭中元齋詞啓請如科儀域中之四大難名字之日道物外之三清在想心以為齋豈圖滋福扵一身唯碩洽㤙扵萬彚臣生逢聖日志慕眞風寧貪乆視之門有覬輕飛之路但以行先不殆徳貴有餘毎䖍一氣以存思非止三元而展敬今則雲摧火影風戞金聲當中元積慶之辰謹修常醮以下界罹灾之事仰告玄慈一昨夏景既闌秋成甚邇而乃曠野則飛羊歛翅深泉則黒蜧蔵鱗嗷嗷之黔庻何依烈烈之蒼穹莫訴雖近沾羙澤而尚慊農郊伏乞太上三尊十方衆聖下從精懇大庇生靈使風雨常調煙塵永息興聖祚扵千秋萬歲振歡聲扵四海九州然後俾臣功名則與國同休道業則在家必逹水中泛泛謝時態之澆浮雲外飄飄逐仙蹤而騫翥既探珠而有望寕種玉以無因臣不任祈恩救灾懇禱䖍惕之至謹辭齋詞啓請如科儀伏以混成至道本在勤行衆妙玄門唯資善閇故曰修之身則其徳乃貴修之國則其徳有餘既能事小功多可謂暫勞永逸臣雖手提金鉞而心寄瑶䑓飄飄然自有良期擾優者誰知積學是以三元致敬一氣存思佇天上之雞聲濳懸素望待海中之鶴信毎瀝丹誠終兾用之則行豈言深不可識今者謹賫薄禮仰黷玄慈所碩轉茂靈根漸抛俗界餌崦嵫之竒草飲沆瀣之仙漿漢代淮王終遂仙逰之樂周時柱史何妨吏隱之名苟保天成奚言日損景仰扵其中有象碩知扵此外無求臣無任授辭懇迫䖍禱兢越之至謹辭黄録齋詞啓請如科儀臣身拘俗網志仰真筌雖窈窈冥冥至道則無形可扣而勤勤懇懇精心則有感必通是以毎勵焚修敢安晷刻所兾學海而終歸巨海好龍而不懼眞龍豈貪輕舉之名但效勤行之㫖然以早分相印乆握兵符當扶危静亂之秋有戮暴誅奸之役伏慮政條失所刑律乖冝愆違暗積扵玄司殃咎難逃扵黒籍今則景銷木徳莭啓火威稽首昊天叩心靈地跼蹐而謹陳薄奠禱祠而仰獻㣲誠伏乞太上三尊十方衆聖俯矝丹慊深降洪慈使電滅千灾雲興百福永資玄䕃漸茂靈根掃閫外之烟塵早成勲業玩壺中之日月免役夢思臣無任悔過祈恩懇迫惶恐之至謹辭禳火齋詞年月日啓請如科儀扵紫極宫内修建洞淵妙齋三日四夜轉經行道為禳當府火灾祈恩投辤上諧虚無元始天尊伏以波蕩四𬈑塵昏九野遂見綿區匝宇未能滅祲消氛臣雖志恱道風而身沾睿澤早託山河之誓乆臨淮海之封毎慎撫綏不遑寧息粗安一境已渉五年齋誠仰貢扵上玄妖氣碩銷扵下界豈料天心悔禍必俟時期地分罹殃難逃曆數方當暮月始起融風遽興鄭國之灾難施瓘斚將救成都之急誰噀酒杯所焮既多俱焚是慮衆力猶勤扵撤屋羣心免駭扵燎原今則毎念傷人唯知罪已仰投靈宇敬醮寳壇祓禳夐異扵四郊寧拘古禮祈禱逺瞻扵三島但獻精誠伏乞太上三尊十方衆聖曲流玄澤火挫陽精使回禄知非祝融請罪閭閻撲地皆除火宅之灾道路生風永作水郷之福烝黎樂業師旅懐安構隂謀者自就消亡歸善化者各資榮泰齊登夀域仰望仙郷臣無任歸罪乞恩䖍禱懇迫惶恐之至謹辭天王院齋詞唐中和二年大歲壬寅正月望日具䘖某敬請僧某乙設齋于法雲寺天王院謹白言舎利佛大慈大悲觀音菩薩伏以欲界将傾魔軍竸起九野塵昏扵刼燼四𬈑波蕩扵狂颷諸侯志慕扵宋公星無三徙聖主徳齊扵􅗛帝日未再中不知天養䲭梟地容螟蟘力闘之羣兇得便義征之衆旅摧威某也手握兵符心抱将略欲展焚枯之力碩成拯溺之功是以景仰三歸勤行十善深慿護念敢啓邀迎字内瘡痍略假醫王之術世間疲瘵遍希慈父之恩今則幸遇初元精修羙供春露洒琉璃之境曉風吹薝蔔之香想其舎衛城中長老盡擕弟子水精宫裡天王便作主人伏碩舎利佛大慈大悲觀世音菩薩教既東流跡能西降逺救閻浮之地蹔離兠率之天問疾語言不竸維摩之說稱名功徳可逃羅利之灾唯碩共泛慈航齊揮智劒寢驚濤扵苦海掃妖氣扵昏衢則乃慧燈照天帝之心法皷破波臣之膽静銷諸惡暫開方便之門廣庇衆生無惜慈悲之室謹䟽爲故昭義僕射齋詞二首中和二年七月二十三日爲故昭義姪孫僕射及二孫子敬設齋于法雲寺聊慿法䟽用寫悲詞以昭義姪孫幼藴壮圖長居重任不掃一室有志四方手運豹韜既是吾家之事身持龍莭累沾聖代之恩至扵越海征蠻對河分陜立戰功扵遐徼傳理化扵近藩慎守詔條能諧物議遂移上黨實委外權尋屬戎馬生郊陣虵出穴遽聆寇孽直犯亰華頻興伐叛之師稍急訓戎之令上将則雖期徇難欲竭忠誠小人則多是幸灾潛興狡計叛徒忽至横禍斯侵弘演納肝其誰能繼酆舒傷目所不忍言噫道則日彰志惟天奪征旌永卷飛旐貟来言念彫零莫勝悲慟但以推尋佛理抑割俗情既知前世因縁粗解此時冤痛况乃父立忠莭子揚孝名古賢所稱今我何恨俾資冥福敬設妙齋所碩慧炬照迷慈航援溺早推誠扵貫日終致樂扵生天子子孫孫永絶㤪讎之本生生世世常逢安泰之期謹䟽又中和二年七月二十七日某官某乙奉太尉䖏分爲故昭義僕射扵法雲寺設三百僧齋并寫金光明經五部法華經一部永充供飬盖聆佛修慧力普濟羣迷人發信心終成善碩苟得影從至敎必能響荅䖍誠伏以昭義僕射夙振雄圖繼分重寄将軍投袂練兵而方切専征天子剪衣飛詔而唯慿妙略佇建彀中之勲業忽罹意外之灾殃不吊昊天奪我良胤今則敬投蓮宇䖍設桒門仍貝葉之眞蹤仰奉法華之妙義伏碩乘茲功徳解彼冤讎灾星昔照扵預州已推定分慧日今懸扵覺路永絶良縁謹䟽桂苑茟耕集卷之十五
