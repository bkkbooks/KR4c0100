front:
  text: 桂苑茟耕集卷之十五齋詞一十五首
  hash: sha256:64fc1692273bf4ab4324d6b9c508874e2c43988f488d47bb470844bcf65b79f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_015-1a}
body:
  text: 應天莭齋詞三首上元黃籙齋詞中元齋詞下元齋詞二首上元齋詞中元齋詞黃籙齋詞禳火齋詞天王院齋詞故昭義僕射齋詞二首應天莭齋詞三首道士某乙言伏以聖人降生王者嘉應包天地之大德啓日月之殊樣是以電繞虹流克符龍質握乾披震允叶龜書伏惟聖神聰睿仁哲眀孝皇帝紫所真宗丹陵寶命孝理而勤修一德化成而胥恱萬方偶以犬吠堯威㷱驚漢御猶軫泣辜之念暫勞展義之行今者風振南薰方在長羸之莭星瞻北極乃當誕慶之辰莫不山靈供萬歲之歡聲河伯獻千年之瑞色仰資聖夀敢設仙齋廣成子之微言既傳衆妙華封人之善祝實繫羣誠伏碩德乃日新禍當天悔暫興時雨遍洗妖氛髙整鸞旗早回鳳輦然後搜濟汾之詠撰封岱之儀傳芳于玉葉金枝積慶于天長地久使蠻戎率服蠢植咸蘇仰沐華胥之風齊登仁夀之域普天率土永賀升平又道士某乙言伏以父天毋地帝道所以為尊貫月繞星靈符于是乎在况覩一人有慶固知萬夀無疆伏惟皇帝陛下龍握丕圖鳳資聖紀播休聲于里社標盛禮于髙梅今者風調舜琴日緩羲轡曆草舒芳于八葉丹陵降瑞于千齡謹設仙齋仰陳善祝伏碩塵銷九野波息四溟早回西幸之儀便舉東封之禮一千年之休運髙建武功三十世之昌期倍延福祚允諧大㝎永賀中興又伏以瀨鄉白鹿既挂仙蹤函谷紫雲果資王氣積慶于天長地久傳華于聖子神孫耀玉京而我李長春演金籙而莊椿永茂伏惟皇帝陛下三無稟德萬有覃恩叶惑星夢日之祥掩四乳八眉之瑞上天降聖爰乘解愠之風列士修齊况值晏隂之月伏碩洞山順䡄汾水回鑾迎萬歲之岩音歸九重之天闕享七百年之休運寰宇中興守五千字之格言兵戈大㝎仰祈玄鑒永護皇居上元黃籙齋詞年月朔啓請如科儀伏以有德不德無名可名自施倐忽之功莫究希微之旨是以紫府乃修心可到玄關非用力能開臣志慕真風躬行正道但以漢良前筯猶勞戰伐之謀越蠡扁舟未遂優間之望既榮人爵須報主恩誓殱無賴之徒久練不祥之器動拘俗役慮犯玄科今則莭已及于上元災未銷于下界謹修常醮仰貢微誠所碩梟覆頑巢鳳回仙駕帝座與三台永耀王畿與九牧皆安雷驚而蟄户全開風掃而妖氛靜息俾臣靈根日茂至業天成乕符提閫外之權終安澤國虹莭指壷中之境得認家山臣無任虔肅禱祠懇悃之至謹辭中元齋詞年月朔啓請如科儀伏以道本強名固絶琢磨之理身為大患深驚寵辱之機能審自然而然必知無可不可是以雕詞贊美則乖妙旨于混成矯志求真則爽竒功于積學兾標玉籍在守金科臣才謝半千雖慙賢路心凝正一早扣玄關齋誠于八莭三元錬志于龍緘鳳藴但屬鯨翻逆浪蜮噴毒沙數年興蠧螫之災萬姓抱瘡痍之苦三尺劒髙提在手須救危時六銖衣輕挂于身未諧夙碩今謹因中元素莭大慶良辰依寶壇而醮設常儀企仙闕而拜申精懇伏碩真風蕩滌玄澤滂流吾君享萬歲于巖音賢相耀六符于渭訣調舜絃之美化永復昌期漏湯網之凶徒咸歸顯戮然後戴髮含齒鱗潛羽翔不知日用之功各遂天成之樂俾臣代勳善繼真位髙遷留形于煙閣雲臺縱賞于芝田蕙圃鑄金追想終榮聖主之恩叱石間逰得效仙人之術儻非過望敢不精修臣某無任祈恩謝過虔禱懇悃之至謹辭下元齋詞年月日啓請如科儀伏以教資妙用無為而無不為道在勤行不厭是以不厭苟得捧持三寶必能極護萬靈須慿善建之根株始覩混成之閫閾故曰大丈夫處其厚而不處其薄居其實而不居其華者也臣雖塵役拘身而雲裝挂志大成是望上達為期每依郭璞詩中精調玉石碩向葛洪傳上得寄一名所以仰欽象帝之先豈在他人之後聽爛柯翁之説則倍惜光隂覽抱朴子之言則不虧忠信但以卑棲俗纍深握兵符政刑之得失難調賞罰之重輕易忒暗堆愆咎莫補精修况叨真位之榮恐負玄科之責是以三元八莭顯醮遙祠唯期致力于九層未曽妨功于一簣今則天吏扣應鍾之候水官欖玄轡之時月數就盈日辰在望仰投靈地敬設寶壇僃儀于琳几瓊盤注想于金臺銀闕兾感通于良夕能濟援于危時伏乞太上三尊十方衆聖曲垂玄鑒俾遂丹誠卑回翠輦于長安復振皇風于正始秉陶鈎者永諧德化仗莭鉞者共戢兵戎波濤靜寢于四𬈑氛霧豁開于九野樹下有推功之將草間無求活之徒至于翔翼躍鱗跂行喙息偕登仁夀之域不躡昏迷之途使臣深結道緣遙申齋碩望三清于通路資一溉于良田此時枕越石之戈暫妨髙卧他日把浮丘之袂豈訝後來臣某無任瀝懇投辭虔禱惶切之至謹辭又年月日啓請如科儀臣伏以測管窺天雖乖曠望揮戈駐日蓋感精誠苟為山之力不虧則至海之期何逺仰玄門之善閉遵妙道以勤行但以為子為臣曰忠曰孝既增榮于國祿碩無忝于家勳手握玉符且救寰中之難志棲金籙唯思象外之逰每慮政失務三法虧畫一雖慎撫綏于南兖尚多愆咎于北酆况當剪寇為期弭兵未暇今則月就盈數日臨下元遙倣真儀敬陳齋法儼星壇而稽首想風馭以馳魂伏乞太上三尊十方衆聖玄慈見蔭良碩克諧翠華早耀于秦雲皇祚永興于漢日百官多慶八裔同歡冦戎則銷燧象之災幽滯則假燭龍之照然後使臣世官貞吉道葉滋成遺榮待泛于五湖企想潛通于三島作人間之都尉蒯訓無心拜天上之侍郎沈羲有望唯碩在家必達終能直道而行臣無任祈恩懴罪虔切惶恐之至謹辭上元齋詞年月日啓請如科儀臣仰察玄經乃見道資衆甫俯稽聖典則知神應至誠是以早詳病病之言每勵賢賢之行五音五色實除耳目之娛六甲六丁潛致瓜牙之役碩躡輕飛之路常𫾣衆妙之門但屬戎馬生郊陳蛇奔穴無苟免而臨難不得已而用兵蓋報主恩慮虧臣莭只誓顯誅冦孽寧知暗積愆殃雖軍律克申而真科是懼今以日延和景月滿初元遇吸新吐故之辰懴喙腐吞腥之罪儼陳醮禮敬薦齋誠燈耀九光燼焚百和寂寥塵外幡幢靜設于星壇髣佛雲中環珮似傳乎風馭兾銷妖祲仰告威靈伏乞大降玄慈下從丹懇萬乘永資于萬夀百官皆荷于百祥戰場則荆棘叢生農壤則麥禾花茂凡云蠢勳盡獲昭蘇然後俾臣援溺功成奉身以退沖靈道遂鼓腹而逰飽蘃之糇糧就瑶臺之蹊徑遇圯上者終諧素志自有前蹤入壷中者蓋感􅌹心寧無後望既殊捕影敢憚勞形臣無任悔過祈恩虔切惶恐之至謹辭中元齋詞啓請如科儀域中之四大難名字之日道物外之三清在想心以為齋豈圖滋福于一身唯碩洽恩于萬彚臣生逢聖日志慕真風寧貪久視之門有覬輕飛之路但以行先不殆德貴有餘每虔一氣以存思非止三元而展敬今則雲摧火影風戞金聲當中元積慶之辰謹修常醮以下界罹災之事仰告玄慈一昨夏景既闌秋成甚邇而乃曠野則飛羊斂翅深泉則黑蜧藏鱗嗷嗷之黔庶何依烈烈之蒼穹莫訴雖近沾美澤而尚慊農郊伏乞太上三尊十方衆聖下從精懇大庇生靈使風雨常調煙塵永息興聖祚于千秋萬歲振歡聲于四海九州然後俾臣功名則與國同休道業則在家必逹水中泛泛謝時態之澆浮雲外飄飄逐仙蹤而騫翥既探珠而有望寧種玉以無因臣不任祈恩救災懇禱虔惕之至謹辭齋詞啓請如科儀伏以混成至道本在勤行衆妙玄門唯資善閇故曰修之身則其德乃貴修之國則其德有餘既能事小功多可謂暫勞永逸臣雖手提金鉞而心寄瑶臺飄飄然自有良期擾優者誰知積學是以三元致敬一氣存思佇天上之雞聲濳懸素望待海中之鶴信每瀝丹誠終兾用之則行豈言深不可識今者謹賫薄禮仰黷玄慈所碩轉茂靈根漸拋俗界餌崦嵫之竒草飲沆瀣之仙漿漢代淮王終遂仙逰之樂周時柱史何妨吏隱之名苟保天成奚言日損景仰于其中有象碩知于此外無求臣無任授辭懇迫虔禱兢越之至謹辭黃録齋詞啓請如科儀臣身拘俗網志仰真筌雖窈窈冥冥至道則無形可扣而勤勤懇懇精心則有感必通是以每勵焚修敢安晷刻所兾學海而終歸巨海好龍而不懼真龍豈貪輕舉之名但效勤行之旨然以早分相印久握兵符當扶危靜亂之秋有戮暴誅姦之役伏慮政條失所刑律乖冝愆違暗積于玄司殃咎難逃于黑籍今則景銷木德莭啓火威稽首昊天叩心靈地局蹐而謹陳薄奠禱祠而仰獻微誠伏乞太上三尊十方衆聖俯矝丹慊深降洪慈使電滅千災雲興百福永資玄蔭漸茂靈根掃閫外之煙塵早成勳業玩壺中之日月免役夢思臣無任悔過祈恩懇迫惶恐之至謹辭禳火齋詞年月日啓請如科儀于紫極宫內修建洞淵妙齋三日四夜轉經行道為禳當府火災祈恩投辭上諧虛無元始天尊伏以波蕩四𬈑塵昏九野遂見綿區匝宇未能滅祲消氛臣雖志恱道風而身沾睿澤早託山河之誓久臨淮海之封每慎撫綏不遑寧息粗安一境已涉五年齋誠仰貢于上玄妖氣碩銷于下界豈料天心悔禍必俟時期地分罹殃難逃曆數方當暮月始起融風遽興鄭國之災難施瓘斚將救成都之急誰噀酒杯所焮既多俱焚是慮衆力猶勤于撤屋羣心免駭于燎原今則每念傷人唯知罪已仰投靈宇敬醮寶壇祓禳敻異于四郊寧拘古禮祈禱逺瞻于三島但獻精誠伏乞太上三尊十方衆聖曲流玄澤火挫陽精使回祿知非祝融請罪閭閻撲地皆除火宅之災道路生風永作水鄉之福蒸黎樂業師旅懷安構隂謀者自就消亡歸善化者各資榮泰齊登夀域仰望仙鄉臣無任歸罪乞恩虔禱懇迫惶恐之至謹辭天王院齋詞唐中和二年大歲壬寅正月望日具䘖某敬請僧某乙設齋于法雲寺天王院謹白言舍利佛大慈大悲觀音菩薩伏以欲界將傾魔軍竸起九野塵昏于劫燼四𬈑波蕩于狂颷諸侯志慕于宋公星無三徙聖主德齊于􅗛帝日未再中不知天養鴟梟地容螟蟘力鬪之羣凶得便義征之衆旅摧威某也手握兵符心抱將略欲展焚枯之力碩成拯溺之功是以景仰三歸勤行十善深慿護念敢啓邀迎字內瘡痍略假醫王之術世間疲瘵遍希慈父之恩今則幸遇初元精修美供春露灑琉璃之境曉風吹薝蔔之香想其舍衛城中長老盡擕弟子水精宫裡天王便作主人伏碩舍利佛大慈大悲觀世音菩薩教既東流迹能西降逺救閻浮之地暫離兜率之天問疾語言不竸維摩之説稱名功德可逃羅利之災唯碩共泛慈航齊揮智劒寢驚濤于苦海掃妖氣于昏衢則乃慧燈照天帝之心法鼓破波臣之膽靜銷諸惡暫開方便之門廣庇衆生無惜慈悲之室謹疏為故昭義僕射齋詞二首中和二年七月二十三日為故昭義姪孫僕射及二孫子敬設齋于法雲寺聊慿法疏用寫悲詞以昭義姪孫幼藴壯圖長居重任不掃一室有志四方手運豹韜既是吾家之事身持龍莭纍沾聖代之恩至于越海征蠻對河分陜立戰功于遐徼傳理化于近藩慎守詔條能諧物議遂移上黨實委外權尋屬戎馬生郊陳蛇出穴遽聆寇孽直犯亰華頻興伐叛之師稍急訓戎之令上將則雖期徇難欲竭忠誠小人則多是幸災潛興狡計叛徒忽至橫禍斯侵弘演納肝其誰能繼酆舒傷目所不忍言噫道則日彰志惟天奪征旌永卷飛旐貟來言念雕零莫勝悲慟但以推尋佛理抑割俗情既知前世因緣粗解此時冤痛况乃父立忠莭子揚孝名古賢所稱今我何恨俾資冥福敬設妙齋所碩慧炬照迷慈航援溺早推誠于貫日終致樂于生天子子孫孫永絶怨讎之本生生世世常逢安泰之期謹疏又中和二年七月二十七日某官某乙奉太尉處分為故昭義僕射于法雲寺設三百僧齋并寫金光明經五部法華經一部永充供飬蓋聆佛修慧力普濟羣迷人發信心終成善碩苟得影從至教必能響答虔誠伏以昭義僕射夙振雄圖繼分重寄將軍投袂練兵而方切専征天子剪衣飛詔而唯慿妙略佇建彀中之勳業忽罹意外之災殃不吊昊天奪我良胤今則敬投蓮宇虔設桑門仍貝葉之真蹤仰奉法華之妙義伏碩乘茲功德解彼冤讎災星昔照于預州已推定分慧日今懸于覺路永絶良緣謹疏桂苑茟耕集卷之十五
