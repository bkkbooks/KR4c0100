front:
  text: 桂苑茟耕序
  hash: sha256:cff712b8f8ed1b708b14c86b9979de45940d9dcb551b1370c83d6e16f8e17988
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_000-1a}
body:
  text: 淮南入本國兼送詔書䓁使前都統廵官承務郎侍御史内供奉賜紫金魚袋臣崔致逺進所著雜詩賦及表奏集二十八卷具録如後私試今體賦五首一卷五言七言今體詩共一百首一卷雜詩賦共三十首一卷中山覆匱集一部五卷桂苑茟耕集一部二十卷右臣自年十二離家西泛當乗桴之際亡父誡之曰十年不苐進士則勿謂吾児吾亦不謂有児徃矣勤㢤無墮乃力臣佩服嚴訓不敢弭忘懸刺無遑兾諧養志實得人百之已千之觀光六年金名牓尾此時諷詠情性寓物名篇曰賦曰詩㡬溢箱篋但以童子篆刻壯夫所慙及忝得魚皆爲棄物尋以浪跡東都茟作飯囊遂有賦五首詩一百首雜詩賦三十首共成三篇爾後調授宣州溧水縣尉禄厚官閑飽食終日仕優則學免擲寸隂公私所爲有集五卷益勵爲山之志爰標覆簣之名地號中山遂冠其首及罷微秩從職淮南蒙髙侍中専委茟硯軍書幅至竭力抵當四年用心萬有餘首然淘之汰之十無一二敢比披沙見寳粗勝瓦畫墁遂勒成桂苑集二十卷臣適當亂離寓食戎幕所謂饘於是粥於是輙以茟耕爲目仍以王韶之語前事可憑雖則傴僂言歸有慙鳬雀旣墾旣耨用破情田自惜微勞兾達聖鍳其詩賦表狀䓁集二十八卷隨狀奉進謹進中和六年正月日前都統廵官承務郎侍御史内供奉賜紫金魚袋臣雀致遠狀奏桂苑茟耕集一部二十卷都統廵官侍御史内供奉崔致遠撰
  hash: sha256:75be3e7de43c2a56cebf82402e9e04b5f71c41aafa3e19f23b6d695c48e34750
