front:
  text: 桂苑茟耕序
  hash: sha256:cff712b8f8ed1b708b14c86b9979de45940d9dcb551b1370c83d6e16f8e17988
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_000-1a}
body:
  text: 淮南入本國兼送詔書等使前都統巡官承務郎侍御史內供奉賜紫金魚袋臣崔致逺進所著雜詩賦及表奏集二十八卷具録如後私試今體賦五首一卷五言七言今體詩共一百首一卷雜詩賦共三十首一卷中山覆匱集一部五卷桂苑茟耕集一部二十卷右臣自年十二離家西泛當乘桴之際亡父誡之曰十年不苐進士則勿謂吾兒吾亦不謂有兒往矣勤哉無墮乃力臣佩服嚴訓不敢弭忘懸刺無遑兾諧養志實得人百之已千之觀光六年金名榜尾此時諷詠情性寓物名篇曰賦曰詩幾溢箱篋但以童子篆刻壯夫所慙及忝得魚皆為棄物尋以浪跡東都茟作飯囊遂有賦五首詩一百首雜詩賦三十首共成三篇爾後調授宣州溧水縣尉祿厚官間飽食終日仕優則學免擲寸隂公私所為有集五卷益勵為山之志爰標覆簣之名地號中山遂冠其首及罷微秩從職淮南蒙髙侍中専委茟硯軍書幅至竭力抵當四年用心萬有餘首然淘之汰之十無一二敢比披沙見寶粗勝瓦畫墁遂勒成桂苑集二十卷臣適當亂離寓食戎幕所謂饘於是粥於是輒以茟耕為目仍以王韶之語前事可憑雖則傴僂言歸有慙鳬雀既墾既耨用破情田自惜微勞兾達聖鍳其詩賦表狀等集二十八卷隨狀奉進謹進中和六年正月日前都統巡官承務郎侍御史內供奉賜紫金魚袋臣雀致遠狀奏桂苑茟耕集一部二十卷都統巡官侍御史內供奉崔致遠撰
  hash: sha256:6081f17a196bc83ba90b4731b75a58fd54d7ef6068de1f800598d340ea241bf9
