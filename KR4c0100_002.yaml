front:
  text: 桂苑茟耕集卷之二
  hash: sha256:b63a45c14dcca634894112b08b6d2e39f1d9ab92e991497ae68b88d2e29d25bf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_002-1a}
body:
  text: 謝加太尉表謝示南蠻通和事宜表謝立西川築城碑表謝御制真贊表謝御札衣襟并國信表謝就加侍中表謝賜宣慰兼加侍中實封表請巡幸江淮表請巡幸第二表讓官請致仕表謝加太尉表臣某言今月某日宣慰使供奉官嚴遵美至奉宣聖旨慰諭臣及將校等并賜臣敕書手詔各一封加臣檢校太尉依前兖淮南節度使兼東面都統者仰窺鳯詔謂對龍顔寵榮極而何力負山戰灼深而自容無地臣某誠抃誠感頓首頓首臣伏以大司馬之威權百官所仰上將軍之法令十道皆遵豈唯整戢五兵實在諧和七政况當今日宜屬全材如臣者德乏潤身智虧周物於儒則茟慙五色在武則劒敵一夫但以荷寵天庭分憂水國擁旄重寄榮冠絶於一時仗銊専征兾折衝於萬里幸逢聖鑒得盡忠誠今者已率雄師將誅巨猾征旗指路逺趍堯日之光戰艦凌波方託舜風之力豈期王人逺降帝命俄臨奬其外鎮之微勞授以上司之劇任未著緇衣之美旋叨錦𬒳之榮况乃兼制利權廣潤軍食瑞節不移於南兖兵符亦綰于東陲將何異能勝此寵寄謹當氷為夕飯蘖作朝餐褰帷則面撫蒸黎建斾則身先士卒群寇既蝟毛而起偶恣侜張諸侯必馬首是瞻共成剪滅唯力斯視何心自安必也臨亂忘身見危致命仰解焦勞之念粗申式遏之功臣既當下瀨屯師佇欲中流設誓枕雕戈而輟寐迹寄轅門瞻帝座以馳誠魂飛輦路未獲稱謝行在無任感恩戀聖榮抃戰懼之至謹因宣慰使嚴遵美回附表陳謝以聞臣某誠感誠懼頓首頓首謹言謝示南蠻通和事宜表臣某言二月二十六日宣慰使供奉官李從孟至伏奉敕旨入鶴拓使胄嗣王龜年閣門使劉光𥙿等回得驃信表并國信兼布燮揚竒肱與西川節度使書皆備述情誠無不順命其表及書白并答信物數並令録往此事首末自卿良謀者逺降王言深窺使節跪閲上天之旨坐知外域之心寵飾踰涯憂惶若厲臣某誠抃誠躍頓首頓首臣才非間代智不濟時但以每鎮窮邉粗安荒服免使飽飛飢附欲令前倨後恭頃者忝守成都兾申逺略遂慿釋子善諭蒙王仰稟天威得揚風教永戢干戈之患俾陳玉帛之儀雖羣議沸騰􅔡衒鑠金之口而宸衷剸斷早推匪石之心是以暫事西巡或虞南叛爰遣維城貴胄直閣近臣回聖德以降尊逺傳玄化譯訛言而獻欵備寫真誠既令抱義戴仁果見奉琛執贄此皆陛下威德臣何力之有焉而乃謂臣有先見之能知未來之事設和蠻之良䇿備幸蜀之嚴城俯録勤勞逈垂稱奬睹雕題之章奏書軌既同息榾夏之猜嫌梯航相接驗南賝之贖咎知北極之紓憂雖云五利有餘敢希茂賞唯願四方無事永贊昌期臣限守藩備不獲稱謝行在無任欣躍感戴兢惕之至謹因供奉官李從孟回附表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝立西川築城碑表臣某言伏奉十一月六日敕旨以臣在任西川節度使日創築羅城昨因有敕嘉奬方進所賜碑詞今巳付所司鐫寫建立者一片石文龜初戴立九重天語鳯巳銜來雕銘莫繼於色絲寵飾遽超於華衮仰窺恩奬俯抱憂惶臣某誠感誠懼頓首頓首頃者幸夢三刀久臨益部遙提一劒得挫蒙兵但以其玉壘可稱金城未設山口則空吞蠻蛋水頭則斜枕犍含溪抱谷之形雖云天險比屋連甍之勢實類野居臣是以運度籌謀斟量板築蓋從人欲果致子來遂得役興而草偃川中誠感而土生石上長圍於三十六里高鎮於百千萬年不愧鐵名可將錐試隼墉烏堞儼若騫飛錦浪綿峯逈然裝飾遂蒙陛下辱褒稱之重許刋勒之榮以為事實可觀足得詞華不朽臣雖遇泥封激賞豈將油素矝誇非敢彰謙所期避謗今者伏遇皇帝陛下逺巡勝概親覽微㓛徴舊賜之碑詞命新鐫之茟迹永使卓立琴臺之境平欺劒閣之銘且杜元凱之峴亭無非自衒阮德規之齊國蓋是衆成謾傳身後之虗名豈睹目前之盛事曷若彩毫見奬翠琰斯刋因成下土之㓛終應上天之意得逢今日别振孤風向非陛下録善恩深酬勞德厚則何以未有出師之業篆刻叨榮曽無興學之規傳揚竊美臣限拘鎮守不獲稱謝行在無任感戴欣躍戰懼之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝賜御製真贊表臣某言二月二十六日宣慰使供奉官李從孟至伏奉敕旨已令於大慈寺卿真院寫朕真并扈從宰臣等真列卿儀貌俱會此堂今先寄卿真軸并朕親製贊述賜卿兾表顯恩式彰異禮者銀璫降使玉簡傳詞受宣而頂踵光輝拜賜而神魂驚越臣某誠感誠懼頓首頓首臣志欽渭訣業錬北書敢憑涓滴之勞自安寵寄願掃氛霧之患永竭忠誠遂在先朝便從戎後南征北伐豈暇寧居東鎮西藩纍叨重任遇陛下龍飛之後委微臣隼擊之能蜀國防蠻則粗申逺略楚宫捍冦則偶遂良機旋令移節於海門復許建牙於淮甸是以常拘戎閫未覲宸階唯披天上之詔書似睹日中之玉字空增戀闕莫遂歸期頃者虔託仁祠寫留麼質豈致去思於舊鎮唯慙取笑於空門伏遇陛下展義陳詩停鑾駐蹕遂徴繪事俾寫聖容其於侍從之臣宜居左右豈料孱微之質得潤丹青愧無燕頷之姿永侍龍顔之側况蒙宸襟顧矚御茟贊揚高題而素壁爭輝卓立而浮埃不染然後逺飛寵詔特遣貴臣乍捧綵箋驟竊遊揚之譽𥘉開寶軸深驚刻畫之恩窺看而形影自慙感激而肺腸何極昔漢朝中興聖帝下念㓛臣列形像於禁宫載勳名於史茟雖令贊述不自稱揚豈如陛下暫事巡逰逈垂奬􅎖别降絲綸之命親編錦繡之詞俾臣位挂於鳯凰池中名超於麒麟閣上遐尋故實獨荷殊榮有何出衆之能見此非常之寵所謂千年嘉遇萬代美談唯當志勵風霜永驗松筠之不改身霑雨露免憂蒲柳之先衰臣限守藩條不獲稱謝行在無任感恩戀聖榮躍兢懼之至謹因供奉官李從孟回附表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝御札衣襟并國信表臣某言二月二十六日宣慰使李從孟至伏蒙聖恩别賜臣御札衣襟并御服衫一領龍䐉香一金合金鈒花散碗一口金花銀榼一隻者窺神茟恩襲御衣仙香氣撲於鼻根寶器光騰於眼界仰霑寵錫俯積憂兢臣某誠感誠懼頓首頓首臣每念業紹弓裘任叨斧銊誓傾忠節終報聖朝去年親率驍雄願殱凶醜旋承綸音已駐舟師既慙叩楫之言徒切枕戈之望豈期貂冠傳命龍衮裁書辱宣尼一字之褒過光武十行之詔加以粉分御笥香滿雕奩花錐乃麗水之珍雪透任山之器捧玩而實驚寮吏緘藏而永耀子孫雖有幸逢時輝榮驟集而無㓛受賞愧耻難居徒荷鴻私何申豹略身依楚水未陳告捷之書目斷蜀天但灑感恩之淚臣限守藩鎮不獲稱謝行在無任荷戴激切榮抃兢懼之至謹因供奉官李從孟回附表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝加侍中表臣某言臣伏奉去年十一月十一日恩制加授臣侍中依前淮南節度使階勳封並如故仍加食實封一百户者有命自天處身無地感深以泣寵極而驚臣誠抃誠懼頓首頓首伏以黜陟分科聖君至教行藏守道達士良規慮受爵以斯亡在持盈而不殆臣自提榷管便遇兵戈郡邑為征戰之場山海足逋逃之藪既難聚利莫遂成㓛况乃權有他門刃無餘地動見越庖代爼無非避柱觸楹遂虧漕挽之程僅壞銅鹽之法伏蒙皇帝陛下俯詳直道不置嚴誅選用良才改移重務而乃察臣在公之節念臣戀主之誠重委將壇更增封邑恕乏一時之秀許攀七葉之榮唯慮慙卿或譏竊位然臣今所以自賀者三朝獨立七鎮榮遷每當拜爵王庭不省謝恩私室以兹勵已永免愧人謹當激發壯圖殱夷窮寇粗息四方之患仰寬萬乘之憂臣限守藩條不獲稱謝行在感恩戰灼屏營之至謹奉表陳謝以聞臣某誠慙誠懼頓首頓首謹言謝加侍中兼實封表臣某言六月十六日供奉官劉叔齊至奉宣聖旨慰諭臣及將校并賜臣敕書手詔各一封官告一通就加臣侍中仍加食實封一百户餘如故者自天降命無地安身啓鳯詔而魂驚對貂冠而股栗臣某誠感誠懼頓首頓首臣早因薄效每忝殊榮勤王而素乏實勤受爵而但多虛受負山寡力臨谷戒心况自戎馬生郊陳蛇出穴妖氛蔽闕法駕省方臣久鎮雄籓嘗提重柄一無成績兩拜寵章前者以上將軍為大司馬今則兼納言之任加真食之榮纍年虧橫草之㓛終日抱伐檀之耻且易曰或錫鞶帶終朝三裭之詩云受爵不讓至于已斯亡遍覽格言是懲貪祿不能報國苟欲榮家臣實何心有靦于目但遇王人逺降聖澤傍流仰睹綸音深嘉秕政以為師徒輯目黎庶安寧俯念忠誠特行懋賞臣也方寸之地可倚咫尺之顔不違豈敢矯俗陳情飾詞讓爵難效一辭而退唯期三命益恭既除勞力於利權終願勵心於閫寄臣伏限守藩不獲奔赴行在稱謝無任感恩戀聖戰汗屏營之至謹附供奉官劉叔齊奉表陳謝以聞臣某誠惶誠戀頓首頓首謹言請巡幸江淮表臣某言伏以舜伐有苗修德而終能率服湯征自葛行恩而竸望來蘇斯皆今古之美談實乃帝王之盛事固敢局天負責向日裁誠仰陳利害之端兾副華夷之望不量狂瞽逺黷聖聰臣某誠惶誠懼頓首頓首臣聞日月以運行為德永麗于天江河以委輸是期必朝于海上能昭其煦育下方遂於通流况乃天災非人力能除地分有兵戎不起將獻永安之兆輒陳可復之詞伏自寇陷上京兵徴外鎮猛鋭始從於鶴列旋致徒歸頑凶尚固於蟻封難成盡殪臣豈唯投𬒮實至衝冠昨率舟師暫屯江次必欲朝離椘岸暮及漢濵旗張商嶺之風劒拂秦川之霧願言薄伐冀效微勞尋蒙陛下逺許分憂不令離任臣進退惟命始終無虧寧招曠職之譏敢涉爭㓛之責又緣淮海乍息煙塵忽若去兵必當致寇則乃江南沃壤盡成蠶食之資淮北強鄰暗展鯨吞之勢輿賦既無所倚軍須將必屢空是以仰奉敕書巳班師旅四境之赤眉歸伏八州之黔首謐寧遍布皇恩粗申將略然而關中縱敵閫外偷安既乖踊躍以身先每切忸怩於顔厚伏惟皇帝陛下省方展義駐蹕經時龜城壯麗之形金湯雖固鳯輦巡逰之費桂玉可虞况舊謂西川富強秪因北路商旅託其茶利贍彼軍儲今則諸道發表章則半載始回徴貢獻則經年未逹實緑道路遼敻兼值干戈阻囏值剽掠者斯多至行朝者甚少加以僦雇所費耗蠧不輕每當水運陸般只可率鍾致石以此征稅則漸成抗弊軍兵則未遂飫饒伏慮扈從實繁宴犒仍廣盡搜資於三蜀難濟用於百司苟興旰食之憂實慊庶寮之望又以蜀川僻居卭棘人密通蠻戎虺毒潛吹獸心難測儻或乘虗犯境率衆渡瀘六軍之熊豹騰威縱能制敵八詔之豺狼作暴不免喧驚事可酌於將來禍須防於未兆伏惟陛下覽臣忠懇察臣直言暫回西幸之儀更舉南巡之禮使處處息後豫之怨人人安戀主之心天下幸甚天下幸甚且如逺狩河陽偽逰雲夢將興霸王俯順權冝况江淮為富庶之鄉吳椘乃繁華之地陛下九年理國四海為家豈比周之東遷非擬晉之南渡賊巢凶狂久聚穢黷難除縱便收城未冝回駕豈如楊都粵壤桂苑名區四夷之賔易朝天九牧之貢無虗月伏乞陛下俯回鳯扆略泛龍舟必想山靈卷三峽之風水伯寢九江之浪遐尋禹迹允叶堯巡昔也日耀錦川天不傾於西北今則風行澤國地無缺於東南然後發使清宫舉章司隸振盛儀于歸闕告休績于登封臣雖識昧變通而志勤匡濟敢憑草奏輒貢管窺無任戀聖感恩戰越屏營之至謹奉表陳請以聞臣某誠惶誠懼頓首頓首謹言第二表臣某言聞聖人能以天下為一家以中國為一人者必闢于其義達於其患然後能為之臣遂自前年繼陳短識請移車駕巡幸江淮計資於避險就安事叶於暫勞永樂未回聖鑒再獻瞽言臣某誠慙誠懼頓首頓首臣尚阻擒姦敢言伐善然但願愚夫之一得難追賢者之三思臣頃鎮成都偶諧逺慮克符天意亟就土㓛别營雉堞之雄規永壯龜城之峻境爰憑釋子善誘蒙王果悛倔強之愆便付懷柔之信皆資帝力能肅物心伏遇陛下逺耀珠旗高臨玉壘樂降絲綸之旨深嘉毫髮之勞謂臣有先見之機念臣以至誠所感仰銜􅐶奬倍激忠誠然則當年已往之㓛粗成籌畫今日未來之事竊有管窺苟或緘辭則為負德不辭鼎鑊輒貢芻蕘臣近者俯察時情仰瞻乾象荆州道路群冦將侵蜀國封疆微災似起儻或未收鳯闕尚駐鑾輿忽有妖氛潛興近境必恐烏合蠶食之徒占據江陵把斷峽路則列鎮貢賦無計流通行在詔書亦難傳降若見東西阻絶固當遐邇動搖伏惟陛下斷自宸衷斥其橫議念江淮之進獻逺涉多虞察蠻延之姦凶乘虗可懼早移仙蹕直幸楊都滅星辰交錯之災叶日月運行之理則乃九州斧鈛討戎而齊願風驅四海梯航奉贄而必能雲集感矣美矣念兹在兹且逆賊黃巢久黷皇居多成穢迹直到虎收之後須勞繕葺之㓛更俟二三年之間可興千萬世之業慮不先㝎事難速成伏乞陛下覽竭節之言闡隨時之義俯從衷懇暫事宸逰天下幸甚天下幸甚臣粗識古今略詳利害自非激以為智豈敢知而不言謹奉表陳請以聞臣某誠惶誠懼頓首頓首謹言讓官請致仕表臣言臣伏以聖君御宇必先塞彼幸門良士省躬唯慮妨其賢路苟速官謗是辜主恩况臣關中無㝎難之勳閫外乏分憂之效強欲晏安寵祿其如玷浼刑章永言量力而行固在奉身以退既知無隱寧避有辭臣某誠慙誠懼頓首頓首臣少勵琢磨晚師擒縱不以一經介意粗於三略留心願紹家勳免虧堂搆先皇帝念臣孤直試以諸難出分大將之威權坐受上卿之爵秩故得內稟聿修之訓外伸式遏之能北掃虜庭則胡雛不敢南牧南清獠海則蠻諜無由北窺及覲彤墀暫司緹綺俄屬齊郊聚孽巨野興師臣也不才謬􅈾斯任伏遇皇帝陛下纂臨宸極警諭戎藩舉旌鉞以分勞聽鼓鼙而軫念謂臣有戢兵之竒略察臣立降寇之微勞遂令位假中台名編外相夢想既通於鳯沼威稜益峻於龍旌其後瀘水波驚蜀山霧暗久念雕題之患遍流黔首之災又蒙命臣曰俞為帥於彼爰遵薄伐得解倒懸豈敢貪天之功願銘鍾鼎秪能因地之利别建溝隍伏蒙陛下俯奬忠誠特行懋賞開國授周司徒之貴立家紹漢丞相之榮臣此時早誡持盈輒思請老必願告休錦里退隱羅浮不料壠上耕夫盡解揭竿斬木草間惡子竸謀蟻聚蜂飛當荆門失守之時乃椘塞宿兵之際忝趨戎斾兼綰牢盆僶俯而未能報恩驅馳而何敢言病或揳揄磨牙於原野或鯨鯢噴毒於江湖尋提招討之權來撫句吳之俗逺憑睿略深挫群凶洎解印海門建牙雄甸上將軍之劇任首冠列藩大司馬之雄贊先沾宥禮揣頂踵而偏濡雨露扼咽喉而莫效涓埃且自黃寇憑陵翠華巡狩仰天􅓍力竊嘗服王導之言終日痛心何止灑袁安之淚及至成軍已出又緣奉詔却回行藏雖順於綸詞進退實慙於物論遂見時溥興北林戎役周寶致南鄰責言玉每慮於俱焚金亦憂於衆鑠幸蒙陛下涵之以海量照之以天光如見肺腸得保首領然臣也先軫以直言逞志曹植以深過責躬則二年忝都統之名不能誅姦戮暴四載主銅􅐭之務不能富國贍軍是以兵權則屢見改移利柄則變為分割凡此辱君之命莫非職臣之由臣猶自知況在陛下擢髮而既難數罪乞骸而誰願辭榮今者大憝奔赴上京克復氛祲即當殄滅寰區永見廓清臣有忝登壇無能報國行當期齒居亦胡顔兼以頃鎮蠻􅑍久棲瘴嶺蒙犯其妖煙毒霧剗除其封豕長蛇當年而靡憚勤劬晚嵗而皆成疾疹不將筯力為禮既載前經苟或身心自讎難逃後患雖思強飯實愧素餐廣陵為椘澤上遊醝府乃漢朝大任以臣衰老當此重難必恐終無所成遂希不可則止伏惟皇帝陛下知人為哲多士以寧選英才而代處是邦俾微臣而退居散地鬪於莬之逃富固是忠貞王內史之辭官誠非矯飾幸遇舜風無外漢日再中陛下既巳除旰食之憂微臣亦希免夜行不息臣無任望恩戀聖懇迫兢灼之至謹奉表陳請以聞臣某誠感誠懼頓首頓首謹言桂苑筆耕集卷之二
