front:
  text: 桂苑茟耕集卷之七别𥿄二十首
  hash: sha256:91153f772344d7272b9ec78b5d0317b34646a7a03def8c11b16e91aec9bdfc82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_007-1a}
body:
  text: 滑州都統令公三首鄭畋相公二首史館蕭遘相公一首度攴裴徹相公一首租庸王徽相公一首太原鄭從讜尚書一首禮部夏侯潭一首吏部裴瓉尚書二首宣歙裴尚書二首鹽鐡李都相公二首盧紹給事一首壁州鄭尚書一首泗州庾常侍一首湖州杜孺休常侍一首滑州都統王令公狀見制書伏承榮加內史之任暫執元戎之權往鎮雄藩誓殱窮寇佇復宫闕則歸廟堂九重之倚賴如山八表之歡呼動地而况令公志勤捧日力贍𥙷天三秉台衡兩分戎律八則建蕭何之㓛業出則振黃霸之恩威此皆群議稱揚不假拙辭贊詠今者聖上以叛徒乘便尚敢侜張諸道徴師互相逗撓蠢彼之姦凶未弭赫斯之憤怒良深遂輟股肱逺資心膂為敖宰椘設前茅後徑之規管仲相齊致九合一匡之譽是以榮轉西臺左相請為東道主人儒武全材古今罕遇伏想近承􅌖略嚴令諸侯誠知白馬封疆幸而獲賴必料蒼鵝群黨困不能飛即當立剗梟巢去迎鑾駕海晏而永興龍德池清而再睹鳯儀凡在含靈皆增係望某靜思奮擊動見悔尤四鄰多是異心十道竟誰同力今所以自賀者得逢知已親捴貞師巧脣無所􅌟之端壯膽有可傾之處唯兾遙禀大將軍之命用勵驍雄仰憑真宰相之威永除妖孽末由陳賀下情不任欣慰瞻攀􅐚祝云云第二伏睹制書伏承榮膺寵命正鎮雄藩伏惟感慰竊以動惟佐聖靜乃優賢百穀垂成則暫停霖雨八綋向泰則貴息兵戈詎勞有道之入久練不祥之器群情既鬱帝命斯行令公獨竭忠誠克扶厄運當六師扈從司南之制度無虧及十乘啓行逐北之威稜有𥙿但屬王事靡鹽人心不同祖䂊州志在誓江佇申壯莭蕭相國力謀佐漢或致遊詞今以小寇必殱大臣于後慮失華夷之望倍興宵旰之憂遂乃鳯𥿄傳恩逺離西蜀蜂旗卷影却到南燕指蹤既禀於成謀搏噬佇著於衆旅㘴驅十道卧理百城顯為出入之寵榮保就始終之勳業某夙銜深奬繼奉好音覽古人賀滿之言睹君子持盈之莭抃慰攀戀不任下情伏惟云云第三伏承㫌憧已到鎮上訖伏惟感慰令公手傾霖雨身耀福星三入廟堂巳超仲父一匡寰宇更屬何人昨者十乘啓行九重軫慮以為螢不勞海濯卵何假山摧遂請元臣却臨重鎮今則徐回龍莭靜撫雄師下車而恩澤均沾舉扇而仁風廣振南燕受賜北極紓憂某早荷奬知倍增欣慰云云鄭畋相公二首伏見二月六日制書伏承相公正居宏父光弼聖君兼捴蘭臺再調梅鼎凡云逺者近者莫不舞之蹈之伏以相公碩德茂勳雄才奧學播在四方之口沃於萬乘之心固絶贊揚但增瞻仰况自關中聚寇歧下屯兵率先諸侯纍展竒略是以才趍鳯輦便陟鵉臺逺涉山川行就九天之寵克平水土㘴升百日之榮竹宫既託於清規藝館更歸於雅望則乃孫叔敖之慎守愈貴愈恭胡伯始之纍遷有倫有要永憑上德佇賀中興使仲父執鞭鄼侯捧轡驅蠢動入華胥之域格蠻夷歸虞舜之風某早沐深知逺聆殊拜末由陳賀抃聳倍深云云第二伏承太保相公纍陳章表懇讓鈞衡暫輟任於股肱果優賢於羽翼緇衣纘美青綬加榮守難進易退之規叶居安慮危之道莫不宸扆欽矚搢紳詠歌而况相公比者統冠甸侯深攻國賊唱義聲而飛羽檄官爵賞而練甲兵方驅破浪之風佇滅燎原之火而乃腹心有疾牙瓜無㓛何君子之見欺實小人之難養然而灾為福始小往大米再秉洪鈞逺安仙蹕調鼎中之實味運堂上之竒謀决勝漢籌弭灾魏闕皆憑蕭承相指蹤之力豈假鮑尚書統集之兵咸推第一之㓛能贊登三之業今則奉身有𥙿止足無虧捋尋疏傳之髙蹤乃訪留侯之故事用黃石公之妙略蔚為帝師從赤松子之勝逰别作仙侣雖云獨樂其奈衆情氛曀餘妖方願靜銷於天下陶鎔重望豈冝久滯於山中必計才返鵉㫌請歸鳯闕永使蜩螳罷噪仍令鹿馬分形深荷眷私况聮親懿依攀禱望可鍳逺誠拜賀末由悚戀增切云云史館蕭遘相公昨睹制書恭氶高辭大計正陟中台兼升史館之榮實副儒門之望竊以冊書所重茟削為難别成一代之楷模敻掩百王之規矩是得宸衷妙選朝列具瞻而况相公真君子孺老成人德允釐百揆顯贊萬機今者邦計既豐國經斯整東西臺之極位揚歷無遺左右史之直言裁成有類莫不勛華表德遊夏緘詞能施𥙷衮之㓛偹載垂衣之化必使褒真貶僞彰發傳之體有三激濁揚清勵事君之心無二古今盛美遐邇欽依某逺守藩維忝資陶冶每慎六條之理敢希一字之褒抃躍所多啓陳無及伏惟俯賜念察度支裴徹相公伏睹除書伏承相公再履台席榮均賦輿凡在生靈莫非欣躍某今之所賀者真以天上之福與大國之幸不欲更牽俗禮強飾繁詞然而歡心有餘祝史無愧敢陳贊詠兾豁懇誠伏以相公德襲清通道資恭儉歷逰華貫高陟台衡當聖君巡幸之初見賢相燮諧之業而乃鴒原陷難鳯閣辭榮暫屈跡於外藩尋秉權於大計今者天將悔禍日待升平果請英才却歸舊位躡周司馬統兵之秩聘晉尚書較運之謀四方所傳一意相賀某每慙薄伎偏荷殊私再逢調鼎之期實切彈冠之望末由陳賀但增攀戀聳抃之至云云租庸王徽相公伏睹制書伏承榮膺寵命伏惟感慰伏以萬乘巡遊最難留事百官毗倚允屬持綱况當返駕之時㔫重清宫之禮膺兹寵寄實在賢能司空相公靜抱長材動施餘刃報主安人之業早冠鼎司束姦芟弊之名已諧輿輪今者塢鳩命氏鷹隼揚威內清輦轂之塵外肅開畿之地聖君新命永託中庸司隸舊章佇觀大禮某忝承春奬欣抃實深云云前太原鄭從讜尚書得河中王相國書報伏承相公榮膺寵命將赴京國伏惟感慰伏以宸遊既逺居守是難須倚元臣方安聖慮是故昔漢帝曰吾與㒒射何異則知重寄别表顯恩而况相公嶽立儒宗川流相業頃辭鳯閣逺耀龍旌郭伋示信之鄉廣沾恩化周舉移書之地遍活疲羸肅軍令於貔貅振兵威於玁狁求安邉境胡雛不敢南侵遽值妖氛周馭久勞西狩今以玉京雖復鑾輅未回輟戎略於藩垣託繁機於宫關必計中和樂職已繼雅音司隸舊章即興盛禮然後重調梅鼎永對蓂階贊成天下之春固是彀中之事凡云品彚莫不欣歡某早忝恩知倍增抃慰末由陳賀但切依攀云云禮部夏侯潭侍郎伏承榮膺寵命伏惟感慰侍郎泰初朗鍳日月難踰孝若美恣風塵莫染儒室别開其户牖相門必繼其弓裘是以始於憲府宣威便見儀曺主貢履歷而皆遵仙路操持而永振貞風柏列朝霜昨日揖登臺御史桂開夜月今朝選入室生徒採珠而蓬島待空搜玉而藍峯寡色副天下正人之顒望息場中藝士之屈聲某早沐春私不任欣抃云云吏部裴瓉尚書二首伏承榮膺寵命伏惟感慰竊以勛華聖代唯務舉能邵泰賢流共推取實用捨既歸於重柄古今皆託於長材人望所諧主恩斯在尚書情踈䆠路性恱道風月髙而霜鶴數聲雲卷而蓮峯萬仞早知厄運久避囂氛洋川之瑞草仙花幾牽蝶夢閬苑之朝嵐暮靄深潤豹姿然而陶鈞難住於山中塗炭待平於天下遂辭肥遁來謁宸逰果登銓管之司允洽簮纓之望昔年掌貢搜海嶽以皆空今日掄材酌淄澠而不混清通所蒞淆亂必除歷居六郡之峻資終𥙷三台之缺位逺祈邇禱匪夕伊朝某早仰仙標遙欽懿範抃慰瞻望不任下情云云第二伏以禮稱選士實資秀孝之科書貴知人允屬銓衡之職君命既將歷試物情固得僉諧而况侍郎雲鶴性情天驥行止璅窗近日髙批帝語於筆端絳帳生風妙選群才於門下洎湖湘察俗瀍洛尹都便冝入秉化權㘴匡聖略直以手能持滿心切避榮唯永勇退之謀久阻急徴之詔萬乘夢惠於隱霧四方渴望於為霖今者移黜陟之司託清通之鍳何假山濤之密啓能遵李重之良針永期涇渭分流必使輪轅適用某每思玉昆金季皆辱眷知松茂竹蒼深敦交契禱祝瞻戀並同衆誠伏惟云云宣歙裴􅐚餘尚書二首伏承榮奉徴詔將赴闕庭伏惟感慶兼極今者妖氛向息聖運重興諸葛亮之用兵已非急務叔孫通之制禮方籍賢才以尚書望積臯䕫政成宛句三年察俗以仁義為先四境懷恩俾寇戎自戢是得傳巖結夢宣室飛書黎庶傾心莫遂攀轅之懇君王聳耳待聽曵履之聲况乃親侍安輿榮趍帝輦佇聆調鼎永使建櫜豈獨關中乂安實為天下幸甚某久鄰仁境深飽德風抃慰瞻攀不任誠懇云云第二特垂手茟榮函兼示陳情表藁捧尋無斁欣賀有餘且近者時風僅訛孝道多缺事親則薄奉巳為先只將奔竸榮身不以違離介意今睹尚書逺辭徴詔懇致奏章叙向來為國分憂不矝茂績請從此於家就養實禀格言况尚書若赴行朝必登相位而乃不親梅鼎願奉板輿是逃台衮之榮唯戀班衣之樂永使李􅐚之表萬古齊名仍令束晢之詩千秋長價有以見聿修令問撗勵時流豈唯上德之美談實乃中興之盛事拜賀末由但切攀依之至云云鹽鐡李都相公二首伏承榮膺寵命兼掌漕運伏惟感慰伏以鑄山熬海既摽冨國之權紫帳皀䄡固是安邦之彥况從多事諒託全才相公中庸日彰大任天降舟楫暫妨於援溺棟梁必俟於扶危今者三年禮成萬乘恩至假途端揆正位司元憑孔僅之智謀繼齊桓之霸業必也廣施竒計遍致豐資答上帝之殊恩振中興之盛事凡云品彚孰不欣歡某每慙糠粃居前久阻鹽梅入用主張多失固難稱老成人交代叨榮無以告新令尹抃慰兢惕不任下情拜賀末由攀戀空切云云第二每辱榮緘即垂虗譽周顗齊名於樂廣固是懷慙韓非接傳於老聃實為過望荷戴增切兢惶益深伏以相公宋劒倚天魯戈駐日再居重任大洽群情必計海若傾心廣潤煎熬之利山靈效力助成鎔鑄之㓛便令流馬飛牛終得踰千越萬國用則立期饒羡廣謨則㘴致升平勤王之誠在我而已伏惟遵護用慰禱祠其他下誠巳具前狀云云盧紹給事近睹除書恭承賢兄左丞榮膺寵命伏惟感慰竊以國有司直野無遺賢蓋前代之所難實我朝之獨盛况乃上可以糾彈八座下可以整肅百官永言其才固屬全德賢兄左丞中庸處厚大雅含清柱晴空而嶽頂無雲瑩秋色而潭心有月是得歷游華貫輝綽令猷頃遇分憂暫作甘棠太守尋聆徴詔請為仙桂主人此時也歡聲則風振儒林喜氣則雲鋪筆陳有口皆賀無心不歸蓬島靈珠想離頷下荆山瑞玉待入掌中而屬鶯谷藏春鳯城陷寇不見孔門盛事唯傷魏闕餘史今者逺從行朝久臨憲府既躡清資於侍極榮升重位於肅機傳咸之畏慎無虧鄭晉之矜莊有𥙿正當今日必繼芳塵給事避地經時陟岡勞念今聆美拜稍慰逺思然每於絳帳馳心共懷遺恨須到洪鈞入手方洽群情髙接鴈行佇迎鳯詔􅐚禱瞻戀無以披陳云壁州鄭凝績尚書伏承自小司馬假大宗伯出刺始寧伏惟慶慰竊以進有致君之志共託阿衡仕無擇祿之言常聆季路綽然遺範宛若合符尚書玉樹一枝金山萬仞雅望全騰於八海華資緩步於五雲漢丞相之傳經永光儒室周司徒之善職固屬髙門况乃於國於家曰忠曰孝比者黃巾犯闕翠輦省方尚書暫别鯉庭逺趍鳯扆髙提夢茟仰贊宸猷禀大聖之指歸立中朝之張本此實為人臣之忠於國也今以聖主優賢嚴君遜位尚書固辭武部峻陟儀曺榮掛萊衣俾歌廉袴毛義之喜難自已胡威之清必衆知又為人子之孝於家也莫不事摽雙美譽冠一時今彼郡而昔彼州豈能較盛出傳舍而入官舍未足齊榮佇見風扇揚名雲屏隔位隼旟髙建免勞陟岵之詩龍鼎待調即展濟川之業某早銜眷奬常忉禱祠拜賀未期瞻攀無極云云泗州鄭庾常侍伏承已到貴鎮上訖伏惟感慰昔鄭弘為臨淮太守熊初架軾鹿乃挾輈既傳一郡之政聲終陟三公之寵秩果符瑞應永振美談今則常侍族茂山東威臨泗上實繼巨君之芳跡足分聖主之逺憂况乃沛師戢兵淮民復業懸一城之愛日振四境之和風群情允諧新命非逺某近封斯接殊眷先垂抃慰瞻攀但切誠抱云云湖州杜孺休常侍昨睹除書伏承榮膺寵命再理吳興伏惟感慰常侍比臨霅水大振袁風適聆髙握新蘭又見重分舊竹實謂政聲日洽人欲天從徴黃太守之書却隨鳯去借寇使君之衆迎得春來自此煙封茗畦月挂蘋渚不詠洞庭歸客即吟金谷主人再樂三年終蘇一境然後入居青璅㘴演紫泥福庶品而既多掌陶鈞而不晚某早銜殊眷抃慰實深拜賀末由瞻馳倍切云云桂苑茟耕集卷之七
