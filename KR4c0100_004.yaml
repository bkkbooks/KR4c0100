front:
  text: 桂苑筆耕集卷之四奏狀十首奏請從事官狀奏請僧弘鼎充僧正狀
  hash: sha256:33735c9131cff468403dbb83e7916d73eac447ac42b709138ce104d1845dbd85
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_004-1a}
body:
  text: 謝弘鼎充僧正狀謝除姪男瓊授彭州九隴縣令狀謝弟柷再除綿州刺史狀謝姪男弘約改名濟除授揚州左司馬狀奏請姪男劬轉官狀奏請歸順軍孫端狀奏李楷已下參軍縣尉等狀奏請楊行敏知盧州狀奏請從事官狀營田判官將仕郎殿中侍御史內供奉賜緋魚袋宋絢右件官相門傳慶詞苑成名退居安東郭之貧就養奉南陔之詠自參戎幕備見良籌佐理而星霜屢遷清勤而風雨不改久禆重任敢覬殊榮伏請轉官改章服依前充職攝鹽鐵巡官朝議郎守京兆府咸陽縣尉柱國高彥休右前件官訓稟儒宗才兼吏術王幾結綬早見勤勞賔席曵𥚑頗多婉畫望憲臺之清秩助榷管之重權伏請轉官依前充職以前件狀如前伏以臣子之所以立身者以孝以忠慎終如始若遂榮親之望必勤事主之誠且如擇鄰卜居斷織勵學至于成立色養無虧能報慈母之恩則宋絢有焉又如教以義方退而學禮至于仕官力行有規能遵嚴父之訓則彥休有焉臣是以久籍謨猷仍嘉德行事堪勵俗志切薦賢伏惟皇帝陛下恩流域中孝理天下特回睿奬許假賔兾令修巳從知盡以敬親務本干黷宸扆無任兢惶謹録奏聞伏聽敕旨奏請僧弘鼎充管內僧正狀右件僧迹洗四流心拘八政演法於有緣之衆致㓛於無之言伏自翠華逺省於風謡丹詔屢徵於月捷凶渠未滅鋭旅猶勤弘鼎常令僧三十人晝夜轉念㓛德張開覺道教化闔城所願早覆梟巢便回鵉駕雖不關於至理實自發於精誠兼緣當道屬郡既多仁祠不少若無綱領難肅緇流伏乞聖慈俯詳所請許充當道管內僧正仍賜紫衣所兾身挂金欄逞養鷹之雋氣手持玉柄制醉象之狂徒謹緣奏聞伏聽敕旨謝許弘鼎充僧正狀右件僧臣先具狀申奏請充當道管內僧正仍賜紫衣伏奉敕旨依允者伏以弘鼎久勤轉念輒具薦論能資十地之因遽荷九天之寵元戎獲請喜三教之並行法侣歡呼驚一佛之或出唯兾永持㓛德上報慈悲苟不能蕩火宅之餘災則何以稱水田之華服必可潛燃慧矩助滅妖氛臣限守藩條不獲陳謝行在無任感戴兢灼之至謹奉狀陳謝以聞謹奏謝除姪瓊官狀前守京兆府鄠縣尉高瓊右件官是臣姪男今得進奏院狀報伏蒙敕旨除授彭州九隴縣令仍賜緋魚袋者伏以高瓊早乏藝能忝從祿仕佐理未間於吏道列官已陟於王畿昨者背秦嶺而脫煙塵面蜀川而就雲日雖有心於葵藿且無托於萍蓬豈料不由薦論便賜超擢才拋黃綬遽沾墨綬之榮始佩銅章又竊銀章之貴况乃濛陽屬邑益部名區正當巡幸之邦實謂來蘇之地豈伊殘劣能此勝當臣也必令行慎履氷坐勤飲水勉追芳於花縣無致辱於竹林臣限守戎藩不獲稱謝天庭無任感恩戰懼之至謹奉狀陳謝以聞謹奏謝弟再除綿州刺史綿州刺史高柷右件官是臣堂弟今得進奏院狀報奉某月某日恩制除授金吾將軍𬒳軍州官衆狀舉留續淮敕旨依前授綿州刺史者恩資鳯扆喜集鴒原形影光輝精魂震越伏以髙柷早從𥚑履免墜箕裘既懸報主之誠得習牧人之術昨者忝膺寵寄粗舉政條銀水金山曾無自潤帶牛佩犢或有可觀振家聲廉慎之名致郡俗舉留之請况乃秩假帝之喉舌官登王之瓜牙仕宦既榮分憂又重柷也必遵朂勵更慎撫綏不辜署劒之恩以謝擁轅之衆臣亦申教誨俾贖貪叨俱在朝之盛儀雖慙前哲各為郡之清譽可畏後生共資綽綽之詩冀播優優之政臣限拘藩鎮不獲稱謝行在無任感恩抃躍之至謹奉狀陳謝謹奏謝姪男弘約改名濟除授楊州大都府左司馬狀朝散大夫前行閏州上元縣令柱國高弘約右件官是臣姪男先具奏請除授揚州司馬并請改名濟伏奉敕旨依允者九天渥澤萬里塗程沐恩命於堯階泛光輝於阮巷負山既重臨谷何安臣以高濟早列官裳頗聞吏術建業字人之政曾有微㓛惟揚典午之資敢希薄授始陳丹青驟竊殊榮濟也譽雖讓於王晞名不慙於程昱聖君如父照臨實表於無偏猶子比兒訓勵必遵於匪懈俾申勤效少贖貪叨臣限守藩條不獲稱謝行在無任感恩激切兢灼之至謹奉狀陳謝以聞謹奏奏請姪男劬轉官狀前鄂州都團綀副使朝議郎檢校祠部郎中兼侍御史桂國賜緋魚袋高劬右件官是臣親姪男粗詳吏術早忝官裳始佐理於江陽旋從知於寒壤實得片言以折獄未嘗枉道而事人遂荷寵榮巳登班列尋叨命服久倅廉車方當寇盜喧驚亦有籌謀施展加以每遵家法願報國恩宗族稱孝悌之名僚友許恭之行臣是以輒思內舉敢具上陳引以進之守戴禮之深義惟善所舉憑魯書之美談伏乞聖慈俯鑑忠懇特賜除授內刺史劬也必能勵心從政常銘馬援之言竭力分憂不負謝安之舉干黷宸扆無任兢惶謹録奏聞伏聽敕旨奏薦歸順軍孫端狀歸順軍都知兵馬使銀青光祿大夫撿挍國子祭酒兼左武衛將軍御史中丞上柱國孫端右件官巢鳥知風園葵向日能投善教永戢姦圖既悛抗斧之心可在執殳之列仰希甄奬輒具奏論伏乞聖慈特授一官勒在軍前驅使兾率感恩之衆永除稔惡之徒謹録奏聞伏聽敕旨奏李楷巳下參軍等狀以前件狀如前伏以臣當府淮海奧區州縣多事永言屬吏實籍得人每憂輿賦闕懸漸難責辨若俟銓衡注擬恐失舉賢前件官等皆為君子儒有古人志學優則仕既知祿在其中見善若驚不愧藝成而下可以參臣軍事可以代臣邑僚試假缺貟頗彰殊效况抱班衣之樂兾攀黃綬之榮伏乞聖慈允臣所請干冒宸鑒無任兢惶謹録奏聞伏聽敕旨奏揚行敏知廬州軍州事右臣伏以武士所先惟忠與勇忠勇兼著行敏有之自假郡符能勤到鋭旅有爭先之志齊氓無背怨之詞蓋乃訓錬齊戎撫綏周室在於巡屬實越輩流纍具奏論請賜正授伏慮道塗艱阻未逹宸聰每籍幹能再陳薦舉永言成績可使頒條伏乞聖慈特賜允許干黷宸鑒無任兢惶謹録奏聞伏聽敕旨桂苑茟耕集卷之四
