front:
  text: 桂苑茟耕集卷之一
  hash: sha256:aa5202f825794f437f16d23f31b0996ffea8081651e618b0d2df1d719f630851
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_001-1a}
body:
  text: 表一十首賀改年號表賀通和南蠻表賀建王除魏愽表賀封公主表賀殺􅓍黄巢徒伴表賀處斬草賊阡能表賀收復京闕表賀殺黃巢表賀降德音表賀廻駕日不許進歌樂表賀改年號表臣某言今月某日得進奏院狀報奉十一日宣下改廣明元年爲中和元年者展義龜城易名鳯紀羙號既新於暦象歡聲遍振於寰區臣某誠抃誠躍頓首頓首臣謹案王制云天子西廵狩命典禮考時月㝎日同律然則三秋啓候萬乗省方金郊興肅殺之風玉壘應廵遊之地遂遵規於舉正爰降命於改元且大戴禮曰中也者天下之大本和也者天下之達道致中和天地位焉萬物育焉故漢益州刺史王襄俾蜀詞人王褒作中和樂職宣布之詩以歌君德耆舊傳楊况及聖朝曽編新樂舉二月恬和之節播八風調暢之音永驗休譚實諧昌運伏惟聖神聦睿仁哲明孝皇帝陛下纂承寳位丕闡皇猷将務格苗暫勞避狄風始行於地上易象可徴日再耀於天中休禎斯在是以紀年有𥙿懸法無虧帝業中興則逺超於前漢後漢物情允洽則近継於元和太和足可使蠢植昭蘇華夷悅服掩神雀黄龍之瑞應河清海晏之期則彼蕞厼叛徒騷然嘯聚偶縱煙塵之患即歸原野之誅佇迴西幸之儀便舉東封之禮臣今者既獲成師以出必能仗義而行跡泛戈舡心馳劒閣兾陳戎捷永賀堯年臨楚水以魂飛朝天可待望秦雲而目極捧日爲期未獲榮列朝班稱慶行在無任抃躍戰懼屏營之至謹奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言賀通和南蠻表臣某言臣得進奏院狀報入南蠻通和使劉光𥙿䓁迴雲南通和兼進獻國信金銀噐物疋段香藥馬䓁者天威逺振星使遄歸化外癡内點之徒竭奉贄獻琛之禮徳既超於萬古㤙巳冾於四夷臣某誠欣誠抃頓首頓首伏以聖主卜征既以用和爲貴逺人從化自知犯義不祥是得事尚從權徳資含垢言皆荅響禮不違經且南蠻甞懐異謀乆稔邉患數年猾夏獨虧控北之誠列鎮徴兵驟動征南之役則築虚可慮怙亂難防今者鳯口衘書纔飛逺地狼心感徳永順皇風有以見皇帝陛下法古爲君視人如子以蔵疾匿瑕為妙策以玩兵黷武為良箴能昭利害之郷不失覊縻之道遂使要服修貢賨旅歸仁適當多事之秋巳見太平之兆則彼驃信實狗封之族尚革昏迷賊巢廼蟻聚之群何難撲滅佇聆大捷永賀中興必可駈堯舜而殿禹湯苑五岳而池四海盛矣羙矣念兹在兹臣項者禦㓂交州董戎蜀郡先則展馬援討除之勢後乃設隨何說諭之機仰托皇威粗申将略喜當今日免負初心限守藩條不護稱慶行在無任賀聖戀㤙欣躍屏營之至謹奉表陳賀以聞臣某誠抃誠躍頓首頓首謹言賀建王除魏慱表臣某言臣得進奏院狀報二月二十二日㤙除建王可開府儀同三司兼太保充魏博節度使者維城茂徳列土殊勞逮分閫外之憂實表寰中之慶臣某誠歡誠喜頓首頓首臣聆周歌麟趾漢譬犬牙固須地䖏親賢方得天垂寵寄伏以建王修善為樂居髙不危好書而既擅多才獻表而肯慙求試今以鄴稱上鎮魏有大名将資磐石之宗遂錫分圭之寵豈獨漳濵之俗逺荷㤙威永令海内之人皆歌徳業臣限守藩鎮不獲稱慶行在無任踴躍屏營之至謹奉表陳賀以聞臣某誠欣誠躍頓首頓首謹言賀封公十二表臣某言臣得進奏院狀報奉去年十月十四日勑㫖皇帝第十一姝封遂寕公主長女封唐興公主次女封永平公主待收復京闕偹禮冊命者芳舒玉葉寵襲金根欝佳氣於高天振歡聲於率土臣某誠欣誠抃頓首頓首伏以遂寕公主徳資元吉考祥於歸妹之占唐興公主永平公主譽給肅雍禀慶於降嬪之典伴嫦娥於獨月分婺女於雙星秀發青春光浮碧落伏惟皇帝陛下齊家理國恭已敬親流鳯扆之殊㤙舉鵉閨之羙命猶以暫勞仙蹕未復皇都留具禮於宫闈待成功於千羽捧日而榮滋九族欽風而喜播四方臣限守藩條不獲陪位稱慶行在無任抃蹈聳踴之至謹奉表陳賀以聞臣某誠喜誠躍頓首頓首謹言賀殺黃巢徒伴表臣某言臣得進奏院狀報北路軍前㝎難軍節度使拓䟦思恭保大軍節度使東方逵䓁奏宣君縣南殺􅓍逆賊黄巢徒伴二萬餘人生擒三千人并賊将者又鳯翔節度使李昌言奏探知京中賊徒潰散六月十三日皇帝御宣政殿排仗受宰臣及百僚賀禮畢者睿謀逺叶戎捷遄陳開雉扇而儼皇威舉鵉㫌而恭列辟天浮喜氣地匝歡聲臣某誠喜誠抃頓首頓首伏以逆賊黄巢嘯聚兇狂偷生晷刻養姦而惟日不足恃暴而謂天可欺敢駈螻蟻之群累拒熊羆之象孽唯自作罪欲何逃拓䟦思恭東方逵䓁身居重位手握雄師氣吞蠢彼之徒志觧赫斯之怒齊駈於六歩七歩果剗扵左之右之戰于野而騰威戎難伏莾拘諸原而騁勇勢若焚枯不唯剥面㫪喉乃得連頭係頸况李昌言鎮扵歧下伺彼京中識虞譚鷹集之祥辯師曠鳥聲之樂遂飛吉語逺達宸聦佇者大􅓍之期克踐中興之運伏惟聖神聦睿仁哲明孝皇帝陛下財成三極敦叙九疇出震位而臨人方瞻堯日幸坤維而罪已更闡舜風暫勞遵養之師遥委仁賢之将既誅逆黨爰列賀班濯錦江邉已睹霞舒綵仗蒼龍闕下即聆雷振銮音永清四海之波遍􅎈九天之澤臣􅍝操鈇鉞尚黙皷􅎏未唱凱歌唯知抃舞頋彭野之乆妨道路怒髪雖衝望秦原而将滅煙塵愁眉已展臣限拘守鎮不獲稱慶行在無任欣抃聳踴屏營之至謹奉表陳賀以聞臣某誠歡誠躍頓首頓首謹言賀䖏斬草賊阡能表臣某言得進奏院狀報西川都将高仁厚部領兵馬收捉草賊阡能已於十月十八日並䖏置訖二十一日聖駕出羅城北樓宣慰廻戈将士各賜優賞放歸本營者逺耀日旗高張天網梟師已歸於大􅓍鴻圖永耀於中興臣某誠歡誠抃頓首頓首臣伏以草賊阡能跡䧟迷津心辜聖澤短狐稔射人之毒瘈狗喧吠主之聲高仁厚逐悪志雄擒奸氣勇仰資睿略静剗兇徒伏惟皇帝陛下有罪必誅無思不服歌採薇而遣卒念破竹之成㓛親降如綸之言遍安𬒳練之卒妖氛息而綿山益翠喜氣浮而錦水先春自此逺振軍聲深摧㓂黨覆頑巢而在即廻法駕以何遥臣方事専征先聆吉語限拘藩鎮不獲稱慶行在無任踴躍屏營之至謹奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言賀收復京闕表臣某言臣得河中節度使王重榮牒報四月十日當道與鴈門節度使李克用及都監楊復光下諸都馬軍齊入京城與賊交戰約殺却賊歩軍一萬餘人其馬軍賊便走出城徃東南路去其賊軍家口錢帛並皆遺下黃巢亦未知存亡其逃遁賊徒尋差兵馬追奔並巳妆復京闕訖者天威耀武月捷傳聲望宸階而𥘉奏凱歌舉區宇而咸增抃舞臣某誠喜誠躍頓首頓首臣竊窺曩代旁採前經静理邦家必湏以殺止殺保安社稷固在雖休勿休是故不得巳而用兵無所私而煦物伏惟皇帝陛下纂臨寳位丕闡宏圖匝四溟而不見揚波安九野而皆能偃草而乃逆賊黄巢暗遵邪徑深入禍門乆騰吠嗓之聲敢恣穿窬之便穢黷宫闕淹延歳時偷安暫戯扵鼎中􅓍暴難逃於杋上今者風行睿略雨集王師楊復光任在信臣李克用名為勇将各思報効競奮驍雄齊心而覆滅梟巢􅓍力而尅收鳯里賊巢拒輪不暇亂轍潜奔干戈則雹散風飛金帛則填街塞巷更展追逰之勢必擒稔悪之徒自此日月重光煙塵永息唯望宸逰之返駕佇觀盛禮扵登封臣職忝董戎㓛慙徇難雖手無重柄數年虧奮撃之能而耳得嘉聲逺地倍歡呼之功臣限拘藩鎮不獲稱賀行在無任手舞足蹈慶抃屏營之至謹奉表陳賀以聞臣某誠喜誠躍頓首頓首謹言賀殺黄巢表臣某言臣得武寕節度使時溥状報逆賊黃巢尚譲分隊並在東北界於六月十五日行營都将李師恱陳景瑜䓁於莱蕪縣北大滅羣兇至十七日遂𬒳賊将偽僕射林言梟斬黄巢首級并将徒伴降部下都将李惟政田球䓁訖其黄巢凾首巳送行在者聖日重耀狂氛暗銷戎捷超於古今歡聲振於夷夏臣某誠抃誠躍頓首頓首臣伏以嵗有四時則秋行肅殺之令武有七徳則兵貴禁戢之能是故嵗以無相奪而克成兵所不得巳而方用自革結䋲之政皆勞祝網之仁賊巢食土懐頑含沙稔毒深犯天紀廣地灾九州則半致侵凌三輔則乆經穢黷擢髪而既難數罪眷喉而只待懲姦今者窮冦迴心元兇授首殺傷老少歸附居多有征無戰之言實符王道以静待勞之勢深叶軍機伏惟皇帝陛下運啓中興功資下武睹天鑒而實為大警聴風謡而非止少康永當銷干戈之鋒便可鑄耒耟之器况廼西山八國數年飽廵幸之㤙東岳百神終日渇登封之禮佇迎雲馭俯納巖音臣宻通㓂戎撫安疆境不暇争鋒而進實防代爼之譏慙虧犬馬之勞喜睹鯨鯢之􅓍手舞足蹈魂飛膽揚臣限守藩條不獲奔走稱賀行在無任慶抃兢越之至謹奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言賀降德音表臣某言臣得進奏院狀報司天䑓奏六月十六日夜太隂虧伏奉六月二十三日徳音應三川管内見禁囚徒䓁冝委所在長吏五日内踈理决遣其京畿四面暴露骸骨冝委諸鎮切准前後敕㫖差人收拾埋瘞者望舒匿影曲赦流㤙化洽辜義資掩骼振歓聲扵蜀壘蕩妖氛扵秦川臣某誠抃誠躍頓首頓首臣伏以日能順晷而照臨不失其所月以順時而盈缺則維其常况當蓂葉初凋桂輪自减兵銷下土非石麟暗闘扵東陵謫見上天致玉兔暫虧於西汜既同君子之過乃軫聖人之憂伏惟聖神聦睿仁哲明孝皇帝陛下光闡􅌖圖保寕區宇仁能及逺徳以勝妖爰當展義之辰克舉眚灾之典慈傷瘦死牢四免滯於風霜義貫幽魂道殣皆沾於雨露可使涪水耀千年之色巴山呼萬嵗之聲道能継於垂衣法無妨於委轡佇廻廵幸仰賀登封臣限守戎藩不獲稱賀行在無任抃躍屏營之至謹奉表陳賀以聞臣某誠歓誠喜頓首頓首謹言賀迴駕日不許進歌樂表臣某言臣得進奏院狀報伏審敕㫖迴駕日應㳂路州縣切不得輒進歌樂及屠殺者聲除􅎖喜味减薦珎逺遵罪巳之言深播好生之徳凡扵蠢動孰不歡呼臣某誠抃誠躍頓首頓首伏惟皇帝陛下日月運行雷雨作觧體堯舜之理能咸若法禹湯之典必勃焉退庭舞而撤宫懸悪衣服而菲飲食一慈二儉守玄祖之格言沐雨􅌨風禀太宗之丕訓今則冕旒東顧梐枒西移師乙收心無以逞鏗鍧之曲庖丁歛手何由挫觳觫之形義感六牲㤙加萬姓則乃蜀山力士既無煩役之虞漢水老人豈有深譏之事帝業永資於下武物情皆慶於中興臣方擁戎旃阻隨仙蹕遥思盛禮空馳拱北之誠願報深㤙但勵鎮南之志無任抃躍屏營之至謹奉表陳賀以聞臣某誠歡誠喜頓首頓首謹言桂苑茟耕集卷之一
