front:
  text: 桂苑筆耕集卷之三
  hash: sha256:266dc04b6a56e1d6dd9392d7639ae751e1c6bb14d1f033596bd4507ed7d0260d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_003-1a}
body:
  text: 謝詔狀謝詔示權令鄭相充都統狀謝宣慰狀謝詔奨餙進奉狀謝詔示徐州事宜狀謝詔止行墨敕狀謝郄公甫充監軍手詔狀謝除鍾傳充江西觀察使狀謝就加侍中兼實封狀謝秦彦䓁正授刺史狀謝詔狀右臣伏奉四月十日詔㫖黄巢兇逆穢黷宫城罪悪貫盈人神共怒㝷東兵合勢剪滅元兇想副朕懐已遵道路佇聞克復永耀功名者十行天語萬里星飛捧窺而壯膽初驚跪讀而愁眉頓豁竊以黄巢禍心斯極根力既衰肉已太醎果将落蹔起烟塵之患則歸原野之誅臣毎當永夜枕戈早願中流叩檝自啓行十乗已屯駐五旬伏縁江路多虞風波未便暫淹行色用候良時非致役扵遷延但興懐扵矍鑠今則仰覩鳯衘之詔况乗隼撃之秋俯勵軍謀仰遵睿筭即兾朝離江北暮到漢南長駈背水之師永破㴞天之孽率奮義感㤙之衆氣已凌雲殄蔵奸匿暴之徒勢如沃雪伏惟陛下嵗廵備禮時邁傳歌将示罪於三危乃宣威扵七徳臣逺承奨諭誓盡勤勞身暫寄於戈舩心毎馳於劒閣唯願西都獻捷早申收復之微㓛東嶽告成得覩登封之盛事臣無任感激兢懼之至謹奉狀陳謝以聞謹奏謝詔示權令鄭相充都統狀右臣伏奉去年九月九日詔㫖卿曽間道獻童諸鎮飛􅊾便欲長駈甲馬親議􅌹征未即便来湏權制置遂命鄭畋䓁分為京城四靣都指揮諸道師徒慮卿偶未委知故兹詔示者伏以書曰無偏無儻王化乃興詩云不識不知帝謀是禀况兵當伐叛事合從權臣去年先因淮北侵疆後值江南阻路乆屯師旅未遂戰征陛下妙選群才近分重寄鄭畋䓁莫不身先貔武手運豹鞱既當怒髪争衝固謂賊􅎍可揕仰酬睿奨竟勵忠誠臣也逺鎮臨戎強隣結憾唯慙曠職豈望成功伏蒙陛下尚念勤勞曲垂慰諭覩上天之慈意觧外地之憂深既許将軍獨舉柳營之令終期叛䘚必歸竹町之誅臣限守戎藩不獲稱謝行在無任感激戰懼之至謹奉狀陳謝以聞謹奏謝宣慰狀右宣慰使供奉官李從孟至伏奉去年九月九日敕書手詔兼宣㤙㫖慰論臣及将士䓁者伏以感㤙効命武士常規仗順摧兇元戎素分賊巢偶乗奸便尚逭嚴誅臣願膾彼逆鱗臠其邪膽掃重氛於魏闕迎法鴐於蜀都是以去年㩀馬援之鞍敢矜獨勇杖辛毗之鉞親率諸軍乆在江千再承天㫖不令離任遂巳班師豈料伏蒙陛下念及老臣撫兹衆率特迃星使逺降泥封綸傳萬乗之言纎微不聞纊彼百夫之體慰暖皆均歡呼而聲巳振雷感泣而淚将成雨唯期勵節共願報㤙臣限守藩條不獲稱謝行在臣無任感戴榮抃戰懽之至謹因供奉官李從孟廻奉狀陳謝以聞謹奏謝詔奨餙進奉狀進奏院逋到㤙賜手詔一封右臣伏奉詔㫖以臣先供軍應接使駱潛䓁進奉銀事特賜奨餙者伏以敕切示賞乃聖主之異㤙寓物輸誠固藩臣之常事但屬敵滋隣境冦阻道途運網而既闕先登贄禮而僅侔錫貢卑成滞况涉尠微是以雖憑孱水之􅎇難逭塗山之罪豈料鴻毛比復方申懇悃之心鳯口衘書逺降稱之㫖感激而懐榮為懼揣倄而報徳何期臣限守藩條不獲稱謝行在無任荷㤙戀聖屏營之至謹奉狀陳謝以聞謹奏謝詔示徐州事宜狀右臣先奉詔㫖㩀時溥奏卿本道差兵侵境殺傷令務止遏者臣遂具時溥誣謗事由申奏伏奉二月二十五日詔㫖今則冦孽不日勦除藩方務息争竸所冝和叶各保封疆者臣伏以天德既高側管者固難窺測日恩至廣戴盆者自阻照臨是以逺竭愚誠動違聖慮時溥旣銜睿奨得縦兵威早成熊㩀之謀更展鯨吞之勢累興師旅来犯封疆焚郭邑於山陽掠資財於淮上臣遂令捍禦略挫兇狂而乃時溥奸計巳成根株巧言頗有枝葉不思巳過敢惑宸聦今者再奉絲綸仰遵徽纆唯期寛則得衆粗可和而不同臣分閫無㓛戢兵為務至於草㓂猶許歸降况是隣藩豈謀侵擾彼無此詐此無彼虞臣限拘鎮守不獲稱謝行在無任感激屏營之至謹奉狀陳謝以聞謹奏謝詔止行墨敕狀右臣伏奉詔㫖去春權降詔命許諸道承制除官巳兩度降敕止絶自今後凡有要甄奨者並扵急逓奏聞不得更議承制者臣伏以漢朝鄧禹始啓倖門魏室曹瞞敢専重柄欲敦扵自家刑國所惜者唯器與名伏遇陛下逺事宸遊慮防爵賞遂降無私之澤遍資諸道之權不料人人而竸弄茟端處處而皆誇墨敕長蛇封豕猶匿暴於神州狗尾羊頭巳成群於列鎮臣前年雖奉詔㫖未欲施行却縁親率軍兵逺期征討此時乆屯南浦将泛西江忽被鎮海節度使周寳欲感軍情潛施巧計便以無㓛将吏悉皆超授官榮臣所領士䘚旣多将校不少彼安㘴者猶爲甄奨此逺行者豈免怨嗟邇口聲傳從頭憤激臣若不依周寳必恐事生遂准詔書得行軍賞巳曽一一具事由申奏訖自奉前年十一月一日敕㫖仰遵成命静守常規至扵近日所招賊徒只與徃時先賜官告曾無僭越豈可隱蔵今者外将忠誠永當無二大君善教巳至再三泣告而天何未聆憂懐而地謂可入臣限拘藩鎮不獲稱謝行在無任戰越屏營之至謹奉狀陳謝以聞謹奏謝郄公甫充監軍手詔狀伏奉某月日敕書手詔各一封右新授當道監軍郄公甫四月十日到伏蒙聖㤙賜臣敕書手詔兼慰喻臣及将校䓁九天降詔萬里宣㤙柳營之列将歡呼桂苑之群寮感泣伏以郄公甫素懐材略乆撫軍戎漢南之職業可觀江北之物情獲頼旣見寛能得衆必令師克在和臣仰窺五色之書俯慰三竹之士喜氣髙侵於畏日歡聲逺振於薰風臣與将校䓁無任感㤙激切榮抃屏營之至謹奉狀陳謝以聞謹奏謝除鍾傳充江西觀察使狀右臣先奏請授鍾傳江西觀察使其高茂卿乞别除廉鎮伏奉七月五日詔㫖允許特賜奨餙者天從素望風遞仙音旣諧舉善之誠實叶分憂之寄伏以鍾傳比從属郡来援府城撫綏而使洽衆情禦備而能成逺略高茂卿旣多梗阻不免佪翔固難掉鞅而旋豈許垂槖而八臣以戒之在闘事可從權遂具奏論輒陳利害不料一言之善遽得動天終令二将之才皆榮列土鍾陵江徼銅柱海隅政成而必有可觀恩重而各得其所臣限拘鎮守不獲稱謝行在無任感激兢灼之至謹奉狀陳謝以聞謹奏謝就加侍中兼實封狀右臣得進奏院狀報伏奉某月日㤙制加授臣侍中餘並如故仍加食實封一百户者九重降命萬里傳聲側聆而踊躍忘疲内揣而怔忪失措伏以納言進秩頒邑賞㓛固須徳望鎮時仍有勲勞濟物然後方可謂君無虛授臣無虗受如臣者謬提旄銊免墜弓裘空有志於四方竟無能於一割况自群兇蝟結戰陣蛇奔狂鱗乆戲於鼎中聖駕逺廵於劒外臣也動不能剗烟塵之患静不能瞻山海之資遂蒙改易兵權分張搉課雖值盤根錯節其如有斧無柯安邦之計策何成富國之機謀莫就唯甘黜爵以警愕官豈期陛下㤙洽無偏義深宥過特超衆例許陟高資印標石鵲之祥早慙不次冠聳金貂之餙愈覺非宜况叨真食之榮實愧素餐之咎但属狼星未滅鯨浪猶翻方期抗斾以専征不敢懸車而請老謹當訓兵是務殄㓂爲期粗中武弁之威仰報西門之賞臣限守藩鎮不獲稱謝行在無任感㤙戀聖戰汗屏營之至謹奉狀陳謝以聞謹奏謝秦彦䓁正授刺史狀新授和州刺史秦彦新授滁州刺史許勍右件官臣先奏請各授管内刺史今月某日得進奏院狀報伏奉某月日敕㫖允許者九天降寵兩地分榮覩降将之懐㤙喜元戎之獲請伏以秦彦䓁比者爲梟爲獍維虺維虵乆流螫蠹之災未有誅鋤之便臣偶令招諭旋自歸投遂假分符皆能守節誠宜奨勸輒具奏論今者聖澤濡枯皇風盪垢纔擲黄巾之餙許登皀盖之資秦彦䓁旣荷新㤙永除舊悪必也出榮建隼八効懸魚學其守土之規贖彼㴞天之罪臣限抅藩鎮不獲稱謝行在無任抃戴兢灼之至謹奉狀陳謝以聞謹奏桂苑茟耕集卷之三
