front:
  text: 桂苑茟耕集卷之八别𥿄一十首
  hash: sha256:666e2a7e6ff0aa0c447aa88c63e9246ef47268f38ffc7651ca925930351a2aeb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_008-1a}
body:
  text: 泗州子常侍西川陳相公徐州時司空三首諸葛爽相公二首湖南閔尚書幽州李大王四首滑州王令公鹽鐵李相公二首龍州裴尚書西川柳常侍史館蕭相公三相公翰林侯學士泗州于濤常侍常侍榮戴貂冠逺驅熊軾能施善政遍恤疲氓暫牧雄州巳安樂國斯乃鄭巨君之甘雨再潤淮邉卜子夏之儒風重興泗上况屬彭門叛亂仍當汴路囏難獨守危城終摧敵壘果成茂績實驗全才且群師恱挾纊之心鄰孽縮吞舟之口仁者有勇信非虗談某昨奉詔書許令軍賞設爵而唯憑帝命舉賢而實契私誠今則寵銀璫威兼鐵柱敬申厚禮用報殊㓛椘岸風聲處處而既傳滅寇隋堤柳色年年而秪望行春拜賀未期瞻思頗切某公牒同封送上云云西川陳敬瑄相公伏睹除書伏承相公以祝鳩之榮兼大貂之貴禮登八命寵冠三台伏惟感慶兼極伏以掌邦教之司無人則闕負國璽之任有德始居昔丁固休徴終叶生松之夢戴慿奧學曾摽奪席之名然十八年而既居後時五十重而何益於事曷若相公雄臨玉壘榮奉金輿昔也坐振風謡作一方之慈父今乃立迎天寵為萬乘之主人使西夷免怨於後豫南詔永知於戀聖是以秩歸鳯闕化冾龜城躡髙蹤於黃闥紫扉耀偉質於朱衣皓帶豈獨一時之盛事實為萬代之美談某早沐眷知不任欣抃云云徐州時溥司空三首竊以誓於晉乘則重其執贄往來諷以椘詞則愧彼隨波上下永言有義有禮唯在知和而和况乃仁境接邦之彥兮善鄰存國之寶也始終相契今古何殊去春特辱長箋兼貽厚幣使者乃和門上挍貺之以華棧大宛引夏殷罪已之言鋪陳數幅舉邾魯息民之義撫綏近封有以見真男子之用心古諸侯之行事其於景仰豈可弭忘今遣専人聊馳微信匪足為報永以為好伏惟照察第二司空利器倚天忠誠貫日授律而舉無遺䇿訓戎而動有成㓛昨者窮寇驚奔鋭師薄伐審麟史追逃之勢展豹篇決勝之機靜剗群凶暗梟戎首范丹縣側雷威騰肅殺之聲季氏山邉天罰示告成之慶久留盛績終屬雄才所謂有非常之人然後有非常之事絳灌亦一時俊傑關張非纍世勳庸鏤姓名於金鼎玉鍾飾儀形於雲臺煙閣永言盡美孰敢爭先某幸接德鄰深遵義路每增欣賀固異等倫云云第三特辱長箋俯傳大捷誘賊將而暗除梟師剗群凶而遍戢豺聲夫何壯哉誠可畏也且黃巢謂逃天得計乃揆日偷生書罪則竹乏南山流惡則浪乾東海逞暴於鋸牙鈎瓜挻災於金闕玉京煙氛所侵塗炭皆匝諸道遞相逗撓别自侜張驅兵而未暇搴旗喪律而先聆返斾養姦既久玩寇何安若非司空以當春滋雨露之恩則坐迎龍莭及初夏順雷霆之怒則立展豹韜遂得才發鋭師果殱窮寇刷國家之積憤弭州縣之餘殃所謂三年不飛終當一戰而霸况可飲頭而快意何須擢髮以論辜有以見報聖天子之恩固須待舉真將軍之令幸聮仁境先聽好音欣抃欽矚翰墨何寄云云諸葛爽相公二首伏承親提師旅逺赴戰征跋履山川蒙犯霜露不審近日尊體何似急景凋年寒威肅物令行麾下盡忘皸瘃之傷望峻寰中將救瘡痍之患必有百靈薦祉七萃成㓛逺揚郤元帥之髙名近繼郭汾陽之雄略則銷氛䘲遍活蒸黎有心之徒引領而望伏惟每加保重早副禱祈逺誠所望云云第二訪聆賊巢自逃商嶺久逼許田蔡師相連狂鋒尚熾當使以道途逺隔行止難知未施掎鹿之能但養斬蛟之勇伏承相公親麾八陳深運六韜將靜掃其群凶已齊驅其鋭旅既見三冬擐甲即致殊㓛方知五月渡瀘誠為易事諸道固當高枕聖君便可回鑾而未測鯨奔頃防獸搏凡居戎閫合審軍機輒遣専人逺偵賊勢幸垂示及兾助討除伏惟照鑒謹狀湖南閔頊尚書親故前河西朱大夫到逺垂書示深荷眷私兼將尚書弄馬圖及貴府祥瑞事迹相示閲覽忘倦欣仰有餘且武藝所稱歷朝可數椘誇徹札魯衒蒙輪彎三百斤之長弓嘗傳漢史掉八十斤之雙戟亦著魏書然而唯守一隅莫能四達長於射而短於御力甚壯而心甚怯永言戎伎難遇全才今者尚書術繼白猿名髙赤免既占萬人之敵真為一代之雄雖居仗銊之榮不忘據鞍之勇爰徴粉繪妙寫風儀遍覽左族右抽唯知目駭神聳彼繫繩逞捷運甓服勤實謂區區瑣瑣者厼况乃夢符捧日政洽觀風花竹呈祥果驗中興之運龜龍薦感皆標上瑞之姿若非望重行春歌喧來暮則何以三軍效勇永諧欽化之名七郡懷恩盡表殊常之應心期渥澤繼入瀟湘此則但睹其電擊雲飛鷹瞵鶚視每勞企想無以喻言唯望慎舉政條仰酬寵寄方值四郊多壘實慿萬里長城其他中心藏之永以為好幸垂諒察云云幽州李可舉大王四首不審自履初夏尊體動止何如伏想趙盾日威雄臨北塞袁宏風化遙助南薰固當九郡懷恩百靈薦祉符提白玉儼摽萬里之長城臺築黃金遍啓四方之賢路豈止應挂絲之夢自然超衣錦之榮狀惟精慎寢興别迎寵册永扶昌運大洽群情今遣諸葛果卿假以郵巡修聘既愧未成好幣又慮或失良材無限遠誠各具别狀云云第二雲龍在想風馬異區未由傾蓋之誠空切著鞭之望雖傳鱗翼莫寫肺肝况某俯顧家門忝同里閈每詠維桑之什即懷喬木之恩幸蒙侍中大王不賤家丘深知國産曲垂厚奬頻辱好音然則苟能知心何假會面以斯佩荷可鑒依攀今緣國患未除鄰讐不戢甚欲慎言結舌其如憤氣填胸略假箋毫具陳事實恃惠子之知我望明王之鑒賢伏惟恩私逺察誠素云云第三伏以蜂蟻巢窠猶能稔惡熊羆隊伍未見摧凶在於義士忠臣莫不痛心疾首某蓋謂去年奉詔遂於近境旋師然今若終不自行必恐竟無所就巳從中夏遍閲大軍待剗淮戎即登汴道但以指其百勝決此一行人不異心事希同力侍中大王族榮周姓爵貴漢封固多報國之誠常貯安邦之術見兹禍難忍不憂勤某既事征行輒申控告伏望差借兵士助平冦戎得貴藩精騎五千勝諸道羸師十萬佇收京闕尅在旬時亦已先具奏陳所貴免成専輒申包胥之告隱與此雖殊趙充國之請行于今可試幸垂亮察必賜允從不敢獨擅茂勳所兾均分重賞忠誠之切實在於斯伏惟永存始終早示可否未間顒望可想春翹云云第四别奉榮緘逺搜古籍其於降歎無以喻陳且近者列土諸侯盈庭多士唯以宦塗鋭志少於儒術留心而乃侍中大王博古通今去華取實燕碣石之接土巳繼芳蹤漢維城之好書逺符仁旨是以訪遺編於汲家尋墜簡於魯宮然則荆軻易水之歌徒矝壯氣召伯甘棠之詠虛播政聲豈若博采聖人之書用光君子之道但懷鑽仰敢覬切磋况某久擁戎旃難親講席耽讀闕五千卷之數藏貯無三十車之多自奉指蹤願申誠懇遍令列肆廣集異書兾資日益之㓛寧憚風詠之過必可徴名東觀承乏西齋伏惟俯賜鑒察云云滑臺王令公某蒙恩忝官不任感懼某粗傳堂構謬荷國恩然而術略素貧勳勞甚淺早分相印纍陟師壇每遇福過災生蓋為材微任重一自四郊多壘萬乘蒙塵宋施毫髮之功深負咽喉之寄羊皮狐腋空思趙簡子之言瓦釡黃鍾寧免椘大夫之歎既難展用唯願退間方欲瀝血拜章奉身請老豈料更隨衆例亦忝殊榮遽登常伯之髙資復益實封之異寵伐檀可懼橫草何申伏緣遞路不通制書未到先垂榮問過辱奬詞既聆天上之音不愧月中之夢末由陳謝但切兢惶云云鹽鐡李都相公二首某蒙恩忝官不任感懼伏以納言峻秩真食殊榮有扶持社稷之㓛有燮理隂陽之術方居正位允洽群情如某德乏潤身智慙周物况逢多事未展壯圖動無效於啓行靜有能於卧理加以久司管貨實寡籌謀既虧於富國贍軍深愧於木牛流馬唯甘黜削永遂優間豈料聖澤無偏戎藩有忝輈飛盡鹿昔年而莫見休徴冠聳豐貂今日而愈慙非據仍加班邑何報聖朝此皆僕射每賜保持得榮交伐唯期勵莭共願匡時陳謝未由依攀益切云云第二竊以世途易變時事難言泛泛如水中自安滔滔者天下皆是雖董卓已燃巨腹衆切歡呼而桓彛若有忠魂潛應慟哭每窺師律空激壯圖今則大駕未旋外藩多難獲利者唯謀潤屋握兵者誰解清宮當道雖乏供須但勤貢獻願早回於御輦難空倚於賦輿割占所因指撝斯在必希朗鑒深察鄙誠其他即遣専人兾具後狀云云龍州裴峴尚書逺勞専介特枉華緘發函睹不滅之蹤滿幅示相憂之旨其於佩惠何以寄言且國步猶囏天心難測忠直者韜聲戢影姦邪者鼓舌簸脣彼既一時此須三黜唯當竭莭豈足興言尚書偶值危時暫淹雅望將期歷試無限卑栖寵辱若驚周柱史非無意也行藏自保魯司寇有是言乎多謝故人勉報聖主分憂救瘼為政非輕志操不虧恩榮斯在狀惟諒察云云西州柳常侍某頃鎮龜城别營雉堞蓋符天意得就土功今者幸遇巡逰謂申績效久留御輦俾立豐碑杜元凱方愧勳名李玄盛敢言德政難忝當㓛受賞其如見寵若驚常侍直道而行樂人之善逺垂華翰過辱奬詞以永傳不朽之談先見未來之事可使美掩蜀都之賦高齊劒閣之銘荷戴兢慙無以指喻伏惟照察云云史館蕭遘相公某日無勞效天降寵光雖雨露常均不辭潤物而丘山漸重莫遂安身况蒙相公察以獨立聖朝勤行直道逈乖芘藾免使湮沉既闢洪爐辱陶鎔之厚賜仍揮彩茟煩刻畫之妍詞以為動有成㓛前無強敵撫寧淮甸靜戢煙塵繼陳任土之儀逺瀝望雲之懇遂使榮升畫室特解牢盆更增班邑之恩尚假統兵之位仰窺華翰俯揣凡材未能息多壘之災何以竊長城之譽唯期激勵少報生成拜賜未前懷仁益切云云三相公某蒙恩忝官不任感懼伏以風后古官是聖代弼諧所重國僑美賞非賢才負荷固難必也挺秀儒林鈎深學海方可奪席占五十重之譽享秩稱二千石之榮如某任重咽喉㓛微毫髮早提兵柄不能靜剗寇戎久握利權無以廣資經費雖進退每從於帝命而否臧實愧於軍謀以兹責躬無所逃罪但願罷歸林藪絶望雲霄豈料宸襟猶傷墜履自上安下方慙畫􅎷之幡居髙飲清忽戴附蟬之冕解煩難於平準增寵祿於實封此皆相公啓導聲慈庇安戎律使貞金錬火免銷耗於毒煙直才摧霜更敷榮於聖日唯當親驅鋭旅遍討群凶兾成破竹之㓛少贖伐檀之刻未由陳謝悚惕增深云云翰林侯䎖學士某材略素貧勳勞甚薄謬蒙睿渥纍陟華資今者拜以古官加之真食伏蒙學士親奉宸眷過垂奬詞煩郭璞之彩毫榮勝軒冕使夷吾之瑣器頓異斗筲邅逢實契於百生銘鏤豈唯於一字但兾仰憑茟陳更鍊戎韜充國壯心早遂征行之望無鹽陋質免慙刻畫之恩荷戴兢惶不任誠懇未由拜賜但切依攀云云桂苑茟耕集卷之八
