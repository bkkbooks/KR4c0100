front:
  text: 桂苑茟耕集卷之十别𥿄二十首
  hash: sha256:32bd102c71f659cf325b81309a1a68f6138cf203590f9d8086ff538642a36e57
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_010-1a}
body:
  text: 魏博韓侍中一首鄂州崔大夫一首考㓛蔣郎中一首前泗州鄭常侍一首新羅使朴貟外一首蕭相公二首田軍容一首都統王令公一首浙西周相公一首前宣歙裴尚書一首幽州李太保五首徐泗時司空一首田軍容一首振武赫連尚書一首幽州李大王一首魏博韓簡侍中一自黃巾北侵翠輦西幸蝗無避境蟻已壞堤內無宮闕之灾外結藩維之耻諸葛爽者豕食難飽豺聲易驕却躡迷途敢凌貴圉侍中手驅虎隊心閲豹韜一陳才施三城遂復雄㓛始建冊命俄臨永為壯士之盛談別作諸侯之美事某昨欲剖巢燻穴久為淬甲勵兵及出師徒又蒙詔㫖且令利權山海鎮壓江淮一弭國讐先資邦賦然其奈夜眠軍幕霜橫枕上之戈曉掛戎衣雷吼匣中之劒終願親揚勇略靜滅凶徒伏惟鍳察鄂州崔紹大夫遠蒙仁私特示表藁其於歎仰無以喻陳某夙練戎韜願禆王略不愧於管天錐地猶勤於撮壤導㳙遂敢纍貢忠誠兾回聖鍳儻或六龍下峽豈同五馬渡江中朝之禮樂無虧下武之㓛猷斯在果蒙大夫惠於宗族贊以表章過垂華衮之褒益睹彩毫之妙古詩云不惜歌者苦但傷知音稀今日知音幸遇之矣然榮示中媲茂弘之德業齊越石之機謀自顧瑣才何當虗譽今則王導清望已推於首座相公劉琨至誠亦付於襄陽㒒射必期英鍳永察愚衷云云考㓛蔣泳郎中特勞専介忽辱榮緘過垂軒冕之褒永置巾箱之寶實慙彼已豈敢當仁郎中學士暫避囏時偶勞僑跡今者官清司績職峻集仙麟趾殿中久侍驂鸞之客螭頭階上則親吐鳯之才豈唯舉四善之精詳蓋必偹九重之顧問鋪陳組繡演暢絲綸則也虞夏商周之書重行聖代蕭曺魏邴之位更屬何人詎可守三徑之寂寥慮千山之險阻許垂訪别専兾祗迎伏惟眷私幸賜鍳察前泗州鄭廉常侍竊以寇戎未殄士卒多驕凡曰郡侯實難政理縱得上和下睦猶為朝是夕非况福乃儻來禍惟不測但無慙於屋漏亦何纍於國恩然而常侍蓋切奉公匪踈撫士雖云驚擾終免侵傷有以見為政無私當仁有𥙿伏承已離泗水始及淮山捧閲來緘僞謙往咎其於瞻仰胡可弭忘然則郡守懸魚既繼古人之節塞翁喪馬可寬逹士之懷云云新羅探候使朴仁範貟外忽奉公狀偹睹忠誠慰愜欽依但增衷抱貟外芳含雞樹秀禀鼇山來登天上之金牌桂分髙影去陟日邉之粉署蘭吐餘香今者仰戀聖朝逺銜王命捧琛執贄棧險航深能獻欵於表章欲致誠於官守雖無奉使難在此時九州之侯伯傾心萬國之臣僚沮色幸來弊鎮得接清規况奉貴國大王特致書信相問將成美事不惜直言儻貟外止到淮壖却歸海徼縱得上陳有理其如外議難防無念東還決為西笑聖主方深倚望賢王佇荷寵榮道路亦通舟船無壅勿移素志勉赴遠行峽中冦戎或聚或散此亦專令防援必應免致驚憂且過鬱蒸可謀征邁館中有闕幸垂示之所來探候事已令録表申奏敬惟鍳察蕭遘相公二首某纍貢表章請議巡幸忠誠屢罄宸眷未回兾保始終再陳利害匪望河陽之狩願迎汾水之逰竊以諸道賦輿皆遵峽路多是㑡五致一蓋已萬水千山後綱不繼前綱所貢不如所費况近者西從蜀國南至荆門似有微灾恐遺巨患忽若草冦侵據江陵阻艱則榛梗既多苞茅莫入或更蠻戎伺隟必令越嶲勞兵避柱觸楹防微可誡行舟墜劒執滯固難某以孝子不諛其親忠臣不諂其主遂陳狂瞽逺黷聖聰唯望略泛龍舟暫遷鳯里庶使九州修貢不愆任土之冝四海歸仁盡遂朝天之望且賊巢凶狂聚衆穢黷經時縱能早覆妭巢豈可便廽法駕淮南乃寰中俗冨閫外名髙喻以金甌永無釁缺比於玉壘實異繁華伏惟相公居注意之朝處沃心之位周成王之卜洛始託姬公晉元帝之渡江終資仲父早申决議仰贊宸衷能成可久之規益表無私之德某頃在西川制置及於南詔通和雖為先察於微豈欲驟稱其伐但緣相公皆垂目驗不敢面欺則今日荆蜀灾星未能退舍吳楚福地實可遷都事歸從權化資垂拱永致一家之理必輸萬里之誠某言不近誣志唯遠慮非奪日官之業兾垂天子之恩幸望國僑無譏禆竈謹以具表陳請訖伏惟苐二伏以物忌太盛器滿必傾自古有言至今為誡苟或不能知止欲貪榮則有折鼎足之虞炊劒頭之險某每念遭逢聖運紹續舊勳北定羌戎南征蠻蛋東降齊盜西建蜀城髙提三尺之權粗展四方之志然自煙塵聚孽原野宿兵曾無敦閲之全材先叨統師詎有縱橫之令策兼領利權而乃不能首唱義聲身先鋭旅􅓍奔鯨於海澤逐𢮓犬於秦關遽及火熾祠篝塵驚御輦逺聆巡幸便議征行但以每當誓衆之時即奉止軍之詔雖自始終勵節其如進退失圖華元興城者之謳子産致國人之謗乃有浙侯構隟沛將加兵三年已來二憾不釋蜩螳竸噪蚌鷸相譏厚誣而巧弄舌端顯奏而亂搖心曲求刺船而不暇想投杼以難逃伏賴相公照以秦臺調之伊鼎察邾公之訴鄭伯解晉帝之疑石苞免桂刑章尚縻寵秩既蒙明洗誠合淬磨更修克已之心永竭勤王之力直以松筠不改雖自保於堅貞蒲柳先秋遽巳傷於衰暮䈥骸漸􅉵志氣潜摧縱欲自強終憂不逮今者幸遇上京已復大駕則廽麟鬪龍吟固息興妭之慮放牛歸馬實迎偃武之期某也既在清時誠為棄物况縈沉痼深負壯圖攬鏡無憀投簮是念豈慕祈奚請老尚處冗貟唯思范蠡愛間得行素意乞解所職自卜為冝伏惟相公選士惟賢退人以禮俯矝羸某特賜允從雖慚未遂報恩免更久為尸祿仰干陶冶敬託箋毫始知調急聲哀唯愧詞窮理盡伏惟俯賜恩鍳田軍容某慙無術略久竊榮寵提漢法之重權陟秦官之極品莫申展效何贖貪叨况自冦盜奔侵京都陷覆久守咽喉之寄不成毫髮之㓛雖兵柄既多固難措手而君恩未報實切靦顔况乃室怒潛興鄰讐竸起陸遜徒稱其佳臾崔暹終憾於癡人顯奏相誣多言可畏幸蒙軍容推心庇護極力保持雖遭貝錦之詞免陷織羅之罪祗合以戀軒思幄策蹇磨鉛畢命為期在公無倦但緣攝生罕妙從役久勤齒髮既衰精神亦耗少私寡欲敢言君子者乎多病愛間方謂古人是也智力不可強進寵章不可濫行寶覺妨賢只冝求退今者肅清鳯闕撲滅梟巢櫜弓矢以銷兵永除戎備垂衣裳而致理廣任賢才如某者寒灰罷燃眢井誰顧往嵗之南征北伐雖忝當仁此時之尸祿素餐逾慙非據既失行驅十乘豈能卧護六軍輒貢表章懇辭爵位伏惟軍容察以有犯無隱之義難進易退之規仰贊帝俞俯從愚願敢有脅肩諂笑固無沒齒怨言幸逢四海之升平願指一丘而飬老干黷清德兢惕實深伏惟云云都統王令公賀冬伏以律管潜吹星躔改候觀臺望瑞雲物呈祥伏惟令公每布祥雲常懸愛日三軍彉弩挾楚纊以忘寒五夜枕戈擁孫衾而逹曙必資景福早建殊㓛雅當肅殺之時便遂討除之勢四方聳耳佇聆大捷之音萬乘傾心永致中興之運某末由陳賀但切禱祈浙西周寶司空伏以禮慶履長傳摽視朔夷夏契混同之運乾坤叶交泰之期伏惟司空相公浙水流恩吳山變俗既睹趙良之日永洽物情願親傅說之星早環帝座末由拜賀但切禱祈云云前宣歙裴䖍餘尚書伏以禮稱迎日傳載書雲當寰中賀聖之晨是水外寢兵之際冝陳善祝仰薦殊祥伏惟尚書政報褰帷慶資溫席巳捧徴黃之詔固諧夢說之期人仰板輿羡老萊之榮養帝留金鼎待伊尹之來調某雖戎律拘身而清規在想未由拜賀但切禱祠幽州李可舉太保碾玉排方腰帶一條并金魚袋一枚金花銀合盛重一百六十兩右件腰帶體資廉潤㓛就琢磨雖慙鄂坂之金稍勝延陵之縞圭璋比德冝親佩劒之腰霜雪呈華願近生松之腹動則金章躍鯉靜乃寶匣盤龍既當屈以求伸唯望服之無斁謹専寄獻逺表依攀伏惟恩私特垂檢納銀結條燈籠一枚承燈盞白盛荷葉一蔘木匣盛金銅鎖鍮並全金花平脫銀裝硯臺一具垂鈉香囊五枚柒木匣盛金銅鎖鍮全具金花平脫銀裝硯匣并硯几一具銀硯水瓶等四事硯几在苐二內右伏以持異物而奉異人嘗聆斯語覽逺書而愧逺客亦驗古詩志常切於攀鴻事不慙於獻鵠每逢珍玩則繫懇誠前件燈籠硯臺等鑄鑠成㓛披砂潤色運巧而靈絲綴藻標竒而霞蘂雕華高懸謂雲蓋凌風遙視疑露盤含日龍膏豹髓偏冝卜夜於歡筵鳯茟鵝箋亦可依仁於未席加以謝囊分掛孔硯深藏虗心而只待含香藴器而終能處默是敢徵美言於舉燭寄徴慊於濡毫伏惟無思宋殿葛籠僻敦儉約或逞張地草聖許近恩輝必可逺耀九光深滋五色隔飛蛾而救物仁化弥彰研含麝以傳書德馨增馥非無所採粗有可觀必望眷私俯垂容納幸甚云云金花陷銀柘裏合大小共三具銀接頭紅牙匙筯一十對犀杔子四隻巳上大合內盛銀裝茶碗四隻在中合內盛犀楪子二十片在小合內盛金花銀腳螺杯一隻右件匙筯犀合茶碗螺杯等雖愧金盤粗勝棘匙鈿玫魂之表異固讓魏銘詠玳瑁之摽竒敢徵潘賦所貴者煙排翠點霞染纎條掌握增榮不慮劉使君見失指蹤任意或希柳御史自擕况乃水族殊姿天成雅器永免蜘蛛寄跡能將鸚鵡齊名稍謂珍竒逺思寄獻伏惟靜籌帷幄許接樽罍對郭隗於髙臺深傾露液遣甘需於仙闕勝醉霞漿伏惟恩私特賜檢納幸甚云云織成紅錦繳壁兩條暖子錦三匹被錦兩匹西川羅夾纈二十匹真紅地絹夾纈八十匹右件繳壁錦纈等龜城傳㨾鳯抒成㓛張廣幅而宛見虹舒疊綵繒而免慙鮫織雖五千里之誇步障則難可爭光而四十匹之製戎衣則或堪入用亦兾偹㑹稽守晝行之服平津侯夜寐之衾不咎輕微特垂容納干浼斯甚兢慙實多云云安南開海路圖一面西川羅城圖一面并八幅紫綾緑右竊以事畏人知㓛慙自衒盂側奔殿終箸美於魯論郤至驟稱果興譏於晉乘妍雖可鍳今古何殊頃者銅柱南標金墉西建開八百里之險路則雲將驅石雷師劈山築四十里之新城則水神㵕泉地媪供土蓋乃感忠誠於上鍳標壯觀於外藩敢言簡在帝心實匪率由人力今則八蠻歸化萬乘省方既能有備無虞亦所當仁不讓去年嘗傳雅㫖欲覽微㓛乃徴於墨妙筆精遍寫彼長途峻壘宛如縮地不止移山逺遣寄呈略希展閲必謂桂陽衛颯誠瑣瑣焉亦知蜀國張儀是區區者恃深眷而不拘小節激壯圖而無訝大言伏惟云云徐泗時司空物色右伏以縞帶紵衣魯史乃先其所出投桃報李周詩用表於相知永言沼沚之毛豈讓琅玕之寶蓋防闕禮只貴申誠前件物等雖曰土冝亦由波及實慙華麗况至鮮微難把八行盡寫傳心之語唯慿一介聊陳籍手之儀伏惟眷私特賜撿納云云田令孜軍容送器物右竊以氣曀未銷道途尚梗久乖􅌹信略逹微誠每憂於逺莫致之不敢以多為貴者前件器物貨非難得器實易盈雖慙鏐銑之名願接樽罍之列輒將寄獻逺表依攀伏望無掛意於四知幸流恩於一諾特垂容納云云振武赫連鐸尚書謝馬拘右特蒙眷知逺有惠賫無庾亮的顱之害有陸機黃耳之能敢謂偹於左牽右牽實為馴於執勒執緤寧唯致逺况解防姦既驅策之有期固指蹤而無失仰承重貺倍荷殊私末有報酬益多愧悚伏惟云云幽州李可舉大王青氊帳一口金銅裝鉸具右伏蒙恩私特賜惠賚委之専介衛以壯夫遙陟危途得張官舍不假棟梁交構能令户牖兮開出觀則一朵蓮峯入玩則千重錦浪加以頂摽曉日額展晨霞靜吟而筠箔搖風俯視而地衣鋪雪舒卷皆成其壯觀行藏永佩於深仁莫不衒沙漠之竒模駭江淮之衆聽卧龍竊譽固當髙枕無憂虜豹成㓛必可運籌决勝唯期尅捷全賴庇庥荷戴所深啓陳何及伏惟桂苑筆耕集卷之十
