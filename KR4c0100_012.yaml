front:
  text: 桂苑茟耕集卷之十二委曲二十首
  hash: sha256:3b986eeab1995d2d0d6501cac0680163ca01268319084a28e4fa15c9b94c1714
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_012-1a}
body:
  text: 滁州許勍昭義成璘廬江縣令李清淮口鎮李質光州李罕之椘夀兩州防秋回戈將士歸順軍孫端椘州張雄椘州張義府滁州許勍夀州張翺廬州楊行敏和州秦彥盧傳戴慮光州王緒椘州營田判官綦母蘋鄆州耿元審海陵鎮髙霸淮口李質滁州許勍委曲報許勍得狀知妻劉氏將從征討碩效勤勞嘉尚之懷諭言不及吾嘗覽後魏書見揚大眼者武伎絶倫戰功居最其妻潘氏頗善騎射至于攻戰逰獵之際潘亦戎裝齊鏕並驅及至逺營同坐幕下對諸寮佐笑言自得大眼時指諸人曰此潘將軍也吾思見若人為日已久不期今夕得舉妙才此亦可謂劉將軍矣想鼓􅎏方振琴瑟相隨既在同心可知竭力教戰則必欺孫武解圍則可假陳平勉致殊功即行懋賞悉之不具云云昭義成璘報成璘大夫魯史云臣一主二漢書曰一心可以事百君則知下有離心蓋為上無全德姪孫僕射夙虧家訓驟荷國恩纍忝藩方曽微績效每于撫俗略不隨時恩威豈得並行寬猛無由相濟况近關西之賊窟持山北之兵權戰伐既勞緝綏莫至固知軍情潰散物議喧張大夫名既超倫事能從衆息貔貅之憤怒慰黎庶之疲羸實謂有三雋才誰云犯五不韙古之所有今也何疑逺遣専人迎取家口儻或行程齟齬且令彼處婆娑如能斷送出來便與友持發遣一踦墜屨猶能牽念奮之心百口孤孀何忍見含愁之色必應慰暖免至飢寒倚望所多諭言無及彼但勤修政理佇荷寵榮不令外盜侵凌必見大君委寄冬寒慎為將息莭級各與安存悉之廬江縣令李清報李令昔有桓榮祖者少曽學武或曰何不學書答云上馬橫槊下馬談經方可謂不負飲食矣若無自全之伎何異于犬羊乎昨見所申衆情可奬昔也一百里之疲俗託在神君今則十八寨之義兵請為軍師若非寬將猛濟惠與威行則何以鱦魠懷仁各能遂性㷱羆聚黨盡得降心姑拋堂上之琴便握匣中之劒所謂文一變而至于武者也况李令族聮天派名比水源才機為一代之雄心術是萬人之敵足得以指麾鋭卒掃蕩叛徒不惟除郡邑之灾亦可㝎國家之難然而軍務既常獨理職銜須有可稱未見所求固難抑致為復碩兼知戎役却守縣曺為復欲改轍從知乘機立事察斯二者决取一途􅌹期奏論早與飛報且如班超投茟蒯恩捨芻當池蛟得水之秋有天驥追風之便古詩云寧為百夫長羞作一書生信知倜儻之人懶守低佪之莭勉成勳業永荷寵光戎務方殷善自將息諸寨將士各與慰問悉之淮口鎮李質報李質覽所申狀慰愜良多李再興未革狼心敦張蜂目搆稱虗事違負本軍初慿逐冦之名却設起戎之計賴質深懷智策善審兵機一唱義聲四圍逆黨狀疾風之掃危葉如烈火之爇飛蓬再興將見誅夷果當懾竄然既是傷弓之物必為釁鼓之資兼知質男裕黃口小兒血氣未㝎偶虧嚴父之訓以涉叛夫之謀質又徇公絶私捨曲取直愛而知惡義以滅親削其舐犢之吉遵彼烹梟之理若非忠勇何得如斯古語有之蝮蛇在手則壯士斷其莭是乃忍小痛而除大患也况石碏傳芳于魯史日磾載美于漢書故事斯存令名不朽足以見質有大丈夫之氣有真君子之心權兵而動必成功鎮境而靜能守莭前勞後效日就月將固當榮盛可期勿以滯淹為恨勉安軍旅善保勳名以古况今惟吾知汝悉之光州李罕之報李罕之成覸有言彼丈夫也我丈夫也然則成功立莭不獨古人扙順輸忠正當今日近奉敕書手詔無非激勵衆心兼除王令公充都統西門軍容充都監此乃籓鎮功虧朝廷計盡遂將大任􅌹付老儒雖漫傳聲必難濟事此去年齊驅猛鋭將掃頑凶尋奉絲綸俾安淮海詔書云為朕全具越之地遣朕無東南之憂遂乃旋師不敢違命然則審詳物議參酌軍期關中有執斧之徒閫外無枕戈之志誰能竭力實可痛心吾若不行衆將焉往今欲直趨汴路便入潼關佇復鳳城奉迎鑾駕永使流傳萬代終能肅靜四方罕之巳處分憂久為養勇必欲㨂精練鋭以期伐叛摧凶今録敕書手詔白寄往仰窺聖㫖必勵忠誠便决征行共圖富貴時不可失吾子勉之故此告知速冝飛報悉之椘夀兩州防秋回戈將士報王承問等久勞防戍又役戰征知得逺歸良多慰愜詩稱束椘不免㤪思傳載及瓜亦嘗憤恚古之難事今見忠誠况承問限過三年訓齊一旅值國家之多難息鄉井之懷歸言下忘身軍前效命遂得永别伍符之列髙登八座之榮固知實勤豈慮虛擲且往年被練而去今日衣錦而回孫權努力之言已成顯驗王昶寶身之誡更慎操持深秋逺行善自將息莭級將士遍與安存遣此不具歸順軍孫端報孫端將軍自從歸投久處間散想多欎悒不暫弭忘但以端職秩已髙官資須稱使司纍具奏薦朝廷則有指揮且仰安撫師徒佇迎恩命古人貴其晚達君子誡其速成王化既無偏無頗寵章必盡善盡美勉期順守勿念躁求秋晚其􅋽忉慎將息莭級遍與慰問悉之椘州張雄報張雄中丞得狀知已㸃練兵士兼請出軍西去討逆賊徒憤氣勃興忠詞懇切覽之嘉歎深置于懷且每值寇戎稍侵疆圉雄必心騰勇略首唱義聲去年已建殊功今日又申丹請不辭危于馬革碩展用于豹韜實謂起豫者雄始可與言兵已矣則帝委之以郡侯吾待之以國士永揚茂績固在良時然彼州司事力猶困未可便謀征役且宜更候指揮兵士各與慰安秋深善自將息馳此不具椘州張義府報張義府得狀兼送罰錢引咎自責足驗用心古語有之人誰無過過而能改善莫大焉饋餼之儀春秋所重在于屬部豈可外交勿為飢則附人别欲申于知已將滅白圭之玷遂以金作贖刑細覽來詞似懷他慮膚受之訴固不行焉但慎始終永圖富貴悉之滁州許勍報許勍語曰兵食可去無信不立則知守信之道乃是立身之本歟苟若壞墮自為顛䨱訪知近日浙西周相公頻差上元鎮使馬暨􅌹賫書曲兼將金銀送到和州說誘秦彥令歸浙岸許授霅川信使繼來事情甚細則未知秦彥終欲如何且浙西素乏勳勞驟沾恩寵謂得長久遽為驕矝殊不知人盡指楹鬼多瞰室惡既天稔道唯日亡今更阻絶我通津動搖我屬郡己乖衆議可見前途以勍直木千尋精金百錬固無憂于邪曲終不改于貞剛况乃邦媛相隨家肌是保永除異慮必享同榮或恐未審浙西所為先此告示悉之夀州張翺報張翺知已部領兵士將赴令公軍前言念逺征倍所加念且扙銊者皆誘閫外分圭者略滿寰中而乃顧家産為逺圖剗國讎為間事唯矝肉食孰肯身先今則翺首唱義聲躬提鋭卒騁大丈夫之志氣副上宰相之指蹤况知素藴機謀久施訓鍊佇伸壯莭必樹竒功當五馬離鄉逺地之芳聲獨振及六龍歸闕前程之變化難量暫此苦辛善為將理今附衣假銀器茶藥等往到宜檢領春寒慎為行李將士倍與慰安馳此不具云云廬州楊行敏報楊行敏使至得狀送芝草圖一軸覽之嘉歎喜有餘懷且草木之祥異也雖自天成皆因地秀物有所應吾何以堪行敏始假郡符已彰瑞諜天其誡爾爾宜慎之况鄉號千年村名穀祿足驗一百年之夀與二千石之資固保前程之富貴矣將酬美貺更勵忠誠非吝奬詞慮驕鋭志悉之夏熱切好將息使回附此不具云云和州秦彥報秦彥尚書使至得狀兼送羊五百口勤誠斯展其數實繁所謂爾羊來思我愛其禮况彥雖榮建隼能效懸魚逺傳廉慎之名深舉撫綏之政而乃特申懇悃倍所歎嘉既無慮于觸藩勉致功于荷箠使回附此不具盧傳報盧傳殿中監裴尚書將到洪州武寧縣人吏百姓及僧道等狀舉論傅前後戰敵賊徒保全縣邑功績一十五件細覽事實慰愜滿懷傳不云乎公侯子孫必復其始傳能資餘慶無怠聿修自值危時便揚壯莭一呼義旅四討凶徒兄弟二人義聲俱唱遂得疲氓獲賴廉使見知始提百里之權尋假六條之寄忠誠所至寵命非遙勉慎始終穩圖富貴所希薦舉必不弭忘悉之戴盧報戴慮殿中監裴尚書經過彼縣日得百姓僧道等狀舉論慮自乾符五年主鎮兼知縣事課績一十三件事皆托實情切舉能詞理燦然良增慰愜盧竭誠報國傾産妄家糾集義軍訓齊宗族撫寧羸瘵捕襲寇戎六年于茲一邑獲賴有功不伐唯善是從遂領縣曺永安鄉黨古者田稱續命邑號義興求之于盧未足多也既增嘉歎不忘薦論勉保忠誠終邀美命悉之光州王緒報王緒天不容好人唯助順苟違至理必亂常刑知緒昨因顔璋久藏禍心果致衆怒璋既誅􅓍緒乃奔逃何不束手戎場投身義域而敢更謀嘯聚尚恣喧張自招相鼠之譏莫識牽羊之禮未知爾意終欲奚為此乃先惠後誅武經所重好生惡殺王化斯行豁開誘善之門俾躡歸仁之路遂加誨諭試問端倪速仰割指本情指陳他望待詳來狀即與指麾禮云志不可滿傳曰惡不可長緒之今日其意若何勿驅齊氓枉入罪網秋冷切好將息莭級各與慰問悉之椘州營田判官綦毋蘋報綦毋評事夫欲均調兵食固須妙選公才供億既多料量非易評事自匡郡政甚洽物情剸割而案無滯詞淬磨而茟有餘刃今委兼判順國軍糧料舉牒同封寄往孔聖猶為委吏蕭何亦作功曺唯託幹能無辭猥屑欲令小人懷惠佇看君子勞心悉之鄆州耿元審報耿元審古來名將多是耿家恭賈秉弇徽音相繼永言苗裔固贍機謀元審雖名異䨥聲而志能獨立佇申忠勇别俟恩榮况逢危難之秋實建勳業名望勞之日勉存終始慎守行藏其他並令樊谷面述今寄衣一副烏觜茶二斤到冝一一領之秋􅋽切好將息悉之海陵鎮髙霸報髙霸得進奏院狀報知轉授右散騎常侍永言欣愜霈然滿懷昔周盤龍破膚有功繼霑爵賞齊世祖戲之曰卿著貂蟬何如兜䥐對曰此貂蟬乃自兜䥐中出耳當時以為名對前史標之美談今此官榮實彰君寵唯在􅌹勤戍遏固守邊陲更俟大來永揚忠莭知之淮口李質報李質得進奏院狀報知質轉授右衛大將軍且自數年君恩溥合官榮職賞可謂均沾然而成功可為受爵無愧者屈指而數能復幾人唯質久戍淮壖逺防冦孽勤勞最至品秩尚卑今授大將軍之名乃滿烈丈夫之望更宜慎守無慮湮沉慰愜歎嘉不離懷抱遣此不具云云桂苑茟耕集卷之十二
