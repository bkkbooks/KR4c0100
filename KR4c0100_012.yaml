front:
  text: 桂苑茟耕集卷之十二委曲二十首
  hash: sha256:3b986eeab1995d2d0d6501cac0680163ca01268319084a28e4fa15c9b94c1714
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_012-1a}
body:
  text: 滁州許勍昭義成璘廬江縣令李清淮口鎮李質光州李罕之椘夀两州防秋廻戈将士歸順軍孫端椘州張雄椘州張義府滁州許勍夀州張翺廬州楊行敏和州秦彦盧傳戴慮光州王緒椘州營田判官綦母蘋鄆州耿元審海陵鎮髙霸淮口李質滁州許勍委曲報許勍得状知妻劉氏将從征討碩效勤勞嘉尚之懐諭言不及吾甞覧後魏書見揚大眼者武伎絶倫戰功居㝡其妻潘氏頗善騎射至扵攻戰逰獵之際潘亦戎裝齊鏕並驅及至逺營同坐幕下對諸寮佐笑言自得大眼時指諸人曰此潘将軍也吾思見若人爲日已乆不期今夕得舉妙才此亦可謂劉将軍矣想皷􅎏方振琴瑟相随既在同心可知竭力敎戰則必欺孫武解圍則可假陳平勉致殊功即行懋賞悉之不具云云昭義成璘報成璘大夫魯史云臣一主二漢書曰一心可以事百君則知下有離心盖爲上無全徳姪孫僕射夙虧家訓驟荷國恩累忝藩方曽㣲績効每扵撫俗略不随時恩威豈得並行寛猛無由相濟况近闗西之賊窟持山北之兵權戰伐既勞緝綏莫至固知軍情潰散物議喧張大夫名既超倫事能從衆息貔貅之憤怒慰黎庶之疲羸實謂有三雋才誰云犯五不韙古之所有今也何疑逺遣専人迎取家口儻或行程齟齬且令彼䖏婆娑如能㫁送出来便與友持發遣一踦墜屨猶能牽念奮之心百口孤孀何忍見含愁之色必應慰暖免至飢寒倚望所多諭言無及彼但勤修政理佇荷寵榮不令外盗侵凌必見大君委寄冬寒慎爲将息莭級各與安存悉之廬江縣令李清報李令昔有桓榮祖者少曽學武或曰何不學書荅云上馬横槊下馬談經方可謂不負飲食矣若無自全之伎何異扵犬羊乎昨見所申衆情可奬昔也一百里之疲俗託在神君今則十八砦之義兵請爲軍師若非寛将猛濟恵與威行則何以鱦魠懐仁各能遂性㷱羆聚黨盡得降心姑抛堂上之琴便握匣中之劒所謂文一變而至扵武者也况李令族聮天派名比水源才機爲一代之雄心術是萬人之敵足得以指麾銳䘚掃蕩叛徒不惟除郡邑之灾亦可㝎國家之難然而軍務既常獨理職銜須有可稱未見所求固難抑致爲復碩兼知戎役却守縣曺為復欲改轍從知乗機立事察斯二者决取一途􅌹期奏論早與飛報且如班超投茟蒯恩捨蒭當池蛟得水之秋有天驥追風之便古詩云寧為百夫長羞作一書生信知倜儻之人懶守低佪之莭勉成勲業永荷寵光戎務方殷善自将息諸寨将士各與慰問悉之淮口鎮李質報李質覧所申状慰愜良多李再興未革狼心敦張蜂目搆稱虗事違負本軍初慿逐冦之名却設起戎之計賴質深懐智策善審兵機一唱義聲四圍逆黨状疾風之掃危葉如烈火之爇飛蓬再興将見誅夷果當懾竄然既是傷弓之物必爲釁皷之資兼知質男裕黄口小児血氣未㝎偶虧嚴父之訓以渉叛夫之謀質又徇公絶私捨曲取直愛而知惡義以滅親削其舐犢之吉遵彼烹梟之理若非忠勇何得如斯古語有之蝮虵在手則壮士㫁其莭是乃忍小痛而除大患也况石碏傳芳扵魯史日磾載羙扵漢書故事斯存令名不朽足以見質有大丈夫之氣有真君子之心權兵而動必成功鎮境而静能守莭前勞後効日就月将固當榮盛可期勿以滯淹爲恨勉安軍旅善保勲名以古况今惟吾知汝悉之光州李罕之報李罕之成覸有言彼丈夫也我丈夫也然則成功立莭不獨古人扙順輸忠正當今日近奉敕書手詔無非激勵衆心兼除王令公充都統西門軍容充都監此乃籓鎮功虧朝廷計盡遂将大任􅌹付老儒雖漫傳聲必難濟事此去年齊驅猛銳将掃頑兇㝷奉絲綸俾安淮海詔書云爲朕全具越之地遣朕無東南之憂遂乃旋師不敢違命然則審詳物議叅酌軍期闗中有執斧之徒閫外無枕戈之志誰能竭力實可痛心吾若不行衆将焉徃今欲直趨汴路便入潼關佇復鳳城奉迎鑾駕永使流傳萬代終能肅静四方罕之巳䖏分憂乆爲養勇必欲㨂精練銳以期伐叛摧兇今録敕書手詔白寄徃仰窺聖㫖必勵忠誠便决征行共圖富貴時不可失吾子勉之故此告知速冝飛報悉之椘夀两州防秋迴戈将士報王承問䓁乆勞防戍又役戰征知得逺歸良多慰愜詩稱束椘不免㤪思傳載及瓜亦甞憤恚古之難事今見忠誠况承問限過三年訓齊一旅值國家之多難息郷井之懐歸言下忘身軍前効命遂得永别伍符之列髙登八座之榮固知實勤豈慮虚擲且徃年被練而去今日衣錦而廻孫權努力之言已成顯驗王昶寳身之誡更慎操持深秋逺行善自将息莭級将士遍與安存遣此不具歸順軍孫端報孫端将軍自從歸投乆䖏閑散想多欎悒不暫弭忘但以端職秩已髙官資須稱使司累具奏薦朝廷則有指揮且仰安撫師徒佇迎㤙命古人貴其晚達君子誡其速成王化既無偏無頗寵章必盡善盡羙勉期順守勿念躁求秋晚其􅋽忉慎将息莭級遍與慰問悉之椘州張雄報張雄中丞得状知已㸃練兵士兼請出軍西去討逆賊徒憤氣勃興忠詞懇切覧之嘉歎深寘于懐且毎值寇戎稍侵疆圉雄必心騰勇略首唱義聲去年已建殊功今日又申丹請不辭危扵馬革碩展用扵豹韜實謂起予者雄始可與言兵已矣則帝委之以郡侯吾待之以國士永揚茂績固在良時然彼州司事力猶困未可便謀征役且宜更候指揮兵士各與慰安秋深善自将息馳此不具椘州张義府報張義府得状兼送罰錢引咎自責足驗用心古語有之人誰無過過而能改善莫大焉饋餼之儀春秋所重在扵属部豈可外交勿爲飢則附人别欲申扵知已将滅白圭之玷遂以金作贖刑細覧来詞似懐他慮膚受之愬固不行焉但慎始終永圖富貴悉之滁州許勍報許勍語曰兵食可去無信不立則知守信之道乃是立身之本歟苟若壊墮自爲顛䨱訪知近日浙西周相公頻差上元鎮使馬暨􅌹賫書曲兼将金銀送到和州說誘秦彦令歸浙岸許授霅川信使繼来事情甚細則未知秦彦終欲如何且浙西素乏勲勞驟沾恩寵謂得長乆遽為驕矝殊不知人盡指楹鬼多瞰室惡既天稔道唯日亡今更阻絶我通津動揺我屬郡己乖衆議可見前途以勍直木千尋精金百錬固無憂扵邪曲終不改扵貞剛况乃邦媛相随家肌是保永除異慮必享同榮或恐未審浙西所爲先此告示悉之夀州張翺報張翺知已部領兵士将赴令公軍前言念逺征倍所加念且扙銊者皆誘閫外分珪者略滿寰中而乃頋家産爲逺圖剗國讎爲閑事唯矝肉食孰肯身先今則翺首唱義聲躬提銳䘚騁大丈夫之志氣副上宰相之指蹤况知素藴機謀乆施訓鍊佇伸壮莭必樹竒功當五馬離郷逺地之芳聲獨振及六龍歸闕前程之變化難量暫此苦辛善為将理今附衣叚銀器茶藥䓁徃到宜檢領春寒慎為行李将士倍與慰安馳此不具云云廬州楊行敏報楊行敏使至得状送芝草圖一軸覧之嘉歎喜有餘懐且草木之祥異也雖自天成皆因地秀物有所應吾何以堪行敏始假郡符已彰瑞諜天其誡爾爾宜慎之况郷號千年村名穀禄足驗一百年之夀與二千石之資固保前程之富貴矣将酬羙貺更勵忠誠非恡奨詞慮驕銳志悉之夏熱切好将息使廻附此不具云云和州秦彦報秦彦尚書使至得状兼送羊五百口勤誠斯展其數實䌓所謂爾羊来思我愛其禮况彦雖榮建隼能効懸魚逺傳廉慎之名深舉撫綏之政而乃特申懇悃倍所歎嘉既無慮扵觸藩勉致功扵荷箠使廻附此不具盧傳報盧傳殿中監裴尚書将到洪州武寧縣人吏百姓及僧道䓁状舉論傅前後戰敵賊徒保全縣邑功績一十五件細覧事實慰愜滿懐傳不云乎公侯子孫必復其始傳能資餘慶無怠聿修自值危時便揚壮莭一呼義旅四討兇徒兄弟二人義聲俱唱遂得疲甿獲賴廉使見知始提百里之權尋假六條之寄忠誠所至寵命非遥勉慎始終穏圖富貴所希薦舉必不弭忘悉之戴盧報戴慮殿中監裴尚書經過彼縣日得百姓僧道䓁状舉論慮自乾符五年主鎮兼知縣事課績一十三件事皆摭實情切舉能詞理燦然良増慰愜盧竭誠報國傾産妄家糺集義軍訓齊宗族撫寧羸瘵捕襲寇戎六年于茲一邑獲賴有功不伐唯善是從遂領縣曺永安郷黨古者田稱續命邑號義興求之扵盧未足多也既増嘉歎不忘薦論勉保忠誠終邀羙命悉之光州王緒報王緒天不容好人唯助順苟違至理必亂常刑知緒昨因顔璋乆蔵禍心果致衆怒璋既誅􅓍緒乃奔逃何不束手戎塲投身義域而敢更謀嘯聚尚恣喧張自招相䑕之譏莫識牽羊之禮未知爾意終欲奚爲此乃先恵後誅武經所重好生惡殺王化斯行豁開誘善之門俾躡歸仁之路遂加誨諭試問端倪速仰割指本情指陳他望待詳来状即與指麾禮云志不可滿傳曰惡不可長緒之今日其意若何勿驅齊甿枉入罪網秋冷切好将息莭級各與慰問悉之椘州營田判官綦毋蘋報綦毋評事夫欲均調兵食固須妙選公才供億既多料量非易評事自匡郡政甚洽物情剸割而案無滯詞淬磨而茟有餘刃今委兼判順國軍粮料舉牒同封寄徃孔聖猶爲委吏蕭何亦作功曺唯託幹能無辭猥屑欲令小人懐恵佇㸔君子勞心悉之鄆州耿元審報耿元審古来名将多是耿家恭賈秉弇徽音相繼永言苗裔固贍機謀元審雖名異䨥聲而志能獨立佇申忠勇别竢恩榮况逢危難之秋實建勲業名望勞之日勉存終始慎守行蔵其他並令樊谷面述今寄衣一副烏觜茶二斤到冝一一領之秋􅋽切好将息悉之海陵鎮髙霸報髙霸得進奏院状報知轉授右散騎常侍永言欣愜霈然滿懐昔周盤龍破膚有功繼霑爵賞齊世祖戲之曰卿着貂蟬何如兠䥐對曰此貂蟬乃自兠䥐中出耳當時以爲名對前史標之羙談今此官榮實彰君寵唯在􅌹勤戍遏固守邊陲更俟大来永揚忠莭知之淮口李質報李質得進奏院状報知質轉授右衛大将軍且自數年君恩溥合官榮職賞可謂均沾然而成功可爲受爵無愧者屈指而數能復㡬人唯質乆戍淮壖逺防冦孽勤勞冣至品秩尚卑今授大将軍之名乃滿烈丈夫之望更宜慎守無慮湮沉慰愜歎嘉不離懐抱遣此不具云云桂苑茟耕集卷之十二
