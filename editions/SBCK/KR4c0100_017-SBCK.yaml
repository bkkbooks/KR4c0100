front:
  text: 桂􅁐茟耕集卷之十七
  hash: sha256:cbe818d29e2560ec9a5eeee7f0b0e9a43bb7b286456f50f84aaf62301502ee24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_017-1a}
body:
  text: 初投獻大尉啓再獻啓謝生料状獻詩啓詩三十首謝職状謝借宅状出師後告辭状謝令􅀙軍状謝借舫子状謝許奏薦状初投獻大尉啓某啓伏以嶽之髙與海之深物􅀁歸而人􅀁仰逈㧞千仞平吞百川其如巘􅔌擎天波瀾蘸日豁四方之眼醒萬族之魂是宇内之􅀁歌謡匪毫端之􅀎賛詠伏惟司徒相公獨抱神略一匡聖朝譽洽扵良㢤康㢤名標扵可乆可大龔黄徳政則郡民有遺愛之碑韓白功勲則􅀦史有􅈂書之茟况某劣同窺豹淺比傾螺難将􅂐刻之詞輒頌陶鎔之業但以間生賢哲年當五百之期廣集英豪客滿三千之數既納之似水則来者如雲斯乃司徒相公鏡扵心而寛􅀆綽􅀆枰扵事而無偏無黨網羅雋彦籠罩驍雄扵儒則沈謝呈才扵武則闗張效力遂使弓旌招􅀮士巖谷為之一空介冑降叛夫烟塵為之四息豈獨分憂扵閫外實惟稱慶扵寰中莫不信齊扵春夏秋冬恩播扵東西南北但日月照臨之􅀁是風雷變化之時然則尼父堂中亦有他郷之子孟甞門下寧無逺地之人片善可稱前賢不讓永􅀎執大􅀖之政豈欲遺小􅀦之賔是以敢寫㣲􅂨輕投朗鍳某新羅人也身也賤性也愚才不雄學不贍雖形骸則鄙年齒未衰自十二則别雞林至二十得遷鸎谷方接青襟之侣旋􅀙黄綬之宫既忝登龍敢言絆􅂹今者乍離一尉欲應三篇更􅂅進􅁱且謀退縮獨依林藪再閲丘墳課日攻詩虞訥之詆訶無避積年著賦陸機之哂咲何慙俟其敦閱致功琢磨成器求魚道在垂竿而不挂曲鉤射鵠心􅌹撚筈而兾䘖後鏃端操勁莭佇望良時窃見萬物投誠八紘嚮徳不謁相公賔閤不逰相公徳門者詞人之􅀁懐慙羣議之􅀁發誚某固敢􅈥肝瀝瞻進牘抽毫不避嚴誅輒申素懇謹録􅀁葉雜篇章五軸兼陳情七言長句詩一百篇齋沐上獻冒犯尊威不任戰懼之至謹啓再獻啓某啓某今月五日謹以􅀁學篇章五通貢于賔次雖慙獻豕輒覬攀龍脩客路以心摧望仁風以目㫁乍覩秦雲之態􅂉似羙人細㸔燕石之姿􅂲爲棄物伏蒙司徒相公光逾愛日煦及寒􅁅念以逺别海隅乆沉江徼特垂豐餼俾濟朝飢自驚樗櫟之材已荷稲􅆝之恵雖􅀛魚投水驟喜命蘇而蚤蝨負山深憂力敗且某也兔絲雖絡蛛網自營萬計尋思不如學也百年勤苦猶恐失之􅀁以未竸宦塗但遵儒道噬仕而懶趨塵土卜居而貪憶林泉人間之要路通津眼無開䖏物外之青山緑水夢有歸時􅀁􅂅更淬鈆刀終求鐡印歛跡而跧蔵學藪安身而跌宕詞林甞誦古詩還符此意云志士惜日短愁人知夜長某既懐志士之勤又抱愁人之苦聊慿毫牘敢述肺肝且如蹋壁􅄀搜杜門寂坐席冷而窓風擺雪茟乾而硯水成氷欲為尼父之絶編無奈羲和之促轡即可知指萬卷之經史恨三冬之景光及其凍枕傷神􅀌燈伴影寒漏則滴殘别淚遥碪則搗破羈心空勞寗戚之悲歌莫􅁇陸機之安寢亦可想貯千端之欎邑過五夜之寂寥然則志士之勤也既如彼愁人之苦也又如此况某家遥日􅏾路隔天池投客舎而方甚死讎指何門而欲安生計唯慮道之将廢豈言人不易知不敢以陋質凡姿覲相公清嚴之徳不敢以片言隻字希相公採録之恩􅀁望者􅂉以其萬里地逺来十餘年苦學稍垂惻憫得濟困窮則必堅背水之心終爲勇士决移山之志不讓愚公伏以某譯殊方之語言學聖代之章句舞態則難爲短袖辯詞則未比長裾舌無三寸之􅀎空緘壮氣膓有九回之懇但戀深恩干浼尊嚴下情無任感戴兢惶涕泗之至謹啓謝生料状某啓某昨日伏蒙仁􅄌再賜生料恩垂望外喜集愁中安貧而已贍晨炊感徳而惟知宿飽遂使范家釡甑免恨長閑顔巷單瓢倍加其樂伏以某雖楊曽穿䈎而蓬且㫁根空把利錐兾遇大賢之鑑豈将長鋏先興下客之歌一昨輒貢蕪音累塵尊聴窺徳宇而燕雖相賀望威風而鷁恐退飛豈料司空相公俯念海人乆爲塵吏特垂記録􅁇賜沾濡生前之溝􅐿無虞飢寒雖濟頭上之丘山漸重負戴難勝依投而既􅀋窮猿展效而􅂅同病雀下情無任云云獻詩啓某啓某窃覧同年顧雲校書獻相公長啓一首短歌十篇學􅂀則鯨噴海濤詞鋒則劒􅀝雲漢僃爲賛頌永可流􅀓如某者跡自外方藝唯下品雖儒宫慕善毎甞窺顔冉之墻而茟陣争雄未得摩曺劉之壘但以幸逰樂􅀦獲覩仁風乆貯懇誠兾伸歌詠輒獻紀徳絶句詩三十首謹封如别㝎王拙舞適足自嫌嫫母濃粧轉爲人咲不􅁕賛􅀭休烈翻憂浼黷尊威然聖人以􅈭勸誠深不間互郷童子學者以揣摩志切皆投鬼谷先生伏惟特恕荒蕪俯垂采覧􅀁兾趨仁化扵江北終得􅀓羙譚扵海東唐突藻鍳下情無任戰慄之至謹啓七言記徳詩三十首謹獻司徒相公兵機一惟将志業練春秋早蓄雄心剗􅀦讐二十年來天下事漢皇髙枕􅀝留侯茟法見􅀃書䆫暫卧龍神􅀓妙訣助竒鋒也知外􅀦人争學惟恨無因乞手蹤南朝蕭子雲善書百濟使人求手蹤以爲􅀦寳性箴波澄性海見深源理究希夷闢道門詞翰好􅀓􅀟羙跡何須更冩五千言雪詠五色毫編六出花三冬吟徹四方誇始知絶句勝聯句從此芳名掩謝家射鵰􅀎将一箭落䨥鵰萬里胡塵當日銷永使威名振沙漠犬戎無復吠唐尭安化班茟由來不暗投旋驅㷱隼待封侯郡名安化􅀎宣化更指河湟地欲􅀵練兵隴水聲秋塞草閑霍将軍暫入長安太平天子憐才略曽請陳兵盡日㸔磻溪刻石書蹤妙入神一廻窺覧一廻新况􅀎早遂王師業桃李終成萬代春伏覩相公磻溪詩云及到王師身已老不知辛苦為何又又􅀴虢縣詩云手栽桃李十餘春今日經過重建勲射虎鉅牙鉤瓜礙王程一箭摧班四海驚白額前驅姜膽碎方知破石是虗聲秦城逺提龍劒鎮龍庭外户從茲永罷扄掃盡邉塵更無事暮天寒角醉吟聴生祠古来難化是蠻夷交趾何人得去思萬代聖朝青史上獨􅀓溪洞立生祠射鞭休􅀃㦸枝非易中莫言楊葉是難穿須㸔立莭沙塲上永得安邉爲射鞭安南西戎始㝎南蠻起都護􅀎摧驃信威萬里封疆萬户口一麾風雨盡􅀵歸天威徑鑿㫁龍門猶勞身擘分華嶽徒稱神如何劈開海山道坐令八􅀦爭來賔岝口徑濟物􅀎廻造化心驅山偃海立功深安南眞得安南界從此蠻兵不敢侵􅀵城碑功業已標征北賦威名初建鎮南碑終知不朽齊銅柱况是儒宗綴色絲碑今度支裵僕射撰詞執金吾一陣風雷㝎八蠻来趨雲陛恱天顔王孫仕宦多榮貴心爲匡君不蹔閑天平海岱烟塵匝鄆城遥揮一劒落􅍴搶征旗不動降旗盡永使天平地亦平釣魚亭錦筵花下飛鸚鵡羅袖風前唱鷓鴣占得仙家詩酒興閑吟烟月憶蓬壷伏覩相公在鄆州詩云酒滿金舡花滿枝􅀟城齊唱鷓鴣詞又釣魚亭詩云水􅇥魚難釣風吹栁易低相印早􅀃休徴應佩刀台星光接将星髙欲迎霖雨歸龍闕看滅妖氛展豹韜西川逺持龍斾活􅀛城威懾蒙王永罷兵應笑欒巴噀盃酒雨師風伯自歸行平蠻卭峽闗東蠻塵絶平夷鎮扼蠻地裂又築羅城變錦城蠻兵永滅功不滅築城一心􅀎感衆心齊鐵甕髙吞劒閣低多上散花樓上望江山供盡好詩題荆南虎吼龍驤出峽来福星才照陣雲開遥思屈宋忠魂在應向風前奠一杯􅈇運濟川已展爲舟葉煮海終成富􅀦功􅀎與吾君緩宵旰爲資心計四方通浙西九江賊膽望風摧萬户愁眉向日開椘舞呉歌一何樂相逢相賀相公來降冦唯将徳化欲銷兵長笑長平恣意坑更想太丘行小恵何如言下濟羣生淮南八郡榮超陶太尉三邉静掩霍嫖姚玉皇終日留金􅂦應待淮王手自調劒南荆南淮南乃天下名鎮相公累移莭制西戎南蠻東鄙賊起相公皆自討除朝上清齊心不倦自朝真豈爲修仙欲濟人天上香風吹椘澤江南江北鎮成春陳情俗眼難窺氷雪姿終朝共詠小山詞此身依托同雞犬他日昇天莫棄遺謝職状右某今月二十五日伏奉公牒特賜署充館驛廵官者㤙降台階光生旅舎承命而吟魂乍懾叨榮而病骨􅀎蘇攀依有心荷戴無力伏以某樗生曠野莠託荒田豈惟良匠不窺抑亦農人見棄風欹弱植難舉􅀔扵􅇒雲塵織纎莖但懐愁扵委地昨者不慙狷者輒效狂生累貢巴詞仰瀆秦鍳伏惟司徒相公念以来􅀙異􅏾逺寓樂郊俯愛似龍不嫌非鳳㧞衰英扵糞上搜滯刃扵獄中許厠嘉賔仍沾厚俸神仙見顧稍親郭隗之㙜駑蹇何施得主鄭荘之驛况乃念子襟之志業辱華衮之褒詞刻􅀞㤙深已􅀎長價琢磨志切終􅂅成功修身則飲水懐氷錬思則吟烟嘨露唯當勵莭以謂報恩謹詣衙門祗候陳謝下情無任感􅈭彷徨榮懼之至謹状謝借宅状右某昨日客司奉􅀓䖏分借賜官宅安下者仰聆尊㫖俯省庸才既榮投跡之有門唯恨殺身之無路伏以某自趨龍斾免泣牛衣職奉非輕書糧頗贍甞讀魯論語曰學而􅄖則仕仕而優則學是以望東開之閤永誓依仁坐北面之􅙘唯期􅀠葉非敢􅀮居而不嫁秪将􅈂道而自媒今者幸寓樂郊况栖静室簦屩則不勞渉逺簞瓢則永遂安貧豈謂愛閑誠堪養勇三年就學非慕藺之心一日成功􅂅滿依劉之志下情無任感㤙激切兢惕之至謹詣衙門祗􅀱陳謝謹状出師後告辭状右某伏念來􅀙異􅏾託在徳門昔曽名列桂科未知稱意今忝職居蓮府始􅁴榮身㤙既厚扵稻􅆝跡􅀎安扵萍梗日増學植月瞻書糧豈期市駿之金􅅖沾駑騫唯愧封侯之印未效禎祥今者屬以大憝逋誅中朝多難頃煩豹略佇滅􅉘聲伏惟太尉相公身耀福星均臨庻􅀋手傾霖雨遍洗妖氛逺命舟師重興國祚華夷則望風競抃蠢植則剋日當蘇若某者空有肺膓方重禱祝恨無羽翼一遂􅁬飛望龍莭以魂銷窺虎威而股慄雖則熊羆之力共喜安人其如犬馬之心常増戀主一情無任攀依􅈭切涕泣之至謹状謝令從軍状右某適見客司俸􅀓䖏分令借舟舡随􅀙行李者深㤙既降壮氣潜伸勵心而􅂅效驅馳感徳而難勝踊躍伏以某塵中走吏海外腐儒五􅀎非自濟之資一割無可施之䖏唯増慷慨已分沉淪豈無投筆之心時應未偶空有請纓之志力且難成誰謂忽被殊私不遺賤跡許随旋斾借賜舟航蹇􅁕無堪敢望維駒之念麽姿何幸遽叨泛鷁之榮况當泣路之時永荷濟川之賜下情無任感戴欣躍兢惕之至謹状謝借舫子状客司奉􅀓䖏分借賜舫子安下者某方脫窮鱗得攀画自慙跡在塵吏忽訝身爲水仙則彼甘寧割錦䌫而呈奢顧愷毀布帆而無恙豈若榮栖徳宇又泛仙舟風波無失􅀁之憂烟月有搜吟之暇况清流滿望暑氣銷威每當㝎志安神則乃銘肌刻骨謹課七言長句詩一首齋沐上獻干瀆台堦下情無任荷戴兢惕之至謹状謝許奏薦状右某昨日見衙前兵馬使曠師禮奉􅀓處分特賜慰問兼許奏薦令自修状夲來者俯慙蓬跡仰聴蘭言喜抃而身䡖欲飛兢惶而心戰難遏何者某職叨鄭驛已謂極榮名逹尭階實爲過望慿何展效佩此恩光况乃朗鑑氷開英才霧集􅀁宜倒屣則先迎玉粲築䑓則次接劇辛如某者輟耕海上之田來泣塵中之路雖云游學尚未成功豈料勤勞莫副於指蹤将念已全扵卵翼許令伐善将使警愚毎思郄子之驟稱深慙速􅉪欲效黄公之多讓又恐失時兾緝拙詞仰遵嚴命南宫适之問宣父實有􅀁歸東方朔之對漢皇寧辭自責旣忝風雷之變化佇期雨露之沾濡下情無任感戴榮抃兢灼之至謹奉状陳謝謹状桂􅁐茟耕集卷之十七
