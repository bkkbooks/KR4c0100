front:
  text: 桂􅁐茟耕集卷之六堂狀十首
  hash: sha256:b47c8c2369344a1b8030c2debddb137e8499cc04a2056031d36af3ff4ae4269e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_006-1a}
body:
  text: 都統廵官侍御史内供奉崔致逺撰賀入蛮使迴狀賀殺黄巢賊徒狀賀􅀵復京城狀賀月蝕徳音狀賀内宴仍給百官料錢狀請降詔㫖指喻兩浙狀謝加侍中兼實封狀謝落諸道􅐭鐡使加侍中兼實封狀謝弟柷再除綿州狀請轉官從事狀賀入蠻使􅂞狀右臣得進奏院狀報入南蠻通和使劉光􅁉等迴雲南通和兼進獻國信金銀器物疋段香藥信馬等漢使􅀓詔則星迴象林􅂪王奉琛則雲集龍闕􅀎舉覊縻之術果悛倔強之心若非聖上徳叶棄瑕化敷柔逺則何以感鐻耳鏤身之衆啓隳肝瀝膽之誠彼越雉呈祥未爲盛觀旅􅋙入貢徒見良箴􅂚若正在艱時􅀎安獷俗使雲南酋長再遵奉贄之儀天下賢良免獻征蛮之䇿斯皆相公魏絳陳利王商振威巳令六詔歸投即使八綋清謐某比者南尋銅柱西鎮劒關曽施上将之謀免辱大君之命令則逺聆盛事倍切歡心陳賀未由無任欣抃云云賀殺黄巢賊徒狀右得進奏院狀報㝎難軍拓䟦相公保大軍東方逵尚書奏於冝君縣南殺􅓍賊徒并生擒賊将又鳯翔李相公奏探知京中賊徒潰散六月十三日聖上御宣政殿排仗受賀者􅀼以逆賊黃巢稔􅁖旣多就刑非乆敢駈烏合之衆屢拒鷹􅀭之師拓䟦相公東方尚書或力微裔孫或曼倩餘慶皆申秘略共彌兖徒􅀎順天誅遂陳月捷軍名㝎難雅稱開張之聲縣號冝君克符堯舜之德是以聖上高臨紫極逺耀皇威睹百辟之歡呼雷驚蜀國想六師之勇戰電掃秦川即當静滅氛䨪永見均施渥澤此皆相公調鼎中之味運堂上之兵右援抱而得㓛左執律而至獻勲㓛相継􅁛慶何窮某乆阻淮夷尚淹海徼逺聆捷語但切歡聲然必願劒拂狼星旗迎聖日終継張飛之拒俊不慙聶叔之致師限守戎藩末由陳賀下情無任踴躍之至謹奉狀陳賀謹録狀上賀􅀵復京城狀右得河中莭度使王司空牒報四月十日當道與鴈門莭度使李㒒射及都監楊驃􅀐下諸道馬軍齊入京城與賊軍交戰約殺賊歩軍一萬餘人其馬軍賊便走出城黄巢亦未知存亡其逃遁賊徒尋差兵馬追奔並已􅀵復京闕訖者伏以逆賊黄巢蔵姦匿暴􅁖積禍盈乆扵輦下偷生固是檻中待死楊驃􅀐受聖君之重􅀉李僕射傳飛将之雄名旣無慮於二心果有成於一力想其霜鋒電擊月羽風駈壓雀􅆑之威髙燎鴻毛之􅀔猛遂使賊巢困不􅀎闘亂無􅀁歸雖爲漏網之鱗巳是傷弓之翼則期加顯􅓍永掃群􅇯加以熊㩀六宫豕豗九陌今兹克復免致焚燒佇望翠華便歸丹闕稍豁上天之怒實除下􅁟之灾此皆相公静運廟謀逺􅀭戎略旣叶一匡之妙道北極何憂􅀅流萬古之羙談東封可俟某登壇有忝仗銊無㓛逺聴歡聲始除慙色限拘守鎮陳賀未由下情無任抃躍之至謹録狀上賀月蝕徳音狀右伏見六月二十六日徳音以太隂薄蝕曲赦三川管内囚徒及委諸鎮􅀵拾埋瘞京畿四靣􅁀露骸骨者伏以金精􅀮耀玉扆垂仁荅天誡以震驚省風謡而欽恤圎扉宥罪掃彗銷􅁈近鄙北齊號御囚而肆虐逺遵西伯􅁙枯骨以施恩蜀山之草木先春􅁗甸之煙塵永息此皆相公㓛成爕理道洽變通助日月之光輝振雲雷之號令八方翹首萬彚歡心某跡繋戎旃心馳台室阻隨班列莫遂歡呼下情無任抃躍之至謹奉狀陳賀謹録狀上賀内宴仍給百官料錢狀右得進奏院狀報七月一日於内殿宴百官仍令度支各給三箇月料錢并奉勑㫖迴駕之日應㳂路州縣切不得輙進歌樂及屠殺者伏以聖上継周匡業避狄興憂自幸成都彌資儉徳守玄元之三寳達舜帝之四聦徹彼珎肴掛其素服言唯罪巳事不勞人今者巳復上京􅀅迴大駕致栢梁之高宴盡醉千鍾鄙鍊布之乏財均頒九府然後継飛綸翰仍命繡衣制郡邑之嚴科莭道途之浮費既施令於好生􅁖殺亦停歡於八列九成王化斯行物情皆泰此皆相公手擕多士躬賀聖君鴛行賦在鎬之章鳯藻詠濟汾之樂一時盛事萬代羙談某限守藩條阻攀仙仗心馳蜀棧目断堯樽下情無任抃躍之至謹奉狀陳賀謹録狀上請降詔㫖指喻兩浙狀右先淮浙西周相公牒杭州與浙東兵士闘敵某遂具事由申奏請降詔書速令戢歛伏奉二月二十日詔㫖已詔兩浙務在叶和者某當時俻録王言各移公牒訖兼先差人賫書牒與劉漢宏尚書詰彼起戎之本諭其継好之䂓今得迴書其言不譲唯稱周相公與董昌苟恃􅃂榮妄行威福虐侵近境阻截通津况有不同國之讎嫌又夫無藴年之誓約必想見豺而戰猶􅀎首䑕幸生已决加兵終期釋憾然則此無和氣彼有闘心甞膽者結㤪既深抉眼者遺言可驗必恐以吴與越終當有越無吴實所謂夫差之麋鹿興譏范蠡之黿鼉得便唯憂黎庻枉見殺傷輙􅄪具狀奏陳請更飛詔止遏某徒圎鑿方枘避柱觸楹累陳高鳯之詞莫觧子都之怒且讎因手足疾在腹心争㓛而行蔵相時豈無懐愧而又積山煑海􅀲剖豆分莫成贍國之權徒􅀼經􅀖之位唯甘廢棄永見沈淪敢期渥澤之無私俯念㳙埃之有效許登玉署高戴金璫仍忝真封式加懋賞且如講􅀎奪席諌切引􅅂方升鵉渚之榮俾稱鳯池之望豈伊孱劣􅀁可貪叨此皆相公仰賛萬機俯安九牧無使怨乎不以􅀎令可者與之唯當三命益恭一辞無退入則撫安疆圉出則誓掃氛雺佇成滅㓂之㓛兾續曠官之責戎鎮有限不􅀗陳謝下情無任感恩兢懼之至謹奉狀陳謝謹録狀上謝落諸道監鐵使加侍中兼實封狀右某伏奉去年十一月十一日㤙制加授侍中並餘如故仍加食實封一百户落諸道鹽鐡使者伏以君親委任固􅀎捨短從長臣子忠勤唯願從微至著某一司搉課六暄凉正逢多事之秋莫展牢籠之用况自頻更綂師别致租庸既當狐譲千皮實見羊分九牧贍軍冨國固絶籌謀熬海鎔山幾隳條貫今者聖上恕其不逮察以無私将漢法之重權委儒流之妙術豈料更留宸慮猶念戎勲許登􅀒璽之班資不替擁旄之􅃂􅀉尚假極品重增實封當主憂臣辱之時若斯榮盛審福過灾生之理何以遑安此皆相公曲庇庸虚全忘僣忝俾息躬於負重當銳志於専征寕無淬礪之㓛仰荅陶鈞之賜此外以榮爲懼至末如初下情無任感戴兢惕之至謹奉狀陳謝云云謝弟柷再除綿州狀右件官是某堂弟今得進奏院狀報奉某月某日恩制除金吾将軍􅀍本州官吏衆狀舉留續准􅃙㫖依前充綿州刺史某甞讀後漢書見㓂恂爲頴川守後拜金吾從上經過頴川郡人􅃒道願借㓂君乃留一年以慰百姓此實國家殊􅃂郡邑羙譚萬代之来一人而已誰知盛事得屬鄙宗安貧恤􅀌頴川之政化雖乏出官入仕子翼之官資略同感深而喜作悲端效淺而榮爲懼本伏以高柷粗閑吏術忝荷君恩分憂而地壓劒􅄏理俗而塵銷鈴閣今者􅂊升緹綺却擁朱輪謂施撫葺之􅀎特徇衆多之請此皆相公愛忘其短仁及於㣲仰賛帝俞俯從群願某唯知提訓俾慎揣摩同驅軾下之熊但期静理雖睹堂前之鷰免恨分飛限守戎藩末由陳賀云云請轉官從事狀某官薛礪右件官閔損登科良由徳行陳琳從職實假詞華林幽而轉識芝蘭木落而方知松桂深敦操尚夙著榦􅀎逺叨分閫之榮唯籍運籌之妙伏請轉官仍改章服轉充觀察判官某官鄭俶右件官早登上苐乆佐大藩􅀎修檢慎之䂓毎助撫綏之政賔筵所重健筆為先伏請轉官仍賜章服轉充莭度掌書記某官顧雲前件官東筠孕羙南桂抽芳曵謝眺之長􅅂􅀙衛青之軍幕五羖皮之為重豈謂虗譚百鷙鳥之不如方知實事良資妙畫共展壯圖伏請轉官仍賜章服充觀察攴使以前件狀如前伏以某逺率舟師誓除國賊征㠶則雲掛行色戰皷則雷含殺聲留務既繁良籌是托或􅀝幕中之婉婉或求馬上之翩翩輙具薦論仰希甄奨不拘月限别覬天恩伏惟相公庇護戎藩激掦賔席稍超常例特受清資略假􅃳於丹青許分榮於朱紫所異元戎十乗速成討罰之㓛越府三才各得施張之䖏巳具狀申奏訖云云桂􅁐茟耕集卷之六
