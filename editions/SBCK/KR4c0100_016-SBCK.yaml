front:
  text: 桂􅁐茟耕集卷之十六􅀕文書䟽記十首
  hash: sha256:1cab09d35323d410e97a065992db5c3b82a2c8a5b82b2fe856504ceeed26eb67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_016-1a}
body:
  text: 都統廵官侍䘖史内供奉崔致逺撰􅀕文四首􅀕五方文築羊馬城􅀕土地文􅀕椘州陣亡将士文寒食􅀕陣云将士文書二首移浙西陳司徒廟書手札一首記二首西州羅城圖記補安南録異圖記䟽一首求化修大雲寺䟽求化修諸道觀䟽􅀕五方文年月日具䘖某謹以清酌庻羞量幣之奠敢昭告于五方神之靈􅀓不云乎五行之官是謂五官封爲上公祀爲貴神社稷五祀是尊是奉木正曰勾芒火正曰祝融金正曰蓐收水正曰玄㝠土正曰后土是以禮云共公氏之覇九州也其子曰后土􅀎平九州故祀以為社然則神主順天靈功莫測諸侯列土祀典宜行惟夫人寔統隂祗廣含坤徳身為萬物之母首冠五方之君職奉軒皇功標社殷湯罷改遷之議漢武陳祠􅀕之誠是知神鑑則無偏無頗物情則以享以祀昔平九土旣􅀎䟽决江河今處五方豈不庇安淮海靈其調和扵金木水火驅役扵風雨雪霜使春夏秋冬永息灾殃之氣東西南北静除氛祲之源牢幣具陳庻羞甚㓗致敬不􅉛扵中霤施恩􅄑滿扵大藩唯候豐穰兾神報塞尚饗築羊馬城􅀕土地文年月日具䘖某以兵戎未息禦僃是勤乃命修築羊馬城遂遣某官某乙告于土地之神曰夫城郭之設邑居􅀁慿陋之則狡者􅂉羙之則寡􅀎固守况今豺聲竸􅀤虺毒遍吹易動難安何䖏􅀎爲樂境暫勞永泰此時須建良功遂乃揣髙卑議逺近使令百堵皆作終可三旬而成徴名扵伏櫪觸楹接􅀔扵長雲㫁岸不假􅀛行之跡豈須龍見之期衆既呌心事無費力神其徳惟博載道實流謙勿辭板築之喧勉致金湯之固使雲鍬雷杵逺振歡聲烏堞隼墉髙標壮觀北吞淮月南吸江烟平欺鐡甕之名逈壓金甌之記有僃無患神其聴之􅀕椘州陣亡将士爾䓁尺籍􅀙軍才心報􅀦羔裘武􅎖既以力稱馬革雄圖早将身許爰有徐孽來侵椘封㫪喉之壮氣未申失手之􅁈聲遽起始見荷戈就列翻爲復矢成行然而功其可稱死且不朽有狼瞫之君子無羊斟之小人昔時之重義􅁿生不求苟活今日之名存身䘮豈貯遺悲魂其有知各歆薄酹寒食􅀕陣亡将士嗚呼生也有涯古今􅀁歎名之不朽忠義為先爾等彍弩勞身蒙輪逞力􅁬氣扵㷱羆之列忘形扵鵝鸛之前􅀎衍勇扵干戈固免慙扵牀第今也野草緑色林鸎好音杳杳逝川空流恨而無極纍纍荒塜誰驗魏之有知我􅀁念􅀆舊功勞我􅀁傷􅀆好時莭俾陳薄酹用慰􅄀逰共謀抗敵扵杜回無效懐歸扵温序􅀎成壮志是謂隂功移浙西陳司徒廟書滔滔逝水幽顯雖殊凛凛雄風古今何譲苟􅂉同心立事必􅀎異代論交司徒壮莭竒功僃載外孫之碣靈恩顯驗髙􅀓太伯之郷譚揚而不假再三徴引而難窮萬一今則兾動玄鍳􅈂書素誠既當可舉而行固在不言而信且此誓除􅀦難齊命舟師将泛西江即離北岸練鋪一水指疆界以雖分黛列千山望威靈而如在今扵􅁦境已立嚴祠敬迓來儀廼酬前􅂅幸移玉趾無戀石頭桂檝蘭檣早决遷居之計鸞絲鳳管佇申迎奉之儀况乃近境無虞芳筵不絶但得禍淫福善何妨捨舊􅀙新北渚烟花休起别􅄐之恨東塘風月好追歌舞之歡必􅀎依統帥指揮永可振司徒勲業特差􅌹介用啓至誠昔之青骨標竒已謂隂陽不測今也赤眉稔惡豈宜征戰無功将申烈烈之威實假􅄀􅄀之助􅀁兾八公山上遍設雄師五里霧中􅀎呈異術則必隂子春之破賊呉大帝之封王共立功名若合符契無誤㑹稽之軍僃有慙即墨之神謀早詳禴祭之言永副里仁之義某白手札風烟雖邇雲霧難披景仰靈威遥申誠􅂅今已静搜勝地髙創夀宫永可安居謹令咨迓便請挈家速至􅌹當掃席相迎且鐡甕城低金􅁜地狹􅀎施百福無滯一方此欲劒拂妖星旗迎聖日必期大捷永致中興幸其來助隂兵共成玉事目極東流之雪浪心馳北頋之煙峰神􅀆移来哀江南某白西川羅城圖記西川羅城四仞髙三㝷濶周三十三里乃今淮海太尉燕公􅀁築也粤若梁州别壞蜀􅀦雄都内跨犍䍧外聮蠻蜑左臨百濮右挾六戎咽喉之控引寔䌓唇齒之輔依難保自昔鼈靈流異􅀛跡標竒藩籬始建其一城扄鐍猶􅉛扵四郭莒子則旣忘重閉衛人則唯慮徒居蠢彼狗封恣其狼戾毎至草乾􅈎道浪縮瀘河則必推紒横侵撥羣驅隊編甿懾竄巷􅂘街號戎兵以㧞斾爲中權府尹以閉闗爲上䇿稔成氛祲積有􅀊時洎乾符初偶絶覊縻大興叛換白虎之狂災漸盛黄龍之舊約難㝷兵力莫申帝心有􅀉以公慶􅀓漝夢業練圯書交趾銘勲則永威八詔鄆城報政則不待三年屬蠻寇加囂王師告老遂飛􅇥詔請救倒懸由是自東徂西以晝􅁇夜走單車扵外境豈煩龔逐獻書受戎輅扵中塗掩􅀳侯稱伯公鄆行次咸陽除投西川莭制䘖睿略倐逹成都于時驃信屯兵逼郊隊而纔踰一舎黔􅀺失葉焚里閭而何啻萬家彼則舉􅀦而濟師此則闐城而受􅁦外熾崑岡之熖噀酒無􅀎内枯䟽勒之源指梅何益莫非枕􅀝墻壁誰堪擐執甲兵公至止之日豁啓城扉若開籠檻威振而寧勞利器邪膽皆摧化行而如嗅新香驚魂盡返蠻王以據耳飽聆其異略鏤膚畏挂扵嚴誅恟然觀電懼雷歘爾烏飛魚散公㝷令選銳暫使追逃乗其垂翅之時展我燎毛之􅀔數俘莫記執馘居多爾後因閱地圖得搜天險是猿狖養髙之窟爲􅉘狼伺􅂩之蹊乃令一剏雄闗一摽巨防修功峽関置平夷鎮蠻賊要路固守無虞危堞則慿蠻助峻長溝則噵澗資深宛成善閉之機實扼間行之徑丸泥可固㫁知無得而踰爟火罷驚坐見不争而勝仍尋水道别建河營大渡河側置防河營逺方猾夏之徒難謀航葦均􅀤戍申之䘚免詠流薪疆陲永保扵覆盂􅌀閈唯矝扵列􅂦卿雲􅀖彦閑吟搜􅄍鳳之詞卓鄭郷豪静坐貯蹲䲭之利公以寢䖏戎閫夢想扁舟将申逺慮扵無窮豈立空言爲不朽乃曰彼蠻之習也外癡内􅃛朝四暯三雖荘叔此時功已成扵長狄而季孫他日憂必在扵顓􅁷詎可虗􅃅錦城尚無羅郭守民之制非我而誰啓抱而神欽至誠飛章而帝􅁢丹請時有賔進難将校獻疑皆云公孫􅄒躍馬雄臨非無意也諸􅁑亮卧龍崛起亦有志焉但以曩築子城猶資容土九年方就百代􅀁難蜀無土昔張儀築子城軰士扵學射山日􅃥徃返九載後始成况今将興廓落之基恐致遷延之誚公曰術先㝎事當速成必􅀎終簡天心豈謂虗穿地脉扵是郡侯奔告邑尹樂􅀙乃使揣髙卑議逺邇慮材用量事期採時􅀱扵魯書佚規模扵周令引長江而􅗇長塹夏禹慙􅀎對髙巘而劃髙墉秦皇失色矧乃命五丁而嘨侶運六甲以驅種天兵則謲水扵寒泉地媪則變沙爲美土蜀地穿未盈尺泉澷漲起至是土出沙中城缺如舊實謂百靈幽賛萬姓恱随􅓩聚雲鋒杵騰雷響不見烈風凌雨又令簋飽觴酣登登而只竸歡呼屹屹而便如湧出百堵皆作三旬而成然後郢匠勞功素材變質􅄖人展妙赬壞凝華攅空而烽櫓髙排架險而闉闍􅋍起横分八尺結雕甍而彩鳳聮飛檻徹四隅擁繡堞而晴虹􅈂挂􅇁一川之佳景籠萬户之歡聲逺而望焉則巍巍峩峩若雲中之疊嶂錦霞縠霧􅀮暎乎其上迫而察也則赫赫燡燡想海畔之仙山金㙜銀闕焜燿乎其間始自庀徒終扵解役不假朽緍扵官稅無資剖粒扵軍租築板􅀁費錢一百五十六貫米一十九萬石皆由智計不破上供皆聚羡財儼成壮觀遂使蠻酋裭魄賨旅歸心不敢言摩壘而旋無因致入郭之役爰徴繪事仰貢九重旋降綸言過褒一字宣睿㫖扵翰林才子綴妍辭扵黄絹外孫築城碑今庸王相公承㫖撰詞公雖迎金鳯䘖書未議石􅀛戴版盖乃謙冲自牧恥其功伐驟稱及蒼鳥髙飛翠華逺狩儼仙逰扵玉壘安聖慮扵金墉故得親覧宏䂓益欽忠莭特傳瑶檢徴進碑詞遂命雕鐫永揚威烈實萬古未聆之事乃四方無比之榮羙矣㢤龍以雲興魚因水樂誰不仰公智周物表事照機先凡施權謀若合符契則昔全蜀未城也天留盛績日待英才􅀁謂有非常之人然後有非常之事有非常之事然後有非常之功是以非常老固非常人之􅀁覬也致逺雖丘堂覩奥師冕何知而秦􅀦歛賢由余不棄謹成實録敢記殊庸􅀁兾四海柕航閱雄圖而稽䫙九州旄鉞望法駕而安心中和三年龍集癸卯八月二十五日記補安南録異圖記交趾四封圖經詳矣然而管多生䝤境邇諸蕃略採俚譚用摽方誌安南之爲府也廵屬一十二郡峰驩愛陸長郡諒武㝎武安蘇茂虞林羇縻五十八州府城東至南􅈚四百餘里有山横亘千里而遥遽穴深巖為䝤窟宅蠻蜑之衆六種星居鄰諸蕃二十一區管生䝤二十一軰水之西南則通闍婆大食之􅀦陸之西北則接女國烏蠻之路曽無亭堠莫審塗程跂􅂂者計日指期沉浮者占風㝎信二十一􅀦雞犬􅀓聲服食􅀁宜大較相􅀋管内生䝤多􅃅山蹄􅂉􅀍髪鏤身􅂉穿胸鑿齒詭音嘲􅑜姦態睢盱其中尤異者卧使頭飛飲扵鼻受豹皮褁體􅀛殻蔽形擣木絮而為裘䝤子多衣木皮熟擣有如纎纊編竹苫而作翅生飬則夫妻代患長成則父子争雄縦時有􅀓譯可通亦俗無乗蚕之業唯織􅄂彩挾布多披短襟交衫􅂉有不縫而衣不粒而食死䘮無服嫁娵不媒戰有排刀病無藥餌固恃險阻各稱酋豪逺自漢朝迄于隋季荐興邉患頗役遐征馬将軍標柱歸時寸分地界史摠管倒碑過後略静海隅洎咸通初驃信挻灾元戎䘮律䲭嘯扵跕鳶之地豕豗扵束馬之塗摧兇欲快扵摏喉拯溺唯思扵援手先帝以今淮海太尉燕公宣威大漠政洽上都時公防禦秦城剗平醜虜才歸輦下出鎮安南乃請出鎮龍編立身豹略剗彫題而卯碎活黔首以肌豐復壁壘扵一麾㧞封疆扵萬里有蠧皆削無􅁈不伸朱道古稔姦扵外杜存凌恣虐扵内皆爲安南巨患公乃誅滅無遺故禇令公遂良竄殁日南子孫雕零公時表洗雪然後使電母雷公鑿外􅏾朝天之路山靈水若偃大洋沃日之波安南􅀴岝口天威神功􅀁開播在逺邇遂得絶蠻課之北窺紆漢軍之南戍乃鳳􅀓徴鷁泛歸程至扵洞䝤海蠻莫不醉㤙飽義逺投聖闕請建生祠則知善政􅀁行殊方可誘既見馬如羊而不敢縦令蟻若象而何虞之以驗四夷之時􅂉不賔九牧之任不得􅀁也有柔逺軍􅀙事呉降甞集是圖名曰録異叙云乆觀遐蕃目擊殊形手題本事然則信以􅀓信斯焉取斯閱前詞退而嘆曰愚之􅀁以爲異者其諸異乎人之􅀁異曰六合之内何物則棄至如䑕肉萬斤蝦􅂡一丈既知南北􅀁産永釋古今之疑則彼獸性羣分鳥聲􅀋聚誠不􅁕異也頃太尉燕公受三頋㤙用六竒計使獷悍歸服邉陲晏然今聖上省方蒙王獻欵不敢㺯吠尭之口永􅀎除猾夏之心皆由燕公收交州鎮蜀郡威振扵犇魑走魅功成扵金壘湯池􅀁謂藴先見之􅀎察未来之事呼吸而隂陽不測指蹤而神鬼交馳實為天工人其代之斯實可為異矣聊􅀘􅀁闕敢貽将来時翠華幸蜀之三載也求化修大雲寺䟽大雲寺募縁求化重修建瓦木功價䓁詳夫教列為三佛居其一其如妙㫖則暗裨玄化㣲言則廣諭凡流開張勸善之門解摘執迷之網然則欲使衆心歸敬須令像設荘嚴有感必通無求不應墾情田而種福㳺法海而洶殃不可思議扵是乎在當州城西大雲寺雖臨椘甸實壓蜀岡舊創仁祠髙標兊位雨洗烟䆫之色萬朶前山風􅃻月砌之聲千株古木在一郡乃徧為勝境扵四時則最稱芳辰至如春水緑波雜花生􅀣都人士女以遨以遊不勞聴法之縁自得消憂之􅀁則與城東禪智寺䨥肩對􅋍両耳齊張夾煬帝之遺宫擁淮王之仙宅壮茲樂土􅀝彼福田前年偶值飛蝗未􅀎避境旋憂聚蟻􅂉欲毀堤故護軍特進以将隔妖氛忽興猛熖遂使瑠璃之界翻成煨燼之餘雖菩薩焚身固爲常事而苾篘住􅁕盡失安居可惜祗園便同􅂩地今幸遇太尉将驅衆旅佇滅羣兇既逃過去之􅂘􅂉􅀘未來之福欲安盛府許葺精廬欲使爐續朝香鍾迎夜梵􅀣宿獼猴之友林栖鸚鵡之王盖尋貞觀之中曽􅀓帝語豈效太清之末酷信伽譚􅀁􅂅廣運􅄌航徐搥法皷深資功徳静剗妖魔百官榮􅀙扵鸞旌萬乗遄歸扵象闕次􅂅太尉廓清寰宇髙坐廟堂演伽葉之眞宗龍堪比徳舉儒童之善敎麟不失時克興上古之風永致大同之化凡扵戴髮含齒鱗潜羽翔皆荷慈悲盡􅀎解脫但以一毛可㧞先求信義之心百􅁕不僵須頼扶持之力既難獨辦固託衆縁無吝羡財合資洪福富者不仁之􅀃自古􅀁譏積而􅀎散之䂓于今可誡謹䟽求化修諸道觀䟽􅂵極宫重修城下諸宫觀求化尾木䓁價伏以苦縣誕靈神州演法眞性乃聖朝之祖強名為至道之宗玉葉金柯耀芳隂扵萬代瑶函瓊笈􅀓妙㫖扵四方遂得齋醮有歸科儀無墜神宫靈宇宛寫諸天秘殿精壇嚴修勝地當州東呉麗俗南衮雄藩鮑叅軍則賦衒精妍􅀭執㦸則箴誇夭矯而乃至道少勤行者玄門無善閉之味澹口中動成大笑義深目外誰信上昇福庭則草没塵侵仙室則雨傾風壊况值梟聲竸噪虺毒強吹到䖏星飛但見羽書之􅇥經年霧集唯聆甲􅀐之勞俗既喧驚敎増寂黔未有葺修之暇非無捨施之縁今幸遇太尉徳􅁇猶龍道深有象黄石公之妙訣雅稱帝師赤松子之勝逰佇迎仙友是故出則以六竒制敵入則以九轉服勤静除閫外之烟塵閑對壷中之日月三元遵敬一氣精修果見眞位髙遷殊祥荐降彩雲片片飛来椘岫之風玄鶴䨥䨥唳向隋宫之月又乃前年則江冦南逼去􅀊則淮戎北侵蟻皆恃扵成羣虵欲矝扵結陣伏賴太尉雄威坐振衆孽奔亡四鄰戴信扵桓公八郡感恩扵邵父覩耕農之蔽野聴歌吹之沸天古人有言爲可為扵可為之時則可其城下宫觀今欲旋集良工増修舊址擬金室銀堂之制䖏䖏騰光俾星冠月帔之徒人人㓗跡㣲功若就良􅂅克伸龍圖早耀扵中興虎旅永摧其大盗次􅂅太尉運籌佐漢逈掩張良拊棹遊湖静追范蠡石留馬跡臺挂鳳音蓬島花開春醉而閑乗白鹿芝田雨過曉耕而長任青牛罷吟小桂之句獨邁大椿之夀然後仰􅀙翔翼俯至潛鱗凡曰含虗悉􅀎蒙福但以􅀁修宫觀荒摧既乆經費甚多無因獨辦資種唯仰衆成功徳迦譚之難捨􅀎捨猶見樂輸道教之自然而然幸無輕諾謹䟽桂􅁐茟耕集卷之十六
