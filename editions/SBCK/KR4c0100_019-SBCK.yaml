front:
  text: 桂􅁐筆耕集卷之十九状啓别􅁓雜書共卄首
  hash: sha256:81e7d2298d0ab6c7486e13452696e6d65dc0366dca0bb6a15fa936b159f93dc8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_019-1a}
body:
  text: 上座主尚書别􅁓賀除吏部侍郎别􅁓賀除禮部尚書别􅁓濟源别􅁓迎椘州行李别􅁓二首五月一日别􅁓謝降頋状與金部郎中别􅁓二首與客将書謝宋絢侍御書荅裴掘庻子書謝髙秘書示長歌書謝李琯状謝元郎中書謝周繁秀才以小山集見示與夀州張常侍書賀椘州張義府尚書與假牧書上座主尚書别􅁓不審近日尊體寢膳何似道惟滌慮徳以􅃳身􅆀五福之併臻迎百靈之􅀁薦伏惟莭宣無爽時望有歸某窃窺曩史之􅀓芳僃載達傄之晦跡䟽太􅀓登其祖帳僅渉沽名陶朱公泛彼栢舟未忘邀利豈若尚書中庸守志大􅀮存神表獨見之􅀎察未萌之事遂得髙楊素莭夙避危時到䖏煙塵不汚指鴻之目終年雲水􅀎怡夢蝶之心然而宸鍳屢回物情猶欎欲作山中宰相其如天下蒼生即期大駕還亰必赴上台虗位斯乃萬乗瞻矚四方禱祈某海燕含泥忝栖雲屋池蛟淂雨早脫塵塗感㤙自比扵互郷仰徳但思扵闕里唯􅂅泥沙賤質永資陶冶深㤙卑情不任攀戀䖍祝涕泣之至謹状賀除吏部侍郎某啓伏承榮膺􅃂命伏惟感慰張司空之一匡西􅀳則藻鍳無倫謝太傅之忽起東山則烝􅀺是念苟欲幽栖恱志獨處忘懐緘輝而恥耀秦㙜藴味而􅂴調殷􅂦則乃智者仁者止􅀓樂山水之名賢才俊才盡失脫塵泥之望羣情乆欎昊命遂行今者侍郎静揖巖扉高提銓管萬族仰濟通之譽一時進寒之徒致使􅀜中之冦孽灾消海内之英雄道泰近又窃聆風議仰測天心必謂文司再歸重徳然則任賢得地既叶五百年之期好學趨門必盈七十子之數􅁇集仙逰扵蓬島盛􅀓儒禮扵杏壇既搜虹玉驪珠皆成􅀦寳佇見䑓鸞閣鳳永作家禽某伏思萬里無依乆勞溧蕩十年有遇幸遂􅁬飛異郷榮垂白之親達路忝披朱之􅎖昔名士爲李公御者喜抃猶多今逺人稱尼父生徒光輝無比陳至懇而喙輸三尺望深仁而膓結九回下情無任抃賀踊躍感􅈭之至伏惟俯賜念察謹状賀除禮部尚書别􅁓伏承天恩榮膺􅃂命伏惟感慰昔子貢曰夫子之文章可得而聞夫子之言性與天道不可得而聞也然則至扵四科弟子窺測尚難况是萬里逺人仰何及固不效尤扵􅂐刻請益扵琢磨強搜􅀋鶩之詞是黷猶龍之徳今者逺聆羙命俯切歡心望峻中􅄗逈冠鴛鷺之列恩深大厦空傾燕雀之誠伏惟捨念雲泉拯民塗炭輔弼契千年之運奸雄避七日之誅某跡忝諸生身拘倅職末由陳賀下情無任抃躍兢惶禱祝之至伏惟俯賜念察謹狀濟源别􅁓不審近日尊體何似伏想孟津别壤沇水清源風晴而欹枕泉聲雲曉而卷簾山色既見境含秀麗固當道脫冲和伏惟毎慎寝興早歸爕理顯驗月中之夢􅐌成天下之春卑情無任攀戀禱祝之至謹状迎椘州行李别􅁓二首不審近日利渉長淮尊體寢膳何似伏以源滋桐栢浪接蓬莱雖漸臨􅊊懊之期而宛對清虗之境開樂鏡而眞同月暎泛膺舟而况值風調誰言避地之行實叶濟川之業伏惟緩飛仙棹静運眞筌庶納休禎毎加遵護卑情懇望謹状又某啓今月某日專使至伏􅀩㤙􅄌特降尊誨跪讀欣抃不任下情伏審尚書逺赴天庭将遵水道整蘭撓而思郭泰指桂􅁐而訪劉安睹神仙則椘俗皆驚聞雅頌則魯儒相賀况某材實慙扵楛矢跡甞列扵蓬壷為􅀝徳門􅀗栖候府今者佇迎鶴駕即覲龍章既知天􅄑遭逢唯切日深踊躍且曽晢陳浴沂之志只見虗談仲由恱浮海之言終非實事輒以管窺筳擊真為古陋今榮卑情無任攀戀欣抃兢惕之至云云五月一日别􅁓某啓伏以黄雀風髙蒼龍星耀㺯雨而梅雖應夏鋪烟而麥已驚秋時㝎晏隂資全徳伏惟尚書處身無躁深守禮經視履考祥雅符易道恬澹則老聃讓羙清虗則周顗懐慙氷光長泛扵玉壷豈須獨映天意乆留其金􅂦唯望親調方當鷁泛仙舟必見鳳䘖睿茟入康帝室永福寰區下情無任䖍禱欎戀􅈭切之至謹状謝降顧状某啓某未遂山栖尚􅀙塵役􅀁居官舎深在軍營雖異衡門實同陋巷既乏君章之蘭菊可襲馨香空餘仲蔚之蓬蒿偏資寂寞春日則蝶牽晝夢秋風則蛩助夜吟以此爲娱無他􅀁覬今者方經離亂再獲起居但喜攀父母之恩却慙下児女之淚况某叨榮秦爵就學漢儀姜維之膽氣雖麁鄧艾之口詞甚訥唯深感激莫備啓陳伏蒙尚書念以逺方察其獨立俯憐素志毎煦温顔聴及階及席之言佇銘骨銘肌之懇早来又蒙降三淸之僊駕頋一畒之窮居方慙随入室之賢豈料忝軾廬之念非􅀁敢望将何自安莫不思光逺耀扵珠郷卑迹永超扵末路揣庸賤則華夷有隔較輝榮則古今無倫數年乖豹􅀮之期常低俗眼此日覩鳳儀之後豁展愁眉下情無任感戴欣抃兢惕之至謹祗􅀱起居陳謝謹状與金部郎中别紙二首不審近日尊體寢膳何似既明且哲則詩美賢人視履考祥則易稱君子既樂持盈之道固安養素之機况屬遅日載陽光風遍煦燕歌鸎舞深資酌桂之歡智水仁山静恱㩀梧之興伏惟永資景福早副􅇥徴擲玄賞扵烟霞濟蒼生扵塗炭羣情禱望天下幸甚謹状又某啓某仰審格言側窺性行人能弘道賢臣以致堯舜為先世實須才俊士以效巢由是恥古者只􅀓扵方䇿今也共仰扵徳門伏惟郎中大雅含清中庸䖏厚既以髙名肅物能将全徳鎮時柱晴空而嶽頂無雲瑩秋色而潭心有月比者蘭抛粉闥竹領朱􅙲出分天子之憂來慰海人之望况彼郡也户吞越氷􅙘列吳山得􅀽宏舉扇之風靈濤縮怒使謝運枉帆之路釣渚含春及其五袴􅀓歌百錢流譽尋迎睿渥遥陟華資懐寳令名誰發迷􅀖之問司珎正位佇成匡國之謀而乃得之若驚直而不倨選勝扵巖軒澗户貪歡扵酒賦琴歌乆聆萬乗虗懐忍見四方失望仐者梟聲向息鳳紀重興􅀳􅀓長才待示指南之制魏牟積變佇申拱北之誠入覲􅕴堦坐調梅􅂦豈止應月中之夢必期成天下之春然則致尭舜之大猷永匡宸扆效巢由之小莭不介尊襟某逺賣鮫綃慙非重價仰趨馬帳忝預生徒下情無任攀戀禱祝兢惕之至云云與客将書某腐芥無依㫁蓬自役長走而未離塵土獨行而轉困路歧昨者逺抱危誠􅌹趨朗鍳竽聲􅂲濫琴調空悲伏蒙将軍念以来自異郷勤扵儒道曲垂提挈得遂獻投指喻情深師冕不爲瞽者奬知言重卞和免作罪人荒淺何堪輝榮已極但以某無媒進取有志退居以詩篇為養性之資以書卷為立身之本却縁雖曽食禄未免憂貧趙囊則到䖏長空范甑則何時暫􅀬况乃家遥四郡路隔十洲窮愁則終夜煎􅆈逺信則經年阻絶時情冷澹俗態澆訛買笑金則易求讀書粮則難􅆀天髙莫問日暮何歸始知學者之心須託至公之力今幸遇相公山包海納雨􅃳風行有片言可奨者稱譽出羣有小技可呈者随材入用是以無一物不歸羙化無一夫不荷深恩然則舉中􅀦之人咸承煦育豈可令外方之士獨見棄遺某不揆庸才敢投清徳豈料将軍許垂拯㧞毎賜吹􅌵他人之得䘮榮枯皆推命分小子之昇沉進退只在㤙私儻􅂉特假重言終榮賤質唯托針􅀎入線則同錐得䖏囊某已􅀝䆠途粗諳吏道如􅀎驅䇿未必跧蔵終當富見室家豈憚職榮州縣實以流年易邁壮氣難申唯望庇庥得期變化􅀁兾燕拪雲屋永無巢幕之危鶴出塵籠稍識栗軒之便今欲􅌹􅁱啓事􅄪獻相公少申感謝之懐預冩辭違之懇未知可否先取指麾且某也姜維之膽氣雖麁鄧艾之口辭甚訥縱申拜謁難具啓陳聊托牋毫代披肝膈未􅀎患己先切求仁将軍之心若鏡焉無幽不察小子之身猶箭也唯命是􅀙千浼既頻慙惶益切伏惟終始俯賜念察謹状謝宋絢侍御書伏蒙殊造俯念移居借賜官車得離旅舘簦笈則免勞自負簞瓢則各識􅀁安如承命駕之恩但勵抹輪之志今者卜鄰甚静學植可成唯扄􅀽粲之門不掃陳蕃之室雖乗機立事輸他附􅀔之榮而守道安貧贏得愛閑之樂既諧素志但感深恩伏惟終始俯賜念察謹状荅裴拙庶子書某逺離海島旅宦江臯比者暫􅂅退居稍期􅀠案來投樂國兾濟窮塗本望少贍山資便諧谷隠伏蒙太尉念以雀有多病鶴自逺來特署職名俾趨恩化㝷縁狂花有失腐芥無依轉知山鹿野麋唯宜退縮永謂鴻儔鵠侣不合攀瞻况乃器比斗筲之人身随刀筆之吏旅舎既拘扵雉堞閑門可設其萑羅自前年伏承庶子暫阻朝天偶来避地便欲托金牌之幸會叙玉季之奬憐専􅀱起居􅂅搜誠懇盖慮跡賤而動多悔􅈔才㣲而易見棄􅂢強自㣲攀舊㤙是爲玷浼清徳以此跧蔵形影綿􅊗􅀊時雖知提箒有門唯恐負荆無路豈料庻子恕以未陳禰刺先降劉牋閱温言而椘絖覆身捧華翰而隋珠耀掌兼􅀩賢弟起居未移曩頋逺賜榮緘不遺異􅏾之人特辱同年之字金膏珠粉既垂摩拂之㤙􅂹尾龍髯重有依攀之望莫不駑駘長價瓴甋生光不唯誇衒扵親朋實􅀁輝榮扵逺俗謹當占筮撰日齋沐拜塵􅈥肝而盡瀝卑誠擢髮而少逃厚責其他􅀁奉尊㫖謹具别状啓陳云云謝髙秘書示長歌書伏􅀩特飛榮誨􅃂示長歌玉海金山難測髙深之本北方南國徒觀羙麗之姿賛詠無堦師資有路但如青蓮居士唯誇散誕之詞白石山人只騁荒唐之作但以風月琴罇為勝槩不以君臣禮樂為宏䂓遂使千年萬年􅀁流􅀓皆嗟大雅小雅之淪􅁦今覩四十三叔行出人表言成世資㺯才子之茟端寫忠臣之襟抱在今行古既爲儒室之宗憂國如家固是徳門之事天有耳而必當悔禍雲無心而亦可銷兵一言自此興危􅀖六義扵斯歸正道則􅀁謂陳平宰社爾曺何知鄧艾􅀞營其志不小永言他日􅁕驗前程某畏影雖迷偷光匪懈既知閱寳直若􅀤蒙唯􅂅将鵬舉萹章􅀓扵異域豈獨以伯魚對荅誇向同聲下情但増感戴欽仰降歎之至續􅌹祗候陳謝謝李琯書某啓某今月十日得祗候見太尉渤澥風息蓬莱路通慙非席上之珍謬作壷中之客伏蒙温顔見煦陋質増榮鳳翼龍鱗終容攀附癡鷹鈍犬特許指呼勉其撿慎之心諭以奬憐之意此皆副使不遺薄藝累發重言始當獨卧北􅙘如蛙跳井豈料榮趨東閤似鶴乗軒風雲既識扵因依氷谷不遑扵安䖏感唯泣誠止無言伏縁既忝􅀙軍難為乞假不􅀗柢􅀱陳謝謝元郎中書某啓伏蒙太尉恩􅄌特賜轉職不任歡慶某玄兔微儒焦􅑺􅃈質早因慕善偶獲成名爾後客路多愁候門䁇援麻衣始染扵藍色竹簡尋摧其桂香伏自去年刺謁燕䑓職叨鄭驛皆蒙郎中推心奨念假力薦􅀭使􅀌根無委地之虞短翮有􅇒雲之望今者忽忝非常之遇深慙不稱之譏雖樂􅀙軍敢安尸禄且鷃披隼翼已􅁴非宜鷄䖏鶴羣固當自責時日已具状辤讓以此未敢祗候陳謝伏蒙恩私特降榮誨奉讀欣抃不任下情謝周䌓秀才以小山集見示昨日早謁玄成晚歸􅁦止􅁴户庭之發光彩聞机案之散馨香遂因驚訊僕夫果得捧承留示温辭一幅粲然受盖之規雅什九篇蔚矣患多之思莫不振紀綱扵六義餙冠冕扵七言既崇大雅之基實播中和之響伏以諸􅀙事鴻儔鵠侶鳳翥鸞翔集桂苑之名都占蓮池之雅望二十三官即先軰僃觀周樂深閱椘材各陳􅐌詠之詞􅀎展縦横之作茟皆實録機不虗張始窺八首之前只謂衛多君子終覧九華之後方知魯出聖人某今􅀁以禱望者翠輦早遇東廵日環免勞西獻二十三官百歩穿業一飛冲天姮娥則迎入桂宫王母則引歸蓬島然後輟勝逰扵御氣展長䇿扵濟時来登郭隗之㙜坐㺯陳琳之茟則乃今朝麗藻已掩八仙公之名他日賔筵必盈才子之數見丘門之請禱待陳榻之解懸某使欲䘖壁乞降摳衣請盖但以志勤詞戰雖将築室反耕道拙世塗僅􅀋杜門却掃未􅀗面申感謝謹􅌹修状啓陳云云與夀州張常侍書當今聖天子在上賢丞相在下然而宿徳令望而推者唯我上公暨滑㙜中令兩地而巳初常侍静芟前􅁦權握使符我上公以理状聞請為真守帝惟曰俞後常侍撫安郡俗振肅兵威大元師以雄才薦請貮前驅帝亦唯曰俞是得㺯印分榮剖符行化踰月報政盡活疲甿實謂夀之人永居夀域矣則乃常侍遇賢丞相之知入聖天子之用乃武乃文多才多藝固以播在四海某豈敢一二而談詠也今􅀁禱􅂅者碧幢紅斾髙引前相幕将壇别張勝地謂予不信神之聴之賀椘州張義府尚書國家自兵興已来爵賞既多官榮甚峻然而常􅂲授受之未􅀎宜稱盡善盡美固當有待今則尚書以累世勲望以􅁆年戰功始假使符旋迎真命某将趨清徳獲聴好音欣抃之來雀躍而已則非獨喜尚書展龔黄之美政實乃賀聖天子之得良二千石也伏惟云云與假牧書伏以近日俗尚書題言矝賛祝苟非全徳多是愧辭某執性近愚䖏身斯直以目􅀁覩以耳􅀁聆方敢詠歌固無謟笑某自逹仁境如歸故郷見百姓之安則知三軍之樂也見郷閭之泰則知郡邑之肅也若非常侍寛猛相濟㤙威并行則何以至村落之居室家相慶自近及逺嬉嬉然喜遇􅄌父然則政成一境名逹九重即計冠􅋍豐貂􅒅翻建隼榮膺真拜大洽羣情某毎聴謳謡深増禱祝伏惟照察謹状桂􅁐茟耕集卷之十九
