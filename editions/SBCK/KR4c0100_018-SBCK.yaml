front:
  text: 桂􅁐茟耕集卷之十八書状啓二十五首
  hash: sha256:64aa61a7329a5fcd8975017be92d2f7f0da577165650954ee2f5eb135fc618fe
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_018-1a}
body:
  text: 賀破淮口賊状賀髙司馬除官謝職状啓二首謝加料錢状謝衣段状謝借示法雲寺天王記状謝示延和閣記碑状謝改職状謝探請料錢状與恩門裴秀才求事啓獻生日物状五首端午日獻物状二首謝新茶状謝櫻桃状謝冬至莭料状謝寒食莭料状謝社日酒肉状謝匹段状賀破淮口賊状右某昨日窃聆淮口鎮状報今月八日諸軍合􅀔殺􅓍狂賊已盡者伏以徐州賊黨偶因嘯聚敢恣喧張䲭梟同巢􅀔必不乆蟣蝨相吊生􅀎㡬何猶懐拒轍之心未有返轅之意伏賴太尉相公雄聲逺振妙略潛施謀安四方决勝千里遂使淮山樂境長承虎豹之威泗水􅀌城免作鯨鯢之餌功著扵暫勞永息計資扵彼竭我盈小盗旋除中興可望三軍之勇氣方振百姓之驚魂再蘇但仰恩威咸増抃躍謹祗􅀱陳賀謹状賀髙司馬除官某啓伏承司馬二十五郎榮膺􅃂命伏惟感慰伏以漢朝美仕稱太傅少傅之榮􅀳代髙流誇大阮小阮之譽然而但欲脫身扵利禄無非縦志扵歌吟扵臣則􅉛報主之誠爲子則失榮親之莭豈期太尉相公重言天應羙命風行遂令司馬二十五郎挂綵衣披朱紱動高堂之喜色振徳宇之嘉聲佐理多閑藹餘芳扵玉􅀣連官獨貴掩前哲扵竹林某毎愧小儒忝栖大厦覩鵾鵬之逸􅀔貯燕雀之歡心下情無任抃躍之至謹奉啓陳賀謹啓謝職状右某志雖求已藝不及人伏蒙太尉相公仁􅄌肉被摧骸翼成叚卯卵難飾片言􅃗字粗伸感徳懐恩今則乆貯血誠敢慿毫素先甘􅂦钁仰黷旌幢謹具長書咨陳下情無任戰灼之至伏惟特寛罪誅俯賜念察謹状長啓某啓某伏以短綆不可以汲深頑鋒不可以剸滯是故不􅀎者止周任有言自宜量力而行豈可􅀙心􅀁欲某東海一布衣也頃者萬里辭家十年觀􅀦本望止扵􅖑尾科弟江淮一縣令耳前年冬罷􅄐末尉望應宏詞計决居山暫爲􅀮退學期至海更自琢磨俱縁禄俸無餘書糧不濟輒擕勃箒来掃膺門豈料太尉相公逈垂奨憐便署職秩跡趨鄭驛身寓陶䆫免􅁨東郭之貧但養北宮之勇去年中夏伏遇出師忽賜招呼猥加驅榮許随龍斾乆􅀝鷁舟毎恨布皷音凡􅉢刀器鈍縦傾肝膽莫副指蹤遽蒙念以慕善依仁特賜奏薦重言天應忝獲超昇若非九重􅀝賴扵功名十道遵承扵法令則其㤙命亦豈肯許某自江外一上縣尉便授内殿憲柣又兼章紱且見聖朝簪裾烜赫子弟出身入仕二三十年猶挂藍袍未趨蓮幕者多矣况如某異􅏾之士乎昔有一日九遷無以及斯榮盛某甞讀魯論見仲尼使􅃮雕開仕對曰仕進之道未􅀎究習善其深志夫子􅆀恱某雖慙不敏窃有慕焉昨蒙恩􅄌特賜轉職尋巳具状陳讓兼納􅀁賜公牒伏奉批誨即有􅃙命但請􅀵之某既􅀩未􅁢至誠固且仰遵嚴㫖立愧形影坐驚神魂毎當夜對寒釭曉窺清鏡感􅈭而頭横涕雨􅁨惶而背浹汗漿難榮擺脫扵風塵倍􅎼汚瀆扵門舘伏以太尉相公雄名峻望碩徳茂勲不唯雲覆九州抑亦風􅀭萬􅀦寓目傾耳仰爲指南儒武􅀁歸一人而已是以諸道景附馬首是瞻其如都統廵官須選人材稱職外塞四方之望内資十乗之威若今某塵玷恩知尸素位但恐買戎狄之笑沽史􅀓之譏昔漢朝金日磾常在武帝左右帝欲别加􅃂遇日磾辭曰臣外國人且使匈奴􅁿漢某仐日之請實在扵茲諸􅆹郎官早陳公議盖以賤無妨貴欲令夷不亂華某伏自前年得在門下更無知識唯謁諸􅆹幕中垂情幸而獲宥窃聆太尉相公去年夏扵東塘頋問某之時諸郎官同力薦􅀭和之如響遂沾厚遇遽窃殊榮昨者􅁇陳讜言不徇尊㫖實乃惜太尉相公之名望存淮南藩府之規儀事體不􅉛裨賛斯在冬末面奉䖏分欲使别開院宇雖承㤙諾轉切􅁨懐何者六韜曰人才大小猶如斗也不可盛石滿則棄矣故孔子云孟公綽爲趙魏老則􅄖不可以爲滕薛大夫今者甘寘嚴誅輒傾真懇乞解􅀁職官􅉪可也伏惟太尉相公時賜􅁢􅀙今得其􅀁儻蒙未垂擯棄猶許依栖則望成别補冗貟􅂉薄攴虗給一枝數粒可養羽毛斗水尺波得安鬐鬛固非矯􅎖廉讓爲名實􅂅揣量分涯免成負累恩徳春秋傳曰齊侯使敬仲爲卿辭曰羈旅之臣免扵罪戾施扵􅀒擔􅀁獲多矣敢辱髙位請以孔告使爲工正不失令名故事昭彰卑誠悃愊守道而得無悂矣登門而免見眲之但􅂅藥臼留恩終有􅇒雲之望蓍簪挂念永無委地之愁干冒台威下情無任懇迫憂兢之至謹啓謝加料錢状右某今日某官奉􅀓䖏分每月加給料錢二十貫者某厚沾職俸過贍書羝羊之角且不羸鼹䑕之腹􅀎易滿唯憂福盛難報㤙深豈料茟端乏白鳳之詞日無可效囊底獲青鳬之術月有􅀁増但懐臨谷之心恐敗􅀒山之力唯􅂅除供陋巷之食分濟逺郷之親同感厚恩永傅遐俗􅂉成浮費必速幽誅下情無任荷戴兢惶涕泣之至謝衣段状某啓伏􅀩㤙􅄌賜及生衣段一十疋者伏以風雖解愠日可畏威始當蒸欎之時忝受鮮華之賜敢效八公之侣欲衒六銖但随百姓之歡同歌五况乃某幸趨台階榮託徳門實資千載之遭逢毎濟四時之服飾愍念而情踰父毋稱揚而禮異賔傄今者輕縠衫材細練褠制俾趨儉幕許曵鄒􅅂雖㤙耀逺人􅁕呈妍扵鮫室而名慙竒士甘􅆀刺扵鵜梁下情無任感戴之至謝借示法雲寺天王記状某啓昨日伏蒙恩􅄌借示修法雲寺天王碑綵毫乍閱俗眼初醒唯慙鐡印之傭流忽覩銀鉤之妙迹旣成國寳豈許家蔵窃聆将􅃙貞碑始揮神茟風停减暑天酒呈祥固知垂露之蹤便成甘露况假崩雲之􅀔永耀法雲冝乎琬琰之詞鎮彼瑠璃之地共􅀓嘉瑞逺振芳聲然則隋煬帝之故都永為寳窟謝将軍之舊宅終作福田下情無任捧讀師禱榮懼之至其碑謹􅌹諮納謹状謝示延和閣記碑状某啓昨日觀察衙推邵宗奉􅀓䖏分賜及延和閣記碑本一軸者跪展眞蹤仰窺臣莭對銀鉤而手舞􅁕蹈望玉輦而魂飛膽揚伏以太尉力贍補天心勤捧日遂啓遷都之議佇聆徙蹕之期恭候宸逰儼成壮觀但以尋章摘句素非吳主之心進牘抽毫唯在陳王之命爰令幕客謹撰碑詞支使侍御丘門顔回融帳盧植􅀎揮真茟妙寫尊襟叙三年望幸之丹誠則鼔􅀓衆聴􅄒一片勤王之忠莭則鏡照羣迷實乃酣飫徳馨僃陳事實永使竒功秘略皆令陋古榮今太尉相公志忉迎鑾喜勝覧􅊾旣賛羙扵􅇒雲百尺将掩􅀎扵入水八分遂乃親染綵毫俾鐫翠琰随手而龍蛇旋活迎鋒而劒㦸交横畫玉􅀧珠豈可比蘭亭醉本撇雲挑霧只宜示蓬島眞仙誰料末儒亦叨殊貺輒敢覬覦将頋是知誘諭孱庸何則名題桂宫跡􅀠蓮府雖忝一時之有遇實無萬代之可稱今者支使侍御以好善心得稽古力騁真才子之藻思辱大丞相之茟蹤雖為賔席殊榮别是儒家盛事則彼郭隗受黄金厚禮虞卿沽白璧深㤙強欲比方却成浼瀆然則四方䑛墨含茟之士也莫不竸效顰眉之態潛希唾口之㤙仰􅁱􅁱然勤慥慥爾如某者學海至海雖云有心執柯伐柯猶恐傷手持􅁦箒而徒増健羡遇神錐而便欲投降唯􅂅讀五千卷之書庻㡬入室把十九年之刃無愧發硎毎覩仙書更敦壮志稍希異闕黨童子何敢望儒林丈人其􅀁賜碑唯慎捧持敢矝披閱待過天池之外遍誇日􅏾之中想彼驪龍頷下之珠永當减價巨鼇頭上之客必欲偷㸔下情無任寳玩師仰之至謝改職状右某伏蒙仁恩特賜公牒改署舘驛廵官今随斾西去者雖命重難荷而身􅁿欲飛稱心懐捧撽之榮滿口詠􅀙軍之樂唯慙幽劣有辱奨怜感恩而既識海深舉歩而但憂氷薄况無孫搴之精􅀐自比顔峻之小児将何以剖拆事機㳺揚徳業然􅀁􅂅者得睹龍飛玉劒豹掣牙旗風雷振大捷之聲日月照中興之運則某也有望扵一言長價􅂉爲天上之人萬里􅀙知免作池中之物行唯踴躍坐則禱祠下情無任榮抃兢灼之至謹齋沐祇候陳謝謝探請料錢状某啓某頃者西笑傾懐南音著操蓬飛萬里迷玉亰之要路通津桂折一名作金􅖑之懸疣附贅乃是常常之事徒云逺逺而来海隅未􅁴扵榮家江徼况勞扵佐邑由是詠南陔而引咎望東道以知歸伏蒙太尉念掃徳門許遷代舎濡毫染牘深慙雪􅁐之清才頂豸腰魚􅃍忝霜䑓之峻秩􅀓天上披􅂨之命榮日邉垂白之親以宣父見知則實同陳隼以逺人多􅄑則不讓漢貂雖乖就養無方乆想宗族稱孝然而煙波阻絶難申􅀒米之心風雨凄􅋽空灑梁山之泣既踈温清又闕㫖甘但切責躬敢言養志况又無郷使難附家書唯吟陟岵之詩莫遇渡􅈚之信今有本􅀦使舡過海某欲買茶藥􅀉附家信伏縁蹄涔易渇溝壑難盈不避嚴誅更陳窮懇伏惟太尉念以依門舘次三千客别庭闈已十八年旣免行傭有希及哺特賜探給三箇月料錢􅀁兾禄遂及親逺分光扵異􅏾志􅀎求已永投跡扵仙郷干瀆台階下情伏増感泣兢悸懇迫之至其請錢状别具上呈云云與㤙門裴秀才求事啓某伏念身托徳門光生異􅏾雖池蛟得雨無沉埋末路之憂而海燕含泥有􅀧汚􅀞梁之罪跡賤而兢惶倍切㤙深而展效何期豈合更寫卑誠仰塵尊徳但以事非􅀗已情􅂉可哀不辭鈇􅃏之誅兾滿斗筲之望伏縁某昨聆座主侍􅀖主銓東洛道路不通且在襄州行李極困早欲􅀤遣􅌹使切縁力未副心今有諸兄弟裴傄逺将窮懇相告輒具别状干瀆台階下情無任戰灼之至前湖南觀察廵官裴璙右件人是某座主侍郎再􅀙弟某去乾符三年冬到湖南起居座主侍郎之時見扵諸院弟兄中偏􅀁記念自數年􅁇遭剽刼生計蕩盡骨肉凋零乆在江南近投當府􅂅披情懇泣告尊􅄌駐留多時不幸疾苦遂且扶持􅀤去云欲逕徃襄陽迎接侍郎今得書云行至滁州前去未得道途旣阻溝壑是虞况乃􅀌孀三十餘口更無産業未卜㝎居伏縁某家􅀉日邉路踰天外香無来信固絶他圖旣無寸􅁟以分耕寧有尺波而假潤是以不量僭越輙具薦論命懸沸􅂦之中目㫁台階之下非不知捋虎鬚之險非不知探龍頷之難但縁旣忝門生豈論賔貢鴛鸞之與螻蟻感恩皆同多士之與逺人報徳何異伏乞太尉相公念以程窮計盡其柱促聲哀特賜扵廬夀管内塲院或堰埭中補署散職􅀁兾月有捧入便獲安家裴璙即自到襄州令弟璹仰副驅䇿不度涯分浼瀆尊嚴下情無任感泣兢懼之至獻生日物状某啓伏以降跡仙山爲行恩扵俗界挺神維嶽期㝎亂扵危時是以􅂎梓材長松椿夀永名字已摽扵金籙兵符暫理扵玉鈐伏惟太尉相公貟嶠禀靈尼丘誕質大任天降中庸日彰四夷識傾膽之門逺栖仁䕃萬姓歸返魂之􅏾盡飽徳馨况今秦甸停氛鎬京聚孽息虎旅奔沉之患望豹萹擒縦之機暫施决勝之謀永􅆀昇平之運則必坐寧環海後當去㑹瑶池五色輕雲鎮随行止千年素鶴竸效驅馳獨保長生却登眞位調􅂦佐玉皇之命䘖盃聴金母之歌自此漢室公卿仰羡而空知望㫁仙家朋友相逢而不訝来遅某居近鼇峰遇深􅂹坂毎賭張良之術唯吟郭璞之詩喜對今辰敢陳善柷􅀛虵病骨叨承救活之恩雞犬癡心窃有􅁬飛之望下情無任䖍禱依攀欣抃之至輒以海東藥物輕黷尊嚴謹具别幅伏惟俯賜念察謹状又状某啓某聆天降賢人濟天下之人也是以材合地寳性契天和髙闢徳門深匡帝室伏惟太尉相公漢師仙格魯聖儒機推心扵三代之英鍊氣扵五行之秀今者正融韶景共慶誕辰四方飽開䦚之恩萬族獻稱觴之懇伏惟龍韜暫展静卷妖氛鳳輦遄歸永興清運然後誡白石生之妙術􅀙赤松子之勝逰鼇頭擎五色之雲乆勞西望豹尾指二亰之路蹔事北征佇揚滅冦之勲便舉朝真之禮某栖身大厦祝夀中春下情無任禱祠歌詠欣躍之至謹具别状輒申微誠伏惟恩􅄌俯賜念察謹状物状海東人形參一軀銀裝龕子盛海東實心琴一張紫綾帒盛右伏以慶資五福瑞降三清中春方盛扵香風上徳乃生扵遲日凡荷奨延之賜合申獻賀之儀前件人參并琴䓁形禀天成韻含風雅具體而既非假貌全材而免有虚聲况皆採近仙峰携乘逺地儻許成功扵藥臼必􅂅􅂢軀如􅀎入用於蓬壼可知實腹誠慙菲薄兾續延長塵黷尊嚴培増戰灼伏惟俯賜容納下情􅄑甚蓬莱山圖一面右伏以重陽煦景仙界降眞雖長生標金籙之名而衆懇祝玉書之夀前件圖千堆翠錦一朶青蓮雪濤蹙出扵墨池鯨噴可駭雲嶠湧生於茟海鼇戴何輕不愧􅃈㣲輒将陳獻望卧龍而股慄随賀燕以魂飛伏惟略鍳心誠俯賜容納􅀁兾近台座而永安寰海展仙齋而便對家山許沾一顧之榮預報三清之信輕黷視聴下情無任禱祝歌謡兢灼之至人參三斤天麻一斤右伏以昴宿垂芒尼丘降瑞始及中和之莭爰當大慶之辰仰沐尊􅄌合申卑禮前件藥物採􅀙日􅏾來渉天池雖徴三椏五葉之名慙無異質而過萬水千山之險貴有餘香不揆輕㣲輒将陳獻􅀁兾海人之藥􅂉同野老之芹伏惟特恕嚴誅俯容情懇績靈夀則後天而老駐仙顔而與日長新下情無任禱祝忻躍兢惕之至謹状端午莭送物状織成鞌幞一條右伏以晏隂将㝎令莭俄臨遇天地之仁時睹江淮之樂境伏惟大尉􅀿五百年運用八千􅀊爲春仰賛薫風髙揚畏日不假渡瀘之役自成匡漢之謀某忝在末睿合陳㣲禮前件鞍幞鴛機呈妙獸錦成華當憇影扵追風􅂉資光扵照地伏􅂅鞍也助百福永安之慶幞也表四方率服之誠干瀆尊嚴下情無任禱祝兢惶懇􅈭之至伏惟俯賜容納謹状雪扇一柄右伏以星火􅀭輝雲峰聳影遇陳大守饗遥祠之莭效華封人祝仙夀之誠前件扇細糝飛綿輕鋪凍練雖假丹青之跡實含㓗白之姿裁䂓則不學齊紈空誇圎月委質則􅂅依孫閤得振仁風謹獻台堦無任悚慄伏惟俯賜容納百生榮幸謹状謝新茶状右某今日中軍使俞公椘奉􅀓䖏分送前件茶茅者伏以蜀岡養秀隋􅁐騰芳始興採擷之功方就精華之味􅀁宜烹緑乳扵金􅂦泛香膏扵玉甌若非静揖禪翁即是閑邀羽客豈期仙貺猥及凡儒不假梅林自􅀎愈渇免求萱草始得忘憂下情無任感㤙惶懼激切之至謹状陳謝謹状謝櫻桃状右中軍使俞公椘奉􅀓䖏分伏蒙賜及前件櫻桃者伏以三春之下始閱群芳百果之中獨誇仙達綴仙露而堪敎鳳食被徳風而背許鸎含遂令摘自喬枝分其羙實豈期末品亦荷深恩捧持而色奪椘萍咽嗢而味欺蘇橘何必貯赤瑛盤上最宜對白玉樽前匀排萬顆之珠不唯眼飽似服一丸之藥便􅁴身輕下情伏増感戴之至謹奉状陳謝謹状謝冬至料状右伏蒙仁㤙特賜前件莭料者伏以某忝棲徳宇不愧異郷萬里滄波雖恨絶東来之信三冬愛日且歡迎南至之辰豈料尊􅄌别垂厚賜玉粒既資扵同頴霜華乃出扵雨歧不勞大嚼之言却懐中聖之慮莫識酬㤙報徳唯知飽食醉吟下情無任兢懼之至謹状謝寒食莭料状右伏蒙仁􅄌特賜前件莭料米糆羊酒䓁者伏以人舉令囬禄沮威正吟化俗之仁風又對順時之甘雨仰沾豐餼遇瞻新炊况乃蟻慕芳羶蛆浮清醖捧恩光而飽飫豈止三朝玩春色而醺酣可期千日秪知歌詠何報陶鈞下情無任感戴之至謹奉状陳謝謹状謝社日酒肉状右伏蒙恩􅄌特賜前件酒肉䓁者伏以候燕應期句龍受祀一半之韶光欲老千般之旅思相攻只知吟樂國之春豈料捧仙家之賜􅁜分甘膬淮减香醲想田夫醉舞之塲起海客狂歌之興敢效陳平壮志便發大言唯尋徐邈前蹤略判中聖其肉并酒謹跪領訖下情無任感戴之至謹状謝疋段状緋羅紫綾紫天净紗紫平紗黄平紗黄綾黄絹熟綿綾袴段右伏蒙仁恩特賜前件疋段霞舒鳳縷雪疊鮫綃猥分絳帳之餘俾換褐袍之飾不學玉尼巧􅀃􅃍叨盧志殊榮唯慙螻蟻之姿不稱蜉蝣之竹但􅂅勵食蘗飲氷之莭報披朱拖紫之恩下情無任感戴兢惕涕泣之至謹奉状陳謝謹状桂􅁐茟耕集卷之十八
