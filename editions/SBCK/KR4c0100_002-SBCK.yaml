front:
  text: 桂􅁐茟耕集卷之二
  hash: sha256:89a6a737fde2fb3cf11ca8186633ec706f037b0ed72e135021f39da63d36f05f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_002-1a}
body:
  text: 謝加太尉表謝示南蠻通和事宜表謝立西川築城碑表謝御制真賛表謝御札衣􅁭并國信表謝就加侍中表謝賜宣慰兼加侍中實封表請廵幸江淮表請廵􅄑第二表譲官請􅆀仕表謝加太尉表臣某言今月某日宣慰使供奉官嚴遵羙至奉宣聖㫖慰諭臣及􅀅校等并賜臣􅃙書手詔各一封加臣檢校太尉依前兖淮南節度使兼東面都統者仰窺鳯詔謂對龍顔􅃂榮極而何力􅀒山戰灼深而自容無地臣某誠抃誠感頓首頓首臣伏以大司馬之威權百官所仰上􅀅軍之法令十道皆遵豈唯整戢五兵實在諧和七政况當今日宜屬全材如臣者徳乏􅃳身智􅉻周物於儒則茟慙五色在武則劒敵一夫但以荷􅃂天庭分憂水國擁旄重􅀉榮冠絶於一時仗銊専征兾折衝於萬里幸逢聖鍳得盡忠誠今者已率雄師􅀅誅巨猾征旗指路逺趍堯日之光戰艦凌波方託舜風之力豈期王人逺降帝命俄臨奨其外鎮之微勞授以上司之劇任未著緇衣之羙旋叨錦􅀍之榮况乃兼制利權廣潤軍食瑞節不移於南兖兵符亦綰扵東陲􅀅何異􅀎勝此􅃂􅀉謹當氷為夕飯蘖作朝飡褰帷則面撫烝黎建斾則身先士卒群㓂既蝟毛而起偶恣侜張諸侯必馬首是瞻共成剪滅唯力斯視何心自安必也臨亂忘身見危致命仰觧焦勞之念粗申式遏之功臣既當下瀨屯師佇欲中流設誓枕雕戈而輟􅄰跡􅀉轅門瞻帝座以馳誠魂飛輦路未􅀗稱謝行在無任感㤙戀聖榮抃戰懼之至謹因宣慰使嚴遵羙廻附表陳謝以聞臣某誠感誠懼頓首頓首謹言謝示南蠻通和事宜表臣某言二月二十六日宣慰使供奉官李從孟至伏奉􅃙㫖入鶴拓使胄嗣王􅀛年閤門使劉光􅁉䓁廻得驃信表并國信兼布爕揚竒肱與西川節度使書皆備述情誠無不順命其表及書白并荅信物數並令録往此事首末自卿良謀者逺降王言深窺使節跪閲上天之㫖㘴知外域之心􅃂餙踰涯憂惶若厲臣某誠抃誠躍頓首頓首臣才非間代智不濟時但以毎鎮窮邉粗安荒服免使飽飛飢附欲令前倨後恭頃者忝守成都兾申逺略遂慿釋子善諭􅂪王仰禀天威得揚風教永戢干戈之患俾陳玉帛之儀雖羣議沸騰􅔡衒鑠金之口而宸􅂨剸断早推匪石之心是以暫事西廵或虞南叛爰遣維城貴胄直閣近臣廻聖徳以降尊逺􅀓玄化譯訛言而獻欵俻寫真誠既令抱義戴仁果見奉琛執贄此皆陛下威徳臣何力之有焉而廼謂臣有先見之􅀎知未来之事設和蠻之良䇿俻幸蜀之嚴城俯録勤勞逈垂稱奨睹雕題之章奏書􅁤既同息榾夏之猜嫌梯航相接驗南賝之贖咎知北極之紓憂雖云五利有餘敢希茂賞唯願四方無事永賛昌期臣限守藩俻不􅀗􅁛謝行在無任欣躍感戴兢惕之至謹因供奉官李從孟廻附表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝立西川築城碑表臣某言伏奉十一月六日􅃙㫖以臣在任西川節度使日創築羅城昨因有􅃙嘉奨方進所賜碑詞今巳付所司鐫冩建立者一片石文􅀛初戴立九重天語鳯巳銜来雕銘莫継於色絲􅃂餙􅃍超於華衮仰窺㤙奨俯抱憂惶臣某誠感誠懼頓首頓首頃者幸夢三刀乆臨益部遥提一劒得挫􅂪兵但以其玉壘可稱金城未設山口則空吞蛮蜑水頭則斜枕犍含溪抱谷之形雖云天險比屋連甍之􅀔實類野居臣是以運度籌謀斟量板築盖從人欲果􅆀子来遂得􅃥興而草偃川中誠感而􅁟生石上長圍於三十六里高鎮於百千萬年不愧鐵名可将錐試隼墉烏堞儼若騫飛錦浪綿峯逈然裝飾遂蒙陛下辱褒稱之重許刋勒之榮以爲事實可觀足得詞華不朽臣雖遇泥封􅈭賞豈将油素矝誇非敢彰謙所期避謗今者伏遇皇帝陛下逺廵勝㮣親覧微㓛徴舊賜之碑詞命新鐫之茟跡永使卓立琴䑓之境平欺劒閣之銘且杜元凱之峴亭無非自衒阮德規之齊國盖是衆成謾􅀓身後之虗名豈睹目前之盛事􅂚若彩毫見奨翠琰斯刋因成下􅁟之㓛終應上天之意得逢今日别振􅀌風向非陛下錄善㤙深酬勞徳厚則何以未有出師之業􅂐刻叨榮曽無興學之規􅀓揚􅀼羙臣限拘鎮守不􅀗􅁛謝行在無任感戴欣躍戰懼之至謹奉表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝賜御製真賛表臣某言二月二十六日宣慰使供奉官李從孟至伏奉􅃙㫖已令於大慈寺卿真院冩朕真并扈從宰臣䓁真列卿儀貌俱會此堂今先􅀉卿真軸并朕親製賛述賜卿兾表顯㤙式彰異禮者銀璫降使玉簡􅀓詞受宣而頂踵光輝拜賜而神魂驚越臣某誠感誠懼頓首頓首臣志欽渭訣業錬北書敢憑㳙滴之勞自安􅃂􅀉願掃氛霧之患永竭忠誠遂在先朝便從戎後南征北伐豈暇寕居東鎮西藩累叨重任遇陛下龍飛之後委微臣隼撃之􅀎蜀國防蠻則粗申逺略楚宫捍冦則偶遂良機旋令移節於海門復許建牙於淮甸是以常拘戎閫未覲宸階唯披天上之詔書似睹日中之玉字空增戀闕莫遂歸期頃者䖍託仁祠冩留麽質豈致去思於舊鎮唯慙􅂑笑於空門伏遇陛下展義陳詩停銮駐蹕遂徴繪事俾冩聖容其於侍從之臣宜居左右豈料孱微之質得潤丹青愧無鷰頷之姿永侍龍顔之側况􅂪宸􅁭顧矚御茟賛揚高題而素壁争輝卓立而浮埃不染然後逺飛􅃂詔特遣貴臣乍捧綵牋驟􅀼㳺揚之譽􅀄開寳軸深驚刻􅀞之㤙窺看而形影自慙感􅈭而肺腸何極昔漢朝中興聖帝下念㓛臣列形像於禁宫載勲名於史茟雖令賛述不自稱揚豈如陛下暫事廵逰逈垂奨􅎖别降絲綸之命親編錦繡之詞俾臣位掛於鳯凰池中名超於麒麟閣上遐尋故實獨荷殊榮有何出衆之􅀎見此非常之􅃂􅀁謂千年嘉遇萬代羙譚唯當志勵風霜永驗松筠之不改身霑雨露免憂蒲柳之先衰臣限守藩條不􅀗􅁛謝行在無任感㤙戀聖榮躍兢懼之至謹因供奉官李從孟迴附表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝御札衣􅁭并國信表臣某言二月二十六日宣慰使李􅀙孟至伏􅂪聖㤙别賜臣御札衣􅁭并御服衫一領龍䐉香一金合金鈒花散椀一口金花銀榼一隻者窺神茟㤙襲御衣仙香氣撲於鼻根寳器光騰於眼界仰霑􅃂錫俯積憂兢臣某誠感誠懼頓首頓首臣毎念業紹弓裘任叨斧銊誓傾忠節終報聖朝去年親率驍雄願殱兇醜旋承綸音已駐舟師既慙叩檝之言徒切枕戈之望豈期貂冠􅀓命龍衮裁書辱宣尼一字之褒過光武十行之詔加以粉分御笥香满雕奩花錐乃䴡水之珎雪透任山之器捧玩而實驚寮吏緘蔵而永耀子孫雖有幸逢時輝榮驟集而無㓛受賞愧耻難居徒荷鴻私何申豹略身依楚水未陳告捷之書目㫁蜀天但灑感㤙之淚臣限守藩鎮不􅀗稱謝行在無任荷戴激切榮抃兢懼之至謹因供奉官李從孟迴附表陳謝以聞臣某誠惶誠恐頓首頓首謹言謝加侍中表臣某言臣伏奉去年十一月十一日㤙制加授臣侍中依前淮南節度使階勲封並如故仍加食實封一百户者有命自天處身無地感深以泣􅃂極而驚臣誠抃誠懼頓首頓首伏以黜陟分科聖君至教行蔵守道達士良䂓慮受爵以斯亡在持盈而不殆臣自提搉筦便遇兵戈郡邑為征戰之塲山海足逋逃之藪既難聚利莫遂成㓛况乃權有他門刃無餘地動見越庖代爼無非避柱觸楹遂􅉻􅈇輓之程僅壊銅塩之法伏􅂪皇帝陛下俯詳直道不寘嚴誅選用良才改移重務而乃察臣在公之節念臣戀主之誠重委将壇更增封邑恕乏一時之秀許攀七葉之榮唯慮慙卿或譏􅀼位然臣今所以自賀者三朝獨立七鎮榮遷毎當拜爵王庭不省謝㤙私室以兹勵已永免愧人謹當激發壯圖殱夷窮宼粗息四方之患仰寛萬乗之憂臣限守藩條不􅀗稱謝行在感㤙戰灼屏營之至謹奉表陳謝以聞臣某誠慙誠懼頓首頓首謹言謝加侍中兼實封表臣某言六月十六日供奉官劉叔齊至奉宣聖㫖慰諭臣及􅀅校并賜臣􅃙書手詔各一封官告一通就加臣侍中仍加食實封一百户餘如故者自天降命無地安身啓鳯詔而魂驚對貂冠而股慄臣某誠感誠懼頓首頓首臣早因薄效毎忝殊榮勤王而素乏實勤受爵而但多虚受􅀒山寡力臨谷戒心况自戎馬生郊陣蛇出穴妖氛蔽闕法駕省方臣乆鎮雄籓甞提重柄一無成績兩拜􅃂章前者以上将軍爲大司馬今則兼納言之任加真食之榮累年􅉛横草之㓛終日抱伐檀之耻且易曰或錫鞶帶終朝三裭之詩云受爵不譲至于已斯亡遍覧格言是懲貪祿不􅀎報國苟欲榮家臣實何心有靦于目但遇王人逺降聖澤傍流仰睹綸音深嘉秕政以爲師徒輯目黎庻安寕俯念忠誠特行懋賞臣也方寸之地可􅀝咫尺之顔不違豈敢矯俗陳情餙詞譲爵難效一辤而退唯期三命益恭既除勞力於利權終願勵心於閫􅀉臣伏限守藩不􅀗奔赴行在稱謝無任感㤙戀聖戰汗屏營之至謹附供奉官劉叔齊奉表陳謝以聞臣某誠惶誠戀頓首頓首謹言請廵幸江淮表臣某言伏以舜伐有苗修徳而終􅀎率服湯征自葛行㤙而竸望來蘇斯皆今古之羙譚實乃帝王之盛事固敢跼天􅀒責向日裁誠仰陳利害之端兾副華夷之望不量狂􅎩逺黷聖聦臣某誠惶誠懼頓首頓首臣聞日月以運行爲德永䴡于天江河以委輸是期必朝于海上􅀎昭其煦育下方遂於通流况乃天灾非人力􅀎除地分有兵戎不起将獻永安之兆輒陳可復之詞伏自㓂䧟上京兵徴外鎮猛銳始從於鶴列旋􅆀徒歸頑兇尚固於蟻封難成盡殪臣豈唯投􅃑實至衝冠昨率舟師暫屯江次必欲朝離椘岸暮及漢濵旗張商嶺之風劒拂􅁗川之霧願言薄伐冀效㣲勞㝷􅂪陛下逺許分憂不令離任臣進退惟命始終無􅉛寕招曠職之譏敢渉争㓛之責又縁淮海乍息􅃄塵忽若去兵必當致㓂則迺江南沃壌盡成蚕食之資淮北強隣暗展鯨吞之􅀔輿賦既無所􅀝軍須将必屢空是以仰奉􅃙書巳班師旅四境之赤眉歸伏八州之黔首謐寕遍布皇㤙粗申将略然而關中縦敵閫外偷安既乖踊躍以身先毎切忸怩於顔厚伏惟皇帝陛下省方展義駐蹕經時􅀛城壯䴡之形金湯雖固鳯輦廵逰之費桂玉可虞况舊謂西川富強秪因北路商旅託其茶利贍彼軍儲今則諸道發表章則半載始迴徴貢獻則經年未逹實緑道路遼夐兼值干戈阻囏值剽掠者斯多至行朝者甚少加以僦雇所費耗蠧不􅁿毎當水運陸般只可率鍾致石以此征稅則漸成抗弊軍兵則未遂飫饒伏慮扈從實䌓宴犒仍廣盡捜資於三蜀難濟用於百司苟興旰食之憂實慊庻寮之望又以蜀川僻居卭􅁄人宻通蠻戎虺毒潛吹獸心難測儻或乗虗犯境率衆渡瀘六軍之熊豹騰威縦􅀎制敵八詔之豺狼作􅁀不免喧驚事可酌於将来禍湏防於未兆伏惟陛下覽臣忠懇察臣直言暫迴西幸之儀更舉南廵之禮使䖏䖏息後予之怨人人安恋主之心天下幸甚天下幸甚且如逺狩河陽僞逰雲夢将興覇王俯順權冝况江淮為富庻之郷呉椘乃䌓華之地陛下九年理國四海為家豈比周之東遷非擬晉之南渡賊巢􅇯狂乆聚穢黷難除縦便􅀵城未冝迴駕豈如楊都粤壌桂􅁐名區四夷之賔易朝天九牧之貢無虗月伏乞陛下俯廻鳯扆略泛龍舟必想山靈卷三峽之風水伯􅃦九江之浪遐㝷禹跡􅁢叶堯廵昔也日耀錦川天不傾於西北今則風行澤國地無缺於東南然後發使清宫舉章司隷振盛儀扵歸闕告休績扵登封臣雖識昧變通而志勤匡濟敢憑草奏輒貢管窺無任戀聖感㤙戰越屏營之至謹奉表陳請以聞臣某誠惶誠懼頓首頓首謹言第二表臣某言聞聖人􅀎以天下為一家以中國為一人者必闢扵其義達於其患然後􅀎為之臣遂自前年継陳短識請移車駕廵幸江淮計資於避險就安事叶於暫勞永樂未廻聖鑒再獻􅎩言臣某誠慙誠懼頓首頓首臣尚阻擒奸敢言伐善然但願愚夫之一得難追賢者之三思臣頃鎮成都偶諧逺慮克符天意亟就􅁟㓛别營雉堞之雄規永壯􅀛城之峻境爰憑釋子善誘􅂪王果悛倔強之愆便付懐柔之信皆資帝力􅀎肅物心伏遇陛下逺耀珠旗高臨玉壘樂降絲綸之㫖深嘉毫髪之勞謂臣有先見之機念臣以至誠所感仰衘􅐶奨倍激忠誠然則當年已徃之㓛粗成籌􅀞今日未来之事􅀼有管窺苟或緘辤則為􅀒德不辞鼎鑊輒貢蒭蕘臣近者俯察時情仰瞻乾象荆州道路群冦将侵蜀國封疆㣲灾似起儻或未􅀵鳯闕尚駐銮輿忽有妖氛潜興近境必恐烏合蚕食之徒占㨿江陵把断峽路則列鎮貢賦無計流通行在詔書亦難􅀓降若見東西阻絶固當遐邇動摇伏惟陛下断自宸􅂨斥其横議念江淮之進獻逺渉多虞察蠻延之奸􅇯乗虗可懼早移仙蹕直幸楊都滅星辰交錯之灾叶日月運行之理則乃九州斧鈛討戎而齊願風駈四海梯航奉贄而必􅀎雲集感矣羙矣念兹在兹且逆賊黄巢乆黷皇居多成穢跡直到虎􅀵之後湏勞繕葺之㓛更俟二三年之間可興千萬世之業慮不先㝎事難速成伏乞陛下覧竭節之言闡隨時之義俯從􅇆懇暫事宸逰天下幸甚天下幸甚臣粗識古今略詳利害自非激以為智豈敢知而不言謹奉表陳請以聞臣某誠惶誠懼頓首頓首謹言讓官請致仕表臣言臣伏以聖君御宇必先塞彼倖門良士省躬唯慮妨其賢路苟速官謗是􅇳主㤙况臣關中無㝎難之勲閫外乏分憂之效強欲晏安􅃂祿其如玷浼刑章永言量力而行固在奉身以退既知無􅀮寕避有辞臣某誠慙誠懼頓首頓首臣少勵琢磨晚師擒縱不以一􅀴介意粗於三略留心願紹家勲免􅃜堂搆先皇帝念臣􅀌直試以諸難出分大将之威權坐受上卿之爵秩故得内禀聿修之訓外伸式遏之􅀎北掃虜庭則胡雛不敢南牧南清䝤海則蠻諜無由北窺及覲彤墀暫司緹綺俄屬齊郊聚孽鉅野興師臣也不才謬􅈾斯任伏遇皇帝陛下纂臨宸極警諭戎藩舉旌􅃏以分勞聴皷鼙而軫念謂臣有戢兵之竒略察臣立降宼之微勞遂令位假中台名編外相夢想既通於鳯沼威稜益峻於龍旌其後瀘水波驚蜀山霧暗乆念雕題之患遍流黔首之灾又蒙命臣曰俞為帥於彼爰遵薄伐得觧倒懸豈敢貪天之功願銘鍾鼎秪􅀎因地之利别建溝隍伏蒙陛下俯奨忠誠特行懋賞開國授周司徒之貴立家紹漢丞相之榮臣此時早誡持盈􅂺思請老必願告休錦里退􅀮羅浮不料壠上耕夫盡觧掲竿斬木草間惡子竸謀蟻聚蜂飛當荆門失守之時乃椘塞宿兵之際忝趨戎斾兼綰牢盆僶俛而未􅀎報㤙駈馳而何敢言病或揳揄磨牙於原野或鯨鯢噴毒於江湖㝷提招討之權来撫句吴之俗逺憑睿略深挫群􅇯洎觧印海門建牙雄甸上􅀅軍之􅇵任首冠列藩大司馬之雄賛先沾宥禮揣頂踵而偏濡雨露扼􅍋喉而莫效㳙埃且自黄㓂憑陵翠華廵狩仰天􅓍力􅀼甞服王導之言終日痛心何止洒􅀽安之淚及至成軍已出又縁奉詔却迴行蔵雖順於綸詞進退實慙於物論遂見時􅄎興北林戎役周寳致南鄰責言玉毎慮於俱焚金亦憂於衆鑠幸蒙陛下涵之以海量炤之以天光如見肺腸得保首領然臣也先軫以直言逞志曹植以深過責躬則二年忝都統之名不􅀎誅奸戮􅁀四載主銅􅐭之務不􅀎富國贍軍是以兵權則屢見改移利柄則變為分割凡此辱君之命莫非職臣之由臣猶自知況在陛下擢髪而既難數罪乞骸而誰願辞榮今者大憝奔赴上京克復氛祲即當殄滅寰區永見廓清臣有忝登壇無􅀎報國行當朞齒居亦胡顔兼以頃鎮蛮􅑍乆棲瘴嶺􅂪犯其妖􅃄毒霧剗除其封豕長蛇當年而靡憚勤劬晚嵗而皆成疾疹不将筯力為禮既載前經苟或身心自讎難逃後患雖思強飯實愧素餐廣陵為椘澤上㳺醝府乃漢朝大任以臣衰老當此重難必恐終無所成遂希不可則止伏惟皇帝陛下知人為哲多士以寕選英才而代䖏是􅀖俾微臣而退居散地闘於莬之迯富固是忠貞王内史之辭官誠非矯餙幸遇舜風無外漢日再中陛下既巳除旰食之憂微臣亦希免夜行不息臣無任望㤙戀聖懇迫兢灼之至謹奉表陳請以聞臣某誠感誠懼頓首頓首謹言桂􅁐筆耕集卷之二
