front:
  text: 桂􅁐茟耕序
  hash: sha256:e09c1afd0c68e610b24545c3cb1c17eb136e1e5a4488eb0f873516027a646ffd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_000-1a}
body:
  text: 淮南入本國兼送詔書䓁使前都統廵官承務郎侍御史内供奉賜紫金魚袋臣崔􅃱逺進所著􅄂詩賦及表奏集二十八卷具録如後􅀻試今體賦五首一卷五言七言今體詩共一百首一卷雜詩賦共三十首一卷中山覆匱集一部五卷桂􅁐茟耕集一部二十卷右臣自年十二離家西泛當乗桴之際亡父誡之曰十年不苐進士則勿謂吾児吾亦不謂有児徃矣勤㢤無􅈥乃力臣佩服嚴訓不敢弭忘懸刺無遑兾諧養志實得人百之已千之觀光六年金名牓尾此時諷詠情性寓物名篇曰賦曰詩㡬溢箱篋但以童子􅂐刻壯夫所慙及忝得魚皆爲棄物尋以浪跡東都茟作飯囊遂有賦五首詩一百首􅄂詩賦三十首共成三篇爾後調授宣州溧水縣尉禄厚官閑飽食終日仕優則學免擲寸隂公􅀻所爲有集五卷益勵爲山之志爰標覆簣之名地號中山遂冠其首及罷微秩從職淮南蒙髙侍中専委茟硯軍書幅至竭力抵當四年用心萬有餘首然淘之汰之十無一二敢比披沙見寳粗勝瓦畫墁遂勒成桂􅁐集二十卷臣適當亂離寓食戎幕所謂饘於是粥於是輙以茟耕爲目仍以王韶之語前事可憑雖則傴僂言歸有慙鳬雀旣墾旣耨用破情田自惜微勞兾達聖鍳其詩賦表狀䓁集二十八卷隨狀奉進謹進中和六年正月日前都統廵官承務郎侍御史内供奉賜紫金魚袋臣雀致遠狀奏桂􅁐茟耕集一部二十卷都統廵官侍御史内供奉崔致遠撰
  hash: sha256:a5c8b81941323468dc0693a061a8a3d932d24a778e6074e2bab375f2bec8891f
