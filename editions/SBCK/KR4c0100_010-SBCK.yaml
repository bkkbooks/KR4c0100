front:
  text: 桂􅁐茟耕集卷之十别􅁓二十首
  hash: sha256:a97fec7c5e2821f161fe5a076d026cea9e51388cab2f3187cadccc204cc35ee9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_010-1a}
body:
  text: 魏愽韓侍中一首鄂州崔大夫一首考㓛蒋􅀰中一首前泗州鄭常侍一首新羅使朴貟外一首蕭相公二首田軍容一首都統王令公一首浙西周相公一首前宣歙裴尚書一首幽州李太保五首徐泗時司空一首田軍容一首振武赫連尚書一首幽州李大王一首魏􅀶韓簡侍中一自黄巾北侵翠輦西幸蝗無避境蟻已壊堤内無宮闕之灾外結藩維之耻諸􅁑爽者豕食難飽􅉘聲易驕却躡迷途敢凌貴圉侍中手駈虎隊心閱豹韜一陣􅂊施三城遂復雄㓛始建冊命俄臨永爲壯士之盛談別作諸侯之羙事某昨欲剖巢燻穴乆爲淬甲勵兵及出師徒又蒙詔㫖且令利權山海鎮壓江淮一弭國讐先資􅀖賦然其奈夜眠軍幕霜横枕上之戈曉掛戎衣雷吼匣中之劒終願親揚勇略静滅􅇯徒伏惟鍳察鄂州崔紹大夫遠蒙仁私特示表藁其於歎仰無以喻陳某夙練戎韜願禆王略不愧於管天錐地猶勤於撮壌導㳙遂敢累貢忠誠兾迴聖鍳儻或六龍下峽豈同五馬渡江中朝之禮樂無􅉛下武之㓛猷斯在果蒙大夫恵於宗族賛以表章過垂華衮之褒益睹彩毫之妙古詩云不惜歌者苦但傷知音稀今日知音幸遇之矣然榮示中媲茂弘之徳業齊越石之機謀自顧􅃈才何當虗譽今則王導清望已推於首座相公劉琨至誠亦付於㐮陽㒒射必期英鍳永察愚􅂨云云考㓛􅃽泳郞中特勞専介忽辱榮緘過垂軒冕之褒永寘巾箱之寳實慙彼已豈敢當仁􅀰中學士暫避囏時偶勞僑跡今者官清司績職峻集仙麟趾殿中乆侍􅆖鸞之客螭頭階上則親吐鳯之才豈唯舉四善之精詳盖必偹九重之顧問鋪陳組繡演暢絲綸則也虞夏商周之書重行聖代蕭曺魏邴之位更属何人詎可守三徑之寂寥慮千山之險阻許垂訪别専兾祗迎伏惟眷私幸賜鍳察前泗州鄭廉常侍竊以寇戎未殄士卒多驕凡曰郡侯實難政理縱得上和下睦猶爲朝是夕非况福乃儻来禍惟不測但無慙於屋漏亦何累於國恩然而常侍盖切奉公匪踈撫士雖云驚擾終免侵傷有以見爲政無私當仁有􅁉伏承已離泗水始及淮山捧閱来緘僞謙徃咎其於瞻仰胡可弭忘然則郡守懸魚既􅁇古人之節塞翁喪馬可寛逹士之懐云云新羅探候使朴仁範貟外忽奉公狀偹睹忠誠慰愜欽依但増􅂨抱貟外芳含雞􅀣秀禀鼇山來豋天上之金牌桂分髙影去陟日邉之粉署蘭吐餘香今者仰戀聖朝逺銜王命捧琛執贄棧險航深􅀎獻欵於表章欲致誠於官守雖無奉使難在此時九州之侯伯傾心萬國之臣僚沮色幸来􅁦鎮得接清規况奉貴國大王特􅆀書信相問􅀅成羙事不惜直言儻貟外止到淮壖却歸海徼縦得上陳有理其如外議難防無念東還決爲西笑聖主方深􅀝望賢王佇荷􅃂榮道路亦通舟舩無壅勿移素志勉赴遠行峽中冦戎或聚或散此亦專令防援必􅀿免􅆀驚憂且過欝蒸可謀征邁館中有闕幸垂示之􅀁来探候事已令録表申奏敬惟鍳察蕭遘相公二首某累貢表章請議廵幸忠誠屢罄宸睠未迴兾保始終再陳利害匪望河陽之狩願迎汾水之逰􅀼以諸道賦輿皆遵峽路多是㑡五致一盖已萬水千山後綱不􅁇前綱􅀁貢不如􅀁費况近者西從蜀國南至荆門似有微灾恐遺巨患忽若草冦侵㩀江陵阻艱則榛梗既多苞茅莫入或更蠻戎伺隟必令越嶲勞兵避柱觸楹防微可誡行舟墜劒執滯固難某以孝子不䛕其親忠臣不謟其主遂陳狂􅎩逺黷聖聦唯望略泛龍舟暫遷鳯里庻使九州修貢不愆任􅁟之冝四海歸仁盡遂朝天之望且賊巢兇狂聚衆􅁾黷經時縱􅀎早覆妭巢豈可便廽法駕淮南乃寰中俗冨閫外名髙喻以金甌永無釁缺比於玉壘實異䌓華伏惟相公居注意之朝䖏沃心之位周成王之卜洛始託􅁎公􅀳元帝之渡江終資仲父早申决議仰賛宸􅂨􅀎成可乆之規益表無私之徳某頃在西川制置及於南詔通和雖爲先察於微豈欲驟稱其伐但縁相公皆垂目驗不敢面欺則今日荆蜀灾星未􅀎退舎吴楚福地實可遷都事歸從權化資垂拱永􅆀一家之理必輸萬里之誠某言不近誣志唯遠慮非奪日官之業兾垂天子之恩幸望國僑無譏禆竈謹以具表陳請訖伏惟苐二伏以物忌太盛器滿必傾自古有言至今爲誡苟或不􅀎知止欲貪榮則有折鼎足之虞炊劒頭之險某每念遭逢聖運紹續舊勲北定羗戎南征蠻蜑東降齊盗西建蜀城髙提三尺之權粗展四方之志然自煙塵聚孽原野宿兵曾無敦閱之全材先叨統師詎有縱横之令筞兼領利權而乃不􅀎首唱義聲身先銳旅􅓍奔鯨於海澤逐􅠖犬於秦􅀜􅃍及火熾祠篝塵驚御輦逺聆廵幸便議征行但以每當誓衆之時即奉止軍之詔雖自始終勵節其如進退失圖華元興城者之謳子産􅆀國人之􅉪乃有浙侯構隟沛将加兵三年已来二憾不釋蜩螗竸噪蚌鷸相譏厚誣而巧弄舌端顯奏而亂摇心曲求刺舡而不暇想投杼以難逃伏頼相公照以秦䑓調之伊鼎察邾公之愬鄭伯觧􅀳帝之疑石苞免桂刑章尚縻􅃂秩既蒙明洗誠合淬磨更修克已之心永竭勤王之力直以松筠不改雖自保於堅貞蒲柳先秋􅃍巳傷於衰暮䈥骸漸􅉵志氣潜摧縱欲自強終憂不逮今者幸遇上京已復大駕則廽麟闘龍吟固息興妭之慮放牛歸馬實迎偃武之期某也既在清時誠爲棄物况縈沉痼深􅀒壯圖􅄃鏡無憀投簮是念豈慕祈奚請老尚䖏冗貟唯思范蠡愛閑得行素意乞解所職自卜爲冝伏惟相公選士惟賢退人以禮俯矝羸某特賜允從雖慚未遂報恩免更乆爲尸禄仰干陶冶敬託牋毫始知調􅇥聲哀唯愧詞窮理盡伏惟俯賜㤙鍳田軍容某慙無術略乆􅀼榮􅃂提漢法之重權陟秦官之極品莫申展効何贖貪叨况自冦盗奔侵京都䧟覆乆守咽喉之􅀉不成毫髮之㓛雖兵柄既多固難措手而君恩未報實切靦顔况乃室怒潛興鄰讐竸起陸遜徒稱其佳􅁷崔暹終憾於癡人顯奏相誣多言可畏幸蒙軍容推心庇護極力保持雖遭貝錦之詞免䧟織羅之罪祗合以戀軒思幄筞蹇磨鈆畢命爲期在公無倦但縁攝生罕妙從役乆勤齒髪既衰精神亦耗少私寡欲敢言君子者乎多病愛閑方謂古人是也智力不可強進􅃂章不可濫行寳覺妨賢只冝求退今者肅清鳯闕撲滅梟巢櫜弓矢以銷兵永除戎備垂衣裳而􅆀理廣任賢才如某者寒􅁅罷燃眢井誰顧徃嵗之南征北伐雖忝當仁此時之尸禄素飡逾慙非㩀既失行驅十乗豈􅀎卧護六軍輙貢表章懇辭爵位伏惟軍容察以有犯無􅀮之義難進易退之規仰賛帝俞俯從愚願敢有脅肩謟笑固無没齒怨言幸逢四海之昇平願指一丘而飬老干黷清徳兢惕實深伏惟云云都統王令公賀冬伏以律管潜吹星􅄤改候觀䑓望瑞雲物呈祥伏惟令公毎布祥雲常懸愛日三軍彉弩挾楚纊以忘寒五夜枕戈擁孫衾而逹曙必資景福早建殊㓛雅當肅殺之時便遂討除之􅀔四方聳耳佇聆大捷之音萬乗傾心永􅆀中興之運某末由陳賀但切禱祈浙西周寳司空伏以禮慶􅂂長傳摽視朔夷夏契混同之運乾坤叶交泰之期㐲惟司空相公浙水流恩吴山變俗既睹趙良之日永洽物情願親傅􅀃之星早環帝座末由拜賀但切禱祈云云前宣歙裴䖍餘尚書伏以禮􅁛迎日傳載書雲當寰中賀聖之晨是水外􅃦兵之際冝陳善祝仰薦殊祥伏惟尚書政報褰帷慶資温席巳捧徴黄之詔固諧夢􅀃之期人仰板輿羡老萊之榮養帝留金鼎待伊尹之來調某雖戎律拘身而清䂓在想未由拜賀但切禱祠幽州李可舉太保碾玉排方腰帶壹條并金魚袋壹枚金花銀合盛重一百六十兩右件腰帶體資廉􅃳㓛就􅅣磨雖慙鄂坂之金稍勝延陵之縞珪璋比徳冝親佩劒之腰霜雪呈華願近生松之腹動則金章躍鯉静乃寳匣盤龍既當屈以求伸唯望服之無斁謹専􅀉獻逺表依攀伏惟㤙􅀻特垂檢納銀結條燈籠一枚承燈盞白盛荷葉一蔘木匣盛金銅鏁鍮並全金花平脫銀裝硯䑓一具垂鈉香囊五枚柒木匣盛金銅鏁鍮全具金花平脫銀裝硯匣并硯几一具銀硯水瓶䓁四事硯几在苐二内右伏以持異物而奉異人甞聆斯語覧逺書而愧逺客亦驗古詩志常切於攀鴻事不慙於獻鵠毎逢珎玩則繋懇誠前件燈籠硯䑓䓁鑄鑠成㓛披砂潤色運巧而靈絲綴藻標竒而霞蘂雕華高懸謂雲盖凌風遥視疑露盤含日龍膏豹髄偏冝卜夜於歡筵鳯茟鵝牋亦可依仁於未席加以謝囊分掛孔硯深蔵虗心而只待含香藴器而終􅀎䖏黙是敢徵羙言於舉燭􅀉徴慊於濡毫伏惟無思宋殿􅁑籠僻敦儉約或逞張地草聖許近恩輝必可逺耀九光深滋五色隔飛蛾而救物仁化弥彰研含麝以􅀓書徳馨增馥非無􅀁採粗有可觀必望眷􅀻俯垂容納幸甚云云金花䧟銀柘裏合大小共三具銀接頭紅牙匙筯一十對犀杔子四隻巳上大合内盛銀裝茶椀四隻在中合内盛犀楪子二十片在小合内盛金花銀脚螺盃一隻右件匙筯犀合茶椀螺盃䓁雖愧金盤粗勝􅁄􅍰鈿玫魂之表異固讓魏銘詠玳􅈘之摽竒敢徵潘賦􅀁貴者煙排翠􅀧霞染纎條掌握増榮不慮劉使君見失指蹤任意或希柳御史自擕况乃水族殊姿天成雅器永免蜘蛛􅀉跡􅀎将鸚鵡齊名稍謂􅈿竒逺思􅀉獻伏惟静籌帷幄許接罇罍對郭隗於髙䑓深傾露液遣甘需於仙闕勝醉霞漿伏惟㤙私特賜檢納幸甚云云織成紅錦繳壁兩條暖子錦三疋被錦兩疋西川羅夹纈二十疋真紅地絹夹纈八十疋右件繳壁錦纈等􅀛城􅀓㨾鳯抒成㓛張廣幅而宛見虹舒疊綵繒而免慙鮫織雖五千里之誇歩障則難可争光而四十疋之製戎衣則或堪入用亦兾偹㑹稽守晝行之服平津侯夜􅄰之衾不咎􅁿微特垂容納干浼斯甚兢慙實多云云安南開海路圖一面西川羅城圖一面并八幅紫綾緑右􅀼以事畏人知㓛慙自衒盂側奔殿終箸羙於魯論郄至驟稱果興譏於晉乗妍虽可鍳今古何殊頃者銅柱南標金墉西建開八百里之險路則雲将驅石雷師劈山築四十里之新城則水神㵕泉地媪供􅁟盖乃感忠誠於上鍳標壯觀於外藩敢言簡在帝心實匪率由人力今則八蠻歸化萬乗省方既􅀎有備無虞亦􅀁當仁不譲去年甞􅀓雅㫖欲覧微㓛乃徴於墨妙筆精遍冩彼長途峻壘宛如縮地不止移山逺遣􅀉呈略希展閱必謂桂陽衛颯誠􅃈􅃈焉亦知蜀國張儀是區區者恃深眷而不拘小節激壯圖而無訝大言伏惟云云徐泗時司空物色右伏以縞帶紵衣魯史乃先其􅀁出投桃報李周詩用表於相知永言沼沚之毛豈譲琅玕之寳盖防闕禮只貴申誠前件物䓁雖曰􅁟冝亦由波及實慙華麗况至尠微難把八行盡冩傳心之語唯慿一介聊陳籍手之儀伏惟眷􅀻特賜撿納云云田令孜軍容送器物右􅀼以氣曀未銷道途尚梗乆乖􅌹信略逹㣲誠毎憂於逺莫􅆀之不敢以多爲貴者前件器物貨非難得器實易盈雖慙鏐銑之名願接罇罍之列輙将􅀉獻逺表依攀伏望無掛意於四知幸流恩於一諾特垂容納云云振武赫連鐸尚書謝馬拘右特蒙眷知逺有恵賫無􅁃亮的顱之害有陸機黄耳之􅀎敢謂偹於左牽右牽實爲馴於執勒執緤寧唯致逺况解防姦既驅筞之有期固指蹤而無失仰承重貺倍荷殊􅀻末有報酬益多愧悚伏惟云云幽州李可舉大王青氊帳一口金銅裝鉸具右伏蒙恩􅀻特賜恵賚委之専介衛以壯夫遥陟危途得張官舎不假棟梁交構􅀎令户牖兮開出觀則一朶蓮峯入玩則千重錦浪加以頂摽曉日額展晨霞静吟而筠箔摇風俯視而地衣鋪雪舒卷皆成其壯觀行蔵永佩於深仁莫不衒沙漠之竒模駭江淮之衆聴卧龍􅀼譽固當髙枕無憂虜豹成㓛必可運籌决勝唯期尅捷全頼庇庥荷戴􅀁深啓陳何及伏惟桂􅁐筆耕集卷之十
