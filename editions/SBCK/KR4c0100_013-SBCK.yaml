front:
  text: 桂􅁐茟耕集卷之十三舉牒卄五首内行墨􅃙牒詞五百
  hash: sha256:30bda49feadfab5b152997a1f171f5c9d58667e1e7216094e5d341a5a36e255e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_013-1a}
body:
  text: 授都将右散􅀐常侍授盱眙鎮将鄒唐兼御史中丞授椘州刺史張雄将軍授髙霸權知江州軍州事許勍妻劉氏封彭城郡君請莭度判官李琯充副使請副使李大夫知留後請髙彦休少府充鹽鐡廵官請泗州千濤尚書充都指揮使王棨端公攝右司馬右司馬王棨攝鹽鐡出使廵官前邵州録亊叅軍頋玄夫攝桐城縣令海陵縣令鄭􅂎前宣州當塗縣令王翶攝揚子縣令柳孝讓攝滁州清流縣令前浙西館驛廵官郷貢三􅀓張咸又攝山陽縣丞前㜈州金華縣尉李涵攝天長縣尉前頴上縣主簿鄭綬攝盛唐縣丞諸􅁑殷知榷酒務李昭望充奉􅀦廵官柴嚴充洪澤雨塘廵官許權攝觀察衙推充洪澤廵官王棨端公知丹陽監事􅆇澣知鹽城監事趙詞攝和州刺史行墨􅃙授散􅀐常侍牒詞􅃙淮南莭度鹽鐡轉運䓁使東面都統兼指揮京西京北神䇿諸道莭度兵馬制置等使牒某官乞右可檢校右散􅀐常侍餘如故如将軍須言貟外置同正貟牒准今年二月九日詔應諸州有功刺史及大将軍等如要勸奨者􅀙監察御史至常侍便可墨􅃙授訖分折聞奏者大君降命元帥􅀙權但云􅀎立勤勞特許先申奨勸漢祖則手無刓印不阻論功武侯則心若懸衡必􅀎舉職用示軍中之賞式資闕下之恩前件官夙藴壮圗乆􅀙戎事将救奔沉之患固慿擒縦之􅀎桓榮祖之馳名不唯馬矟周盤龍之受爵􅁢稱貂􅃣事須准詔授檢校右散􅀐常侍仍具申奏并牒如者故牒廣明二年六月十二日使兼都統檢校大尉平章事燕國公授盱胎鎮将鄒唐御史中丞牒准詔云云将軍分間大夫出疆可􅌹未請之權况奉已成之命髙懸懋賞用報竒功前件官術􅁇白猿名齊赤免夙歸信義僃察忠良雖遷柱下之官尚慊軍中之望冝昇􅌹席更勵枕戈爾其心保清廉好對暎淮之月力誇驍銳無慙破浪之風事須准詔行墨􅃙授御史中丞椘州刺史張雄将軍牒准詔云云見功必賞漢髙祖之殊恩承制無疑鄧司空之故事前件官材標落落韻禀錚錚自假使符已揚政績理股胘之名郡登耳目之髙官信義相􅀙功名愈振佇擅外􅄗之􅀉冝昇大􅀣之資爾其益勵忠䂓仰䘖成命用副劉弘之善舉無嗟李廣之難封事須准詔行墨􅃙轉授右武衛将軍貟外置同政授髙霸權知江州軍州事牒准詔應諸州刺史如有軍功卿量加爵賞如有罪犯卿冝書罰别差人知州具状申奏者大元帥之權既資成命古諸侯之任宜選良才前件官蛟躍池中虎蹲岸上用軍以義守莭唯忠不辭白刃之危累挫黄巾之衆􅂉短兵闘勇􅂉圎陣呈竒動有􅀁成徃無不利今以九江闕牧一郡思春将活疲甿固慿幹吏爾其遏強撫弱削􅁦蠲苛無登庾亮之樓空知翫月好把􅀽宏之扇且學移風稍展政聲佇沾恩命事須准詔行墨􅃙差知江州軍州事仍具事由申奏并牒知者許勍妻劉氏封彭城郡君牒奉䖏分古者官至大夫室稱命婦遂有􅀙夫之貴乃爲䖏世之榮而况静則􅀎慎内言動則克􅀙外􅃥躬擐甲胄志凌雪霜功名既異扵常流封拜豈拘扵成命以滁州刺史許勍妻劉氏英才天授貞莭日彰平欺後魏将軍洛陽失行仰慕聖朝公主司竹興兵一昨􅌹命良夫討除叛䘚􅃍陳丹赤固􅂅同征手驅組練之羣逺攻城壘身脫綺羅之色乆犯氛埃四徳有餘六韜可試豈獨家之肥也實謂􅀖之媛亐夫既冠其銀鐺婦宜榮扵石窌豈可使松標峻影早􅆀􅇒雲蘿抱柔姿猶嗟委地先行茂賞用報前功軍中之舍爵䇿勲與人􅀙欲天上之錦牋鈿軸待鳳䘖来事須准詔行墨􅃙封彭城郡君仍表次録奏并牒知者請節度判官李綰大夫充副使牒大夫天芝禀秀霜桂含貞蔚􅈛芳猷毎見用和爲貴凛然直氣終􅀎嫉惡如讎信知賢良實救凋􅁦頃者再握一同之政曽標三異之名既􅀤縣花佇分郡竹而乃鵾鵬自滯羔鴈相􅀙鉅野卑栖劒川逺役察俗而唯資婉􅀞犒師而不乏豐儲果得入奏玉墀出懸金印洎某暫臨江陸旋鎮海門永言移莭之難咸假運籌之妙一来淮甸四換星霜判官徳以􅃳身固為已任恩􅀎濟物不欲人知莅事實䌓在公匪懈筆直而吏多畏色鞭輊而獄絶􅁈聲見君子之盡心實古人之用意十二年之弘益乆而彌芳千萬里之追從永以爲好雖将徐榻别􅆀猶恐燕䑓未高今已假小秩宗兼大司憲不遷職位何稱官榮幸屈跡扵副車兾揚威扵戎幕陳寵宣詔條無失甞賴功曺吕䖍􅆀郡俗永安亦憑别駕若言今日彼在下風事須請攝莭度副使表次録奏請副使李大夫知留後牒大夫劒横天外珠媚水中雄􅏢則仰决浮雲温􅃳則㫄無枯草深蔵利哭乆佐逺藩毎施婉婉之謀共化􅃖􅃖之俗五鎮相􅀝一紀于茲甞扵折獄按刑唯遵直道縦至旬休莭假不離公門敢言知已之難實荷成人之羙今已三年翫冠尚恣侜張十道徴師􅉍相逼撓若不􅌹征鈇銊何因倒載干戈遂驅飬勇之鋒佇破稔奸之窟代行拙政留託長才慰八郡之疲羸察四鄰之劻勷兾使􅀽宏􅀺庻粗識詠謌無令陶侃賔傄只耽閑戯數年卧理今日出行皆資裨助之功聿保始終之恵事須請知觀察留後請髙彦休少府充䀋鐡廵官牒少府學麟成角詞鳯􅀓毛偶輕桂客之逰暫樂梅仙之白鶴唳而月籠寒野萬里清音鵬飛而雲簸長天九霄髙躅􅄑聮宗黨得接徽猷敢興念扵維駒無見辭扵絆􅂹稍假縦横之術終匡幹運之權雖慙燕􅀦之金䑓􅂅接謝家之玉􅀣同姓必親扵異姓今人何讓扵古人事須請攝鹽鐡廵官表次録奏請泗州于尚書充都指揮使牒尚書洞究儒經㫄探武緯指清途扵萬里牧逺羣扵三年􅒅㸔隼飛輈待鹿挾慰疲甿以仁政捍冦盗以智謀克歸合浦之􅈿曽散曲堤之衆今者徐戎遺燼敢恣侵􅇒椘䘚精鋒佇期掃蕩終免􅆀包胥之哭况非奪􅀳鄙之軍但以鷹犬呈功㷱羆就列須俟指揮之命仍申搏噬之􅀎實託威權逺希統攝俾瞻馬首皆知進退之宜永滅梟聲用審否臧之律事湏充都指揮使其應援諸都及寧淮盱胎淮隂䓁三鎮将士悉受指揮王棨端公攝右司馬牒端公烏衣茂族鶴氅清流早列官榮頗精吏術口中金石常聆􅈂韻之髙手下銅鹽曽展長才之妙事既同扵外舉理無愧扵㫄求今則秩挂方書職􅂙典午雖云承乏且欲試􅀎憲府威􅏢他日見􅉘狼懾伏郡庭閑散此時樂魚鳥留連事須差攝右司馬右司馬王棨端公攝鹽鐡出使廵官牒奉䖏分且權筦之設也本資戎事将贍軍須既當薄伐之期實藉均輸之利􅀎成重務固選良才端公韻振維山慶流淮水静䖏五常之􅏾勤尋六義之門每覧縁情俻知守莭􅁇委當仁之任皆􅀓幹吏之名已爲㦄試諸難可謂多􅀎鄙事今以仰裨􅀦用㫄濟兵儲權課方殷句稽匪易官居典午既已􅄖閑志在推公無辭冗屑佇糜幕職立展籌謀雖見王晞長􅀉心扵方外何妨裴楷暫勞力扵俗中事須請攝䀋鐡出使廵官句勘當司錢物前邵州録事叅軍頋玄夫攝桐城縣令牒前件官善水無壅謙山自髙腹飽詩書口含鋒刃厚利唯勤扵耕道閑情素􅂴扵釣名爲踈奔竸之門尚䖏卑栖之地既􅀎㓗已何惜愛人州主簿之提綱昔甞留意邑大夫之製錦今可呈功永言不憚勤勞方謂克承闕乏稍念時危而慎守勿云俗􅁦而難除一門多詠雪之才衆推儒慶百里渇象雷之理勉振政聲事須差攝舒州桐城縣令海􅁜縣令鄭􅂎牒奉䖏分字人之政爲吏􅀁難欲俟三年有成同須一日必葺永言委任實籍賢􅀎前件官深扵詩敏扵行不近劉與脂膩唯資謝朏膏􅃾累假一同俻彰三善睠彼東呉之近境實為南兖之奥區昔也承乏多勤去思猶在今可以舉舊令尹之政修眞君子之誠均調政刑遍慰􅀺庻展􅂹終希扵得路割雞無憚扵􅀤硎行乎敬㢤勿􅈥乃力事須請攝海􅁜縣令前宣州當塗縣令王翺攝楊子牒奉䖏分宰字之術若驅羣雞緩之則散􅇥之則亂此言雖小其理甚中知者非難行之不易况乃隋城近邑楚岸通津螟蝗則乆待消除鱦魠則每思飬肴前件官相門積慶儒室推賢早登廉孝之科甞歷句稽之任雖棲下位不墜令名果逢連師之知再假字人之秩雉誰忍捕􅍎自停喧陶潜之腰腹蹔孔􅁬之膏􅃾下􅃳今以楊子一同䌓􅇵四逹要衝毎當使命交馳實託宰傄勤幹遂重責成之􅀉况逢多事之秋而乃有令患風請告踰月若言考秩亦合替移固選長才俾修闕政其在上贍夏日下視春水冝無憚扵徒勞佇有成扵歷試苟有􅀴年沉醉必虧莅事之􅀎如将終夕清談亦失相時之理勉扵二􅀃慎自三思事須差攝􅀭子縣令柳孝讓攝滁州清流縣令牒奉䖏分今世之奨邑大夫也多以河陽花彭澤柳爲羙士永言至理我則不然唯某在其視人如傷㓗已以仕􅀎懐氷蘗之操逈掩花柳之名實難其才得副吾意前件官展禽苗裔言偃政􅀎曽宰濟隂克安屬邑乆依江徼静守窮居數年而雖甚食貧直道而未甞改莭今将歷試俾假缺貟無興喧􅍎之譏勉致驅雞之術事須差攝滁州清流縣令前浙西舘驛廵官郷貢三傳張咸又攝山陽縣丞牒奉䖏分前件官族資􅍎印業練麟經未躬壮圖甞􅀙碎職既精簡牘之事寧辭州縣之勞習􅀓之體有三􅀎詳正義在公之心無二宜慎爾官徃矣敬㢤賞罰斯在事須差攝山陽縣令前婺州金華縣尉李涵攝天長縣尉牒奉䖏分夫縣尉之設也其官雖卑其務甚重動則推詳滯獄静則慰撫疲甿是以佐傄􅀎無其直聲宰尹亦懐其畏色永言至理實繋長才前件官性習五常身資一命甞佐金華􅇵色頗􅀓玉㓗髙名乆見退修誠思進取俾助養鱦之政且昇化鮪之資其在蘗作朝飡氷爲夕飲髙懸曺捧静和宓琴譽能息扵􅍎喧􅀔必登扵鴻漸云云前頴上縣主簿鄭綬攝盛唐縣丞勇韋緘評事薦牒奉䖏分凡城一邑皆列六曺雖云具體而㣲豈可􅀙心􅀁欲况縣丞之佐理也令長憚其糺摘猾吏禀其規程苟􅀎自強何患不立前件官康成求已季智奉公曽申頴上之勤勞遂見渭陽之論舉桓譚貳政且冝肅彼奸豪殷浩吟詩無用傷其貧賤事須差攝夀州盛唐縣丞諸􅁑殷知㩁酒務牒奉䖏分搉酤之權起扵漢代㑹訃之利著在周􅀴既當預僃闕懸難可不􅀙改作将成重務固選良才前件官􅀮豹含章卧龍襲慶㓗已則隋珠無􅀋在公則庖刃有餘昨分孔僅之重司已成歷試今躡魯匡之良䇿何憚􅌹勤無辭鄭驛之卑棲早􅆀卓爐之餘利􅀎資羙禄必贍雄師􅀁期百姓無譁非阻三軍告醉事須差攝舘驛廵官􅌹知㩁酒務李昭望充奉􅀦廵官牒奉䖏分昔孔子誡伯魚學曰其先祖不􅁕􅁛其族姓不􅁕道然而大以流聲後裔者豈非學之􅀁􅆀乎若然則先祖之與族姓也不唯時世􅀁榮亦乃聖人􅀁重前件官搢紳上品結綬中朝方襲芸香遽飄蓬跡逺逃虎口猶絆􅂹蹄今以一言爲賢三代可數但渭陽之族坐振重名漂流淮徼之居来永碎職遂茲響應用試才􅀎既知各有司存唯在聿修厥徳事須􅀘充椘州營田奉國廵官柴巖充洪澤雨塘廵官椘州榮田牒奉䖏分三農就稔一溉推功苟非降雨之渠何以􅆀如雲之稼俾無􅈥惰固藉􅌹勤前件官壮志不渝公才可任承乏而善叅軍事慎終而益見吏􅀎今以洪澤近封雨塘羙􅃅徴小喻大昇髙自卑爾其静朂氷心潜窺水脉勉禀龔黄之令逺􅁇田曺無慙鄭白之名有􅉛地利髙懸賞罰用試否􅆇事須差充椘州營田院洪澤雨塘􅌹知官許權攝觀察衙推充洪澤廵官牒奉䖏分撫俗􅀁先勸農爲最是以鄭渾則奪其獵具温嶠則請置田曺仰順天時俯徴日力俾督耕夫之業須慿幹吏之才前件官歷試已多忠勤可奬令尹之功成製錦督郵之政克提綱但承闕乏之時皆有緝綏之譽今以山陽沃壤淮畔奥區地占三巡田逾萬頃非乏决渠爲雨尚􅉛多稼如雲盖為編甿不勤功扵藨蓘縦當稔嵗皆失利扵稲􅆝知爾奉公勸民務本若使耰而不輟必期敏則有功委以農時假之使職永言􅀙政實可與權無取􅃳扵膏􅃾苟徇私扵毫髪勉施乃力廣諭衆心事須差攝觀察衙推充洪澤廵官兼都廵勘指揮奉國謝陽䓁廵務者王棨端公知丹陽監事牒前件官蹈氷守節飲氷安貧静吟而篋有新詩寂坐而門無雜客卓爾君子宛然古人今以将濟軍須誠資吏術少輟􅅣磨之業俾􅌹鼓鑄之權想夷甫之不言無􅉛祖徳思仲宣之未遇勉俟官榮事須差知丹陽監事臧澣知鹽城監事牒奉䖏分若官無直道則利有多門凡歷任扵牢盆􅂉成資扵􅃳屋而乃就此䌓􅇵守其㓗廉心誅則不惹脂膏智刃則􅀎分髖髀甞聆斯語罕覩其人前件官雅淡装懐清勤綰務甞握由拳之􅅦課唯遵止􅁕之䂓模休替末遥功勞可驗更資歷試必濟重難展才扵近監之郷守莭扵作鹹之地不須對雪空中吟謝朗之詩只在􅆈波言下見張融之事須補充權糶使廵官知䀋城監事趙詞攝和州刺史牒奉䖏分昔張緒子充少好逰獵右臂鷹左牽犬緒見而謂曰一身两役無乃勞乎充跪荅曰丈夫三十而立今二十九矣請至来􅀊緒曰過而􅀎改顔氏子焉其後折莭修身終爲賢達則古之豪俊今可䂓模前件官脫跡迷途投身義永除惑志可奨悛容既􅀎資父事君是得居官理務俾叅上佐用試忠誠况當榮之時好縱安居之樂詞其勉輸後効善補前愆已銷九族之憂無起一朝之忿事須差攝和州刺
