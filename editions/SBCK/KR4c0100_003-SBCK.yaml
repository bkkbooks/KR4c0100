front:
  text: 桂􅁐筆耕集卷之三
  hash: sha256:16a23da7f5e1c38e679f0f75546c47a66bdfd42f4695d17596d5e4b9a80c50df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_003-1a}
body:
  text: 謝詔狀謝詔示權令鄭相充都統狀謝宣慰狀謝詔奨餙進奉狀謝詔示徐州事宜狀謝詔止行墨􅃙狀謝郄公甫充監軍手詔狀謝除鍾􅀓充江西觀察使狀謝就加侍中兼實封狀謝􅁗彦䓁正授刺史狀謝詔狀右臣伏奉四月十日詔㫖黄巢􅇯逆穢黷宫城罪􅁖貫盈人神共怒㝷東兵合􅀔剪滅元􅇯想副朕懐已遵道路佇聞克復永耀功名者十行天語萬里星飛捧窺而壯膽初驚跪讀而愁眉頓豁􅀼以黄巢禍心斯極根力既衰􅁏已太醎果将落蹔起烟塵之患則歸原野之誅臣毎當永夜枕戈早願中流叩檝自啓行十乗已屯駐五旬伏縁江路多虞風波未便暫淹行色用􅃸良時非致役扵遷延但興懐扵矍鑠今則仰覩鳯衘之詔况乗隼撃之秋俯勵軍謀仰遵睿筭即兾朝離江北暮到漢南長駈背水之師永破㴞天之孽率􅁬義感㤙之衆氣已凌雲殄蔵奸匿暴之徒􅀔如沃雪伏惟陛下嵗廵備禮時邁􅀓歌将示罪於三危乃宣威扵七徳臣逺承奨諭誓盡勤勞身暫􅀉於戈舩心毎馳於劒閣唯願西都獻捷早申􅀵復之微㓛東嶽告成得覩登封之盛事臣無任感激兢懼之至謹奉狀陳謝以聞謹奏謝詔示權令鄭相充都統狀右臣伏奉去年九月九日詔㫖卿曽間道獻童諸鎮飛􅊾便欲長駈甲馬親議􅌹征未即便来湏權制置遂命鄭畋䓁分為京城四靣都指揮諸道師徒慮卿偶未委知故兹詔示者伏以書曰無偏無儻王化乃興詩云不識不知帝謀是禀况兵當伐叛事合從權臣去年先因淮北侵疆後值江南阻路乆屯師旅未遂戰征陛下妙選群才近分重􅀉鄭畋䓁莫不身先貔武手運豹鞱既當怒髪争衝固謂賊􅎍可揕仰酬睿奨竟勵忠誠臣也逺鎮臨戎強隣結憾唯慙曠職豈望成功伏􅂪陛下尚念勤勞曲垂慰諭覩上天之慈意觧外地之憂深既許将軍獨舉柳營之令終期叛䘚必歸竹町之誅臣限守戎藩不􅀗稱謝行在無任感激戰懼之至謹奉狀陳謝以聞謹奏謝宣慰狀右宣慰使供奉官李從孟至伏奉去年九月九日􅃙書手詔兼宣㤙㫖慰論臣及将士䓁者伏以感㤙効命武士常規仗順摧􅇯元戎素分賊巢偶乗奸便尚逭嚴誅臣願膾彼逆鱗臠其邪膽掃重氛於魏闕迎法鴐於蜀都是以去年㩀馬援之鞍敢矜獨勇杖辛毗之􅃏親率諸軍乆在江千再承天㫖不令離任遂巳班師豈料伏蒙陛下念及老臣撫兹衆率特迃星使逺降泥封綸􅀓萬乗之言纎微不聞纊彼百夫之體慰暖皆均歡呼而聲巳振雷感泣而淚将成雨唯期勵節共願報㤙臣限守藩條不􅀗􅁛謝行在臣無任感戴榮抃戰懽之至謹因供奉官李從孟廻奉狀陳謝以聞謹奏謝詔奨餙進奉狀進奏院逋到㤙賜手詔一封右臣伏奉詔㫖以臣先供軍應接使駱潛䓁進奉銀事特賜奨餙者伏以敕切示賞乃聖主之異㤙寓物輸誠固藩臣之常事但屬敵滋隣境冦阻道途運網而既闕先登贄禮而僅侔錫貢卑成滞况涉尠微是以雖憑孱水之􅎇難逭􅂗山之罪豈料鴻毛比復方申懇悃之心鳯口衘書逺降􅁛之㫖感激而懐榮為懼揣倄而報徳何期臣限守藩條不􅀗􅁛謝行在無任荷㤙戀聖屏營之至謹奉狀陳謝以聞謹奏謝詔示徐州事宜狀右臣先奉詔㫖㩀時溥奏卿本道􅏔兵侵境殺傷令務止遏者臣遂具時溥誣謗事由申奏伏奉二月二十五日詔㫖今則冦孽不日勦除藩方務息争竸所冝和叶各保封疆者臣伏以天德既高側管者固難窺測日恩至廣戴盆者自阻照臨是以逺竭愚誠動違聖慮時􅄎旣銜睿奨得縦兵威早成熊㩀之謀更展鯨吞之􅀔累興師旅来犯封疆焚郭邑於山陽掠資財於淮上臣遂令捍禦略挫􅇯狂而乃時􅄎奸計巳成根株巧言頗有枝葉不思巳過敢惑宸聦今者再奉絲綸仰遵徽纆唯期寛則得衆粗可和而不同臣分閫無㓛戢兵為務至於草㓂猶許歸降况是隣藩豈謀侵擾彼無此詐此無彼虞臣限拘鎮守不􅀗􅁛謝行在無任感激屏營之至謹奉狀陳謝以聞謹奏謝詔止行墨􅃙狀右臣伏奉詔㫖去春權降詔命許諸道承制除官巳兩度降􅃙止絶自今後凡有要甄奨者並扵急逓奏聞不得更議承制者臣伏以漢朝鄧禹始啓倖門魏室曹瞞敢専重柄欲敦扵自家刑國􅀁惜者唯器與名伏遇陛下逺事宸遊慮防爵賞遂降無私之澤遍資諸道之權不料人人而竸弄茟端處處而皆誇墨􅃙長蛇封豕猶匿暴於神州狗尾羊頭巳成群於列鎮臣前年雖奉詔㫖未欲施行却縁親率軍兵逺期征討此時乆屯南浦将泛西江忽被鎮海節度使周寳欲感軍情潛施巧計便以無㓛将吏悉皆超授官榮臣所領士䘚旣多将校不少彼安㘴者猶爲甄奨此逺行者豈免怨嗟邇口聲􅀓􅀙頭憤激臣若不依周寳必恐事生遂准詔書得行軍賞巳曽一一具事由申奏訖自奉前年十一月一日􅃙㫖仰遵成命静守常規至扵近日所招賊徒只與徃時先賜官告曾無僭越豈可隱蔵今者外将忠誠永當無二大君善教巳至再三泣告而天何未聆憂懐而地謂可入臣限拘藩鎮不􅀗􅁛謝行在無任戰越屏營之至謹奉狀陳謝以聞謹奏謝郄公甫充監軍手詔狀伏奉某月日􅃙書手詔各一封右新授當道監軍郄公甫四月十日到伏蒙聖㤙賜臣􅃙書手詔兼慰喻臣及将校䓁九天降詔萬里宣㤙柳營之列将歡呼桂􅁐之群寮感泣伏以郄公甫素懐材略乆撫軍戎漢南之職業可觀江北之物情􅀗頼旣見寛􅀎得衆必令師克在和臣仰窺五色之書俯慰三竹之士喜氣髙侵於畏日歡聲逺振於薰風臣與将校䓁無任感㤙激切榮抃屏營之至謹奉狀陳謝以聞謹奏謝除鍾􅀓充江西觀察使狀右臣先奏請授鍾􅀓江西觀察使其高茂卿乞别除廉鎮伏奉七月五日詔㫖􅁢許特賜奨餙者天從素望風遞仙音旣諧舉善之誠實叶分憂之􅀉伏以鍾􅀓比從属郡来援府城撫綏而使洽衆情禦備而􅀎成逺略高茂卿旣多梗阻不免佪翔固難掉鞅而旋豈許垂槖而八臣以戒之在闘事可􅀙權遂具奏論􅂺陳利害不料一言之善􅃍得動天終令二将之才皆榮列􅁟鍾陵江徼銅柱海隅政成而必有可觀恩重而各得其所臣限拘鎮守不􅀗􅁛謝行在無任感激兢灼之至謹奉狀陳謝以聞謹奏謝就加侍中兼實封狀右臣得進奏院狀報伏奉某月日㤙制加授臣侍中餘並如故仍加食實封一百户者九重降命萬里􅀓聲側聆而踊躍忘疲内揣而怔忪失措伏以納言進秩頒邑賞㓛固須徳望鎮時仍有勲勞濟物然後方可謂君無虛授臣無虗受如臣者謬提旄銊免墜弓裘空有志於四方竟無􅀎於一割况自群􅇯蝟結戰陣蛇奔狂鱗乆􅃧於鼎中聖駕逺廵於劒外臣也動不􅀎剗烟塵之患静不􅀎瞻山海之資遂蒙改易兵權分張搉課雖值盤根錯節其如有斧無柯安􅀖之計策何成富國之機謀莫就唯甘黜爵以警􅕎官豈期陛下㤙洽無偏義深宥過特超衆例許陟高資印標石􅍎之祥早慙不次冠聳金貂之餙愈覺非宜况叨真食之榮實愧素餐之咎但属狼星未滅鯨浪猶翻方期抗斾以専征不敢懸車而請老謹當訓兵是務殄㓂爲期粗中武弁之威仰報西門之賞臣限守藩鎮不􅀗􅁛謝行在無任感㤙戀聖戰汗屏營之至謹奉狀陳謝以聞謹奏謝秦彦䓁正授刺史狀新授和州刺史􅁗彦新授滁州刺史許勍右件官臣先奏請各授管内刺史今月某日得進奏院狀報伏奉某月日􅃙㫖􅁢許者九天降寵兩地分榮覩降将之懐㤙喜元戎之􅀗請伏以秦彦䓁比者爲梟爲獍維虺維虵乆流螫蠹之災未有誅鋤之便臣偶令招諭旋自歸投遂假分符皆􅀎守節誠宜奨勸輒具奏論今者聖澤濡枯皇風盪垢􅂊擲黄巾之餙許登皀盖之資秦彦䓁旣荷新㤙永除舊􅁖必也出榮建隼八効懸魚學其守􅁟之規贖彼㴞天之罪臣限抅藩鎮不􅀗􅁛謝行在無任抃戴兢灼之至謹奉狀陳謝以聞謹奏桂􅁐茟耕集卷之三
