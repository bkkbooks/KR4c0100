front:
  text: 桂苑茟耕集卷之十七
  hash: sha256:c68423ca746a1a7713f23b48e421da022e155b010a52cfd2f0a1f920d129c31a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_017-1a}
body:
  text: 初投獻大尉啓再獻啓謝生料狀獻詩啓詩三十首謝職狀謝借宅狀出師後告辭狀謝令從軍狀謝借舫子狀謝許奏薦狀初投獻大尉啓某啓伏以嶽之髙與海之深物所歸而人所仰逈拔千仞平吞百川其如巘崿擎天波瀾蘸日豁四方之眼醒萬族之魂是宇內之所歌謡匪毫端之能贊詠伏惟司徒相公獨抱神略一匡聖朝譽洽于良哉康哉名標于可久可大龔黃德政則郡民有遺愛之碑韓白功勳則國史有直書之茟况某劣同窺豹淺比傾螺難將篆刻之詞輒頌陶鎔之業但以間生賢哲年當五百之期廣集英豪客滿三千之數既納之似水則來者如雲斯乃司徒相公鏡于心而寬兮綽兮枰于事而無偏無黨網羅雋彥籠罩驍雄于儒則沈謝呈才于武則關張效力遂使弓旌招隱士巖谷為之一空介胄降叛夫烟塵為之四息豈獨分憂于閫外實惟稱慶于寰中莫不信齊于春夏秋冬恩播于東西南北但日月照臨之所是風雷變化之時然則尼父堂中亦有他鄉之子孟嘗門下寧無逺地之人片善可稱前賢不讓永能執大邦之政豈欲遺小國之賔是以敢寫微衷輕投朗鍳某新羅人也身也賤性也愚才不雄學不贍雖形骸則鄙年齒未衰自十二則别雞林至二十得遷鶯谷方接青襟之侣旋從黃綬之宫既忝登龍敢言絆驥今者乍離一尉欲應三篇更碩進修且謀退縮獨依林藪再閲丘墳課日攻詩虞訥之詆訶無避積年著賦陸機之哂笑何慙俟其敦閲致功琢磨成器求魚道在垂竿而不挂曲鉤射鵠心􅌹撚筈而兾䘖後鏃端操徑莭佇望良時竊見萬物投誠八紘嚮德不謁相公賔閣不逰相公德門者詞人之所懷慙羣議之所發誚某固敢墮肝瀝瞻進牘抽毫不避嚴誅輒申素懇謹録所葉雜篇章五軸兼陳情七言長句詩一百篇齊沐上獻冒犯尊威不任戰懼之至謹啓再獻啓某啓某今月五日謹以所學篇章五通貢于賔次雖慙獻豕輒覬攀龍修客路以心摧望仁風以目斷乍覩秦雲之態或似美人細看燕石之姿恐為棄物伏蒙司徒相公光逾愛日煦及寒灰念以逺别海隅久沉江徼特垂豐餼俾濟朝飢自驚樗櫟之材已荷稻粱之惠雖龜魚投水驟喜命蘇而蚤蝨負山深憂力敗且某也兔絲雖絡蛛網自營萬計尋思不如學也百年勤苦猶恐失之所以未竸宦塗但遵儒道噬仕而懶趨塵土卜居而貪憶林泉人間之要路通津眼無開處物外之青山緑水夢有歸時所碩更淬鉛刀終求鐡印斂跡而跧藏學藪安身而跌宕詞林嘗誦古詩還符此意云志士惜日短愁人知夜長某既懷志士之勤又抱愁人之苦聊慿毫牘敢述肺肝且如踏壁冥搜杜門寂坐席冷而窗風擺雪茟乾而硯水成氷欲為尼父之絶編無奈羲和之促轡即可知指萬卷之經史恨三冬之景光及其凍枕傷神孤燈伴影寒漏則滴殘别淚遙砧則搗破羈心空勞寧戚之悲歌莫繼陸機之安寢亦可想貯千端之欎邑過五夜之寂寥然則志士之勤也既如彼愁人之苦也又如此况某家遙日域路隔天池投客舍而方甚死讎指何門而欲安生計唯慮道之將廢豈言人不易知不敢以陋質凡姿覲相公清嚴之德不敢以片言隻字希相公採録之恩所望者或以其萬里地逺來十餘年苦學稍垂惻憫得濟困窮則必堅背水之心終為勇士决移山之志不讓愚公伏以某譯殊方之語言學聖代之章句舞態則難為短袖辨詞則未比長裾舌無三寸之能空緘壯氣腸有九回之懇但戀深恩干浼尊嚴下情無任感戴兢惶涕泗之至謹啓謝生料狀某啓某昨日伏蒙仁慈再賜生料恩垂望外喜集愁中安貧而已贍晨炊感德而惟知宿飽遂使范家釡甑免恨長間顔巷單瓢倍加其樂伏以某雖楊曽穿䈎而蓬且斷根空把利錐兾遇大賢之鑑豈將長鋏先興下客之歌一昨輒貢蕪音纍塵尊聽窺德宇而燕雖相賀望威風而鷁恐退飛豈料司空相公俯念海人久為塵吏特垂記録繼賜沾濡生前之溝壑無虞飢寒雖濟頭上之丘山漸重負戴難勝依投而既類窮猿展效而碩同病雀下情無任云云獻詩啓某啓某竊覽同年顧雲校書獻相公長啓一首短歌十篇學派則鯨噴海濤詞鋒則劒倚雲漢僃為贊頌永可流傳如某者跡自外方藝唯下品雖儒宫慕善每嘗窺顔冉之墻而茟陳爭雄未得摩曺劉之壘但以幸逰樂國獲覩仁風久貯懇誠兾伸歌詠輒獻紀德絶句詩三十首謹封如别㝎王拙舞適足自嫌嫫母濃粧轉為人笑不足贊揚休烈翻憂浼黷尊威然聖人以激勸誠深不間互鄉童子學者以揣摩志切皆投鬼谷先生伏惟特恕荒蕪俯垂采覽所兾趨仁化于江北終得傳美談于海東唐突藻鍳下情無任戰栗之至謹啓七言記德詩三十首謹獻司徒相公兵機一惟將志業練春秋早蓄雄心剗國讐二十年來天下事漢皇髙枕倚留侯茟法見說書窗暫卧龍神傳妙訣助竒鋒也知外國人爭學惟恨無因乞手蹤南朝蕭子雲善書百濟使人求手蹤以為國寶性針波澄性海見深源理究希夷闢道門詞翰好傳雙美跡何須更寫五千言雪詠五色毫編六出花三冬吟徹四方誇始知絶句勝聯句從此芳名掩謝家射鵰能將一箭落䨥鵰萬里胡塵當日銷永使威名振沙漠犬戎無復吠唐堯安化班茟由來不暗投旋驅㷱隼待封侯郡名安化能宣化更指河湟地欲收練兵隴水聲秋塞草間霍將軍暫入長安太平天子憐才略曽請陳兵盡日看磻溪刻石書蹤妙入神一回窺覽一回新况能早遂王師業桃李終成萬代春伏覩相公磻溪詩云及到王師身已老不知辛苦為何又又經虢縣詩云手栽桃李十餘春今日經過重建勳射虎巨牙鉤瓜礙王程一箭摧班四海驚白額前驅姜膽碎方知破石是虗聲秦城逺提龍劒鎮龍庭外户從茲永罷扄掃盡邉塵更無事暮天寒角醉吟聽生祠古來難化是蠻夷交趾何人得去思萬代聖朝青史上獨傳溪洞立生祠射鞭休說㦸枝非易中莫言楊葉是難穿須看立莭沙場上永得安邉為射鞭安南西戎始㝎南蠻起都護能摧驃信威萬里封疆萬户口一麾風雨盡收歸天威徑鑿斷龍門猶勞身擘分華嶽徒稱神如何劈開海山道坐令八國爭來賔岝口徑濟物能回造化心驅山偃海立功深安南真得安南界從此蠻兵不敢侵收城碑功業已標征北賦威名初建鎮南碑終知不朽齊銅柱况是儒宗綴色絲碑今度支裴僕射撰詞執金吾一陳風雷㝎八蠻來趨雲陛恱天顔王孫仕宦多榮貴心為匡君不暫間天平海岱烟塵匝鄆城遙揮一劒落攙搶征旗不動降旗盡永使天平地亦平釣魚亭錦筵花下飛鸚鵡羅袖風前唱鷓鴣占得仙家詩酒興間吟烟月憶蓬壷伏覩相公在鄆州詩云酒滿金船花滿枝雙城齊唱鷓鴣詞又釣魚亭詩云水急魚難釣風吹栁易低相印早說休徴應佩刀台星光接將星髙欲迎霖雨歸龍闕看滅妖氛展豹韜西川逺持龍斾活龜城威懾蒙王永罷兵應笑欒巴噀杯酒雨師風伯自歸行平蠻卭峽關東蠻塵絶平夷鎮扼蠻地裂又築羅城變錦城蠻兵永滅功不滅築城一心能感衆心齊鐵甕髙吞劒閣低多上散花樓上望江山供盡好詩題荆南虎吼龍驤出峽來福星才照陳雲開遙思屈宋忠魂在應向風前奠一杯漕運濟川已展為舟葉煮海終成富國功能與吾君緩宵旰為資心計四方通浙西九江賊膽望風摧萬户愁眉向日開椘舞吳歌一何樂相逢相賀相公來降冦唯將德化欲銷兵長笑長平恣意坑更想太丘行小惠何如言下濟羣生淮南八郡榮超陶太尉三邉靜掩霍嫖姚玉皇終日留金鼎應待淮王手自調劒南荆南淮南乃天下名鎮相公纍移莭制西戎南蠻東鄙賊起相公皆自討除朝上清齊心不倦自朝真豈為修仙欲濟人天上香風吹椘澤江南江北鎮成春陳情俗眼難窺氷雪姿終朝共詠小山詞此身依托同雞犬他日升天莫棄遺謝職狀右某今月二十五日伏奉公牒特賜署充館驛巡官者恩降台階光生旅舍承命而吟魂乍懾叨榮而病骨能蘇攀依有心荷戴無力伏以某樗生曠野莠託荒田豈惟良匠不窺抑亦農人見棄風欹弱植難舉勢于凌雲塵織纎莖但懷愁于委地昨者不慙狷者輒效狂生纍貢巴詞仰瀆秦鍳伏惟司徒相公念以來從異域逺寓樂郊俯愛似龍不嫌非鳳拔衰英于糞上搜滯刃于獄中許厠嘉賔仍沾厚俸神仙見顧稍親郭隗之㙜駑蹇何施得主鄭莊之驛况乃念子襟之志業辱華衮之褒詞刻畫恩深已能長價琢磨志切終碩成功修身則飲水懷氷錬思則吟烟嘨露唯當勵莭以謂報恩謹詣衙門祗候陳謝下情無任感激倣徨榮懼之至謹狀謝借宅狀右某昨日客司奉傳處分借賜官宅安下者仰聆尊㫖俯省庸才既榮投跡之有門唯恨殺身之無路伏以某自趨龍斾免泣牛衣職奉非輕書糧頗贍嘗讀魯論語曰學而優則仕仕而優則學是以望東開之閣永誓依仁坐北面之􅙘唯期隸葉非敢隱居而不嫁秪將直道而自媒今者幸寓樂郊况栖靜室簦屩則不勞涉逺簞瓢則永遂安貧豈謂愛間誠堪養勇三年就學非慕藺之心一日成功碩滿依劉之志下情無任感恩激切兢惕之至謹詣衙門祗候陳謝謹狀出師後告辭狀右某伏念來從異域託在德門昔曽名列桂科未知稱意今忝職居蓮府始覺榮身恩既厚于稻粱跡能安于萍梗日增學植月瞻書糧豈期市駿之金傍沾駑騫唯愧封侯之印未效禎祥今者屬以大憝逋誅中朝多難頃煩豹略佇滅豺聲伏惟太尉相公身耀福星均臨庶類手傾霖雨遍洗妖氛逺命舟師重興國祚華夷則望風競抃蠢植則剋日當蘇若某者空有肺腸方重禱祝恨無羽翼一遂奮飛望龍莭以魂銷窺虎威而股栗雖則熊羆之力共喜安人其如犬馬之心常增戀主一情無任攀依激切涕泣之至謹狀謝令從軍狀右某適見客司俸傳處分令借舟船隨從行李者深恩既降壯氣潜伸勵心而碩效驅馳感德而難勝踊躍伏以某塵中走吏海外腐儒五能非自濟之資一割無可施之處唯增慷慨已分沉淪豈無投筆之心時應未偶空有請纓之志力且難成誰謂忽被殊私不遺賤跡許隨旋斾借賜舟航蹇足無堪敢望維駒之念麼姿何幸遽叨泛鷁之榮况當泣路之時永荷濟川之賜下情無任感戴欣躍兢惕之至謹狀謝借舫子狀客司奉傳處分借賜舫子安下者某方脫窮鱗得攀畫自慙跡在塵吏忽訝身為水仙則彼甘寧割錦纜而呈奢顧愷毀布帆而無恙豈若榮栖德宇又泛仙舟風波無失所之憂烟月有搜吟之暇况清流滿望暑氣銷威每當㝎志安神則乃銘肌刻骨謹課七言長句詩一首齊沐上獻干瀆台階下情無任荷戴兢惕之至謹狀謝許奏薦狀右某昨日見衙前兵馬使曠師禮奉傳處分特賜慰問兼許奏薦令自修狀夲來者俯慙蓬跡仰聽蘭言喜抃而身䡖欲飛兢惶而心戰難遏何者某職叨鄭驛已謂極榮名逹堯階實為過望慿何展效佩此恩光况乃朗鑑氷開英才霧集所宜倒屣則先迎玉粲築臺則次接劇辛如某者輟耕海上之田來泣塵中之路雖云游學尚未成功豈料勤勞莫副於指蹤將念已全于卵翼許令伐善將使警愚每思郤子之驟稱深慙速謗欲效黃公之多讓又恐失時兾緝拙詞仰遵嚴命南宫適之問宣父實有所歸東方朔之對漢皇寧辭自責既忝風雷之變化佇期雨露之沾濡下情無任感戴榮抃兢灼之至謹奉狀陳謝謹狀桂苑茟耕集卷之十七
