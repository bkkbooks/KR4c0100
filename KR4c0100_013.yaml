front:
  text: 桂苑茟耕集卷之十三舉牒草五首內行墨敕牒詞五百
  hash: sha256:1ae1b4d82257e01c70a241d630e5dab198d96933e367cdbeaf8209657f0b1b65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0100_SBCK_013-1a}
body:
  text: 授都將右散騎常侍授盱眙鎮將鄒唐兼御史中丞授椘州刺史張雄將軍授髙霸權知江州軍州事許勍妻劉氏封彭城郡君請莭度判官李琯充副使請副使李大夫知留後請髙彥休少府充鹽鐡巡官請泗州千濤尚書充都指揮使王棨端公攝右司馬右司馬王棨攝鹽鐡出使巡官前邵州録事參軍顧玄夫攝桐城縣令海陵縣令鄭𣏌前宣州當塗縣令王翶攝揚子縣令柳孝讓攝滁州清流縣令前浙西館驛巡官鄉貢三傳張咸又攝山陽縣丞前㜈州金華縣尉李涵攝天長縣尉前頴上縣主簿鄭綬攝盛唐縣丞諸葛殷知榷酒務李昭望充奉國巡官柴嚴充洪澤雨塘巡官許權攝觀察衙推充洪澤巡官王棨端公知丹陽監事臧浣知鹽城監事趙詞攝和州刺史行墨敕授散騎常侍牒詞敕淮南莭度鹽鐡轉運等使東面都統兼指揮京西京北神䇿諸道莭度兵馬制置等使牒某官乞右可檢校右散騎常侍餘如故如將軍須言貟外置同正貟牒准今年二月九日詔應諸州有功刺史及大將軍等如要勸奬者從監察御史至常侍便可墨敕授訖分折聞奏者大君降命元帥從權但云能立勤勞特許先申奬勸漢祖則手無刓印不阻論功武侯則心若懸衡必能舉職用示軍中之賞式資闕下之恩前件官夙藴壯圗久從戎事將救奔沉之患固慿擒縱之能桓榮祖之馳名不唯馬矟周盤龍之受爵允稱貂冠事須准詔授檢校右散騎常侍仍具申奏并牒如者故牒廣明二年六月十二日使兼都統檢校大尉平章事燕國公授盱胎鎮將鄒唐御史中丞牒准詔云云將軍分間大夫出疆可􅌹未請之權况奉已成之命髙懸懋賞用報竒功前件官術繼白猿名齊赤免夙歸信義僃察忠良雖遷柱下之官尚慊軍中之望冝升􅌹席更勵枕戈爾其心保清廉好對映淮之月力誇驍鋭無慙破浪之風事須准詔行墨敕授御史中丞椘州刺史張雄將軍牒准詔云云見功必賞漢髙祖之殊恩承制無疑鄧司空之故事前件官材標落落韻禀錚錚自假使符已揚政績理股胘之名郡登耳目之髙官信義相從功名愈振佇擅外臺之寄冝升大樹之資爾其益勵忠規仰䘖成命用副劉弘之善舉無嗟李廣之難封事須准詔行墨敕轉授右武衛將軍貟外置同政授髙霸權知江州軍州事牒准詔應諸州刺史如有軍功卿量加爵賞如有罪犯卿冝書罰别差人知州具狀申奏者大元帥之權既資成命古諸侯之任宜選良才前件官蛟躍池中虎蹲岸上用軍以義守莭唯忠不辭白刃之危纍挫黃巾之衆或短兵鬪勇或圎陳呈竒動有所成往無不利今以九江闕牧一郡思春將活疲氓固慿幹吏爾其遏強撫弱削弊蠲苛無登庾亮之樓空知玩月好把袁宏之扇且學移風稍展政聲佇沾恩命事須准詔行墨敕差知江州軍州事仍具事由申奏并牒知者許勍妻劉氏封彭城郡君牒奉處分古者官至大夫室稱命婦遂有從夫之貴乃為處世之榮而况靜則能慎內言動則克從外役躬擐甲胄志凌雪霜功名既異于常流封拜豈拘于成命以滁州刺史許勍妻劉氏英才天授貞莭日彰平欺後魏將軍洛陽失行仰慕聖朝公主司竹興兵一昨􅌹命良夫討除叛卒遽陳丹赤固碩同征手驅組練之羣逺攻城壘身脫綺羅之色久犯氛埃四德有餘六韜可試豈獨家之肥也實謂邦之媛亐夫既冠其銀鐺婦宜榮于石窖豈可使松標峻影早致凌雲蘿抱柔姿猶嗟委地先行茂賞用報前功軍中之舍爵䇿勳與人從欲天上之錦箋鈿軸待鳳䘖來事須准詔行墨敕封彭城郡君仍表次録奏并牒知者請節度判官李綰大夫充副使牒大夫天芝禀秀霜桂含貞蔚爾芳猷每見用和為貴凛然直氣終能嫉惡如讎信知賢良實救凋弊頃者再握一同之政曽標三異之名既發縣花佇分郡竹而乃鵾鵬自滯羔鴈相從巨野卑栖劒川逺役察俗而唯資婉畫犒師而不乏豐儲果得入奏玉墀出懸金印洎某暫臨江陸旋鎮海門永言移莭之難咸假運籌之妙一來淮甸四換星霜判官德以潤身固為已任恩能濟物不欲人知蒞事實繁在公匪懈筆直而吏多畏色鞭輊而獄絶冤聲見君子之盡心實古人之用意十二年之弘益久而彌芳千萬里之追從永以為好雖將徐榻别致猶恐燕臺未高今已假小秩宗兼大司憲不遷職位何稱官榮幸屈跡于副車兾揚威于戎幕陳寵宣詔條無失嘗賴功曺吕䖍致郡俗永安亦憑别駕若言今日彼在下風事須請攝莭度副使表次録奏請副使李大夫知留後牒大夫劒橫天外珠媚水中雄􅏢則仰决浮雲溫潤則㫄無枯草深藏利哭久佐逺藩每施婉婉之謀共化蚩蚩之俗五鎮相倚一紀于茲嘗于折獄按刑唯遵直道縱至旬休莭假不離公門敢言知已之難實荷成人之美今已三年玩冠尚恣侜張十道徴師遞相逼撓若不􅌹征鈇銊何因倒載干戈遂驅飬勇之鋒佇破稔奸之窟代行拙政留託長才慰八郡之疲羸察四鄰之劻勷兾使袁宏黎庶粗識詠歌無令陶侃賔傄只耽間戲數年卧理今日出行皆資裨助之功聿保始終之惠事須請知觀察留後請髙彥休少府充鹽鐡巡官牒少府學麟成角詞鳯傳毛偶輕桂客之逰暫樂梅仙之白鶴唳而月籠寒野萬里清音鵬飛而雲簸長天九霄髙躅幸聮宗黨得接徽猷敢興念于維駒無見辭于絆驥稍假縱橫之術終匡幹運之權雖慙燕國之金臺碩接謝家之玉樹同姓必親于異姓今人何讓于古人事須請攝鹽鐡巡官表次録奏請泗州于尚書充都指揮使牒尚書洞究儒經㫄探武緯指清途于萬里牧逺羣于三年旟看隼飛輈待鹿挾慰疲氓以仁政捍冦盜以智謀克歸合浦之珍曽散曲堤之衆今者徐戎遺燼敢恣侵凌椘卒精鋒佇期掃蕩終免致包胥之哭况非奪晉鄙之軍但以鷹犬呈功㷱羆就列須俟指揮之命仍申搏噬之能實託威權逺希統攝俾瞻馬首皆知進退之宜永滅梟聲用審否臧之律事須充都指揮使其應援諸都及寧淮盱胎淮隂等三鎮將士悉受指揮王棨端公攝右司馬牒端公烏衣茂族鶴氅清流早列官榮頗精吏術口中金石常聆直韻之髙手下銅鹽曽展長才之妙事既同于外舉理無愧于㫄求今則秩挂方書職參典午雖云承乏且欲試能憲府威􅏢他日見豺狼懾伏郡庭間散此時樂魚鳥留連事須差攝右司馬右司馬王棨端公攝鹽鐡出使巡官牒奉處分且權管之設也本資戎事將贍軍須既當薄伐之期實藉均輸之利能成重務固選良才端公韻振維山慶流淮水靜處五常之域勤尋六義之門每覽緣情備知守莭繼委當仁之任皆傳幹吏之名已為㦄試諸難可謂多能鄙事今以仰裨國用㫄濟兵儲權課方殷句稽匪易官居典午既已優間志在推公無辭冗屑佇糜幕職立展籌謀雖見王晞長寄心于方外何妨裴楷暫勞力于俗中事須請攝鹽鐡出使巡官句勘當司錢物前邵州録事參軍顧玄夫攝桐城縣令牒前件官善水無壅謙山自髙腹飽詩書口含鋒刃厚利唯勤于耕道間情素懶于釣名為踈奔竸之門尚處卑栖之地既能潔已何惜愛人州主簿之提綱昔嘗留意邑大夫之製錦今可呈功永言不憚勤勞方謂克承闕乏稍念時危而慎守勿云俗弊而難除一門多詠雪之才衆推儒慶百里渴象雷之理勉振政聲事須差攝舒州桐城縣令海陵縣令鄭𣏌牒奉處分字人之政為吏所難欲俟三年有成同須一日必葺永言委任實籍賢能前件官深于詩敏于行不近劉與脂膩唯資謝朏膏腴纍假一同備彰三善眷彼東吳之近境實為南兖之奧區昔也承乏多勤去思猶在今可以舉舊令尹之政修真君子之誠均調政刑遍慰黎庶展驥終希于得路割雞無憚于發硎行乎敬哉勿墮乃力事須請攝海陵縣令前宣州當塗縣令王翺攝楊子牒奉處分宰字之術若驅羣雞緩之則散急之則亂此言雖小其理甚中知者非難行之不易况乃隋城近邑楚岸通津螟蝗則久待消除鱦魠則每思飬肴前件官相門積慶儒室推賢早登廉孝之科嘗歷句稽之任雖棲下位不墜令名果逢連師之知再假字人之秩雉誰忍捕鵲自停喧陶潜之腰腹暫孔奮之膏腴下潤今以楊子一同繁劇四逹要衝每當使命交馳實託宰傄勤幹遂重責成之寄况逢多事之秋而乃有令患風請告踰月若言考秩亦合替移固選長才俾修闕政其在上贍夏日下視春水冝無憚于徒勞佇有成于歷試苟有經年沉醉必虧蒞事之能如將終夕清談亦失相時之理勉于二說慎自三思事須差攝揚子縣令柳孝讓攝滁州清流縣令牒奉處分今世之奬邑大夫也多以河陽花彭澤柳為美士永言至理我則不然唯某在其視人如傷潔已以仕能懷氷蘗之操逈掩花柳之名實難其才得副吾意前件官展禽苗裔言偃政能曽宰濟隂克安屬邑久依江徼靜守窮居數年而雖甚食貧直道而未嘗改莭今將歷試俾假缺貟無興喧鵲之譏勉致驅雞之術事須差攝滁州清流縣令前浙西館驛巡官鄉貢三傳張咸又攝山陽縣丞牒奉處分前件官族資鵲印業練麟經未躬壯圖嘗從碎職既精簡牘之事寧辭州縣之勞習傳之體有三能詳正義在公之心無二宜慎爾官往矣敬哉賞罰斯在事須差攝山陽縣令前婺州金華縣尉李涵攝天長縣尉牒奉處分夫縣尉之設也其官雖卑其務甚重動則推詳滯獄靜則慰撫疲氓是以佐傄能無其直聲宰尹亦懷其畏色永言至理實繫長才前件官性習五常身資一命嘗佐金華劇色頗傳玉潔髙名久見退修誠思進取俾助養鱦之政且升化鮪之資其在蘗作朝餐氷為夕飲髙懸曺捧靜和宓琴譽能息于鵲喧勢必登于鴻漸云云前頴上縣主簿鄭綬攝盛唐縣丞勇韋緘評事薦牒奉處分凡城一邑皆列六曺雖云具體而微豈可從心所欲况縣丞之佐理也令長憚其糾摘猾吏禀其規程苟能自強何患不立前件官康成求已季智奉公曽申頴上之勤勞遂見渭陽之論舉桓談二政且冝肅彼奸豪殷浩吟詩無用傷其貧賤事須差攝夀州盛唐縣丞諸葛殷知榷酒務牒奉處分榷酤之權起于漢代㑹訃之利著在周經既當預僃闕懸難可不從改作將成重務固選良才前件官隱豹含章卧龍襲慶潔已則隋珠無類在公則庖刃有餘昨分孔僅之重司已成歷試今躡魯匡之良䇿何憚􅌹勤無辭鄭驛之卑棲早致卓爐之餘利能資美祿必贍雄師所期百姓無譁非阻三軍告醉事須差攝館驛巡官􅌹知榷酒務李昭望充奉國巡官牒奉處分昔孔子誡伯魚學曰其先祖不足稱其族姓不足道然而大以流聲後裔者豈非學之所致乎若然則先祖之與族姓也不唯時世所榮亦乃聖人所重前件官搢紳上品結綬中朝方襲藝香遽飄蓬跡逺逃虎口猶絆驥蹄今以一言為賢三代可數但渭陽之族坐振重名漂流淮徼之居來永碎職遂茲響應用試才能既知各有司存唯在聿修厥德事須𥙷充椘州營田奉國巡官柴巖充洪澤雨塘巡官椘州榮田牒奉處分三農就稔一溉推功苟非降雨之渠何以致如雲之稼俾無墮惰固藉􅌹勤前件官壯志不渝公才可任承乏而善參軍事慎終而益見吏能今以洪澤近封雨塘美號徴小喻大升髙自卑爾其靜朂氷心潜窺水脉勉禀龔黃之令逺繼田曺無慙鄭白之名有虧地利髙懸賞罰用試否臧事須差充椘州營田院洪澤雨塘􅌹知官許權攝觀察衙推充洪澤巡官牒奉處分撫俗所先勸農為最是以鄭渾則奪其獵具溫嶠則請置田曺仰順天時俯徴日力俾督耕夫之業須慿幹吏之才前件官歷試已多忠勤可奬令尹之功成製錦督郵之政克提綱但承闕乏之時皆有緝綏之譽今以山陽沃壤淮畔奧區地占三巡田逾萬頃非乏决渠為雨尚虧多稼如雲蓋為編氓不勤功于藨蓘縱當稔嵗皆失利于稻粱知爾奉公勸民務本若使耰而不輟必期敏則有功委以農時假之使職永言從政實可與權無取潤于膏腴苟徇私于毫髮勉施乃力廣諭衆心事須差攝觀察衙推充洪澤巡官兼都巡勘指揮奉國謝陽等巡務者王棨端公知丹陽監事牒前件官蹈氷守節飲氷安貧靜吟而篋有新詩寂坐而門無雜客卓爾君子宛然古人今以將濟軍須誠資吏術少輟琢磨之業俾􅌹鼓鑄之權想夷甫之不言無虧祖德思仲宣之未遇勉俟官榮事須差知丹陽監事臧浣知鹽城監事牒奉處分若官無直道則利有多門凡歷任于牢盆或成資于潤屋而乃就此繁劇守其潔廉心誅則不惹脂膏智刃則能分髖髀嘗聆斯語罕覩其人前件官雅淡裝懷清勤綰務嘗握由拳之榷課唯遵止足之規模休替末遙功勞可驗更資歷試必濟重難展才于近監之鄉守莭于作鹹之地不須對雪空中吟謝朗之詩只在熬波言下見張融之事須補充權糶使巡官知鹽城監事趙詞攝和州刺史牒奉處分昔張緒子充少好逰獵右臂鷹左牽犬緒見而謂曰一身兩役無乃勞乎充跪答曰丈夫三十而立今二十九矣請至來歲緒曰過而能改顔氏子焉其後折莭修身終為賢達則古之豪俊今可規模前件官脫跡迷途投身義永除惑志可奬悛容既能資父事君是得居官理務俾參上佐用試忠誠况當榮之時好縱安居之樂詞其勉輸後效善補前愆已銷九族之憂無起一朝之忿事須差攝和州刺
